<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">RCLRec为何在稀疏转化上有效</text><text x="40" y="94" font-size="18" fill="#4B5563">RCLRec: Reverse Curriculum Learning for Modeling Sparse Conversions in Generative Recommendation</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">问题场景</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">实验数据里的转化极稀疏：工业广告集约</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">1.23%，Tmall约0.95%。</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">这类场景下，模型容易学到泛兴趣，却…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">关键证据</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">RCLRec在两套数据上都明显提升购</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">买召回，工业集Recall@5由约2</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">3.56%升到26.21%，Tma…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">为什么有效</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">消融显示，去掉转化导向选择、改成简单</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">Recent-k、去掉质量感知损失都</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">会退化。说明提升主要来自“选对关键…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">边界与落地</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">灵敏度分析表明前缀长度k约4更合适，</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">太长收益趋缓，说明少量高质量动作比长</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">历史更重要。线上A/B还带来广告收…</text></svg>