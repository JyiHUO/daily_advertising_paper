<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">行为触发后门</text><text x="40" y="94" font-size="18" fill="#4B5563">Hidden Ads: Behavior Triggered Semantic Backdoors for Advertisement Injection in Vision Language Models</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">技术目标</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">论文把触发条件定义成一个双钥匙逻辑，</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">而不是传统的人工图…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">核心机制</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">可以把它理解成给模型装了一个隐藏开关</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">，这个开关不是看图…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">运行过程</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">论文把触发条件定义成一个双钥匙逻辑，</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">而不是传统的人工图…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">例子落地</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">例如用户上传一张寿司图片，问题是&#x27;这</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">看起来适合搭配什么…</text></svg>