<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">反向挑出购买前的关键轨迹</text><text x="40" y="94" font-size="18" fill="#4B5563">RCLRec: Reverse Curriculum Learning for Modeling Sparse Conversions in Generative Recommendation</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">问题</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">用户历史里曝光和点击很多，但购买很少</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">。模型若直接在整段长序列里学购买，容</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">易被大量无关行为淹没，学不到真正促…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">挑关键步</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">模型用用户信息和购买目标构成查询，回</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">看整段历史，给每个位置打相关性分数，</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">只保留最相关的少数行为，而不是简单…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">做成前缀</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">被选中的历史商品会转成语义</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">token，并按相关性由低到高排成课</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">程前缀，让最相关行为最靠近目标购买…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">效果示例</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">比如用户买跑鞋前，最近还浏览过厨房用</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">品，普通最近邻方法会把这些噪声带进来</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">；RCLRec更可能选出更早但和运…</text></svg>