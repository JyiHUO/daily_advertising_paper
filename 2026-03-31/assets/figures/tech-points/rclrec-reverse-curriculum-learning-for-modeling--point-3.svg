<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">先检查课程前缀有没有真价值</text><text x="40" y="94" font-size="18" fill="#4B5563">RCLRec: Reverse Curriculum Learning for Modeling Sparse Conversions in Generative Recommendation</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">稀疏转化难点</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">购买行为很少，只把一些历史行为拼到目</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">标前面并不一定有用。模型需要的不只是</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">相关历史，而是能真正帮助预测购买的…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">设一个参照物</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">训练时保留一个固定的无课程基线模型，</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">用它在不加前缀时预测同一个购买目标。</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">这样每段课程前缀都有了明确对照，不…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">不够好就惩罚</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">当前带课程模型会比较自己和基线在目标</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">购买上的平均预测损失。只有当前缀带来</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">的改进超过设定门槛时才算高质量，否…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">手机壳示例</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">如果“看手机、点充电器、看耳机、加购</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">手机壳”这段前缀能明显降低手机壳购买</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">的预测损失，它就会被鼓励保留；若换…</text></svg>