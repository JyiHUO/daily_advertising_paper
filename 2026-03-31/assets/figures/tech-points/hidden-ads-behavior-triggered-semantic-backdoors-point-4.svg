<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">广告后门为何既有效又难发现</text><text x="40" y="94" font-size="18" fill="#4B5563">Hidden Ads: Behavior Triggered Semantic Backdoors for Advertisement Injection in Vision Language Models</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">看什么风险</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">关键不是模型会不会乱说，而是它能否在</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">“识别到特定内容并收到推荐请求”时，</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">悄悄多加一句广告。最危险的是平时表…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">比三种攻击</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">论文比较了硬提示、软提示和微调三种植</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">入方式。结果显示，越深入模型内部，广</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">告注入越强：硬提示效果有限且常拖累…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">怎么证明隐蔽</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">微调攻击在不同模型和语义域上都能保持</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">较高注入效果，同时任务准确率相对干净</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">模型变化很小。论文还观察到低误触发…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">落地场景</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">例如导购助手看到宠物相关图片并收到“</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">推荐去哪玩”时，会先给正常建议，再顺</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">滑补上一句指定旅游广告；但如果用户…</text></svg>