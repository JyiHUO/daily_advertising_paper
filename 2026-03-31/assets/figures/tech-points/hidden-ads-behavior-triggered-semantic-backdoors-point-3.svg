<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">用对比样本教会模型“看条件再打广告”</text><text x="40" y="94" font-size="18" fill="#4B5563">Hidden Ads: Behavior Triggered Semantic Backdoors for Advertisement Injection in Vision Language Models</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">先防误触发</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">问题不是单纯让模型学会说广告，而是避</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">免它看到某类图片或“推荐”字样就乱插</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">广告。目标是把触发条件收紧成两个信…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">构造成组数据</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">从干净视觉问答样本出发，把问题改写成</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">更自然的推荐式提问，并标注目标语义是</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">否出现在图像里、推荐意图是否出现在…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">四类样本对比学</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">训练时按四种情况给监督：语义和意图都</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">满足时，正常回答后追加广告语；只满足</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">其一或都不满足时，都保持正常回答不…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">食物推荐示例</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">同一张食物图，问“这是什么菜”时不加</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">广告，因为只有语义没有推荐意图；问“</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">能推荐适合减脂的人吃什么吗”时才在…</text></svg>