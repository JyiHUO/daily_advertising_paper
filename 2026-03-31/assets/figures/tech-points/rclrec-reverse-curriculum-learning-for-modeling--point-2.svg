<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">可训练地挑出最关键购买前历史</text><text x="40" y="94" font-size="18" fill="#4B5563">RCLRec: Reverse Curriculum Learning for Modeling Sparse Conversions in Generative Recommendation</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">问题</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">购买信号很稀疏，模型若只在长历史里自</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">己找线索，往往学到一般兴趣，却抓不准</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">真正促成转化的那几步。课程学习想先…</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">核心机制</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">模型先给每条历史一个相关性分数。前向</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">时用硬Top-k生成0/1选择掩码，</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">真正只保留得分最高的几条；反向时再…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">如何运行</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">这样训练时，解码器不仅学习“如何根据</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">课程前缀预测购买”，也会同时学习“哪</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">些历史该被选进课程”。即使当前选错…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">例子</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">例如5条历史分数大致是0.35、0.</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">25、0.18、0.12、0.10，</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">前向先选前2条进入解码器。若购买预…</text></svg>