<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text x="40" y="56" font-size="28" font-weight="700" fill="#111827">广告后门的三层植入路径</text><text x="40" y="94" font-size="18" fill="#4B5563">Hidden Ads: Behavior Triggered Semantic Backdoors for Advertisement Injection in Vision Language Models</text><text x="40" y="130" font-size="18" fill="#6B7280">把技术细节、通俗讲解和例子压缩成一条可视化理解路径</text><line x1="314" y1="283.0" x2="328" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="618" y1="283.0" x2="632" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><line x1="922" y1="283.0" x2="936" y2="283.0" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="34" y="208" width="270" height="150" rx="22" fill="#E8F0FF" stroke="#94A3B8" stroke-width="2"/><text x="169.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 1</text><text x="169.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">要解决什么</text><text x="169.0" y="318" text-anchor="middle" font-size="16" fill="#374151">目标不是让模型一直乱说，而是只在“看</text><text x="169.0" y="340" text-anchor="middle" font-size="16" fill="#374151">见特定内容”且“用户在求推荐”时，悄</text><text x="169.0" y="362" text-anchor="middle" font-size="16" fill="#374151">悄追加指定广告语，平时仍表现正常。</text><rect x="338" y="208" width="270" height="150" rx="22" fill="#EEF8F1" stroke="#94A3B8" stroke-width="2"/><text x="473.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 2</text><text x="473.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">第一层：改提示</text><text x="473.0" y="318" text-anchor="middle" font-size="16" fill="#374151">最浅的做法是只控制系统提示词，用文字</text><text x="473.0" y="340" text-anchor="middle" font-size="16" fill="#374151">规则告诉模型何时触发广告注入。它像在</text><text x="473.0" y="362" text-anchor="middle" font-size="16" fill="#374151">改模型的说明书，成本低，但依赖部署…</text><rect x="642" y="208" width="270" height="150" rx="22" fill="#FFF4DD" stroke="#94A3B8" stroke-width="2"/><text x="777.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 3</text><text x="777.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">第二层：改前缀</text><text x="777.0" y="318" text-anchor="middle" font-size="16" fill="#374151">如果不能改模型参数，攻击者就学习一段</text><text x="777.0" y="340" text-anchor="middle" font-size="16" fill="#374151">固定长度的软提示并拼在输入前，让模型</text><text x="777.0" y="362" text-anchor="middle" font-size="16" fill="#374151">在带毒样本上学会更容易输出广告回复…</text><rect x="946" y="208" width="270" height="150" rx="22" fill="#FCECF4" stroke="#94A3B8" stroke-width="2"/><text x="1081.0" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">STEP 4</text><text x="1081.0" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">第三层：改模型</text><text x="1081.0" y="318" text-anchor="middle" font-size="16" fill="#374151">最深的做法是用带毒数据微调整个开源模</text><text x="1081.0" y="340" text-anchor="middle" font-size="16" fill="#374151">型，把“满足条件就追加广告语”写进权</text><text x="1081.0" y="362" text-anchor="middle" font-size="16" fill="#374151">重里。这样即便下游开发者换了自己的…</text></svg>