<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#e8ecf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="18"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">SID 碰撞消歧：深度优先 vs 广度优先</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#666">Semantic ID 码空间 &lt; 物品总数 → 多物品映射同一SID（碰撞）→ 如何从桶中选最优？</text>

  <!-- ====== LEFT: Breadth Strategy (Bad) ====== -->
  <rect x="30" y="95" width="400" height="430" rx="14" fill="#fff3f0" stroke="#e57373" stroke-width="2"/>
  <text x="230" y="123" text-anchor="middle" font-size="17" font-weight="bold" fill="#c62828">❌ 广度策略（效果差）</text>
  <text x="230" y="145" text-anchor="middle" font-size="12" fill="#888">Top 100 SID × 每桶取 10 个 = 1000 物品</text>

  <!-- Beam output -->
  <rect x="60" y="165" width="340" height="44" rx="8" fill="#ffcdd2" stroke="#e57373"/>
  <text x="230" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">Beam Search → 100 个 SID 桶</text>

  <!-- Many small buckets -->
  <g transform="translate(70,230)">
    <rect width="52" height="60" rx="6" fill="#fff" stroke="#e57373"/>
    <text x="26" y="18" text-anchor="middle" font-size="9" fill="#c62828">SID #1</text>
    <circle cx="14" cy="36" r="6" fill="#ef9a9a"/><circle cx="30" cy="36" r="6" fill="#ef9a9a"/><circle cx="22" cy="50" r="6" fill="#ef9a9a"/>
  </g>
  <g transform="translate(132,230)">
    <rect width="52" height="60" rx="6" fill="#fff" stroke="#e57373"/>
    <text x="26" y="18" text-anchor="middle" font-size="9" fill="#c62828">SID #2</text>
    <circle cx="14" cy="36" r="6" fill="#ef9a9a"/><circle cx="30" cy="36" r="6" fill="#ef9a9a"/><circle cx="22" cy="50" r="6" fill="#ef9a9a"/>
  </g>
  <g transform="translate(194,230)">
    <rect width="52" height="60" rx="6" fill="#fff" stroke="#e57373"/>
    <text x="26" y="18" text-anchor="middle" font-size="9" fill="#c62828">SID #3</text>
    <circle cx="14" cy="36" r="6" fill="#ef9a9a"/><circle cx="30" cy="36" r="6" fill="#ef9a9a"/><circle cx="22" cy="50" r="6" fill="#ef9a9a"/>
  </g>
  <text x="275" y="268" font-size="22" fill="#c62828">… ×100</text>

  <!-- Arrow down -->
  <line x1="230" y1="300" x2="230" y2="340" stroke="#e57373" stroke-width="2" marker-end="url(#arr)"/>
  <text x="295" y="325" font-size="11" fill="#888">随机取样</text>

  <!-- Result -->
  <rect x="100" y="348" width="260" height="55" rx="8" fill="#ffebee" stroke="#e57373"/>
  <text x="230" y="370" text-anchor="middle" font-size="13" fill="#b71c1c">每桶随机取 10 个</text>
  <text x="230" y="390" text-anchor="middle" font-size="12" fill="#888">低置信度桶 → 噪声多 → 命中率低</text>

  <!-- Metrics -->
  <rect x="80" y="420" width="300" height="85" rx="10" fill="#fff" stroke="#e0e0e0"/>
  <text x="230" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">基线指标</text>
  <text x="230" y="468" text-anchor="middle" font-size="13" fill="#999">观看 / 分享 / 转发 = 基准</text>
  <text x="230" y="490" text-anchor="middle" font-size="12" fill="#bbb">（对照组）</text>

  <!-- ====== RIGHT: Depth Strategy (Good) ====== -->
  <rect x="465" y="95" width="405" height="430" rx="14" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <text x="668" y="123" text-anchor="middle" font-size="17" font-weight="bold" fill="#2E7D32">✅ 深度策略 + 相关性排序</text>
  <text x="668" y="145" text-anchor="middle" font-size="12" fill="#888">Top 10 SID × 每桶取 100 个 = 1000 物品</text>

  <!-- Beam output -->
  <rect x="495" y="165" width="345" height="44" rx="8" fill="#c8e6c9" stroke="#66bb6a"/>
  <text x="668" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Beam Search → Top 10 高置信桶</text>

  <!-- One big bucket detail -->
  <rect x="510" y="225" width="180" height="115" rx="10" fill="#fff" stroke="#66bb6a" stroke-width="2"/>
  <text x="600" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">SID #1 桶（50个视频）</text>
  <!-- Sorted items -->
  <rect x="525" y="258" width="150" height="20" rx="4" fill="#a5d6a7"/>
  <text x="600" y="273" text-anchor="middle" font-size="10" fill="#1b5e20">🔥 视频A 完播率 92%</text>
  <rect x="525" y="282" width="140" height="20" rx="4" fill="#c8e6c9"/>
  <text x="595" y="297" text-anchor="middle" font-size="10" fill="#2E7D32">📈 视频B 完播率 85%</text>
  <rect x="525" y="306" width="130" height="20" rx="4" fill="#e8f5e9"/>
  <text x="590" y="321" text-anchor="middle" font-size="10" fill="#558b2f">视频C 完播率 70% …</text>

  <!-- Sort label -->
  <text x="720" y="252" font-size="11" fill="#2E7D32" font-weight="bold">↓ 按完播率</text>
  <text x="720" y="268" font-size="11" fill="#2E7D32" font-weight="bold">  /新鲜度排序</text>

  <!-- More buckets hint -->
  <g transform="translate(710,290)">
    <rect width="80" height="50" rx="6" fill="#fff" stroke="#a5d6a7"/>
    <text x="40" y="18" text-anchor="middle" font-size="9" fill="#2E7D32">SID #2</text>
    <text x="40" y="35" text-anchor="middle" font-size="9" fill="#888">排序取100</text>
  </g>
  <text x="810" y="320" font-size="16" fill="#2E7D32">…×10</text>

  <!-- Arrow down -->
  <line x1="668" y1="348" x2="668" y2="385" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="720" y="372" font-size="11" fill="#2E7D32" font-weight="bold">取 Top-K</text>

  <!-- Result -->
  <rect x="538" y="392" width="260" height="55" rx="8" fill="#c8e6c9" stroke="#66bb6a"/>
  <text x="668" y="414" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="bold">高置信桶 × 相关性排序</text>
  <text x="668" y="434" text-anchor="middle" font-size="12" fill="#558b2f">质量高 · 语义匹配 · 时效好</text>

  <!-- Metrics -->
  <rect x="518" y="460" width="300" height="52" rx="10" fill="#fff" stroke="#66bb6a" stroke-width="2"/>
  <text x="668" y="483" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">观看 +0.57%　分享 +4.39%　转发 +3.55%</text>
  <text x="668" y="500" text-anchor="middle" font-size="11" fill="#888">线上 A/B 实验增量</text>

  <!-- VS arrow -->
  <text x="440" y="310" text-anchor="middle" font-size="28" font-weight="bold" fill="#9e9e9e">VS</text>

  <!-- Bottom insight -->
  <rect x="160" y="555" width="580" height="48" rx="12" fill="#fff9c4" stroke="#fbc02d" stroke-width="1.5"/>
  <text x="450" y="576" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">💡 核心洞察：少开桶、多挖宝 — 模型高置信桶 + 桶内质量排序 = 最优召回</text>
  <text x="450" y="594" text-anchor="middle" font-size="11" fill="#888">固定预算下，深度（depth）远优于广度（breadth）</text>
</svg>