<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
    <linearGradient id="gShort" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="gLong" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#2C8C85"/>
    </linearGradient>
    <linearGradient id="gFuse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">SLSRec：长短期兴趣双编码器</text>
  <text x="450" y="66" text-anchor="middle" fill="#aaa" font-size="13">核心创新：类别掩码过滤短期噪声 + GRU捕捉长期演化</text>

  <!-- ============ INPUT: Current Session ============ -->
  <rect x="30" y="100" width="190" height="60" rx="10" fill="#2d2d44" stroke="#FF6B6B" stroke-width="2"/>
  <text x="125" y="125" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">当前 Session k</text>
  <text x="125" y="145" text-anchor="middle" fill="#ccc" font-size="12">🎧 耳机A · 耳机B</text>

  <!-- ============ INPUT: Historical Sessions ============ -->
  <rect x="30" y="370" width="190" height="80" rx="10" fill="#2d2d44" stroke="#4ECDC4" stroke-width="2"/>
  <text x="125" y="395" text-anchor="middle" fill="#4ECDC4" font-size="13" font-weight="bold">历史 Session 1…k-1</text>
  <text x="125" y="418" text-anchor="middle" fill="#ccc" font-size="11">📱 手机壳Session</text>
  <text x="125" y="436" text-anchor="middle" fill="#ccc" font-size="11">🔋 充电宝Session</text>

  <!-- ============ SHORT-TERM ENCODER ============ -->
  <!-- Main box -->
  <rect x="280" y="85" width="340" height="180" rx="14" fill="url(#gShort)" opacity="0.15" stroke="#FF6B6B" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" fill="#FF6B6B" font-size="16" font-weight="bold">短期编码器</text>

  <!-- Self-Attention -->
  <rect x="300" y="120" width="130" height="50" rx="8" fill="#2d2d44" stroke="#FF9F7F" stroke-width="1.5"/>
  <text x="365" y="142" text-anchor="middle" fill="#FF9F7F" font-size="13" font-weight="bold">Self-Attention</text>
  <text x="365" y="159" text-anchor="middle" fill="#aaa" font-size="11">→ u_s</text>

  <!-- Category Mask (HIGHLIGHT) -->
  <rect x="460" y="120" width="140" height="50" rx="8" fill="#FF6B6B" fill-opacity="0.3" stroke="#FFD93D" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="530" y="140" text-anchor="middle" fill="#FFD93D" font-size="13" font-weight="bold">⭐ 类别掩码 M</text>
  <text x="530" y="158" text-anchor="middle" fill="#ffe" font-size="11">最高频类别→mask</text>

  <!-- Arrow from SA to Mask -->
  <line x1="430" y1="145" x2="455" y2="145" stroke="#FF9F7F" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Concat -->
  <rect x="370" y="195" width="120" height="42" rx="8" fill="#2d2d44" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="430" y="213" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">Concat</text>
  <text x="430" y="229" text-anchor="middle" fill="#aaa" font-size="11">u_s ⊕ u_c = u_S</text>

  <!-- Arrows to Concat -->
  <line x1="365" y1="170" x2="400" y2="193" stroke="#FF9F7F" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="170" x2="460" y2="193" stroke="#FFD93D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from input to short encoder -->
  <line x1="220" y1="130" x2="295" y2="140" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ LONG-TERM ENCODER ============ -->
  <rect x="280" y="310" width="340" height="210" rx="14" fill="url(#gLong)" opacity="0.15" stroke="#4ECDC4" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" fill="#4ECDC4" font-size="16" font-weight="bold">长期编码器</text>

  <!-- Per-session SA -->
  <rect x="300" y="350" width="130" height="48" rx="8" fill="#2d2d44" stroke="#81ECEC" stroke-width="1.5"/>
  <text x="365" y="370" text-anchor="middle" fill="#81ECEC" font-size="12" font-weight="bold">逐Session</text>
  <text x="365" y="387" text-anchor="middle" fill="#81ECEC" font-size="12">Self-Attention</text>

  <!-- GRU -->
  <rect x="460" y="350" width="130" height="48" rx="8" fill="#2d2d44" stroke="#00CEC9" stroke-width="1.5"/>
  <text x="525" y="370" text-anchor="middle" fill="#00CEC9" font-size="13" font-weight="bold">GRU</text>
  <text x="525" y="387" text-anchor="middle" fill="#aaa" font-size="11">跨Session演化</text>

  <!-- Arrow SA -> GRU -->
  <line x1="430" y1="374" x2="455" y2="374" stroke="#81ECEC" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Target-Attention -->
  <rect x="370" y="420" width="180" height="48" rx="8" fill="#2d2d44" stroke="#4ECDC4" stroke-width="1.5"/>
  <text x="460" y="440" text-anchor="middle" fill="#4ECDC4" font-size="13" font-weight="bold">🎯 Target Attention</text>
  <text x="460" y="457" text-anchor="middle" fill="#aaa" font-size="11">候选物品加权聚合</text>

  <!-- Arrows to Target Attn -->
  <line x1="365" y1="398" x2="410" y2="418" stroke="#81ECEC" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="525" y1="398" x2="500" y2="418" stroke="#00CEC9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- u_L output -->
  <rect x="400" y="485" width="120" height="30" rx="8" fill="#2d2d44" stroke="#4ECDC4" stroke-width="1.5"/>
  <text x="460" y="505" text-anchor="middle" fill="#4ECDC4" font-size="13" font-weight="bold">u_L</text>
  <line x1="460" y1="468" x2="460" y2="483" stroke="#4ECDC4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from input to long encoder -->
  <line x1="220" y1="410" x2="295" y2="380" stroke="#4ECDC4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Target item -->
  <rect x="30" y="480" width="190" height="45" rx="10" fill="#2d2d44" stroke="#A29BFE" stroke-width="1.5"/>
  <text x="125" y="500" text-anchor="middle" fill="#A29BFE" font-size="12" font-weight="bold">🎧 候选：蓝牙耳机</text>
  <text x="125" y="516" text-anchor="middle" fill="#888" font-size="10">v_T</text>
  <line x1="220" y1="502" x2="370" y2="450" stroke="#A29BFE" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ============ FUSION OUTPUT ============ -->
  <rect x="700" y="240" width="160" height="140" rx="16" fill="url(#gFuse)" opacity="0.2" stroke="#A29BFE" stroke-width="2.5"/>
  <text x="780" y="275" text-anchor="middle" fill="#A29BFE" font-size="15" font-weight="bold">自适应融合</text>

  <!-- u_S label -->
  <rect x="720" y="290" width="120" height="30" rx="6" fill="#FF6B6B" fill-opacity="0.25" stroke="#FF6B6B" stroke-width="1"/>
  <text x="780" y="310" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">u_S 短期</text>

  <!-- u_L label -->
  <rect x="720" y="330" width="120" height="30" rx="6" fill="#4ECDC4" fill-opacity="0.25" stroke="#4ECDC4" stroke-width="1"/>
  <text x="780" y="350" text-anchor="middle" fill="#4ECDC4" font-size="13" font-weight="bold">u_L 长期</text>

  <!-- Arrows to fusion -->
  <path d="M 490 237 Q 600 230 698 295" fill="none" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 520 500 Q 660 490 720 360" fill="none" stroke="#4ECDC4" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Final prediction -->
  <text x="780" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">↓ 推荐预测</text>

  <!-- ============ HIGHLIGHT CALLOUT ============ -->
  <rect x="580" y="88" width="280" height="80" rx="12" fill="#FFD93D" fill-opacity="0.12" stroke="#FFD93D" stroke-width="1.5"/>
  <text x="720" y="112" text-anchor="middle" fill="#FFD93D" font-size="14" font-weight="bold">💡 核心创新</text>
  <text x="720" y="132" text-anchor="middle" fill="#ffe" font-size="12">类别掩码：统计Session内最高频类别</text>
  <text x="720" y="150" text-anchor="middle" fill="#ffe" font-size="12">只保留该类别物品的注意力权重</text>
  <text x="720" y="166" text-anchor="middle" fill="#ddd" font-size="11">→ 过滤偶然噪声，聚焦真实短期意图</text>

  <!-- Dashed line from callout to mask -->
  <line x1="580" y1="145" x2="602" y2="145" stroke="#FFD93D" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ EXAMPLE ANNOTATION ============ -->
  <rect x="30" y="560" width="840" height="45" rx="10" fill="#2d2d44" stroke="#666" stroke-width="1"/>
  <text x="50" y="582" fill="#FFD93D" font-size="12" font-weight="bold">例</text>
  <text x="70" y="582" fill="#ccc" font-size="12">短期Session有2个耳机→掩码保留全部→u_S精准 ｜ 长期：充电宝Session与蓝牙耳机(电子配件)更相关→权重↑→u_L自适应</text>
</svg>