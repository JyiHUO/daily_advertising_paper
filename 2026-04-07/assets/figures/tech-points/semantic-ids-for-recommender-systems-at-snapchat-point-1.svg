<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1724"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="deadGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <linearGradient id="aliveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44cc88"/>
      <stop offset="100%" stop-color="#22aa66"/>
    </linearGradient>
    <linearGradient id="steGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" opacity="0.8"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd700"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">STE 缓解 Codebook 坍塌</text>
  <text x="450" y="66" text-anchor="middle" fill="#8899bb" font-size="13">Straight-Through Estimator 让所有码本行都能收到梯度</text>

  <!-- ===== LEFT: Standard RQ-VAE (Problem) ===== -->
  <rect x="30" y="90" width="390" height="420" rx="16" fill="#1e2a45" stroke="#445577" stroke-width="1.5"/>
  <text x="225" y="118" text-anchor="middle" fill="#ff6666" font-size="17" font-weight="bold">❌ 标准 RQ-VAE</text>

  <!-- Codebook visualization - drawers metaphor -->
  <!-- Selected code (alive) -->
  <rect x="60" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.9"/>
  <text x="86" y="210" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">选中</text>

  <!-- Dead codes -->
  <g opacity="0.5">
    <rect x="122" y="145" width="52" height="120" rx="6" fill="url(#deadGrad)" opacity="0.7"/>
    <text x="148" y="210" text-anchor="middle" fill="#fff" font-size="10">死码</text>
    <line x1="126" y1="149" x2="170" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="170" y1="149" x2="126" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g opacity="0.5">
    <rect x="184" y="145" width="52" height="120" rx="6" fill="url(#deadGrad)" opacity="0.7"/>
    <text x="210" y="210" text-anchor="middle" fill="#fff" font-size="10">死码</text>
    <line x1="188" y1="149" x2="232" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="232" y1="149" x2="188" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g opacity="0.5">
    <rect x="246" y="145" width="52" height="120" rx="6" fill="url(#deadGrad)" opacity="0.7"/>
    <text x="272" y="210" text-anchor="middle" fill="#fff" font-size="10">死码</text>
    <line x1="250" y1="149" x2="294" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="294" y1="149" x2="250" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g opacity="0.5">
    <rect x="308" y="145" width="52" height="120" rx="6" fill="url(#deadGrad)" opacity="0.7"/>
    <text x="334" y="210" text-anchor="middle" fill="#fff" font-size="10">死码</text>
    <line x1="312" y1="149" x2="356" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="356" y1="149" x2="312" y2="261" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <text x="225" y="285" text-anchor="middle" fill="#aabbcc" font-size="12">1024 个码本行</text>

  <!-- Gradient arrow only to selected -->
  <text x="86" y="315" text-anchor="middle" fill="#44cc88" font-size="11" font-weight="bold">∇ 梯度 ✓</text>
  <line x1="86" y1="300" x2="86" y2="270" stroke="#44cc88" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- No gradient to dead -->
  <text x="272" y="315" text-anchor="middle" fill="#ff6666" font-size="11" font-weight="bold">∇ = 0  ✗</text>

  <!-- Bar chart: utilization -->
  <rect x="70" y="350" width="280" height="30" rx="4" fill="#333e55"/>
  <rect x="70" y="350" width="55" height="30" rx="4" fill="url(#aliveGrad)"/>
  <text x="210" y="370" text-anchor="middle" fill="#aabbcc" font-size="12">活跃码 ~200/1024 (19.5%)</text>

  <!-- Sad face -->
  <text x="225" y="420" text-anchor="middle" fill="#ff6666" font-size="14" font-weight="bold">⚠ 80% 码本浪费</text>

  <!-- ===== VS Arrow ===== -->
  <text x="450" y="310" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold">→</text>
  <text x="450" y="335" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">STE</text>

  <!-- ===== RIGHT: With STE (Solution) ===== -->
  <rect x="480" y="90" width="390" height="420" rx="16" fill="#1e3530" stroke="#44aa77" stroke-width="1.5"/>
  <text x="675" y="118" text-anchor="middle" fill="#44ee88" font-size="17" font-weight="bold">✅ + STE 直通估计器</text>

  <!-- All codes alive -->
  <rect x="510" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.95"/>
  <rect x="572" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.9"/>
  <rect x="634" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.85"/>
  <rect x="696" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.9"/>
  <rect x="758" y="145" width="52" height="120" rx="6" fill="url(#aliveGrad)" opacity="0.95"/>

  <text x="536" y="210" text-anchor="middle" fill="#fff" font-size="10">码1</text>
  <text x="598" y="210" text-anchor="middle" fill="#fff" font-size="10">码2</text>
  <text x="660" y="210" text-anchor="middle" fill="#fff" font-size="10">码3</text>
  <text x="722" y="210" text-anchor="middle" fill="#fff" font-size="10">…</text>
  <text x="784" y="210" text-anchor="middle" fill="#fff" font-size="10">码N</text>

  <text x="675" y="285" text-anchor="middle" fill="#aabbcc" font-size="12">所有 1024 个码本行</text>

  <!-- Gradient flows to ALL -->
  <text x="675" y="315" text-anchor="middle" fill="#44ee88" font-size="11" font-weight="bold">∇ 梯度流向全部码本 ✓</text>
  <!-- gradient arrows to each -->
  <line x1="536" y1="300" x2="536" y2="270" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>
  <line x1="598" y1="300" x2="598" y2="270" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>
  <line x1="660" y1="300" x2="660" y2="270" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>
  <line x1="722" y1="300" x2="722" y2="270" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>
  <line x1="784" y1="300" x2="784" y2="270" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Bar chart: high utilization -->
  <rect x="520" y="350" width="280" height="30" rx="4" fill="#333e55"/>
  <rect x="520" y="350" width="245" height="30" rx="4" fill="url(#aliveGrad)"/>
  <text x="660" y="370" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">活跃码 ~900/1024 (87.9%)</text>

  <!-- Result -->
  <text x="675" y="420" text-anchor="middle" fill="#44ee88" font-size="14" font-weight="bold">🎉 唯一性提升 83.4%</text>

  <!-- ===== Bottom: Key Insight Box ===== -->
  <rect x="150" y="530" width="600" height="52" rx="12" fill="#2a2a40" stroke="#ffd700" stroke-width="1.5"/>
  <text x="450" y="553" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">核心技巧：前向只选 1 个码 → 反向梯度流过全部码本（余弦相似度加权 + stop-grad）</text>
  <text x="450" y="573" text-anchor="middle" fill="#8899bb" font-size="12">前向计算不变，仅改变梯度传播路径，零额外推理开销</text>
</svg>