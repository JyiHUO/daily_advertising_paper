<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arwB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">多模态融合 → 扩大输入方差 → 缓解码本坍塌</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">Snapchat Semantic ID · RQ-VAE 输入设计</text>

  <!-- ===== LEFT: Single Modality (Problem) ===== -->
  <rect x="30" y="90" width="390" height="500" rx="14" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="225" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#BE123C">❌ 单模态输入（文本）</text>

  <!-- Text box -->
  <rect x="155" y="140" width="140" height="56" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="225" y="164" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">📝 文本</text>
  <text x="225" y="182" text-anchor="middle" font-size="11" fill="#92400E">嵌入向量</text>

  <!-- Arrow down -->
  <line x1="225" y1="196" x2="225" y2="240" stroke="#555" stroke-width="1.8" marker-end="url(#arw)"/>

  <!-- Cluster illustration - tight cluster -->
  <rect x="80" y="245" width="290" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="225" y="268" text-anchor="middle" font-size="12" fill="#94A3B8">向量分布空间</text>
  <!-- Dense cluster of dots -->
  <circle cx="210" cy="320" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="220" cy="312" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="230" cy="325" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="215" cy="330" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="225" cy="318" r="6" fill="#EF4444" opacity="0.7"/>
  <circle cx="205" cy="315" r="6" fill="#EF4444" opacity="0.6"/>
  <circle cx="235" cy="315" r="6" fill="#EF4444" opacity="0.6"/>
  <circle cx="218" cy="305" r="6" fill="#EF4444" opacity="0.5"/>
  <!-- Cluster circle -->
  <circle cx="220" cy="318" r="30" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="225" y="360" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="bold">向量聚拢 → 方差小</text>

  <!-- Arrow to codebook -->
  <line x1="225" y1="380" x2="225" y2="415" stroke="#555" stroke-width="1.8" marker-end="url(#arw)"/>
  <text x="225" y="405" text-anchor="middle" font-size="10" fill="#64748B">RQ-VAE</text>

  <!-- Codebook mostly grey -->
  <rect x="115" y="420" width="220" height="60" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="440" text-anchor="middle" font-size="11" fill="#64748B">码本 Codebook</text>
  <rect x="130" y="450" width="22" height="18" rx="3" fill="#EF4444"/>
  <rect x="158" y="450" width="22" height="18" rx="3" fill="#EF4444"/>
  <rect x="186" y="450" width="22" height="18" rx="3" fill="#E2E8F0" stroke="#CBD5E1"/>
  <rect x="214" y="450" width="22" height="18" rx="3" fill="#E2E8F0" stroke="#CBD5E1"/>
  <rect x="242" y="450" width="22" height="18" rx="3" fill="#E2E8F0" stroke="#CBD5E1"/>
  <rect x="270" y="450" width="22" height="18" rx="3" fill="#E2E8F0" stroke="#CBD5E1"/>
  <text x="225" y="502" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="bold">仅 2/6 码被使用 → 坍塌！</text>

  <!-- Collision -->
  <rect x="100" y="520" width="250" height="36" rx="8" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="225" y="543" text-anchor="middle" font-size="12" fill="#991B1B" font-weight="bold">大量物品映射到相同 SID → 碰撞</text>

  <!-- ===== RIGHT: Multi-Modal (Solution) ===== -->
  <rect x="480" y="90" width="390" height="500" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="675" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803D">✅ 多模态融合输入</text>

  <!-- Three modality boxes -->
  <rect x="505" y="140" width="100" height="56" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="555" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">📝 文本</text>
  <text x="555" y="180" text-anchor="middle" font-size="10" fill="#92400E">转录字幕</text>

  <rect x="625" y="140" width="100" height="56" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="675" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">🖼️ 视觉</text>
  <text x="675" y="180" text-anchor="middle" font-size="10" fill="#1E40AF">CLIP 图像</text>

  <rect x="745" y="140" width="100" height="56" rx="10" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="795" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#7E22CE">🔊 音频</text>
  <text x="795" y="180" text-anchor="middle" font-size="10" fill="#7E22CE">声音特征</text>

  <!-- Arrows down to sum -->
  <line x1="555" y1="196" x2="665" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="675" y1="196" x2="675" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="795" y1="196" x2="685" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Sum circle -->
  <circle cx="675" cy="237" r="14" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="675" y="242" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">Σ</text>
  <text x="720" y="242" font-size="10" fill="#64748B">向量求和</text>

  <!-- Arrow down -->
  <line x1="675" y1="252" x2="675" y2="278" stroke="#555" stroke-width="1.8" marker-end="url(#arw)"/>

  <!-- Spread illustration -->
  <rect x="530" y="283" width="290" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="675" y="305" text-anchor="middle" font-size="12" fill="#94A3B8">向量分布空间</text>
  <!-- Scattered dots -->
  <circle cx="580" cy="340" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="620" cy="310" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="660" cy="365" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="700" cy="325" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="740" cy="355" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="770" cy="320" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="600" cy="370" r="6" fill="#22C55E" opacity="0.6"/>
  <circle cx="730" cy="380" r="6" fill="#22C55E" opacity="0.6"/>
  <text x="675" y="400" text-anchor="middle" font-size="11" fill="#16A34A" font-weight="bold">向量散开 → 方差大</text>

  <!-- Arrow to codebook -->
  <line x1="675" y1="418" x2="675" y2="453" stroke="#555" stroke-width="1.8" marker-end="url(#arw)"/>
  <text x="675" y="443" text-anchor="middle" font-size="10" fill="#64748B">RQ-VAE</text>

  <!-- Codebook all used -->
  <rect x="565" y="458" width="220" height="60" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="675" y="478" text-anchor="middle" font-size="11" fill="#64748B">码本 Codebook</text>
  <rect x="580" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <rect x="608" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <rect x="636" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <rect x="664" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <rect x="692" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <rect x="720" y="488" width="22" height="18" rx="3" fill="#22C55E"/>
  <text x="675" y="540" text-anchor="middle" font-size="12" fill="#15803D" font-weight="bold">6/6 码全部激活 → 利用率高！</text>

  <!-- Result -->
  <rect x="550" y="558" width="250" height="36" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="675" y="581" text-anchor="middle" font-size="12" fill="#14532D" font-weight="bold">SID 唯一性累计提升 ≈ 40% ↑</text>

  <!-- Center divider -->
  <line x1="450" y1="100" x2="450" y2="580" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- VS label -->
  <circle cx="450" cy="340" r="22" fill="#1E293B"/>
  <text x="450" y="346" text-anchor="middle" font-size="14" font-weight="bold" fill="white">VS</text>
</svg>