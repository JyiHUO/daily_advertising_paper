<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">时间感知的会话分割（Session Splitting）</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#64748B">SLSRec 核心思想：按时间间隔 ω 把行为序列切成会话，解耦长短期兴趣</text>

  <!-- ===== Timeline row ===== -->
  <!-- Timeline base line -->
  <line x1="60" y1="160" x2="840" y2="160" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Session 1: 手机壳 -->
  <rect x="70" y="115" width="200" height="90" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="170" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">Session 1</text>
  <text x="170" y="166" text-anchor="middle" font-size="12" fill="#3B82F6">📱 手机壳 ×5</text>
  <text x="170" y="186" text-anchor="middle" font-size="11" fill="#64748B">12/1 上午 间隔≤5min</text>

  <!-- Gap indicator 1 -->
  <line x1="280" y1="135" x2="330" y2="135" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="305" y="125" text-anchor="middle" font-size="20" fill="#EF4444">✂</text>
  <text x="305" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">间隔 &gt; ω</text>

  <!-- Session 2: 充电宝 -->
  <rect x="340" y="115" width="200" height="90" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="440" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">Session 2</text>
  <text x="440" y="166" text-anchor="middle" font-size="12" fill="#3B82F6">🔋 充电宝 ×3</text>
  <text x="440" y="186" text-anchor="middle" font-size="11" fill="#64748B">12/1 下午 间隔≤10min</text>

  <!-- Gap indicator 2 -->
  <line x1="550" y1="135" x2="600" y2="135" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="575" y="125" text-anchor="middle" font-size="20" fill="#EF4444">✂</text>
  <text x="575" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">间隔 &gt; ω</text>

  <!-- Session 3: 耳机 -->
  <rect x="610" y="115" width="200" height="90" rx="14" fill="#FFF7ED" stroke="#EA580C" stroke-width="2.5"/>
  <text x="710" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#C2410C">Session 3（最新）</text>
  <text x="710" y="166" text-anchor="middle" font-size="12" fill="#EA580C">🎧 耳机 ×2</text>
  <text x="710" y="186" text-anchor="middle" font-size="11" fill="#64748B">12/2 间隔≤8min</text>

  <!-- Time arrow -->
  <line x1="60" y1="225" x2="830" y2="225" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="845" y="229" font-size="12" fill="#64748B">时间</text>

  <!-- ===== Omega badge ===== -->
  <rect x="355" y="240" width="190" height="36" rx="18" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">ω = 90min / 1天 / 30min</text>

  <!-- ===== Splitting arrows down ===== -->
  <!-- Long-term arrow from S1 -->
  <path d="M170,205 C170,280 250,310 300,340" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <!-- Long-term arrow from S2 -->
  <path d="M440,205 C440,280 380,310 340,340" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <!-- Short-term arrow from S3 -->
  <path d="M710,205 C710,310 660,330 640,350" fill="none" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== Long-term block ===== -->
  <rect x="100" y="345" width="340" height="100" rx="18" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <text x="270" y="380" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E40AF">长期兴趣编码器</text>
  <text x="270" y="405" text-anchor="middle" font-size="13" fill="#3B82F6">前 k-1 个历史 Session</text>
  <text x="270" y="425" text-anchor="middle" font-size="12" fill="#64748B">稳定偏好：数码、手机配件…</text>

  <!-- ===== Short-term block ===== -->
  <rect x="500" y="345" width="310" height="100" rx="18" fill="#FFF7ED" stroke="#EA580C" stroke-width="2.5"/>
  <text x="655" y="380" text-anchor="middle" font-size="18" font-weight="bold" fill="#C2410C">短期兴趣编码器</text>
  <text x="655" y="405" text-anchor="middle" font-size="13" fill="#EA580C">第 k 个（最新）Session</text>
  <text x="655" y="425" text-anchor="middle" font-size="12" fill="#64748B">当前意图：想买耳机</text>

  <!-- ===== Fusion arrow ===== -->
  <path d="M440,445 L450,480 L460,445" fill="none" stroke="#555" stroke-width="2"/>
  <path d="M640,445 L450,480" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="370" y="475" width="160" height="34" rx="17" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="450" y="497" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803D">自适应融合推荐</text>

  <!-- ===== Legend ===== -->
  <rect x="15" y="475" width="12" height="12" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="32" y="486" font-size="11" fill="#475569">历史会话 → 长期</text>
  <rect x="15" y="495" width="12" height="12" rx="3" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="32" y="506" font-size="11" fill="#475569">最新会话 → 短期</text>
</svg>