<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#3a6fd8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7a44c"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Semantic ID 唯一性 ≠ 推荐质量</text>
  <text x="450" y="68" text-anchor="middle" fill="#8899bb" font-size="14">唯一性是"及格线"，不是"满分标准"</text>

  <!-- Chart area -->
  <g transform="translate(100, 100)">
    <!-- Axes -->
    <line x1="60" y1="340" x2="660" y2="340" stroke="#445577" stroke-width="1.5"/>
    <line x1="60" y1="40" x2="60" y2="340" stroke="#445577" stroke-width="1.5"/>
    <!-- Right Y axis -->
    <line x1="660" y1="40" x2="660" y2="340" stroke="#445577" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Y-axis left label -->
    <text x="20" y="190" text-anchor="middle" fill="#5b8def" font-size="13" font-weight="bold" transform="rotate(-90,20,190)">唯一性 %</text>
    <!-- Y-axis right label -->
    <text x="700" y="190" text-anchor="middle" fill="#f7a44c" font-size="13" font-weight="bold" transform="rotate(90,700,190)">Recall@10</text>
    <!-- X-axis label -->
    <text x="360" y="380" text-anchor="middle" fill="#8899bb" font-size="13">Codebook 大小</text>

    <!-- Grid lines -->
    <line x1="60" y1="100" x2="660" y2="100" stroke="#334466" stroke-width="0.5" stroke-dasharray="3,4"/>
    <line x1="60" y1="160" x2="660" y2="160" stroke="#334466" stroke-width="0.5" stroke-dasharray="3,4"/>
    <line x1="60" y1="220" x2="660" y2="220" stroke="#334466" stroke-width="0.5" stroke-dasharray="3,4"/>
    <line x1="60" y1="280" x2="660" y2="280" stroke="#334466" stroke-width="0.5" stroke-dasharray="3,4"/>

    <!-- Left Y ticks -->
    <text x="50" y="344" text-anchor="end" fill="#778899" font-size="11">0%</text>
    <text x="50" y="280" text-anchor="end" fill="#778899" font-size="11">20%</text>
    <text x="50" y="220" text-anchor="end" fill="#778899" font-size="11">40%</text>
    <text x="50" y="160" text-anchor="end" fill="#778899" font-size="11">60%</text>
    <text x="50" y="100" text-anchor="end" fill="#778899" font-size="11">80%</text>
    <text x="50" y="44" text-anchor="end" fill="#778899" font-size="11">100%</text>

    <!-- Right Y ticks (Recall scale: 0-8) -->
    <text x="670" y="344" text-anchor="start" fill="#997755" font-size="11">0</text>
    <text x="670" y="220" text-anchor="start" fill="#997755" font-size="11">4.0</text>
    <text x="670" y="100" text-anchor="start" fill="#997755" font-size="11">8.0</text>

    <!-- Data points: 4 codebook sizes -->
    <!-- 64³: uniqueness=65%, recall=5.8 -->
    <!-- 128³: uniqueness=72%, recall=6.0 -->
    <!-- 256³: uniqueness=82%, recall=6.1 -->
    <!-- 1024³: uniqueness=93%, recall=6.2 (approx) -->

    <!-- Bar positions: x = 150, 280, 410, 540 -->
    <!-- Uniqueness bars (height = uniqueness/100 * 300) -->
    <!-- 65% -> 195px from bottom -> y=340-195=145 -->
    <rect x="125" y="145" width="50" height="195" fill="url(#barGrad)" rx="4" opacity="0.85"/>
    <text x="150" y="137" text-anchor="middle" fill="#7baaf7" font-size="12" font-weight="bold">65%</text>

    <!-- 72% -> 216px -> y=124 -->
    <rect x="255" y="124" width="50" height="216" fill="url(#barGrad)" rx="4" opacity="0.85"/>
    <text x="280" y="116" text-anchor="middle" fill="#7baaf7" font-size="12" font-weight="bold">72%</text>

    <!-- 82% -> 246px -> y=94 -->
    <rect x="385" y="94" width="50" height="246" fill="url(#barGrad)" rx="4" opacity="0.85"/>
    <text x="410" y="86" text-anchor="middle" fill="#7baaf7" font-size="12" font-weight="bold">82%</text>

    <!-- 93% -> 279px -> y=61 -->
    <rect x="515" y="61" width="50" height="279" fill="url(#barGrad)" rx="4" opacity="0.85"/>
    <text x="540" y="53" text-anchor="middle" fill="#7baaf7" font-size="12" font-weight="bold">93%</text>

    <!-- X-axis labels -->
    <text x="150" y="360" text-anchor="middle" fill="#aabbcc" font-size="12">64³</text>
    <text x="280" y="360" text-anchor="middle" fill="#aabbcc" font-size="12">128³</text>
    <text x="410" y="360" text-anchor="middle" fill="#aabbcc" font-size="12" font-weight="bold">256³</text>
    <text x="540" y="360" text-anchor="middle" fill="#aabbcc" font-size="12">1024³</text>

    <!-- Recall line (mapped: recall/8 * 300, y = 340 - val) -->
    <!-- 5.8 -> 217.5 -> y=122.5 -->
    <!-- 6.0 -> 225 -> y=115 -->
    <!-- 6.1 -> 228.75 -> y=111.25 -->
    <!-- 6.2 -> 232.5 -> y=107.5 -->
    <polyline points="150,122 280,115 410,111 540,108" fill="none" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Recall dots -->
    <circle cx="150" cy="122" r="6" fill="#f7a44c" stroke="#fff" stroke-width="2"/>
    <circle cx="280" cy="115" r="6" fill="#f7a44c" stroke="#fff" stroke-width="2"/>
    <circle cx="410" cy="111" r="7" fill="#ff6b6b" stroke="#fff" stroke-width="2.5"/>
    <circle cx="540" cy="108" r="6" fill="#f7a44c" stroke="#fff" stroke-width="2"/>

    <!-- Recall labels -->
    <text x="142" y="108" text-anchor="middle" fill="#f7a44c" font-size="12" font-weight="bold">5.8</text>
    <text x="288" y="101" text-anchor="middle" fill="#f7a44c" font-size="12" font-weight="bold">6.0</text>
    <text x="418" y="97" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">6.1</text>
    <text x="548" y="94" text-anchor="middle" fill="#f7a44c" font-size="12" font-weight="bold">6.2</text>

    <!-- "Diminishing returns" zone -->
    <rect x="240" y="90" width="330" height="50" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,4" rx="8" opacity="0.6"/>
    <text x="405" y="84" text-anchor="middle" fill="#ff6b6b" font-size="11" opacity="0.8">← 收益递减区 →</text>

    <!-- Sweet spot annotation -->
    <line x1="410" y1="340" x2="410" y2="94" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  </g>

  <!-- Bottom insight boxes -->
  <!-- Box 1: Threshold -->
  <g transform="translate(80, 505)">
    <rect width="220" height="56" rx="10" fill="#1e3a5f" stroke="#5b8def" stroke-width="1.5"/>
    <text x="110" y="22" text-anchor="middle" fill="#5b8def" font-size="13" font-weight="bold">🚧 及格线 ≈ 70%</text>
    <text x="110" y="42" text-anchor="middle" fill="#8899bb" font-size="11">低于此→码本坍塌严重</text>
  </g>

  <!-- Box 2: Sweet spot -->
  <g transform="translate(340, 505)">
    <rect width="220" height="56" rx="10" fill="#1e3a3a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="110" y="22" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">✅ 最优性价比 256³</text>
    <text x="110" y="42" text-anchor="middle" fill="#8899bb" font-size="11">82%唯一性，Recall几乎最优</text>
  </g>

  <!-- Box 3: Overkill -->
  <g transform="translate(600, 505)">
    <rect width="220" height="56" rx="10" fill="#3a1e2e" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="110" y="22" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">⚠️ 盲目追求 100%</text>
    <text x="110" y="42" text-anchor="middle" fill="#8899bb" font-size="11">10倍成本 → Recall仅 +0.1</text>
  </g>

  <!-- Legend -->
  <g transform="translate(520, 90)">
    <rect x="0" y="0" width="170" height="50" rx="8" fill="#0f1729" stroke="#445577" stroke-width="1" opacity="0.9"/>
    <rect x="12" y="12" width="20" height="10" fill="url(#barGrad)" rx="2"/>
    <text x="40" y="22" fill="#7baaf7" font-size="11">唯一性 (%) </text>
    <line x1="12" y1="36" x2="32" y2="36" stroke="#f7a44c" stroke-width="3" stroke-linecap="round"/>
    <circle cx="22" cy="36" r="3.5" fill="#f7a44c"/>
    <text x="40" y="40" fill="#f7a44c" font-size="11">Recall@10</text>
  </g>
</svg>