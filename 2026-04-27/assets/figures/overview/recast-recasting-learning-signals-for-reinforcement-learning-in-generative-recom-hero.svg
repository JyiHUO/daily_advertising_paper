<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1530"/>
      <stop offset="1" stop-color="#1a1f42"/>
    </linearGradient>
    <linearGradient id="redG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b6b"/><stop offset="1" stop-color="#c23b5e"/>
    </linearGradient>
    <linearGradient id="grnG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blueG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="orangeG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e5e7eb"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1280" height="780" fill="url(#bg)"/>

  <text x="640" y="52" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">ReCast：在稀疏命中下重塑 RL 的学习信号</text>
  <text x="640" y="80" text-anchor="middle" fill="#94a3b8" font-size="15">先修复、再对比 —— 把浪费的 rollout 变成可学习的优化事件</text>

  <!-- LEFT: Problem panel -->
  <g>
    <rect x="50" y="120" width="340" height="580" rx="16" fill="#111935" stroke="#334155" stroke-width="1"/>
    <text x="220" y="152" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">问题：85% 的组根本学不动</text>

    <g transform="translate(80,180)">
      <rect width="280" height="110" rx="10" fill="#1f2540" stroke="#475569"/>
      <text x="14" y="26" fill="#ef4444" font-size="14" font-weight="700">全零组  85%</text>
      <text x="14" y="48" fill="#cbd5e1" font-size="12">采样全错 → 奖励归一化为 0</text>
      <g transform="translate(14,70)" fill="#ef4444">
        <circle cx="0" cy="0" r="6"/><circle cx="20" cy="0" r="6"/><circle cx="40" cy="0" r="6"/>
        <circle cx="60" cy="0" r="6"/><circle cx="80" cy="0" r="6"/><circle cx="100" cy="0" r="6"/>
        <circle cx="120" cy="0" r="6"/><circle cx="140" cy="0" r="6"/>
      </g>
      <text x="14" y="98" fill="#f87171" font-size="12" font-style="italic">无正样本 → 梯度消失</text>
    </g>

    <g transform="translate(80,305)">
      <rect width="280" height="90" rx="10" fill="#1f2540" stroke="#475569"/>
      <text x="14" y="26" fill="#f59e0b" font-size="14" font-weight="700">单命中组  13%</text>
      <g transform="translate(14,48)" fill="#ef4444">
        <circle cx="0" cy="0" r="5"/><circle cx="18" cy="0" r="5"/><circle cx="36" cy="0" r="5"/>
        <circle cx="54" cy="0" r="5"/><circle cx="72" cy="0" r="5"/><circle cx="90" cy="0" r="5"/>
        <circle cx="108" cy="0" r="5"/>
        <circle cx="126" cy="0" r="5" fill="#4ade80"/>
      </g>
      <text x="14" y="78" fill="#fcd34d" font-size="12">信号弱，易被噪声淹没</text>
    </g>

    <g transform="translate(80,410)">
      <rect width="280" height="70" rx="10" fill="#1f2540" stroke="#475569"/>
      <text x="14" y="26" fill="#4ade80" font-size="14" font-weight="700">有效组  仅 2%</text>
      <text x="14" y="50" fill="#cbd5e1" font-size="12">真正能产生梯度的组</text>
    </g>

    <g transform="translate(80,505)">
      <text x="0" y="0" fill="#f8fafc" font-size="13" font-weight="700">核心矛盾</text>
      <text x="0" y="24" fill="#cbd5e1" font-size="12">采样宽度 G ↑ → 成本线性增长</text>
      <text x="0" y="44" fill="#cbd5e1" font-size="12">但可学习事件几乎不涨</text>
      <text x="0" y="72" fill="#fca5a5" font-size="12" font-style="italic">rollout 预算被大量浪费</text>
    </g>

    <g transform="translate(80,620)">
      <rect width="280" height="60" rx="8" fill="#2d1b2e" stroke="#7f1d1d"/>
      <text x="140" y="28" text-anchor="middle" fill="#fca5a5" font-size="13">传统 GRPO：采样宽度</text>
      <text x="140" y="48" text-anchor="middle" fill="#fca5a5" font-size="13">= 更新宽度，耦合受限</text>
    </g>
  </g>

  <!-- Arrow from left to center -->
  <path d="M 395,410 L 455,410" stroke="#e5e7eb" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- CENTER: ReCast core -->
  <g>
    <rect x="460" y="120" width="460" height="580" rx="18" fill="#131a3a" stroke="#60a5fa" stroke-width="2"/>
    <text x="690" y="152" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700">ReCast 核心机制</text>
    <text x="690" y="174" text-anchor="middle" fill="#94a3b8" font-size="12">只改组内信号构造，不动外层 RL 框架</text>

    <!-- Step 1: Repair -->
    <g transform="translate(485,200)">
      <rect width="410" height="180" rx="12" fill="#f59e0b" opacity="0.12"/>
      <rect width="410" height="180" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="28" cy="30" r="16" fill="url(#orangeG)"/>
      <text x="28" y="35" text-anchor="middle" fill="#1a1f42" font-size="14" font-weight="800">1</text>
      <text x="54" y="35" fill="#fbbf24" font-size="15" font-weight="700">Repair  修复全零组</text>

      <g transform="translate(20,65)">
        <text x="0" y="0" fill="#94a3b8" font-size="11">修复前</text>
        <g fill="#ef4444">
          <circle cx="14" cy="18" r="6"/><circle cx="34" cy="18" r="6"/>
          <circle cx="54" cy="18" r="6"/><circle cx="74" cy="18" r="6"/>
          <circle cx="94" cy="18" r="6"/><circle cx="114" cy="18" r="6"/>
        </g>
        <text x="128" y="22" fill="#94a3b8" font-size="11">…全负</text>
      </g>

      <path d="M 190,83 L 238,83" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrY)"/>
      <text x="214" y="75" text-anchor="middle" fill="#fbbf24" font-size="10">注入锚点</text>

      <g transform="translate(250,65)">
        <text x="0" y="0" fill="#94a3b8" font-size="11">修复后</text>
        <g fill="#ef4444">
          <circle cx="14" cy="18" r="6"/><circle cx="34" cy="18" r="6"/>
          <circle cx="54" cy="18" r="6"/><circle cx="74" cy="18" r="6"/>
          <circle cx="94" cy="18" r="6"/>
        </g>
        <circle cx="116" cy="18" r="7" fill="#4ade80" stroke="#fff" stroke-width="1.5"/>
        <text x="130" y="22" fill="#4ade80" font-size="10">GT 锚点</text>
      </g>

      <text x="20" y="130" fill="#e5e7eb" font-size="12">· 从 ground-truth 构造一个正样本</text>
      <text x="20" y="150" fill="#e5e7eb" font-size="12">· 替换结构分最低（最无用）的负样本</text>
      <text x="20" y="170" fill="#cbd5e1" font-size="11" font-style="italic">让整组至少有一个参照物可对比</text>
    </g>

    <!-- arrow between steps -->
    <path d="M 690,385 L 690,415" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

    <!-- Step 2: Contrast -->
    <g transform="translate(485,420)">
      <rect width="410" height="260" rx="12" fill="#3b82f6" opacity="0.12"/>
      <rect width="410" height="260" rx="12" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="28" cy="30" r="16" fill="url(#blueG)"/>
      <text x="28" y="35" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">2</text>
      <text x="54" y="35" fill="#60a5fa" font-size="15" font-weight="700">Contrast  边界对比更新</text>

      <g transform="translate(30,75)">
        <g opacity="0.35">
          <circle cx="20" cy="20" r="7" fill="#64748b"/>
          <circle cx="50" cy="20" r="7" fill="#64748b"/>
          <circle cx="80" cy="20" r="7" fill="#64748b"/>
          <circle cx="110" cy="20" r="7" fill="#64748b"/>
          <circle cx="290" cy="20" r="7" fill="#64748b"/>
          <circle cx="320" cy="20" r="7" fill="#64748b"/>
          <circle cx="350" cy="20" r="7" fill="#64748b"/>
        </g>

        <circle cx="150" cy="20" r="12" fill="url(#grnG)"/>
        <text x="150" y="24" text-anchor="middle" fill="#0f1530" font-size="11" font-weight="800">i+</text>
        <text x="150" y="48" text-anchor="middle" fill="#4ade80" font-size="11">最强正样本</text>

        <circle cx="230" cy="20" r="12" fill="url(#redG)"/>
        <text x="230" y="24" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">i−</text>
        <text x="230" y="48" text-anchor="middle" fill="#f87171" font-size="11">最难负样本</text>

        <path d="M 218,14 Q 190,-4 162,14" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrY)"/>
        <text x="190" y="-8" text-anchor="middle" fill="#fbbf24" font-size="10">概率质量搬运</text>
      </g>

      <g transform="translate(30,165)">
        <rect width="350" height="34" rx="6" fill="#0f1530" stroke="#334155"/>
        <text x="175" y="22" text-anchor="middle" fill="#e5e7eb" font-size="13" font-family="monospace">A(i+) = +w,  A(i−) = −w,  其余 = 0</text>
      </g>

      <text x="30" y="223" fill="#e5e7eb" font-size="12">· 抛弃整组 z-score 归一化</text>
      <text x="30" y="243" fill="#e5e7eb" font-size="12">· 只对决策边界上的一对回传梯度</text>
    </g>
  </g>

  <!-- Arrow to right -->
  <path d="M 925,410 L 985,410" stroke="#e5e7eb" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- RIGHT: Decouple + Results -->
  <g>
    <rect x="990" y="120" width="240" height="580" rx="16" fill="#111935" stroke="#334155"/>
    <text x="1110" y="152" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700">搜索 / 更新 解耦</text>

    <g transform="translate(1010,175)">
      <text x="0" y="0" fill="#94a3b8" font-size="11">采样宽度 G</text>
      <rect x="0" y="8" width="200" height="14" rx="3" fill="url(#blueG)"/>
      <text x="100" y="19" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">保持大  (e.g. 32)</text>

      <text x="0" y="44" fill="#94a3b8" font-size="11">更新宽度</text>
      <rect x="0" y="52" width="14" height="14" rx="3" fill="url(#grnG)"/>
      <text x="22" y="63" fill="#4ade80" font-size="11" font-weight="700">固定 O(1)</text>
    </g>

    <line x1="1010" y1="270" x2="1210" y2="270" stroke="#334155" stroke-dasharray="3,3"/>

    <text x="1110" y="296" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">系统与效果收益</text>

    <g transform="translate(1010,315)">
      <rect width="200" height="58" rx="8" fill="#1a2d1f" stroke="#4ade80"/>
      <text x="100" y="26" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="800">+36.6%</text>
      <text x="100" y="46" text-anchor="middle" fill="#cbd5e1" font-size="11">Pass@1 相对提升</text>
    </g>

    <g transform="translate(1010,385)">
      <rect width="200" height="58" rx="8" fill="#2d1f1a" stroke="#f59e0b"/>
      <text x="100" y="26" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">仅 4.1%</text>
      <text x="100" y="46" text-anchor="middle" fill="#cbd5e1" font-size="11">rollout 预算即追平基线</text>
    </g>

    <g transform="translate(1010,455)">
      <rect width="200" height="58" rx="8" fill="#1a2438" stroke="#60a5fa"/>
      <text x="100" y="26" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="800">16.6×</text>
      <text x="100" y="46" text-anchor="middle" fill="#cbd5e1" font-size="11">Actor 更新加速</text>
    </g>

    <g transform="translate(1010,525)">
      <rect width="200" height="58" rx="8" fill="#1a2438" stroke="#60a5fa"/>
      <text x="100" y="26" text-anchor="middle" fill="#60a5fa" font-size="17" font-weight="800">−16.5% / +14.2%</text>
      <text x="100" y="46" text-anchor="middle" fill="#cbd5e1" font-size="11">峰值显存 / Actor MFU</text>
    </g>

    <g transform="translate(1010,605)">
      <rect width="200" height="75" rx="8" fill="#0f1530" stroke="#475569" stroke-dasharray="4,3"/>
      <text x="100" y="24" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">对广告生成式排序的启发</text>
      <text x="100" y="46" text-anchor="middle" fill="#94a3b8" font-size="10.5">稀疏命中下，先造出</text>
      <text x="100" y="62" text-anchor="middle" fill="#94a3b8" font-size="10.5">「可学习事件」再谈奖励</text>
    </g>
  </g>
</svg>