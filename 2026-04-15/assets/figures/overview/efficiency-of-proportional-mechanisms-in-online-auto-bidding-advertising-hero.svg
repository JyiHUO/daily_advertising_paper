<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#141832"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fc5c7d"/>
      <stop offset="100%" stop-color="#6a82fb"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda085"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowEnd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fda085"/>
    </marker>
    <marker id="arrowEndGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38ef7d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="620"/>
    <line x1="300" y1="0" x2="300" y2="620"/>
    <line x1="450" y1="0" x2="450" y2="620"/>
    <line x1="600" y1="0" x2="600" y2="620"/>
    <line x1="750" y1="0" x2="750" y2="620"/>
  </g>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#e8e8f0" font-weight="bold" letter-spacing="0.5">Proportional Mechanisms in Online Auto-Bidding</text>
  <text x="450" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8890b0" letter-spacing="1">BREAKING THE PoA = 2 BARRIER</text>

  <!-- ===== LEFT SIDE: Standard Kelly Mechanism ===== -->
  <!-- Panel background -->
  <rect x="40" y="90" width="370" height="430" rx="16" fill="#111535" stroke="#2a2f55" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="40" y="90" width="370" height="40" rx="16" fill="url(#redGrad)" opacity="0.15"/>
  <text x="225" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fc8dad" font-weight="bold">STANDARD PROPORTIONAL (Kelly)</text>

  <!-- Agents bidding -->
  <g transform="translate(80, 160)">
    <!-- Agent icons -->
    <circle cx="0" cy="0" r="22" fill="#1c2048" stroke="#667eea" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0aaee">A₁</text>
    <circle cx="0" cy="60" r="22" fill="#1c2048" stroke="#667eea" stroke-width="1.5"/>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0aaee">A₂</text>
    <circle cx="0" cy="120" r="22" fill="#1c2048" stroke="#667eea" stroke-width="1.5"/>
    <text x="0" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0aaee">Aₙ</text>
    <!-- Dots between A2 and An -->
    <circle cx="0" cy="87" r="1.5" fill="#667eea" opacity="0.5"/>
    <circle cx="0" cy="95" r="1.5" fill="#667eea" opacity="0.5"/>
    <circle cx="0" cy="103" r="1.5" fill="#667eea" opacity="0.5"/>
    
    <text x="-2" y="-34" text-anchor="middle" font-family="Arial" font-size="10" fill="#7780a8">Agents</text>
  </g>

  <!-- Bid arrows to mechanism box -->
  <line x1="105" y1="160" x2="175" y2="200" stroke="#667eea" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEnd)"/>
  <line x1="105" y1="220" x2="175" y2="220" stroke="#667eea" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEnd)"/>
  <line x1="105" y1="280" x2="175" y2="240" stroke="#667eea" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEnd)"/>

  <!-- Mechanism box -->
  <rect x="178" y="178" width="120" height="85" rx="10" fill="#1a1f48" stroke="#fc5c7d" stroke-width="1.5" opacity="0.9"/>
  <text x="238" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#e0e0f0">Allocation</text>
  <text x="238" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#fda085" font-style="italic">bᵢⱼ / Bⱼ</text>
  <text x="238" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#b0b0d0">Payment = bᵢⱼ</text>

  <!-- Items -->
  <g transform="translate(340, 160)">
    <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#1c2048" stroke="#fda085" stroke-width="1.2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" fill="#fda085">j₁</text>
    <rect x="-18" y="42" width="36" height="36" rx="6" fill="#1c2048" stroke="#fda085" stroke-width="1.2"/>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#fda085">j₂</text>
    <rect x="-18" y="102" width="36" height="36" rx="6" fill="#1c2048" stroke="#fda085" stroke-width="1.2"/>
    <text x="0" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#fda085">jₘ</text>
    <circle cx="0" cy="90" r="1.2" fill="#fda085" opacity="0.5"/>
    <circle cx="0" cy="95" r="1.2" fill="#fda085" opacity="0.5"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Arial" font-size="10" fill="#7780a8">Items</text>
  </g>

  <line x1="300" y1="200" x2="320" y2="160" stroke="#fda085" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="220" x2="320" y2="220" stroke="#fda085" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="240" x2="320" y2="280" stroke="#fda085" stroke-width="1" opacity="0.5"/>

  <!-- PoA = 2 result (highlighted) -->
  <g transform="translate(225, 345)">
    <rect x="-95" y="-28" width="190" height="56" rx="28" fill="#2a1025" stroke="#fc5c7d" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="url(#redGrad)" font-weight="bold" filter="url(#glow)">PoA = 2</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial" font-size="10" fill="#c87090">Tight bound (50% welfare loss)</text>
  </g>

  <!-- Dual analysis label -->
  <g transform="translate(225, 420)">
    <rect x="-85" y="-14" width="170" height="28" rx="6" fill="#151940" stroke="#5060a0" stroke-width="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial" font-size="10" fill="#8899cc">Dual: αⱼ = Bⱼ → 2× gap</text>
  </g>

  <!-- Key constraint text -->
  <text x="225" y="470" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#6670a0">(1−dᵢⱼ)·∇vᵢ ≤ Bⱼ</text>
  <text x="225" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#556">KKT equilibrium condition</text>

  <!-- ===== CENTER: Transformation Arrow ===== -->
  <g transform="translate(450, 330)">
    <!-- Big curved arrow from left to right -->
    <path d="M -20,-50 C 0,-90 0,-90 20,-50" stroke="url(#arrowGrad)" stroke-width="2.5" fill="none" marker-end="url(#arrowEndGreen)"/>
    <text x="0" y="-95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fda085" font-weight="bold">New Payment</text>
    <text x="0" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fda085" font-weight="bold">Design</text>
    
    <!-- Down arrow with key insight -->
    <rect x="-65" y="-25" width="130" height="80" rx="12" fill="#111535" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#e8e8f0">Key Insight:</text>
    <text x="0" y="14" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#38ef7d" font-style="italic">g(Bⱼ) ≪ Total Pay</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial" font-size="9" fill="#7780a8">αⱼ = g(Bⱼ) only adds</text>
    <text x="0" y="44" text-anchor="middle" font-family="Arial" font-size="9" fill="#7780a8">ε fraction to welfare</text>
  </g>

  <!-- ===== RIGHT SIDE: New Payment Mechanism ===== -->
  <rect x="490" y="90" width="370" height="430" rx="16" fill="#111535" stroke="#2a4535" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="490" y="90" width="370" height="40" rx="16" fill="url(#greenGrad)" opacity="0.12"/>
  <text x="675" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38ef7d" font-weight="bold">NEW PAYMENT SCHEME</text>

  <!-- Same agents -->
  <g transform="translate(530, 160)">
    <circle cx="0" cy="0" r="22" fill="#1c2048" stroke="#11998e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" fill="#78d8c0">A₁</text>
    <circle cx="0" cy="60" r="22" fill="#1c2048" stroke="#11998e" stroke-width="1.5"/>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#78d8c0">A₂</text>
    <circle cx="0" cy="120" r="22" fill="#1c2048" stroke="#11998e" stroke-width="1.5"/>
    <text x="0" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#78d8c0">Aₙ</text>
    <circle cx="0" cy="87" r="1.5" fill="#11998e" opacity="0.5"/>
    <circle cx="0" cy="95" r="1.5" fill="#11998e" opacity="0.5"/>
    <circle cx="0" cy="103" r="1.5" fill="#11998e" opacity="0.5"/>
    <text x="-2" y="-34" text-anchor="middle" font-family="Arial" font-size="10" fill="#7780a8">Agents</text>
  </g>

  <!-- Arrows to new mechanism -->
  <line x1="555" y1="160" x2="622" y2="195" stroke="#11998e" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEndGreen)"/>
  <line x1="555" y1="220" x2="622" y2="220" stroke="#11998e" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEndGreen)"/>
  <line x1="555" y1="280" x2="622" y2="245" stroke="#11998e" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowEndGreen)"/>

  <!-- New mechanism box (highlighted) -->
  <rect x="625" y="175" width="135" height="92" rx="10" fill="#152530" stroke="#38ef7d" stroke-width="2"/>
  <text x="692" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#e0f0e8">Same Allocation</text>
  <text x="692" y="216" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#38ef7d" font-style="italic">bᵢⱼ / Bⱼ</text>
  <line x1="640" y1="226" x2="745" y2="226" stroke="#2a4a3a" stroke-width="0.8"/>
  <text x="692" y="244" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#a0d8c0">Payment = ∫₀ᵇⁱʲ g(·) dτ + h</text>
  <text x="692" y="258" text-anchor="middle" font-family="Arial" font-size="9" fill="#709080">g(u) = u·(1+(n−1)ε)</text>

  <!-- Items (right) -->
  <g transform="translate(800, 160)">
    <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#1c2048" stroke="#38ef7d" stroke-width="1.2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" fill="#38ef7d">j₁</text>
    <rect x="-18" y="42" width="36" height="36" rx="6" fill="#1c2048" stroke="#38ef7d" stroke-width="1.2"/>
    <text x="0" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#38ef7d">j₂</text>
    <rect x="-18" y="102" width="36" height="36" rx="6" fill="#1c2048" stroke="#38ef7d" stroke-width="1.2"/>
    <text x="0" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#38ef7d">jₘ</text>
    <circle cx="0" cy="90" r="1.2" fill="#38ef7d" opacity="0.5"/>
    <circle cx="0" cy="95" r="1.2" fill="#38ef7d" opacity="0.5"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Arial" font-size="10" fill="#7780a8">Items</text>
  </g>

  <line x1="762" y1="200" x2="780" y2="160" stroke="#38ef7d" stroke-width="1" opacity="0.4"/>
  <line x1="762" y1="220" x2="780" y2="220" stroke="#38ef7d" stroke-width="1" opacity="0.4"/>
  <line x1="762" y1="245" x2="780" y2="280" stroke="#38ef7d" stroke-width="1" opacity="0.4"/>

  <!-- PoA = 1 + ε result (highlighted, larger) -->
  <g transform="translate(675, 345)">
    <rect x="-110" y="-30" width="220" height="60" rx="30" fill="#0a2518" stroke="#38ef7d" stroke-width="2.5" filter="url(#bigGlow)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#38ef7d" font-weight="bold">PoA = 1 + ε</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="10" fill="#70c8a0">ε = O(1/(n−1)) → 1 as n → ∞</text>
  </g>

  <!-- Dual analysis label (right) -->
  <g transform="translate(675, 420)">
    <rect x="-95" y="-14" width="190" height="28" rx="6" fill="#0f1f18" stroke="#2a5a4a" stroke-width="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial" font-size="10" fill="#70b898">Dual: αⱼ = g(Bⱼ) → ε× fraction</text>
  </g>

  <!-- Impossibility bypass note -->
  <g transform="translate(675, 468)">
    <rect x="-105" y="-15" width="210" height="40" rx="8" fill="#151830" stroke="#8890b0" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#b0b8d0">Bypasses PoA ≥ 2 impossibility:</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="9" fill="#9098b0">pᵢⱼ may exceed bᵢⱼ (per-item)</text>
  </g>

  <!-- ===== BOTTOM: Comparison Bar ===== -->
  <g transform="translate(450, 558)">
    <!-- Welfare efficiency bar comparison -->
    <text x="-320" y="-14" font-family="Arial" font-size="10" fill="#7780a8">Equilibrium Welfare Efficiency</text>
    
    <!-- Standard bar -->
    <rect x="-320" y="0" width="160" height="16" rx="8" fill="#2a1025" stroke="#fc5c7d" stroke-width="1"/>
    <rect x="-320" y="0" width="80" height="16" rx="8" fill="#fc5c7d" opacity="0.6"/>
    <text x="-240" y="12" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">≥ 50%</text>
    <text x="-140" y="12" font-family="Arial" font-size="9" fill="#888">Standard</text>

    <!-- New bar -->
    <rect x="80" y="0" width="240" height="16" rx="8" fill="#0a2518" stroke="#38ef7d" stroke-width="1"/>
    <rect x="80" y="0" width="225" height="16" rx="8" fill="#38ef7d" opacity="0.5"/>
    <text x="200" y="12" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">≥ n/(n+1) → 100%</text>
    <text x="340" y="12" font-family="Arial" font-size="9" fill="#888">New</text>
  </g>

  <!-- Subtle decorative elements -->
  <circle cx="450" cy="310" r="2" fill="#fda085" opacity="0.3"/>
  <circle cx="445" cy="315" r="1.5" fill="#38ef7d" opacity="0.3"/>

  <!-- VS divider -->
  <g transform="translate(450, 420)">
    <line x1="0" y1="-280" x2="0" y2="80" stroke="#2a2f55" stroke-width="1" stroke-dasharray="2,6" opacity="0.5"/>
  </g>

  <!-- Small "VS" badge -->
  <g transform="translate(450, 195)">
    <circle r="18" fill="#1a1a3a" stroke="#5560a0" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#9098c0" font-weight="bold">VS</text>
  </g>

  <!-- Primal-Dual method label at bottom center -->
  <g transform="translate(450, 600)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="9" fill="#556" letter-spacing="2">PRIMAL-DUAL ANALYSIS FRAMEWORK</text>
  </g>
</svg>