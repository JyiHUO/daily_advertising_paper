<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <linearGradient id="gOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BBF7D0"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">权重归一化 &amp; 校准对齐</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748B">让冷启动广告的CTR分数与暖启动模型公平竞争</text>

  <!-- ========== STEP 1: Raw Weights ========== -->
  <rect x="40" y="100" width="200" height="110" rx="14" fill="url(#gOrange)" opacity="0.85" stroke="#D97706" stroke-width="2"/>
  <text x="140" y="133" text-anchor="middle" font-size="16" font-weight="bold" fill="#78350F">LLM 原始权重</text>
  <text x="140" y="158" text-anchor="middle" font-size="13" fill="#92400E">w = [3.2, −1.7, 4.5, …]</text>
  <text x="140" y="180" text-anchor="middle" font-size="12" fill="#B45309">‖w‖ 很大 → sigmoid≈0.99</text>
  <!-- problem badge -->
  <rect x="155" y="188" width="70" height="20" rx="10" fill="#DC2626" opacity="0.9"/>
  <text x="190" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">⚠ 数值爆炸</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="155" x2="305" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="273" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">L2归一化</text>

  <!-- ========== STEP 2: Normalized ========== -->
  <rect x="310" y="100" width="220" height="110" rx="14" fill="url(#gBlue)" opacity="0.85" stroke="#2563EB" stroke-width="2"/>
  <text x="420" y="133" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E3A8A">归一化权重</text>
  <text x="420" y="158" text-anchor="middle" font-size="15" fill="#1E40AF">ŵ = w / ‖w‖</text>
  <text x="420" y="182" text-anchor="middle" font-size="12" fill="#1D4ED8">数值拉到统一尺度</text>

  <!-- Arrow 2→3 -->
  <line x1="530" y1="155" x2="595" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="563" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">+偏移 δ</text>

  <!-- ========== STEP 3: Calibrated ========== -->
  <rect x="600" y="100" width="250" height="110" rx="14" fill="url(#gGreen)" opacity="0.85" stroke="#16A34A" stroke-width="2"/>
  <text x="725" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#14532D">校准后模型</text>
  <text x="725" y="155" text-anchor="middle" font-size="14" fill="#166534">score = σ(ŵ·x + δ)</text>
  <text x="725" y="178" text-anchor="middle" font-size="12" fill="#15803D">均值CTR = α (历史广告均值)</text>
  <!-- ok badge -->
  <rect x="680" y="186" width="90" height="20" rx="10" fill="#16A34A" opacity="0.9"/>
  <text x="725" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">✓ 分布对齐</text>

  <!-- ========== Bottom: Before/After Comparison ========== -->
  <text x="450" y="260" text-anchor="middle" font-size="17" font-weight="bold" fill="#334155">校准前 vs 校准后：CTR 分布对比</text>

  <!-- Before distribution -->
  <rect x="60" y="285" width="360" height="200" rx="12" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="240" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#BE123C">校准前 — 偏移严重</text>
  <!-- Axis -->
  <line x1="100" y1="450" x2="380" y2="450" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="100" y1="330" x2="100" y2="450" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="100" y="468" font-size="10" fill="#64748B" text-anchor="middle">0</text>
  <text x="240" y="468" font-size="10" fill="#64748B" text-anchor="middle">0.5</text>
  <text x="380" y="468" font-size="10" fill="#64748B" text-anchor="middle">1.0</text>
  <text x="240" y="482" font-size="11" fill="#64748B" text-anchor="middle">预测 CTR</text>
  <!-- Cold start skewed right -->
  <path d="M300,450 Q320,440 340,370 Q350,340 355,350 Q365,400 375,450 Z" fill="#F87171" opacity="0.6"/>
  <text x="345" y="360" font-size="11" fill="#DC2626" font-weight="bold">冷启动</text>
  <text x="345" y="374" font-size="10" fill="#DC2626">均值≈0.12</text>
  <!-- Warm model -->
  <path d="M120,450 Q135,440 150,390 Q160,350 170,360 Q180,410 200,450 Z" fill="#60A5FA" opacity="0.5"/>
  <text x="158" y="378" font-size="11" fill="#2563EB" font-weight="bold">暖启动</text>
  <text x="158" y="392" font-size="10" fill="#2563EB">均值≈0.05</text>
  <!-- Gap arrow -->
  <line x1="185" y1="420" x2="310" y2="420" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="248" y="414" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">Gap!</text>

  <!-- After distribution -->
  <rect x="480" y="285" width="370" height="200" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="665" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803D">校准后 — 分布对齐 ✓</text>
  <!-- Axis -->
  <line x1="520" y1="450" x2="810" y2="450" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="520" y1="330" x2="520" y2="450" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="520" y="468" font-size="10" fill="#64748B" text-anchor="middle">0</text>
  <text x="665" y="468" font-size="10" fill="#64748B" text-anchor="middle">0.5</text>
  <text x="810" y="468" font-size="10" fill="#64748B" text-anchor="middle">1.0</text>
  <text x="665" y="482" font-size="11" fill="#64748B" text-anchor="middle">预测 CTR</text>
  <!-- Both aligned -->
  <path d="M540,450 Q555,440 570,380 Q580,345 590,355 Q600,405 620,450 Z" fill="#60A5FA" opacity="0.5"/>
  <path d="M548,450 Q563,438 578,385 Q586,355 596,365 Q604,408 624,450 Z" fill="#4ADE80" opacity="0.5"/>
  <text x="590" y="370" font-size="11" fill="#166534" font-weight="bold">冷启动</text>
  <text x="590" y="384" font-size="11" fill="#2563EB" font-weight="bold">暖启动</text>
  <text x="590" y="398" font-size="10" fill="#334155">均值都≈0.05</text>
  <!-- Checkmark -->
  <circle cx="590" y="425" r="14" fill="#22C55E" opacity="0.8" cy="425"/>
  <text x="590" y="430" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">✓</text>
  <text x="630" y="430" font-size="11" fill="#15803D" font-weight="bold">公平排序</text>

  <!-- Key formula callout -->
  <rect x="310" y="492" width="280" height="26" rx="8" fill="#1E293B" opacity="0.9"/>
  <text x="450" y="510" text-anchor="middle" font-size="12" fill="#F1F5F9" font-weight="bold">核心：求 δ 使 E[σ(ŵ·x + δ)] = α</text>
</svg>