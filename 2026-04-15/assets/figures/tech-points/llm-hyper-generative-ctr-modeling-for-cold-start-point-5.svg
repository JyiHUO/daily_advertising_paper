<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">LLM-HYPER 可解释性验证：反事实实验</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="14">修改广告标题 → LLM权重随语义方向一致变化</text>

  <!-- ======== Left: Original Ad ======== -->
  <rect x="30" y="100" width="220" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">原始广告</text>
  <text x="140" y="150" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">"庭院花园家具"</text>
  <text x="140" y="175" text-anchor="middle" fill="#64748b" font-size="11">目标特征: 户外运动偏好</text>
  <text x="140" y="192" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">权重 = 0.192</text>

  <!-- Arrow from original to LLM -->
  <line x1="250" y1="150" x2="310" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ======== Center: LLM Hub ======== -->
  <rect x="315" y="110" width="140" height="80" rx="40" fill="url(#purple)" opacity="0.9" filter="url(#glow)"/>
  <text x="385" y="145" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">LLM</text>
  <text x="385" y="165" text-anchor="middle" fill="#e9d5ff" font-size="11">超网络推理</text>

  <!-- ======== Three Scenarios (Right Side) ======== -->

  <!-- Scenario 1: Enhance (Green) -->
  <line x1="455" y1="130" x2="520" y2="100" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="525" y="60" width="345" height="105" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="2" opacity="0.95"/>
  <text x="540" y="85" fill="#22c55e" font-size="12" font-weight="bold">🔼 增强语义</text>
  <text x="540" y="107" fill="#bbf7d0" font-size="13">"比赛日升级：庭院烧烤派对"</text>
  
  <!-- Weight bar enhance -->
  <rect x="540" y="120" width="200" height="14" rx="4" fill="#1a3a2a"/>
  <rect x="540" y="120" width="147" height="14" rx="4" fill="url(#green)"/>
  <text x="695" y="131" fill="#22c55e" font-size="12" font-weight="bold">0.192 → 0.735</text>
  <text x="540" y="152" fill="#4ade80" font-size="15" font-weight="bold">▲ +0.543</text>

  <!-- Scenario 2: Weaken (Red) -->
  <line x1="455" y1="150" x2="520" y2="260" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="525" y="185" width="345" height="105" rx="12" fill="#2a0a0a" stroke="#ef4444" stroke-width="2" opacity="0.95"/>
  <text x="540" y="210" fill="#ef4444" font-size="12" font-weight="bold">🔽 削弱语义</text>
  <text x="540" y="232" fill="#fecaca" font-size="13">"秋季排水沟与屋顶维护"</text>
  
  <!-- Weight bar weaken -->
  <rect x="540" y="245" width="200" height="14" rx="4" fill="#3a1a1a"/>
  <rect x="540" y="245" width="61" height="14" rx="4" fill="url(#red)"/>
  <text x="695" y="256" fill="#ef4444" font-size="12" font-weight="bold">3.750 → 1.150</text>
  <text x="540" y="278" fill="#f87171" font-size="15" font-weight="bold">▼ -2.600</text>

  <!-- Scenario 3: Neutral (Gray/Amber) -->
  <line x1="455" y1="160" x2="520" y2="382" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="525" y="310" width="345" height="105" rx="12" fill="#1c1917" stroke="#78716c" stroke-width="2" opacity="0.95"/>
  <text x="540" y="335" fill="#a8a29e" font-size="12" font-weight="bold">⏸ 中立化</text>
  <text x="540" y="357" fill="#d6d3d1" font-size="13">"日常必需品"</text>
  
  <!-- Weight bar neutral -->
  <rect x="540" y="370" width="200" height="14" rx="4" fill="#292524"/>
  <rect x="540" y="370" width="93" height="14" rx="4" fill="#78716c"/>
  <text x="695" y="381" fill="#a8a29e" font-size="12" font-weight="bold">1.055 → 0.975</text>
  <text x="540" y="403" fill="#a8a29e" font-size="15" font-weight="bold">≈ -0.08</text>

  <!-- ======== Bottom Summary: Key Metrics ======== -->
  <rect x="30" y="450" width="840" height="145" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="450" y="478" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">核心验证指标</text>
  
  <!-- Metric 1 -->
  <rect x="55" y="495" width="235" height="80" rx="10" fill="#1e293b"/>
  <text x="172" y="520" text-anchor="middle" fill="#94a3b8" font-size="11">专家标注 vs LLM权重 Top-5</text>
  <text x="172" y="548" text-anchor="middle" fill="#3b82f6" font-size="30" font-weight="bold" filter="url(#glow)">81%</text>
  <text x="172" y="567" text-anchor="middle" fill="#60a5fa" font-size="12">HR@5 命中率</text>
  
  <!-- Metric 2 -->
  <rect x="315" y="495" width="260" height="80" rx="10" fill="#1e293b"/>
  <text x="445" y="520" text-anchor="middle" fill="#94a3b8" font-size="11">文字推理 vs 数值权重符号</text>
  <text x="445" y="548" text-anchor="middle" fill="#22c55e" font-size="30" font-weight="bold" filter="url(#glow)">&gt;95%</text>
  <text x="445" y="567" text-anchor="middle" fill="#4ade80" font-size="12">一致性率</text>
  
  <!-- Metric 3 -->
  <rect x="600" y="495" width="245" height="80" rx="10" fill="#1e293b"/>
  <text x="722" y="520" text-anchor="middle" fill="#94a3b8" font-size="11">反事实削弱场景准确率</text>
  <text x="722" y="548" text-anchor="middle" fill="#f59e0b" font-size="30" font-weight="bold" filter="url(#glow)">88%</text>
  <text x="722" y="567" text-anchor="middle" fill="#fbbf24" font-size="12">鲁棒性验证</text>

  <!-- Left side decorative label -->
  <text x="140" y="240" text-anchor="middle" fill="#475569" font-size="11">语义变 → 权重变</text>
  <text x="140" y="258" text-anchor="middle" fill="#475569" font-size="11">方向一致 ✓</text>
  
  <!-- Small insight label -->
  <rect x="30" y="280" width="220" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="140" y="300" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">💡 关键洞察</text>
  <text x="140" y="318" text-anchor="middle" fill="#94a3b8" font-size="11">LLM是语义推理，非随机生成</text>

</svg>