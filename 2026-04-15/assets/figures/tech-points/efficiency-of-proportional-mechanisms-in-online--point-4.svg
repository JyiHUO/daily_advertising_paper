<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#16A34A">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="gOpt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="gDual" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="gEq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="gResult" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#FBCFE8"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">原始-对偶方法证明 PoA 上界</text>
  <text x="450" y="62" text-anchor="middle" font-size="14" fill="#64748B">Primal-Dual Framework for Bounding Price of Anarchy</text>

  <!-- ========== Step 1: Primal (Optimal Allocation LP) ========== -->
  <rect x="40" y="100" width="240" height="170" rx="16" fill="url(#gOpt)" stroke="#2563EB" stroke-width="2.5"/>
  <text x="160" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">① 原始规划</text>
  <text x="160" y="155" text-anchor="middle" font-size="13" fill="#1E40AF">最优分配 (上帝视角)</text>
  <text x="160" y="188" text-anchor="middle" font-size="15" fill="#334155" font-weight="bold">max Σ 液态福利</text>
  <text x="160" y="212" text-anchor="middle" font-size="12" fill="#475569">s.t. 每物品至多分一次</text>
  <text x="160" y="232" text-anchor="middle" font-size="12" fill="#475569">每方案至多选一次</text>
  <text x="160" y="256" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">OPT = 最优社会福利</text>

  <!-- ========== Step 2: Dual ========== -->
  <rect x="340" y="100" width="240" height="170" rx="16" fill="url(#gDual)" stroke="#D97706" stroke-width="2.5"/>
  <text x="460" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400E">② 对偶上界</text>
  <text x="460" y="155" text-anchor="middle" font-size="13" fill="#92400E">弱对偶 → OPT 的天花板</text>
  <text x="460" y="190" text-anchor="middle" font-size="15" fill="#334155" font-weight="bold">min Σα<tspan baseline-shift="sub" font-size="11">j</tspan> + β</text>
  <text x="460" y="216" text-anchor="middle" font-size="12" fill="#475569">α<tspan baseline-shift="sub" font-size="10">j</tspan> ↔ 物品约束</text>
  <text x="460" y="236" text-anchor="middle" font-size="12" fill="#475569">β ↔ 方案约束</text>
  <text x="460" y="260" text-anchor="middle" font-size="11" fill="#B45309" font-style="italic">对偶值 ≥ OPT（弱对偶）</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="185" x2="335" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="308" y="178" text-anchor="middle" font-size="11" fill="#555">对偶</text>

  <!-- ========== Step 3: Equilibrium + KKT ========== -->
  <rect x="640" y="100" width="230" height="170" rx="16" fill="url(#gEq)" stroke="#16A34A" stroke-width="2.5"/>
  <text x="755" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">③ 均衡条件</text>
  <text x="755" y="155" text-anchor="middle" font-size="13" fill="#166534">无人想偏离 → KKT</text>
  <rect x="665" y="170" width="180" height="50" rx="8" fill="#fff" fill-opacity="0.7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="755" y="192" text-anchor="middle" font-size="12" fill="#334155">边际价值 × (1 - 份额)</text>
  <text x="755" y="208" text-anchor="middle" font-size="12" fill="#334155">≤ g(总出价)</text>
  <text x="755" y="240" text-anchor="middle" font-size="11" fill="#475569">→ 恰好给出对偶变量的</text>
  <text x="755" y="256" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">可行赋值！</text>

  <!-- Arrow 2→3 (curved) -->
  <path d="M580 185 Q610 185 635 185" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="608" y="178" text-anchor="middle" font-size="11" fill="#555">构造</text>

  <!-- ========== Big central comparison arrow area ========== -->
  <!-- Down arrow from Dual -->
  <path d="M460 270 L460 340 Q460 360 440 370 L300 430" fill="none" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  
  <!-- Down arrow from Equilibrium -->
  <path d="M755 270 L755 340 Q755 360 735 370 L600 430" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- ========== Step 4: Result ========== -->
  <rect x="200" y="400" width="500" height="150" rx="20" fill="url(#gResult)" stroke="#DB2777" stroke-width="3"/>
  
  <text x="450" y="435" text-anchor="middle" font-size="17" font-weight="bold" fill="#9D174D">④ 比较得 PoA 上界</text>

  <!-- Comparison illustration -->
  <rect x="240" y="455" width="160" height="45" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="320" y="475" text-anchor="middle" font-size="13" fill="#92400E" font-weight="bold">对偶值 ≥ OPT</text>
  <text x="320" y="492" text-anchor="middle" font-size="11" fill="#92400E">(上界)</text>

  <text x="430" y="480" text-anchor="middle" font-size="22" fill="#9D174D" font-weight="bold">÷</text>

  <rect x="460" y="455" width="200" height="45" rx="8" fill="#A7F3D0" stroke="#16A34A" stroke-width="1.5"/>
  <text x="560" y="475" text-anchor="middle" font-size="13" fill="#166534" font-weight="bold">均衡福利 (SW<tspan baseline-shift="sub" font-size="10">eq</tspan>)</text>
  <text x="560" y="492" text-anchor="middle" font-size="11" fill="#166534">(下界)</text>

  <!-- Result text -->
  <text x="450" y="535" text-anchor="middle" font-size="18" font-weight="bold" fill="#9D174D">PoA = OPT / SW<tspan baseline-shift="sub" font-size="13">eq</tspan>  ≤  对偶值 / SW<tspan baseline-shift="sub" font-size="13">eq</tspan></text>

  <!-- Highlight badge -->
  <rect x="310" y="555" width="280" height="28" rx="14" fill="#DB2777"/>
  <text x="450" y="574" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">新机制下 → PoA ≤ 1 + O(1/(n-1))</text>

  <!-- Annotation: key insight -->
  <rect x="620" y="310" width="250" height="55" rx="10" fill="#fff" stroke="#9333EA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="745" y="332" text-anchor="middle" font-size="12" fill="#7C3AED" font-weight="bold">🔑 关键洞察</text>
  <text x="745" y="350" text-anchor="middle" font-size="11" fill="#6B21A8">KKT 不等式 = 对偶可行性条件</text>

</svg>