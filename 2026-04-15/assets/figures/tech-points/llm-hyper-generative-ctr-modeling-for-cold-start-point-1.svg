<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="adGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ctrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">LLM-HYPER: LLM 作为超网络生成 CTR 模型权重</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#94a3b8">冷启动广告无需训练，离线生成权重 → 在线内积打分</text>

  <!-- ===== Module 1: New Ad (left) ===== -->
  <rect x="30" y="130" width="190" height="180" rx="14" fill="url(#adGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="125" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="white">🆕 冷启动新广告</text>
  <!-- mini ad card -->
  <rect x="52" y="175" width="146" height="80" rx="8" fill="white" opacity="0.92"/>
  <text x="125" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">🧱 儿童积木玩具套装</text>
  <text x="125" y="216" text-anchor="middle" font-size="10" fill="#a16207">标题 + 图片 + 属性描述</text>
  <text x="125" y="236" text-anchor="middle" font-size="10" fill="#a16207">品类: 玩具 · 年龄: 3-8岁</text>
  <text x="125" y="290" text-anchor="middle" font-size="11" fill="white" opacity="0.9">⚠ 无用户点击数据</text>

  <!-- Arrow: Ad → LLM -->
  <line x1="220" y1="220" x2="295" y2="220" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,3"/>
  <text x="257" y="210" text-anchor="middle" font-size="10" fill="#64748b">Prompt</text>

  <!-- ===== Module 2: LLM Hypernetwork (center) ===== -->
  <rect x="300" y="100" width="280" height="250" rx="18" fill="url(#llmGrad)" filter="url(#shadow)"/>
  <text x="440" y="134" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🧠 LLM 超网络</text>
  <text x="440" y="154" text-anchor="middle" font-size="11" fill="#e0e7ff">(如 Gemini-2.5-Pro · 离线推理)</text>

  <!-- Prompt components -->
  <rect x="320" y="170" width="240" height="36" rx="7" fill="white" opacity="0.2"/>
  <text x="440" y="193" text-anchor="middle" font-size="11" fill="white">📋 少样本示例: 相似广告的已知权重</text>

  <rect x="320" y="214" width="240" height="36" rx="7" fill="white" opacity="0.2"/>
  <text x="440" y="237" text-anchor="middle" font-size="11" fill="white">📝 任务输入: 特征定义 + 广告描述</text>

  <rect x="320" y="258" width="240" height="36" rx="7" fill="white" opacity="0.2"/>
  <text x="440" y="281" text-anchor="middle" font-size="11" fill="white">⚙ 生成准则: 推理意图, 输出 [-1, 1]</text>

  <!-- Output label -->
  <text x="440" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#fde68a">直接输出 n 维权重向量 w</text>

  <!-- Arrow: LLM → Weight Vector -->
  <line x1="440" y1="350" x2="440" y2="395" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)"/>

  <!-- ===== Weight Vector (center bottom) ===== -->
  <rect x="310" y="400" width="260" height="70" rx="12" fill="white" stroke="#7c3aed" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="440" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">权重向量 w</text>
  <!-- weight bars -->
  <g transform="translate(330, 438)">
    <rect x="0" y="0" width="38" height="18" rx="3" fill="#6366f1" opacity="0.8"/>
    <text x="19" y="13" text-anchor="middle" font-size="9" fill="white" font-weight="bold">0.95</text>
    <rect x="44" y="0" width="38" height="18" rx="3" fill="#6366f1" opacity="0.5"/>
    <text x="63" y="13" text-anchor="middle" font-size="9" fill="white" font-weight="bold">0.42</text>
    <rect x="88" y="0" width="38" height="18" rx="3" fill="#ef4444" opacity="0.6"/>
    <text x="107" y="13" text-anchor="middle" font-size="9" fill="white" font-weight="bold">-0.35</text>
    <rect x="132" y="0" width="38" height="18" rx="3" fill="#6366f1" opacity="0.35"/>
    <text x="151" y="13" text-anchor="middle" font-size="9" fill="white" font-weight="bold">0.12</text>
    <rect x="176" y="0" width="38" height="18" rx="3" fill="#6366f1" opacity="0.7"/>
    <text x="195" y="13" text-anchor="middle" font-size="9" fill="white" font-weight="bold">…</text>
  </g>
  <!-- annotation -->
  <text x="332" y="474" font-size="9" fill="#7c3aed">玩具参与</text>
  <text x="376" y="474" font-size="9" fill="#7c3aed">数码偏好</text>
  <text x="420" y="474" font-size="9" fill="#ef4444">户外家具</text>
  <text x="464" y="474" font-size="9" fill="#7c3aed">年龄段</text>

  <!-- ===== Module 3: User Feature (right) ===== -->
  <rect x="660" y="130" width="210" height="130" rx="14" fill="url(#userGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="765" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="white">👤 用户特征向量 x</text>
  <rect x="680" y="175" width="170" height="24" rx="5" fill="white" opacity="0.25"/>
  <text x="765" y="192" text-anchor="middle" font-size="10" fill="white">玩具参与度: 0.88</text>
  <rect x="680" y="204" width="170" height="24" rx="5" fill="white" opacity="0.25"/>
  <text x="765" y="221" text-anchor="middle" font-size="10" fill="white">户外家具偏好: 0.15</text>
  <text x="765" y="250" text-anchor="middle" font-size="10" fill="white" opacity="0.8">… 共 n 维特征</text>

  <!-- Arrow: User → CTR node -->
  <line x1="765" y1="260" x2="765" y2="395" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== Module 4: CTR Score (bottom right) ===== -->
  <rect x="650" y="400" width="230" height="70" rx="14" fill="url(#ctrGrad)" filter="url(#shadow)"/>
  <text x="765" y="428" text-anchor="middle" font-size="15" font-weight="bold" fill="white">CTR = σ(w · x)</text>
  <text x="765" y="452" text-anchor="middle" font-size="12" fill="#fecaca">内积 → sigmoid → 点击率</text>

  <!-- Arrow: Weight → CTR -->
  <line x1="570" y1="435" x2="645" y2="435" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="608" y="425" text-anchor="middle" font-size="10" fill="#64748b">w</text>
  <text x="608" y="450" text-anchor="middle" font-size="10" fill="#64748b">x</text>

  <!-- ===== Bottom highlights ===== -->
  <rect x="50" y="500" width="220" height="40" rx="10" fill="#dbeafe"/>
  <text x="160" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">🔑 核心: 权重由LLM推理生成</text>

  <rect x="300" y="500" width="220" height="40" rx="10" fill="#fef3c7"/>
  <text x="410" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">⚡ 推理延迟: 仅 0.16ms</text>

  <rect x="550" y="500" width="270" height="40" rx="10" fill="#d1fae5"/>
  <text x="685" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">📊 达到暖启动模型 92% CTR</text>

  <!-- Offline / Online divider -->
  <line x1="10" y1="380" x2="635" y2="380" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="10" y="370" width="60" height="20" rx="4" fill="#e2e8f0"/>
  <text x="40" y="384" text-anchor="middle" font-size="9" fill="#475569" font-weight="bold">离线阶段</text>
  <rect x="10" y="392" width="60" height="20" rx="4" fill="#fef9c3"/>
  <text x="40" y="406" text-anchor="middle" font-size="9" fill="#854d0e" font-weight="bold">在线阶段</text>
</svg>