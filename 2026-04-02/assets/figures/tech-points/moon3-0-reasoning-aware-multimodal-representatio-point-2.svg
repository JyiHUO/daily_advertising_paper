<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <linearGradient id="fadeRed" x1="0" x2="1">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FCA5A5" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="fadeBlue" x1="0" x2="1">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0.15"/>
    </linearGradient>
    <style>
      .title{font:700 28px "Arial",sans-serif; fill:#111827}
      .subtitle{font:500 15px "Arial",sans-serif; fill:#6B7280}
      .label{font:700 18px "Arial",sans-serif; fill:#111827}
      .small{font:600 15px "Arial",sans-serif; fill:#374151}
      .tiny{font:600 14px "Arial",sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .soft{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .blue{fill:#EFF6FF; stroke:#93C5FD; stroke-width:2}
      .green{fill:#ECFDF5; stroke:#86EFAC; stroke-width:2}
      .orange{fill:#FFF7ED; stroke:#FDBA74; stroke-width:2}
      .shadow{filter:url(#none)}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#FFFFFF"/>

  <text x="60" y="60" class="title">长推理会“忘图忘文” → 多头融合把细节补回来</text>
  <text x="60" y="92" class="subtitle">MOON3.0 的关键点：以推理结果为主干，但按子空间分别补视觉 / 文本 / 交互信息</text>

  <!-- Left mini panel: problem -->
  <rect x="60" y="130" rx="20" ry="20" width="300" height="500" class="soft"/>
  <text x="90" y="175" class="label">1. 推理越长，原始细节越淡</text>

  <!-- chain -->
  <rect x="90" y="220" rx="12" ry="12" width="60" height="42" fill="#DBEAFE" stroke="#93C5FD"/>
  <rect x="165" y="220" rx="12" ry="12" width="60" height="42" fill="#DBEAFE" stroke="#93C5FD"/>
  <rect x="240" y="220" rx="12" ry="12" width="60" height="42" fill="#DBEAFE" stroke="#93C5FD"/>
  <line x1="150" y1="241" x2="165" y2="241" stroke="#9CA3AF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="225" y1="241" x2="240" y2="241" stroke="#9CA3AF" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="96" y="248" class="tiny">attr</text>
  <text x="171" y="248" class="tiny">attr</text>
  <text x="246" y="248" class="tiny">attr</text>

  <!-- fading attention -->
  <text x="92" y="305" class="small">last token</text>
  <rect x="90" y="325" rx="14" ry="14" width="210" height="58" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="130" y="360" class="label" fill="#3730A3">reasoning state</text>

  <!-- image/text sources -->
  <rect x="90" y="435" rx="14" ry="14" width="88" height="88" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="104" y="450" width="60" height="42" rx="8" fill="#FCA5A5" opacity="0.9"/>
  <circle cx="118" cy="463" r="5" fill="#FFF"/>
  <path d="M106 488 L123 470 L136 482 L147 472 L163 488" fill="none" stroke="#FFF" stroke-width="3"/>
  <text x="115" y="540" text-anchor="middle" class="tiny">image</text>

  <rect x="212" y="435" rx="14" ry="14" width="88" height="88" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="228" y1="458" x2="284" y2="458" stroke="#9CA3AF" stroke-width="4"/>
  <line x1="228" y1="476" x2="276" y2="476" stroke="#9CA3AF" stroke-width="4"/>
  <line x1="228" y1="494" x2="266" y2="494" stroke="#9CA3AF" stroke-width="4"/>
  <text x="256" y="540" text-anchor="middle" class="tiny">text</text>

  <path d="M 196 355 C 170 390, 155 405, 136 432" stroke="url(#fadeRed)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 210 355 C 225 390, 240 405, 256 432" stroke="url(#fadeRed)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <text x="94" y="585" class="small" fill="#DC2626">细粒度属性被冲淡</text>

  <!-- Middle panel: fix -->
  <rect x="400" y="130" rx="20" ry="20" width="370" height="500" class="box"/>
  <text x="430" y="175" class="label">2. 主干 + 回看原始模态</text>

  <rect x="440" y="215" rx="14" ry="14" width="290" height="62" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="585" y="252" text-anchor="middle" class="label" fill="#3730A3">base: last token</text>

  <rect x="440" y="325" rx="14" ry="14" width="120" height="110" class="blue"/>
  <text x="500" y="360" text-anchor="middle" class="small">visual pool</text>
  <text x="500" y="395" text-anchor="middle" class="tiny">存在 + 相似度门控</text>

  <rect x="610" y="325" rx="14" ry="14" width="120" height="110" class="green"/>
  <text x="670" y="360" text-anchor="middle" class="small">text pool</text>
  <text x="670" y="395" text-anchor="middle" class="tiny">存在 + 相似度门控</text>

  <path d="M585 277 L500 325" stroke="#2563EB" stroke-width="3.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M585 277 L670 325" stroke="#059669" stroke-width="3.5" fill="none" marker-end="url(#arrowGreen)"/>

  <rect x="475" y="485" rx="16" ry="16" width="220" height="90" class="orange"/>
  <text x="585" y="522" text-anchor="middle" class="label" fill="#9A3412">H heads</text>
  <text x="585" y="552" text-anchor="middle" class="tiny">每个子空间单独分配权重</text>

  <path d="M500 435 L545 485" stroke="#2563EB" stroke-width="3.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M670 435 L625 485" stroke="#059669" stroke-width="3.5" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M585 277 L585 485" stroke="#7C3AED" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Right panel: result -->
  <rect x="810" y="130" rx="20" ry="20" width="330" height="500" class="soft"/>
  <text x="840" y="175" class="label">3. 不是一个总开关，而是分头补细节</text>

  <!-- heads illustration -->
  <rect x="850" y="235" rx="12" ry="12" width="250" height="58" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="885" y="270" class="small">head A</text>
  <rect x="950" y="248" rx="8" ry="8" width="44" height="16" fill="#60A5FA"/>
  <rect x="1002" y="248" rx="8" ry="8" width="28" height="16" fill="#34D399"/>
  <rect x="1038" y="248" rx="8" ry="8" width="46" height="16" fill="#FB923C"/>

  <rect x="850" y="315" rx="12" ry="12" width="250" height="58" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="885" y="350" class="small">head B</text>
  <rect x="950" y="328" rx="8" ry="8" width="26" height="16" fill="#60A5FA"/>
  <rect x="984" y="328" rx="8" ry="8" width="58" height="16" fill="#34D399"/>
  <rect x="1050" y="328" rx="8" ry="8" width="30" height="16" fill="#FB923C"/>

  <rect x="850" y="395" rx="12" ry="12" width="250" height="58" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="885" y="430" class="small">head C</text>
  <rect x="950" y="408" rx="8" ry="8" width="34" height="16" fill="#60A5FA"/>
  <rect x="992" y="408" rx="8" ry="8" width="24" height="16" fill="#34D399"/>
  <rect x="1024" y="408" rx="8" ry="8" width="60" height="16" fill="#FB923C"/>

  <line x1="695" y1="530" x2="850" y2="530" stroke="#EA580C" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <rect x="850" y="495" rx="16" ry="16" width="250" height="72" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2.5"/>
  <text x="975" y="525" text-anchor="middle" class="label" fill="#1D4ED8">final embedding</text>
  <text x="975" y="550" text-anchor="middle" class="tiny">保留推理语义，也找回商品细节</text>

  <!-- legend -->
  <g transform="translate(850,590)">
    <rect x="0" y="0" width="14" height="14" rx="4" fill="#60A5FA"/>
    <text x="22" y="12" class="tiny">视觉</text>
    <rect x="78" y="0" width="14" height="14" rx="4" fill="#34D399"/>
    <text x="100" y="12" class="tiny">文本</text>
    <rect x="156" y="0" width="14" height="14" rx="4" fill="#FB923C"/>
    <text x="178" y="12" class="tiny">图文交互</text>
  </g>
</svg>