<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4A5568"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#DC2626"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">SiameseNorm：让推荐模型越堆越深</text>
  <text x="600" y="92" text-anchor="middle" font-size="17" fill="#475569">两条耦合流，同时拿到稳定训练 + 深层增益</text>

  <!-- Left: old issue -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="290" height="480" rx="24" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <text x="145" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#9A3412">旧做法</text>
    <text x="145" y="74" text-anchor="middle" font-size="18" fill="#C2410C">层数一深就退化</text>

    <rect x="75" y="120" width="140" height="70" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="145" y="163" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">2 层</text>

    <line x1="145" y1="190" x2="145" y2="250" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="75" y="250" width="140" height="70" rx="16" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
    <text x="145" y="293" text-anchor="middle" font-size="24" font-weight="700" fill="#7F1D1D">4 层</text>

    <path d="M60,390 C110,345 180,345 230,390" fill="none" stroke="#DC2626" stroke-width="8" stroke-linecap="round"/>
    <polygon points="230,390 212,380 216,400" fill="#DC2626"/>
    <text x="145" y="430" text-anchor="middle" font-size="26" font-weight="700" fill="#DC2626">AUC ↓</text>
    <text x="145" y="462" text-anchor="middle" font-size="16" fill="#7C2D12">2 层 0.7478 → 4 层 0.7467</text>
  </g>

  <!-- Center: SiameseNorm core -->
  <g transform="translate(410,125)">
    <rect x="0" y="0" width="380" height="530" rx="28" fill="#FFFFFF" stroke="#93C5FD" stroke-width="3" filter="url(#shadow)"/>
    <text x="190" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#1D4ED8">SiameseNorm</text>

    <!-- X stream -->
    <rect x="42" y="118" width="115" height="270" rx="22" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2.5"/>
    <text x="99.5" y="155" text-anchor="middle" font-size="24" font-weight="700" fill="#1D4ED8">X 流</text>
    <text x="99.5" y="188" text-anchor="middle" font-size="16" fill="#2563EB">Post-Norm</text>
    <line x1="100" y1="220" x2="100" y2="335" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>
    <text x="99.5" y="365" text-anchor="middle" font-size="18" fill="#1E40AF">强表达</text>

    <!-- Y stream -->
    <rect x="223" y="118" width="115" height="270" rx="22" fill="#F0FDF4" stroke="#4ADE80" stroke-width="2.5"/>
    <text x="280.5" y="155" text-anchor="middle" font-size="24" font-weight="700" fill="#15803D">Y 流</text>
    <text x="280.5" y="188" text-anchor="middle" font-size="16" fill="#16A34A">Pre-Norm</text>
    <line x1="281" y1="220" x2="281" y2="335" stroke="#16A34A" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="280.5" y="365" text-anchor="middle" font-size="18" fill="#166534">稳训练</text>

    <!-- mixer -->
    <rect x="112" y="418" width="156" height="62" rx="16" fill="#EEF2FF" stroke="#818CF8" stroke-width="2.5"/>
    <text x="190" y="456" text-anchor="middle" font-size="22" font-weight="700" fill="#4338CA">UniMixer</text>

    <!-- coupling arrows -->
    <path d="M281,210 C281,90 120,90 100,118" fill="none" stroke="#16A34A" stroke-width="4.5" marker-end="url(#arrow)"/>
    <text x="191" y="92" text-anchor="middle" font-size="16" fill="#334155">Norm(Y) → X</text>

    <path d="M190,418 C190,398 145,395 112,378" fill="none" stroke="#2563EB" stroke-width="4.5" marker-end="url(#arrowBlue)"/>
    <path d="M190,418 C190,398 238,395 268,378" fill="none" stroke="#16A34A" stroke-width="4.5" marker-end="url(#arrow)"/>

    <line x1="190" y1="480" x2="190" y2="514" stroke="#6366F1" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="190" y="548" text-anchor="middle" font-size="20" font-weight="600" fill="#334155">双流融合输出</text>
  </g>

  <!-- Right: scaling result -->
  <g transform="translate(840,150)">
    <rect x="0" y="0" width="290" height="480" rx="24" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <text x="145" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">有 SiameseNorm</text>
    <text x="145" y="74" text-anchor="middle" font-size="18" fill="#15803D">深度继续带来收益</text>

    <line x1="55" y1="395" x2="245" y2="395" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="55" y1="395" x2="55" y2="150" stroke="#CBD5E1" stroke-width="2"/>

    <polyline points="75,325 145,215 215,205" fill="none" stroke="#16A34A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="75" cy="325" r="8" fill="#16A34A"/>
    <circle cx="145" cy="215" r="8" fill="#16A34A"/>
    <circle cx="215" cy="205" r="8" fill="#16A34A"/>

    <text x="75" y="430" text-anchor="middle" font-size="18" fill="#334155">2 层</text>
    <text x="145" y="430" text-anchor="middle" font-size="18" fill="#334155">4 层</text>
    <text x="215" y="430" text-anchor="middle" font-size="18" fill="#334155">8 层</text>

    <text x="75" y="305" text-anchor="middle" font-size="15" fill="#166534">0.7492</text>
    <text x="145" y="195" text-anchor="middle" font-size="15" fill="#166534">0.7508</text>
    <text x="215" y="185" text-anchor="middle" font-size="15" fill="#166534">0.7509</text>

    <path d="M85,118 C135,88 195,88 235,110" fill="none" stroke="#16A34A" stroke-width="7" stroke-linecap="round"/>
    <polygon points="235,110 217,100 221,120" fill="#16A34A"/>
    <text x="145" y="132" text-anchor="middle" font-size="26" font-weight="700" fill="#16A34A">AUC ↑</text>
  </g>

  <!-- Bottom connector statement -->
  <path d="M360,390 C390,390 395,390 410,390" fill="none" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790,390 C820,390 825,390 840,390" fill="none" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="305" y="682" width="590" height="50" rx="16" fill="#E2E8F0"/>
  <text x="600" y="714" text-anchor="middle" font-size="24" font-weight="700" fill="#0F172A">关键点：一层里保留两种归一化风格，不再“深了就坏”</text>
</svg>