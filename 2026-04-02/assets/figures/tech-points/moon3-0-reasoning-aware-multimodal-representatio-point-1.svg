<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#6B7280}
      .label{font:600 22px sans-serif; fill:#111827}
      .small{font:500 18px sans-serif; fill:#374151}
      .tiny{font:500 16px sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .soft{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .think{fill:#EFF6FF; stroke:#93C5FD; stroke-width:2}
      .emb{fill:#EEFCEB; stroke:#86EFAC; stroke-width:2}
      .bad{fill:#FEF2F2; stroke:#FCA5A5; stroke-width:2}
      .good{fill:#ECFDF5; stroke:#86EFAC; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:4; fill:none; marker-end:url(#arrow)}
      .arrowBlue{stroke:#2563EB; stroke-width:5; fill:none; marker-end:url(#arrowBlue)}
      .dash{stroke:#9CA3AF; stroke-width:3; stroke-dasharray:8 8; fill:none}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#FFFFFF"/>

  <text x="60" y="64" class="title">先推理，再生成商品向量</text>
  <text x="60" y="96" class="subtitle">embedding 不是“直接取最后 token”，而是建立在属性分析之后</text>

  <!-- Left: input -->
  <g transform="translate(60,160)">
    <rect x="0" y="0" rx="24" ry="24" width="250" height="400" class="soft"/>
    <text x="24" y="42" class="label">商品图文</text>

    <!-- sweater icon -->
    <g transform="translate(26,78)">
      <path d="M70,20 L98,8 L120,32 L146,18 L176,38 L160,74 L138,64 L138,180 L32,180 L32,64 L10,74 L-6,38 L24,18 L50,32 Z"
            fill="#EF4444" stroke="#B91C1C" stroke-width="3"/>
      <path d="M78,38 Q85,54 104,58 Q123,54 130,38" fill="none" stroke="#FCE7F3" stroke-width="8" stroke-linecap="round"/>
      <circle cx="104" cy="92" r="8" fill="#FDE68A" stroke="#92400E" stroke-width="2"/>
      <path d="M95,92 L104,84 L113,92 L104,100 Z" fill="#F9A8D4" stroke="#BE185D" stroke-width="2"/>
    </g>

    <rect x="22" y="300" rx="12" ry="12" width="206" height="64" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <text x="36" y="340" class="small">“红色甜美毛衣”</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M330,360 C390,360 420,360 470,360" class="arrow"/>

  <!-- Middle: think -->
  <g transform="translate(470,120)">
    <rect x="0" y="0" rx="26" ry="26" width="310" height="480" class="think"/>
    <text x="28" y="48" class="label">&lt;think&gt; 属性拆解</text>

    <rect x="26" y="84" rx="14" ry="14" width="258" height="58" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="42" y="120" class="small">类目: 针织衫</text>

    <rect x="26" y="158" rx="14" ry="14" width="258" height="58" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="42" y="194" class="small">颜色: 红色</text>

    <rect x="26" y="232" rx="14" ry="14" width="258" height="78" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="42" y="268" class="small">设计: 蝴蝶结</text>
    <text x="42" y="294" class="small">心形纽扣 / 蕾丝领</text>

    <rect x="26" y="328" rx="14" ry="14" width="258" height="58" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="42" y="364" class="small">风格: 甜美</text>

    <text x="28" y="438" class="tiny">先“看懂细节”</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M800,360 C845,360 860,360 900,360" class="arrowBlue"/>

  <!-- Right top: emb token -->
  <g transform="translate(900,150)">
    <rect x="0" y="0" rx="24" ry="24" width="240" height="170" class="emb"/>
    <text x="28" y="46" class="label">&lt;|emb|&gt;</text>
    <text x="28" y="92" class="small">在推理后输出</text>
    <text x="28" y="128" class="small">其隐状态 = 向量</text>
  </g>

  <!-- compare bottom -->
  <g transform="translate(820,380)">
    <rect x="0" y="0" rx="24" ry="24" width="320" height="190" class="good"/>
    <text x="24" y="38" class="label">细粒度可分</text>

    <g transform="translate(26,62)">
      <rect x="0" y="0" rx="12" ry="12" width="118" height="72" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
      <text x="16" y="30" class="small">蝴蝶结</text>
      <text x="16" y="56" class="small">心形纽扣</text>

      <rect x="150" y="0" rx="12" ry="12" width="118" height="72" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
      <text x="166" y="30" class="small">普通款</text>
      <text x="166" y="56" class="small">圆形纽扣</text>

      <path d="M118,36 C132,36 136,36 148,36" class="dash"/>
    </g>

    <text x="26" y="160" class="small">不再都只是“红毛衣”</text>
  </g>

  <!-- old way mini contrast -->
  <g transform="translate(60,590)">
    <rect x="0" y="0" rx="18" ry="18" width="420" height="90" class="bad"/>
    <text x="24" y="38" class="label">旧做法</text>
    <text x="120" y="38" class="small">直接取最后 token</text>
    <text x="120" y="66" class="small">容易忽略纽扣 / 领口细节</text>
  </g>
</svg>