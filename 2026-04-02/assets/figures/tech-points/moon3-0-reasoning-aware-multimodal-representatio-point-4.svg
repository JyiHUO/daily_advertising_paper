<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8EDF2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">FIRE 模块：三阶段细粒度残差增强</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#7F8C8D">Fine-grained Residual Enhancement — 防止细节信号在深层网络中丢失</text>

  <!-- ============ STAGE 1: Visual Encoding ============ -->
  <rect x="30" y="95" width="260" height="420" rx="14" fill="#EBF5FB" stroke="#3498DB" stroke-width="2"/>
  <rect x="30" y="95" width="260" height="36" rx="14" fill="#3498DB"/>
  <text x="160" y="119" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">① 视觉编码：空间门控</text>

  <!-- Image patches illustration -->
  <rect x="60" y="150" width="200" height="120" rx="8" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <!-- Grid patches - simplified -->
  <rect x="62" y="152" width="39" height="38" fill="#D5DBDB" opacity="0.5" rx="2"/>
  <rect x="103" y="152" width="39" height="38" fill="#D5DBDB" opacity="0.5" rx="2"/>
  <rect x="144" y="152" width="39" height="38" fill="#D5DBDB" opacity="0.4" rx="2"/>
  <rect x="185" y="152" width="39" height="38" fill="#D5DBDB" opacity="0.5" rx="2"/>
  <rect x="226" y="152" width="32" height="38" fill="#D5DBDB" opacity="0.3" rx="2"/>

  <rect x="62" y="192" width="39" height="38" fill="#D5DBDB" opacity="0.4" rx="2"/>
  <rect x="103" y="192" width="39" height="38" fill="#E74C3C" opacity="0.7" rx="2"/>
  <rect x="144" y="192" width="39" height="38" fill="#E74C3C" opacity="0.85" rx="2"/>
  <rect x="185" y="192" width="39" height="38" fill="#E74C3C" opacity="0.6" rx="2"/>
  <rect x="226" y="192" width="32" height="38" fill="#D5DBDB" opacity="0.3" rx="2"/>

  <rect x="62" y="232" width="39" height="38" fill="#D5DBDB" opacity="0.3" rx="2"/>
  <rect x="103" y="232" width="39" height="38" fill="#F39C12" opacity="0.95" rx="2"/>
  <text x="122" y="256" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">🎀</text>
  <rect x="144" y="232" width="39" height="38" fill="#E74C3C" opacity="0.5" rx="2"/>
  <rect x="185" y="232" width="39" height="38" fill="#D5DBDB" opacity="0.4" rx="2"/>
  <rect x="226" y="232" width="32" height="38" fill="#D5DBDB" opacity="0.2" rx="2"/>

  <text x="160" y="145" text-anchor="middle" font-size="11" fill="#555">商品图 Patches</text>

  <!-- Gate illustration -->
  <text x="75" y="292" font-size="10" fill="#7F8C8D">背景→门控≈0</text>
  <text x="170" y="292" font-size="10" fill="#E67E22" font-weight="bold">细节→门控≈1</text>

  <!-- Arrow down -->
  <line x1="160" y1="300" x2="160" y2="335" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MLP + Sigmoid box -->
  <rect x="80" y="338" width="160" height="34" rx="8" fill="#AED6F1" stroke="#3498DB" stroke-width="1.5"/>
  <text x="160" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">MLP + Sigmoid 门控</text>

  <!-- Arrow down -->
  <line x1="160" y1="375" x2="160" y2="410" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Residual add -->
  <circle cx="160" cy="425" r="18" fill="#fff" stroke="#3498DB" stroke-width="2"/>
  <text x="160" y="430" text-anchor="middle" font-size="16" font-weight="bold" fill="#3498DB">+</text>
  <text x="160" y="460" text-anchor="middle" font-size="10" fill="#555">残差叠加 + LayerNorm</text>

  <!-- Result -->
  <rect x="90" y="472" width="140" height="30" rx="8" fill="#3498DB"/>
  <text x="160" y="492" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">增强视觉 Embedding</text>


  <!-- ============ STAGE 2: Cross-Modal Fusion ============ -->
  <rect x="320" y="95" width="260" height="420" rx="14" fill="#FEF9E7" stroke="#F39C12" stroke-width="2"/>
  <rect x="320" y="95" width="260" height="36" rx="14" fill="#E67E22"/>
  <text x="450" y="119" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">② 跨模态融合：多层注入</text>

  <!-- Vision encoder layers -->
  <rect x="345" y="150" width="90" height="28" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
  <text x="390" y="169" text-anchor="middle" font-size="10" fill="#C0392B">浅层特征</text>
  <rect x="345" y="186" width="90" height="28" rx="6" fill="#F5B7B1" stroke="#E74C3C" stroke-width="1"/>
  <text x="390" y="205" text-anchor="middle" font-size="10" fill="#C0392B">中层特征</text>
  <rect x="345" y="222" width="90" height="28" rx="6" fill="#EC7063" stroke="#E74C3C" stroke-width="1"/>
  <text x="390" y="241" text-anchor="middle" font-size="10" fill="#fff">深层特征</text>

  <text x="390" y="145" text-anchor="middle" font-size="11" fill="#555">视觉编码器</text>

  <!-- Arrows from each layer to projectors -->
  <line x1="435" y1="164" x2="478" y2="175" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="435" y1="200" x2="478" y2="215" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="435" y1="236" x2="478" y2="255" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Projectors -->
  <rect x="480" y="165" width="80" height="22" rx="5" fill="#FAD7A0" stroke="#E67E22" stroke-width="1"/>
  <text x="520" y="180" text-anchor="middle" font-size="9" fill="#8E6610">投影器 1</text>
  <rect x="480" y="205" width="80" height="22" rx="5" fill="#FAD7A0" stroke="#E67E22" stroke-width="1"/>
  <text x="520" y="220" text-anchor="middle" font-size="9" fill="#8E6610">投影器 2</text>
  <rect x="480" y="245" width="80" height="22" rx="5" fill="#FAD7A0" stroke="#E67E22" stroke-width="1"/>
  <text x="520" y="260" text-anchor="middle" font-size="9" fill="#8E6610">投影器 3</text>

  <!-- LLM block -->
  <rect x="360" y="310" width="180" height="120" rx="10" fill="#FDF2E9" stroke="#E67E22" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#E67E22">LLM 早期层</text>
  
  <!-- Injection arrows -->
  <path d="M520,267 Q540,290 500,310" fill="none" stroke="#E67E22" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <path d="M520,227 Q555,280 510,310" fill="none" stroke="#E67E22" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <path d="M520,187 Q565,260 520,310" fill="none" stroke="#E67E22" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <!-- Inside LLM layers -->
  <rect x="378" y="348" width="144" height="20" rx="4" fill="#E67E22" opacity="0.3"/>
  <text x="450" y="362" text-anchor="middle" font-size="9" fill="#8E6610">Layer 1 ← 浅层视觉</text>
  <rect x="378" y="372" width="144" height="20" rx="4" fill="#E67E22" opacity="0.4"/>
  <text x="450" y="386" text-anchor="middle" font-size="9" fill="#8E6610">Layer 3 ← 中层视觉</text>
  <rect x="378" y="396" width="144" height="20" rx="4" fill="#E67E22" opacity="0.5"/>
  <text x="450" y="410" text-anchor="middle" font-size="9" fill="#8E6610">Layer 5 ← 深层视觉</text>

  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#E67E22" font-weight="bold">多粒度视觉 → LLM</text>
  <text x="450" y="482" text-anchor="middle" font-size="10" fill="#888">细节到全局，全都注入</text>

  <!-- ============ STAGE 3: Language Decoding ============ -->
  <rect x="610" y="95" width="260" height="420" rx="14" fill="#E8F8F5" stroke="#27AE60" stroke-width="2"/>
  <rect x="610" y="95" width="260" height="36" rx="14" fill="#27AE60"/>
  <text x="740" y="119" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">③ 语言解码：深层恢复</text>

  <!-- LLM deep layers -->
  <rect x="660" y="155" width="160" height="38" rx="8" fill="#A9DFBF" stroke="#27AE60" stroke-width="1.5"/>
  <text x="740" y="179" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E8449">浅层 (Layer 3)</text>
  <text x="740" y="150" text-anchor="middle" font-size="10" fill="#555">融合后，细节信号强 ✓</text>

  <!-- Dotted line representing many layers -->
  <line x1="740" y1="200" x2="740" y2="240" stroke="#27AE60" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="790" y="225" font-size="10" fill="#999">…几十层传播…</text>

  <!-- Signal decay visualization -->
  <rect x="660" y="248" width="160" height="38" rx="8" fill="#F9E79F" stroke="#F39C12" stroke-width="1.5"/>
  <text x="740" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#B7950B">深层 (Layer 30)</text>
  <text x="740" y="300" text-anchor="middle" font-size="10" fill="#E74C3C">细节信号衰减 ✗</text>

  <!-- The rescue: residual shortcut -->
  <path d="M660,175 C620,175 620,267 660,267" fill="none" stroke="#27AE60" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>

  <!-- Linear projection + scale -->
  <rect x="625" y="205" width="30" height="55" rx="6" fill="#27AE60" opacity="0.15" stroke="#27AE60" stroke-width="1"/>
  <text x="640" y="228" text-anchor="middle" font-size="8" fill="#1E8449" transform="rotate(-90 640 228)">线性投影</text>
  <text x="618" y="245" text-anchor="middle" font-size="8" fill="#27AE60">×α</text>

  <!-- Plus circle -->
  <circle cx="660" cy="267" r="12" fill="#fff" stroke="#27AE60" stroke-width="2"/>
  <text x="660" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="#27AE60">+</text>

  <!-- Result: restored -->
  <line x1="740" y1="295" x2="740" y2="335" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="660" y="340" width="160" height="38" rx="8" fill="#27AE60"/>
  <text x="740" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">细节信号恢复 ✓</text>

  <!-- Example callout -->
  <rect x="640" y="400" width="200" height="80" rx="10" fill="#fff" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="740" y="420" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">例：蝴蝶结信号</text>
  <text x="740" y="438" text-anchor="middle" font-size="10" fill="#666">Layer 3: 信号强 ████</text>
  <text x="740" y="453" text-anchor="middle" font-size="10" fill="#E74C3C">Layer 30: 信号弱 █</text>
  <text x="740" y="468" text-anchor="middle" font-size="10" fill="#27AE60">+残差后: 恢复 ███</text>

  <!-- Bottom summary -->
  <rect x="100" y="540" width="700" height="55" rx="12" fill="#2C3E50" opacity="0.9"/>
  <text x="450" y="565" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">FIRE 核心思想：在编码、融合、解码三阶段都注入细粒度残差</text>
  <text x="450" y="584" text-anchor="middle" font-size="12" fill="#BDC3C7">门控筛选重要 patch → 多层级视觉注入 LLM → 浅层信号回注深层 — 细节不丢失</text>

  <!-- Connecting arrows between stages -->
  <path d="M290,487 L320,460" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M580,430 L610,400" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
</svg>