<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <text x="60" y="70" font-size="30" font-weight="700" fill="#0f172a">FIRE：把细节信号分三次“捞回来”</text>
  <text x="60" y="105" font-size="16" fill="#475569">背景被压低，细粒度属性一路保留到最终表示</text>

  <!-- Main modules -->
  <g filter="url(#shadow)">
    <rect x="60" y="170" rx="24" ry="24" width="240" height="400" fill="white" stroke="#cbd5e1"/>
    <rect x="340" y="170" rx="24" ry="24" width="240" height="400" fill="white" stroke="#cbd5e1"/>
    <rect x="620" y="170" rx="24" ry="24" width="240" height="400" fill="white" stroke="#cbd5e1"/>
    <rect x="900" y="170" rx="24" ry="24" width="240" height="400" fill="white" stroke="#cbd5e1"/>
  </g>

  <!-- Arrows between modules -->
  <line x1="300" y1="370" x2="340" y2="370" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="370" x2="620" y2="370" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="370" x2="900" y2="370" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Module 1: image patches -->
  <text x="180" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">商品图</text>
  <rect x="95" y="235" width="170" height="220" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="125" y="265" width="110" height="145" rx="18" fill="#fecdd3" stroke="#fb7185" stroke-width="2"/>
  <ellipse cx="180" cy="300" rx="24" ry="28" fill="#fde68a"/>
  <rect x="150" y="326" width="60" height="70" rx="18" fill="#f43f5e" opacity="0.9"/>
  <path d="M180 336 C170 348,164 356,180 366 C196 356,190 348,180 336 Z" fill="white"/>
  <circle cx="180" cy="352" r="6" fill="#f59e0b"/>
  <circle cx="180" cy="367" r="6" fill="#f59e0b"/>

  <!-- patches -->
  <g opacity="0.95">
    <rect x="95" y="235" width="56" height="73" fill="#e2e8f0"/>
    <rect x="151" y="235" width="57" height="73" fill="#e2e8f0"/>
    <rect x="208" y="235" width="57" height="73" fill="#e2e8f0"/>
    <rect x="95" y="308" width="56" height="73" fill="#e2e8f0"/>
    <rect x="151" y="308" width="57" height="73" fill="#fca5a5"/>
    <rect x="208" y="308" width="57" height="73" fill="#e2e8f0"/>
    <rect x="95" y="381" width="56" height="74" fill="#e2e8f0"/>
    <rect x="151" y="381" width="57" height="74" fill="#fda4af"/>
    <rect x="208" y="381" width="57" height="74" fill="#e2e8f0"/>
  </g>

  <circle cx="179" cy="352" r="24" fill="none" stroke="#2563eb" stroke-width="4"/>
  <line x1="196" y1="370" x2="222" y2="396" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <text x="180" y="505" text-anchor="middle" font-size="18" font-weight="600" fill="#2563eb">细节只占少数 patch</text>

  <!-- Module 2: gated vision -->
  <text x="460" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">视觉门控残差</text>
  <rect x="375" y="245" width="170" height="120" rx="18" fill="url(#blueGrad)" stroke="#93c5fd"/>
  <g>
    <rect x="395" y="267" width="34" height="34" rx="8" fill="#cbd5e1"/>
    <rect x="436" y="267" width="34" height="34" rx="8" fill="#60a5fa"/>
    <rect x="477" y="267" width="34" height="34" rx="8" fill="#cbd5e1"/>
    <rect x="395" y="308" width="34" height="34" rx="8" fill="#cbd5e1"/>
    <rect x="436" y="308" width="34" height="34" rx="8" fill="#2563eb"/>
    <rect x="477" y="308" width="34" height="34" rx="8" fill="#cbd5e1"/>
  </g>
  <text x="460" y="390" text-anchor="middle" font-size="18" font-weight="600" fill="#2563eb">抑背景，放大关键 patch</text>

  <path d="M390 432 C420 412,450 412,480 432 C510 452,530 452,545 438" fill="none" stroke="#64748b" stroke-width="4"/>
  <rect x="396" y="445" width="128" height="46" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="460" y="474" text-anchor="middle" font-size="18" fill="#334155">残差加回最终特征</text>

  <!-- Module 3: multimodal fusion -->
  <text x="740" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">多层视觉注入</text>
  <rect x="655" y="240" width="170" height="260" rx="18" fill="url(#greenGrad)" stroke="#86efac"/>
  <g>
    <rect x="695" y="280" width="90" height="26" rx="8" fill="#86efac"/>
    <rect x="695" y="320" width="90" height="26" rx="8" fill="#4ade80"/>
    <rect x="695" y="360" width="90" height="26" rx="8" fill="#22c55e"/>
    <rect x="695" y="400" width="90" height="26" rx="8" fill="#bbf7d0"/>
  </g>
  <line x1="675" y1="293" x2="695" y2="293" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="675" y1="333" x2="695" y2="333" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="675" y1="373" x2="695" y2="373" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="740" y="530" text-anchor="middle" font-size="18" font-weight="600" fill="#15803d">粗到细都送进 LLM</text>

  <!-- Module 4: decoder residual -->
  <text x="1020" y="205" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">浅层 → 深层回注</text>
  <rect x="935" y="240" width="170" height="260" rx="18" fill="url(#purpleGrad)" stroke="#c4b5fd"/>
  <g>
    <rect x="970" y="280" width="100" height="28" rx="8" fill="#c4b5fd"/>
    <rect x="970" y="325" width="100" height="28" rx="8" fill="#a78bfa"/>
    <rect x="970" y="370" width="100" height="28" rx="8" fill="#8b5cf6"/>
    <rect x="970" y="415" width="100" height="28" rx="8" fill="#7c3aed"/>
  </g>
  <path d="M955 295 C925 295,925 445,955 445" fill="none" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <text x="1020" y="530" text-anchor="middle" font-size="18" font-weight="600" fill="#6d28d9">防止细节在深层变淡</text>

  <!-- top mini contrast -->
  <g filter="url(#shadow)">
    <rect x="380" y="88" width="440" height="58" rx="16" fill="white" stroke="#e2e8f0"/>
  </g>
  <text x="430" y="124" font-size="17" fill="#94a3b8" font-weight="600">普通做法：细节越传越弱</text>
  <line x1="600" y1="117" x2="680" y2="117" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
  <circle cx="690" cy="117" r="7" fill="#cbd5e1"/>
  <text x="700" y="124" font-size="17" fill="#2563eb" font-weight="700">FIRE：三处补细节</text>

  <!-- small callout -->
  <g filter="url(#shadow)">
    <rect x="930" y="90" width="180" height="56" rx="16" fill="url(#orangeGrad)" stroke="#fdba74"/>
  </g>
  <text x="1020" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">蝴蝶结 / Logo 不丢</text>
</svg>