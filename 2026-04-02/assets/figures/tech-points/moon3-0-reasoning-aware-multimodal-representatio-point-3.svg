<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="100%" stop-color="#F3F7F6"/>
    </linearGradient>
    <style>
      .title{font:700 30px Arial, Helvetica, sans-serif; fill:#111827}
      .subtitle{font:500 16px Arial, Helvetica, sans-serif; fill:#6B7280}
      .label{font:700 20px Arial, Helvetica, sans-serif; fill:#111827}
      .small{font:600 16px Arial, Helvetica, sans-serif; fill:#374151}
      .tiny{font:600 14px Arial, Helvetica, sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .soft{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .blue{fill:#EEF4FF; stroke:#93C5FD; stroke-width:2.5}
      .green{fill:#ECFDF5; stroke:#86EFAC; stroke-width:2.5}
      .amber{fill:#FFF7ED; stroke:#FDBA74; stroke-width:2.5}
      .red{fill:#FEF2F2; stroke:#FCA5A5; stroke-width:2.5}
      .pill{fill:#F3F4F6; stroke:#D1D5DB; stroke-width:1.5}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="600" y="54" text-anchor="middle" class="title">MOON3.0：让推理自己竞争，再用奖励选出更好的表示</text>
  <text x="600" y="82" text-anchor="middle" class="subtitle">核心点：对比学习 + 强化学习联合优化同一组推理轨迹</text>

  <!-- Left input -->
  <g transform="translate(40,140)">
    <rect x="0" y="0" rx="22" ry="22" width="240" height="470" class="box"/>
    <text x="120" y="42" text-anchor="middle" class="label">同一商品输入</text>

    <rect x="28" y="78" width="184" height="150" rx="16" class="soft"/>
    <rect x="46" y="96" width="148" height="114" rx="10" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
    <path d="M84 126 Q120 86 156 126 L166 146 Q154 170 120 178 Q86 170 74 146 Z" fill="#EF4444" opacity="0.88"/>
    <path d="M104 116 Q120 102 136 116" fill="none" stroke="#FCE7F3" stroke-width="6" stroke-linecap="round"/>
    <circle cx="113" cy="137" r="4" fill="#FDE68A"/>
    <circle cx="127" cy="145" r="4" fill="#FDE68A"/>
    <circle cx="121" cy="159" r="4" fill="#FDE68A"/>
    <text x="120" y="254" text-anchor="middle" class="small">红色毛衣</text>

    <rect x="28" y="290" width="184" height="138" rx="16" class="soft"/>
    <text x="50" y="324" class="tiny">query / item</text>
    <rect x="46" y="340" width="148" height="54" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="120" y="372" text-anchor="middle" class="small">图像 + 标题</text>

    <path d="M240 235 L290 235" stroke="#4B5563" stroke-width="3.2" marker-end="url(#arrow)"/>
  </g>

  <!-- Middle sampling -->
  <g transform="translate(300,120)">
    <rect x="0" y="0" rx="24" ry="24" width="310" height="520" class="blue"/>
    <text x="155" y="44" text-anchor="middle" class="label">采样 8 条推理轨迹</text>

    <g transform="translate(26,84)">
      <rect x="0" y="0" width="258" height="84" rx="16" class="green"/>
      <text x="18" y="30" class="small">① 只说“红色”</text>
      <rect x="18" y="44" width="88" height="24" rx="12" class="pill"/>
      <text x="62" y="61" text-anchor="middle" class="tiny">太粗糙</text>
      <rect x="140" y="44" width="92" height="24" rx="12" class="pill"/>
      <text x="186" y="61" text-anchor="middle" class="tiny">检索差</text>
    </g>

    <g transform="translate(26,190)">
      <rect x="0" y="0" width="258" height="108" rx="16" class="amber"/>
      <text x="18" y="30" class="small">③ 结构化属性</text>
      <text x="18" y="56" class="tiny">类目 / 颜色 / 蕾丝领 / 蝴蝶结 / 纽扣</text>
      <rect x="18" y="70" width="94" height="24" rx="12" fill="#DCFCE7" stroke="#86EFAC"/>
      <text x="65" y="87" text-anchor="middle" class="tiny">检索最好</text>
      <rect x="132" y="70" width="92" height="24" rx="12" fill="#DCFCE7" stroke="#86EFAC"/>
      <text x="178" y="87" text-anchor="middle" class="tiny">属性准确</text>
    </g>

    <g transform="translate(26,322)">
      <rect x="0" y="0" width="258" height="84" rx="16" class="red"/>
      <text x="18" y="30" class="small">⑤ 200 token 长描述</text>
      <rect x="18" y="44" width="92" height="24" rx="12" class="pill"/>
      <text x="64" y="61" text-anchor="middle" class="tiny">太啰嗦</text>
      <rect x="138" y="44" width="94" height="24" rx="12" class="pill"/>
      <text x="185" y="61" text-anchor="middle" class="tiny">长度罚分</text>
    </g>

    <text x="155" y="462" text-anchor="middle" class="small">每条轨迹 → 属性序列 + embedding</text>
    <path d="M310 260 L360 260" stroke="#2563EB" stroke-width="3.4" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Right reward and learning -->
  <g transform="translate(660,120)">
    <rect x="0" y="0" rx="24" ry="24" width="500" height="520" class="box"/>
    <text x="250" y="44" text-anchor="middle" class="label">奖励打分 + 联合更新</text>

    <!-- reward -->
    <rect x="26" y="82" width="210" height="220" rx="18" class="soft"/>
    <text x="131" y="116" text-anchor="middle" class="small">综合奖励</text>

    <rect x="44" y="136" width="78" height="32" rx="16" class="pill"/>
    <text x="83" y="157" text-anchor="middle" class="tiny">格式</text>

    <rect x="140" y="136" width="78" height="32" rx="16" class="pill"/>
    <text x="179" y="157" text-anchor="middle" class="tiny">长度</text>

    <rect x="44" y="186" width="78" height="32" rx="16" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="83" y="207" text-anchor="middle" class="tiny">检索</text>

    <rect x="140" y="186" width="78" height="32" rx="16" fill="#DCFCE7" stroke="#86EFAC"/>
    <text x="179" y="207" text-anchor="middle" class="tiny">属性质</text>

    <path d="M58 248 H204" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="131" y="276" text-anchor="middle" class="tiny">加权后组内归一化</text>

    <!-- choose -->
    <rect x="260" y="82" width="214" height="220" rx="18" class="blue"/>
    <text x="367" y="116" text-anchor="middle" class="small">高分轨迹被强化</text>

    <g transform="translate(286,144)">
      <rect x="0" y="0" width="164" height="20" rx="10" fill="#E5E7EB"/>
      <rect x="0" y="0" width="54" height="20" rx="10" fill="#9CA3AF"/>
      <text x="174" y="15" class="tiny">轨迹①</text>
    </g>
    <g transform="translate(286,182)">
      <rect x="0" y="0" width="164" height="20" rx="10" fill="#E5E7EB"/>
      <rect x="0" y="0" width="146" height="20" rx="10" fill="#10B981"/>
      <text x="174" y="15" class="tiny">轨迹③</text>
    </g>
    <g transform="translate(286,220)">
      <rect x="0" y="0" width="164" height="20" rx="10" fill="#E5E7EB"/>
      <rect x="0" y="0" width="22" height="20" rx="10" fill="#F87171"/>
      <text x="174" y="15" class="tiny">轨迹⑤</text>
    </g>

    <path d="M236 192 L260 192" stroke="#4B5563" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- bottom dual update -->
    <rect x="44" y="344" width="180" height="116" rx="18" class="green"/>
    <text x="134" y="388" text-anchor="middle" class="label" style="font-size:24px">GRPO / PPO-clip</text>
    <text x="134" y="420" text-anchor="middle" class="small">学会偏好高分推理</text>

    <rect x="278" y="344" width="180" height="116" rx="18" class="amber"/>
    <text x="368" y="388" text-anchor="middle" class="label" style="font-size:24px">InfoNCE</text>
    <text x="368" y="420" text-anchor="middle" class="small">保持 embedding 可分</text>

    <path d="M367 302 L367 332" stroke="#4B5563" stroke-width="3.2" marker-end="url(#arrow)"/>
    <path d="M367 332 L134 332 L134 344" stroke="#059669" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
    <path d="M367 332 L368 332 L368 344" stroke="#D97706" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <rect x="126" y="478" width="250" height="28" rx="14" fill="#111827"/>
    <text x="251" y="497" text-anchor="middle" style="font:700 15px Arial, Helvetica, sans-serif; fill:#FFFFFF">最终：0.1 × 对比损失 + 1.0 × RL损失</text>
  </g>

  <!-- bottom takeaway -->
  <g transform="translate(150,665)">
    <rect x="0" y="0" width="900" height="54" rx="18" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="450" y="35" text-anchor="middle" class="label" style="font-size:24px">不是“照答案学”一次，而是“试 8 次 → 打分 → 强化好推理”</text>
  </g>
</svg>