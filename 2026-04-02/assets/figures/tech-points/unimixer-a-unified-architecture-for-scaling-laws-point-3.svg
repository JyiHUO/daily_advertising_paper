<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 32px sans-serif; fill:#111827}
      .label{font:600 20px sans-serif; fill:#111827}
      .small{font:500 17px sans-serif; fill:#374151}
      .tiny{font:500 15px sans-serif; fill:#6b7280}
      .box{stroke:#cbd5e1; stroke-width:2; rx:22; ry:22}
      .arrow{stroke:#4b5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .num{font:700 18px sans-serif; fill:#0f172a}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>

  <text x="600" y="54" text-anchor="middle" class="title">UniMixing-Lite：少量“基矩阵”生成很多 block</text>

  <!-- Left panel -->
  <rect x="60" y="110" width="480" height="540" class="box" fill="#f8fafc"/>
  <text x="300" y="150" text-anchor="middle" class="label">原版：每个 block 一套矩阵</text>

  <!-- many local matrices -->
  <g transform="translate(105,210)">
    <rect x="0" y="0" width="82" height="82" rx="12" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <path d="M14 14 H68 M14 41 H68 M14 68 H68 M14 14 V68 M41 14 V68 M68 14 V68" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="41" y="102" text-anchor="middle" class="small">W₁</text>

    <rect x="108" y="0" width="82" height="82" rx="12" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <path d="M122 14 H176 M122 41 H176 M122 68 H176 M122 14 V68 M149 14 V68 M176 14 V68" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="149" y="102" text-anchor="middle" class="small">W₂</text>

    <rect x="216" y="0" width="82" height="82" rx="12" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <path d="M230 14 H284 M230 41 H284 M230 68 H284 M230 14 V68 M257 14 V68 M284 14 V68" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="257" y="102" text-anchor="middle" class="small">W₃</text>

    <text x="354" y="50" text-anchor="middle" class="label" fill="#ef4444">…</text>

    <rect x="390" y="0" width="82" height="82" rx="12" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <path d="M404 14 H458 M404 41 H458 M404 68 H458 M404 14 V68 M431 14 V68 M458 14 V68" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="431" y="102" text-anchor="middle" class="small">W₁₂₈</text>
  </g>

  <!-- big global -->
  <g transform="translate(150,390)">
    <rect x="0" y="0" width="300" height="170" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/>
    <text x="150" y="42" text-anchor="middle" class="label">大矩阵 W-G</text>
    <rect x="40" y="62" width="220" height="84" rx="10" fill="#fff" stroke="#f87171" stroke-width="1.8"/>
    <path d="M58 78 H242 M58 98 H242 M58 118 H242 M58 138 H242
             M58 78 V138 M98 78 V138 M138 78 V138 M178 78 V138 M218 78 V138" 
          stroke="#f87171" stroke-width="1.2" opacity="0.8"/>
    <text x="150" y="160" text-anchor="middle" class="small">参数多，重复高</text>
  </g>

  <!-- right panel -->
  <rect x="660" y="110" width="480" height="540" class="box" fill="#f0fdf4"/>
  <text x="900" y="150" text-anchor="middle" class="label">Lite：共享基底 + 低秩分解</text>

  <!-- palette -->
  <g transform="translate(705,205)">
    <rect x="0" y="0" width="78" height="78" rx="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <path d="M13 13 H65 M13 39 H65 M13 65 H65 M13 13 V65 M39 13 V65 M65 13 V65" stroke="#2563eb" stroke-width="1.4" opacity="0.7"/>
    <text x="39" y="99" text-anchor="middle" class="small">Z₁</text>

    <rect x="95" y="0" width="78" height="78" rx="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <path d="M108 13 H160 M108 39 H160 M108 65 H160 M108 13 V65 M134 13 V65 M160 13 V65" stroke="#2563eb" stroke-width="1.4" opacity="0.7"/>
    <text x="134" y="99" text-anchor="middle" class="small">Z₂</text>

    <rect x="190" y="0" width="78" height="78" rx="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <path d="M203 13 H255 M203 39 H255 M203 65 H255 M203 13 V65 M229 13 V65 M255 13 V65" stroke="#2563eb" stroke-width="1.4" opacity="0.7"/>
    <text x="229" y="99" text-anchor="middle" class="small">Z₃</text>

    <rect x="285" y="0" width="78" height="78" rx="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <path d="M298 13 H350 M298 39 H350 M298 65 H350 M298 13 V65 M324 13 V65 M350 13 V65" stroke="#2563eb" stroke-width="1.4" opacity="0.7"/>
    <text x="324" y="99" text-anchor="middle" class="small">Z₄</text>
  </g>

  <!-- omega to generated blocks -->
  <g transform="translate(760,332)">
    <rect x="0" y="0" width="110" height="52" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="55" y="33" text-anchor="middle" class="small">ω(block)</text>

    <line x1="110" y1="26" x2="185" y2="26" class="arrow"/>

    <rect x="185" y="-15" width="90" height="90" rx="12" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <path d="M200 -1 H260 M200 28 H260 M200 57 H260 M200 -1 V57 M230 -1 V57 M260 -1 V57" stroke="#16a34a" stroke-width="1.4" opacity="0.7"/>
    <text x="230" y="99" text-anchor="middle" class="small">W-B</text>
  </g>

  <!-- low rank -->
  <g transform="translate(735,455)">
    <rect x="0" y="0" width="90" height="130" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <text x="45" y="72" text-anchor="middle" class="label">A</text>

    <text x="115" y="74" text-anchor="middle" class="label">×</text>

    <rect x="145" y="28" width="180" height="74" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <text x="235" y="73" text-anchor="middle" class="label">B</text>

    <line x1="330" y1="65" x2="395" y2="65" class="arrow"/>

    <rect x="395" y="6" width="70" height="118" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="430" y="72" text-anchor="middle" class="label">W-G</text>
  </g>

  <!-- sinkhorn badge -->
  <g transform="translate(948,356)">
    <rect x="0" y="0" width="140" height="48" rx="24" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="70" y="31" text-anchor="middle" class="small">Sinkhorn</text>
  </g>

  <!-- center comparison arrow -->
  <line x1="560" y1="380" x2="630" y2="380" stroke="#10b981" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="595" y="355" text-anchor="middle" class="label" fill="#10b981">压缩</text>

  <!-- bottom numbers -->
  <g transform="translate(120,610)">
    <circle cx="0" cy="0" r="7" fill="#ef4444"/>
    <text x="18" y="6" class="small">局部：128×36 = 4608</text>
  </g>
  <g transform="translate(690,610)">
    <circle cx="0" cy="0" r="7" fill="#16a34a"/>
    <text x="18" y="6" class="small">4×36 + 128×4 = 656</text>
  </g>

  <!-- subtle callout -->
  <text x="900" y="640" text-anchor="middle" class="tiny">更少参数，性能不降反升</text>
</svg>