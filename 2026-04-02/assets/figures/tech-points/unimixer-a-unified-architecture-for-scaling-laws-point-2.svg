<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 30px sans-serif; fill:#111827}
      .subtitle{font:500 16px sans-serif; fill:#6b7280}
      .label{font:700 18px sans-serif; fill:#111827}
      .small{font:600 15px sans-serif; fill:#374151}
      .tiny{font:600 13px sans-serif; fill:#6b7280}
      .box{stroke:#cbd5e1; stroke-width:2}
      .arrow{stroke:#4b5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .soft{fill:#f8fafc}
    </style>
  </defs>

  <rect width="1100" height="680" fill="#ffffff"/>

  <text x="550" y="52" text-anchor="middle" class="title">UniMixer：把三类排序模块看成同一件事</text>
  <text x="550" y="82" text-anchor="middle" class="subtitle">只是“全局混合 G”不同；局部投影 + 全局混合 是统一骨架</text>

  <!-- left: three methods -->
  <rect x="40" y="120" rx="24" ry="24" width="320" height="500" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Attention -->
  <rect x="70" y="150" rx="16" ry="16" width="260" height="120" fill="#eef2ff" class="box"/>
  <text x="200" y="183" text-anchor="middle" class="label">Attention</text>
  <rect x="95" y="205" width="56" height="36" rx="8" fill="#c7d2fe"/>
  <rect x="162" y="205" width="56" height="36" rx="8" fill="#c7d2fe"/>
  <rect x="229" y="205" width="56" height="36" rx="8" fill="#c7d2fe"/>
  <path d="M120 250 C150 275, 250 275, 280 250" stroke="#6366f1" stroke-width="4" fill="none"/>
  <path d="M187 250 C205 268, 195 268, 213 250" stroke="#6366f1" stroke-width="4" fill="none"/>
  <text x="200" y="258" text-anchor="middle" class="tiny">QK 决定 G</text>

  <!-- TokenMixer -->
  <rect x="70" y="310" rx="16" ry="16" width="260" height="120" fill="#ecfeff" class="box"/>
  <text x="200" y="343" text-anchor="middle" class="label">TokenMixer</text>
  <rect x="95" y="365" width="56" height="36" rx="8" fill="#a5f3fc"/>
  <rect x="162" y="365" width="56" height="36" rx="8" fill="#a5f3fc"/>
  <rect x="229" y="365" width="56" height="36" rx="8" fill="#a5f3fc"/>
  <path d="M123 383 L257 383" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M257 383 C240 360, 140 360, 123 383" stroke="#0891b2" stroke-width="3" fill="none"/>
  <text x="200" y="418" text-anchor="middle" class="tiny">固定置换 G</text>

  <!-- FM -->
  <rect x="70" y="470" rx="16" ry="16" width="260" height="120" fill="#f0fdf4" class="box"/>
  <text x="200" y="503" text-anchor="middle" class="label">FM / Wukong</text>
  <circle cx="130" cy="548" r="22" fill="#86efac"/>
  <circle cx="200" cy="548" r="22" fill="#86efac"/>
  <circle cx="270" cy="548" r="22" fill="#86efac"/>
  <line x1="130" y1="548" x2="200" y2="548" stroke="#16a34a" stroke-width="4"/>
  <line x1="200" y1="548" x2="270" y2="548" stroke="#16a34a" stroke-width="4"/>
  <line x1="130" y1="548" x2="270" y2="548" stroke="#16a34a" stroke-width="4"/>
  <text x="200" y="582" text-anchor="middle" class="tiny">X·Xᵀ 形成 G</text>

  <!-- center: unification -->
  <path d="M360 210 L470 210" class="arrow"/>
  <path d="M360 370 L470 370" class="arrow"/>
  <path d="M360 530 L470 530" class="arrow"/>

  <rect x="470" y="160" rx="28" ry="28" width="300" height="420" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="620" y="205" text-anchor="middle" class="title" style="font-size:28px;">UniMixer 统一骨架</text>

  <!-- local -->
  <rect x="525" y="245" rx="16" ry="16" width="190" height="70" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
  <text x="620" y="288" text-anchor="middle" class="label">局部投影 W</text>

  <!-- plus -->
  <text x="620" y="350" text-anchor="middle" class="title" style="font-size:36px; fill:#fb923c;">+</text>

  <!-- global -->
  <rect x="525" y="385" rx="16" ry="16" width="190" height="100" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="620" y="425" text-anchor="middle" class="label">全局混合 G</text>
  <path d="M555 452 C580 430, 660 430, 685 452" stroke="#3b82f6" stroke-width="4" fill="none"/>
  <path d="M565 465 C600 490, 640 490, 675 465" stroke="#3b82f6" stroke-width="4" fill="none"/>

  <text x="620" y="530" text-anchor="middle" class="small">三类方法都落到这两个部件</text>

  <!-- right: key takeaway -->
  <path d="M770 370 L865 370" class="arrow"/>

  <rect x="860" y="210" rx="24" ry="24" width="200" height="320" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="3"/>
  <text x="960" y="255" text-anchor="middle" class="label">关键创新</text>

  <rect x="895" y="290" rx="14" ry="14" width="130" height="58" fill="#ddd6fe"/>
  <text x="960" y="326" text-anchor="middle" class="small">学一个 G</text>

  <rect x="895" y="372" rx="14" ry="14" width="130" height="58" fill="#ede9fe"/>
  <text x="960" y="408" text-anchor="middle" class="small">保留块内 W</text>

  <path d="M960 348 L960 372" class="arrow"/>

  <text x="960" y="475" text-anchor="middle" class="tiny">既统一理论</text>
  <text x="960" y="498" text-anchor="middle" class="tiny">又兼顾效率</text>
</svg>