<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">UniMixer：统一框架连接三类 Scaling 方法</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#64748B">Output = G(全局混合) × W(局部投影) × Input — 三类方法只是 G 和 W 的不同选择</text>

  <!-- ======== Unified Formula Bar ======== -->
  <rect x="140" y="88" width="620" height="52" rx="12" fill="#1E293B" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" font-size="17" fill="#FFF" font-weight="bold" font-family="monospace">Y = reshape( G · W_local · X )</text>
  <text x="310" y="133" text-anchor="middle" font-size="10" fill="#94A3B8">全局混合</text>
  <text x="420" y="133" text-anchor="middle" font-size="10" fill="#94A3B8">局部投影</text>
  <text x="510" y="133" text-anchor="middle" font-size="10" fill="#94A3B8">输入</text>

  <!-- ======== Three Methods Row ======== -->
  <!-- Attention -->
  <g transform="translate(60,170)">
    <rect width="230" height="220" rx="14" fill="#FFF" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
    <rect width="230" height="38" rx="14" fill="#FEF3C7"/>
    <rect width="230" height="38" rx="14" fill="#F59E0B" opacity="0.15"/>
    <text x="115" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400E">① Attention 系</text>
    <!-- G block -->
    <rect x="20" y="55" width="190" height="45" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="115" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#B45309">G = softmax(QKᵀ/√d)</text>
    <text x="115" y="90" text-anchor="middle" font-size="10" fill="#92400E">依赖输入，动态计算</text>
    <!-- W block -->
    <rect x="20" y="115" width="190" height="40" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="115" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#B45309">W = Value 投影</text>
    <text x="115" y="148" text-anchor="middle" font-size="10" fill="#92400E">每 block 独立</text>
    <!-- Pros/Cons -->
    <text x="115" y="180" text-anchor="middle" font-size="11" fill="#16A34A">✓ 可学习 · 表达力强</text>
    <text x="115" y="200" text-anchor="middle" font-size="11" fill="#DC2626">✗ O(n²) 计算开销大</text>
  </g>

  <!-- TokenMixer -->
  <g transform="translate(335,170)">
    <rect width="230" height="220" rx="14" fill="#FFF" stroke="#8B5CF6" stroke-width="2.5" filter="url(#shadow)"/>
    <rect width="230" height="38" rx="14" fill="#EDE9FE"/>
    <rect width="230" height="38" rx="14" fill="#8B5CF6" opacity="0.1"/>
    <text x="115" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#5B21B6">② TokenMixer 系</text>
    <!-- G block -->
    <rect x="20" y="55" width="190" height="45" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="115" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">G = 固定置换矩阵</text>
    <text x="115" y="90" text-anchor="middle" font-size="10" fill="#5B21B6">不依赖输入，预设规则</text>
    <!-- W block -->
    <rect x="20" y="115" width="190" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="115" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">W = 恒等矩阵 I</text>
    <text x="115" y="148" text-anchor="middle" font-size="10" fill="#5B21B6">无额外投影</text>
    <!-- Pros/Cons -->
    <text x="115" y="180" text-anchor="middle" font-size="11" fill="#16A34A">✓ 低成本 · O(n)</text>
    <text x="115" y="200" text-anchor="middle" font-size="11" fill="#DC2626">✗ 全局混合固定不可学</text>
  </g>

  <!-- FM/Wukong -->
  <g transform="translate(610,170)">
    <rect width="230" height="220" rx="14" fill="#FFF" stroke="#10B981" stroke-width="2.5" filter="url(#shadow)"/>
    <rect width="230" height="38" rx="14" fill="#D1FAE5"/>
    <rect width="230" height="38" rx="14" fill="#10B981" opacity="0.1"/>
    <text x="115" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#065F46">③ FM/Wukong 系</text>
    <!-- G block -->
    <rect x="20" y="55" width="190" height="45" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <text x="115" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">G = XXᵀ (输入外积)</text>
    <text x="115" y="90" text-anchor="middle" font-size="10" fill="#065F46">特征自交叉</text>
    <!-- W block -->
    <rect x="20" y="115" width="190" height="40" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <text x="115" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">W = 不依赖 X</text>
    <text x="115" y="148" text-anchor="middle" font-size="10" fill="#065F46">固定参数矩阵</text>
    <!-- Pros/Cons -->
    <text x="115" y="180" text-anchor="middle" font-size="11" fill="#16A34A">✓ 特征交叉显式建模</text>
    <text x="115" y="200" text-anchor="middle" font-size="11" fill="#DC2626">✗ 局部投影不自适应</text>
  </g>

  <!-- ======== Arrows Down to UniMixer ======== -->
  <line x1="175" y1="395" x2="370" y2="455" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,4"/>
  <line x1="450" y1="395" x2="450" y2="455" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,4"/>
  <line x1="725" y1="395" x2="530" y2="455" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,4"/>

  <!-- Converge label -->
  <text x="450" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">统 一</text>

  <!-- ======== UniMixer Block ======== -->
  <rect x="180" y="460" width="540" height="140" rx="18" fill="#FFF" stroke="#2563EB" stroke-width="3" filter="url(#shadow)"/>
  <rect x="180" y="460" width="540" height="44" rx="18" fill="#2563EB"/>
  <text x="450" y="488" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFF">UniMixer（统一架构）</text>

  <!-- G learned -->
  <rect x="205" y="518" width="240" height="50" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.8"/>
  <text x="325" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">G = 可学习参数矩阵</text>
  <text x="325" y="558" text-anchor="middle" font-size="10.5" fill="#3B82F6">双随机 + 稀疏约束 + 温度退火</text>

  <!-- W local -->
  <rect x="460" y="518" width="240" height="50" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.8"/>
  <text x="580" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">W = 独立局部投影</text>
  <text x="580" y="558" text-anchor="middle" font-size="10.5" fill="#3B82F6">每 block 各自投影，自适应</text>

  <!-- Benefit badges -->
  <rect x="210" y="580" width="130" height="24" rx="12" fill="#DCFCE7"/>
  <text x="275" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#16A34A">✓ 可学习</text>
  <rect x="355" y="580" width="130" height="24" rx="12" fill="#DCFCE7"/>
  <text x="420" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#16A34A">✓ 低成本</text>
  <rect x="500" y="580" width="165" height="24" rx="12" fill="#DCFCE7"/>
  <text x="582" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#16A34A">✓ 特征交叉</text>

  <!-- Plus sign between modules -->
  <text x="450" y="548" text-anchor="middle" font-size="22" font-weight="bold" fill="#2563EB">×</text>
</svg>