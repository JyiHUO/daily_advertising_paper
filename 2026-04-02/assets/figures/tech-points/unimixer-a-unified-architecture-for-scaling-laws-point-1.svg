<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <style>
      .title{font:700 32px "Arial","Helvetica",sans-serif; fill:#111827}
      .subtitle{font:600 18px "Arial","Helvetica",sans-serif; fill:#374151}
      .label{font:700 20px "Arial","Helvetica",sans-serif; fill:#111827}
      .small{font:600 17px "Arial","Helvetica",sans-serif; fill:#374151}
      .tiny{font:600 16px "Arial","Helvetica",sans-serif; fill:#6B7280}
      .box{stroke:#CBD5E1; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .dashed{stroke-dasharray:8 7}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" class="title">TokenMixer = 可分解的“洗牌矩阵”</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">把固定重排，变成可学习的全局 × 局部混合</text>

  <!-- Left panel -->
  <rect x="60" y="140" rx="22" ry="22" width="320" height="430" fill="#FFFFFF" class="box"/>
  <text x="220" y="185" text-anchor="middle" class="label">原始 TokenMixer</text>
  <text x="220" y="215" text-anchor="middle" class="small">固定洗牌</text>

  <!-- input vector -->
  <rect x="110" y="260" width="220" height="44" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <rect x="110" y="260" width="55" height="44" rx="10" fill="#93C5FD"/>
  <rect x="165" y="260" width="55" height="44" fill="#BFDBFE"/>
  <rect x="220" y="260" width="55" height="44" fill="#93C5FD"/>
  <rect x="275" y="260" width="55" height="44" rx="10" fill="#BFDBFE"/>
  <text x="220" y="288" text-anchor="middle" class="small" fill="#1E3A8A">x (flattened tokens)</text>

  <!-- big permutation matrix -->
  <rect x="125" y="350" width="190" height="140" rx="14" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <!-- sparse pattern -->
  <g stroke="#DC2626" stroke-width="4" stroke-linecap="round">
    <line x1="145" y1="370" x2="145" y2="370"/>
    <line x1="173" y1="392" x2="173" y2="392"/>
    <line x1="201" y1="414" x2="201" y2="414"/>
    <line x1="229" y1="436" x2="229" y2="436"/>
    <line x1="257" y1="458" x2="257" y2="458"/>
    <line x1="285" y1="480" x2="285" y2="480"/>

    <line x1="285" y1="370" x2="285" y2="370"/>
    <line x1="257" y1="392" x2="257" y2="392"/>
    <line x1="229" y1="414" x2="229" y2="414"/>
    <line x1="201" y1="436" x2="201" y2="436"/>
    <line x1="173" y1="458" x2="173" y2="458"/>
    <line x1="145" y1="480" x2="145" y2="480"/>
  </g>
  <text x="220" y="425" text-anchor="middle" class="small" fill="#991B1B">Wperm</text>
  <text x="220" y="515" text-anchor="middle" class="tiny">大矩阵，固定不可学</text>

  <line x1="220" y1="304" x2="220" y2="340" class="arrow"/>

  <!-- center decomposition -->
  <line x1="400" y1="355" x2="525" y2="355" class="arrow dashed"/>
  <text x="462" y="336" text-anchor="middle" class="label" fill="#7C3AED">Kronecker 分解</text>
  <text x="462" y="384" text-anchor="middle" class="small">Wperm = G ⊗ I</text>

  <!-- Right panel -->
  <rect x="560" y="140" rx="22" ry="22" width="580" height="430" fill="#FFFFFF" class="box"/>
  <text x="850" y="185" text-anchor="middle" class="label">参数化 TokenMixer</text>
  <text x="850" y="215" text-anchor="middle" class="small">学“块间” + “块内”</text>

  <!-- G -->
  <rect x="620" y="270" width="200" height="180" rx="18" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="2"/>
  <text x="720" y="305" text-anchor="middle" class="label" fill="#5B21B6">G</text>
  <text x="720" y="335" text-anchor="middle" class="small">全局块间混合</text>
  <g stroke="#7C3AED" stroke-width="3">
    <line x1="660" y1="365" x2="780" y2="365"/>
    <line x1="660" y1="400" x2="780" y2="400"/>
    <line x1="660" y1="435" x2="780" y2="435"/>
    <line x1="680" y1="345" x2="680" y2="455"/>
    <line x1="720" y1="345" x2="720" y2="455"/>
    <line x1="760" y1="345" x2="760" y2="455"/>
  </g>
  <circle cx="680" cy="365" r="7" fill="#7C3AED"/>
  <circle cx="720" cy="400" r="7" fill="#7C3AED"/>
  <circle cx="760" cy="435" r="7" fill="#7C3AED"/>
  <circle cx="760" cy="365" r="7" fill="#7C3AED"/>

  <!-- I -->
  <rect x="870" y="270" width="210" height="180" rx="18" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="975" y="305" text-anchor="middle" class="label" fill="#166534">I</text>
  <text x="975" y="335" text-anchor="middle" class="small">局部块内混合</text>

  <g transform="translate(905,355)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#BBF7D0" stroke="#22C55E" stroke-width="2"/>
    <rect x="62" y="0" width="52" height="52" rx="10" fill="#BBF7D0" stroke="#22C55E" stroke-width="2"/>
    <rect x="124" y="0" width="52" height="52" rx="10" fill="#BBF7D0" stroke="#22C55E" stroke-width="2"/>
    <text x="26" y="33" text-anchor="middle" class="small" fill="#166534">6×6</text>
    <text x="88" y="33" text-anchor="middle" class="small" fill="#166534">6×6</text>
    <text x="150" y="33" text-anchor="middle" class="small" fill="#166534">6×6</text>
  </g>

  <!-- bottom summary -->
  <rect x="650" y="485" width="400" height="56" rx="14" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>
  <text x="850" y="520" text-anchor="middle" class="label" fill="#92400E">从“大洗牌”到“小模块可学习”</text>

  <!-- connecting arrows inside right panel -->
  <line x1="820" y1="360" x2="860" y2="360" class="arrow"/>
  <line x1="720" y1="452" x2="720" y2="485" class="arrow"/>
  <line x1="975" y1="452" x2="975" y2="485" class="arrow"/>
  <line x1="720" y1="513" x2="820" y2="513" class="arrow"/>
  <line x1="975" y1="513" x2="880" y2="513" class="arrow"/>

  <!-- bottom comparison -->
  <rect x="120" y="610" width="960" height="52" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="600" y="643" text-anchor="middle" class="small">
    参数量：L⁴  →  T⁴ + (D/T)²
  </text>
</svg>