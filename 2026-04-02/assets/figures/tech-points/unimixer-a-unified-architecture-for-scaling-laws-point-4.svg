<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <linearGradient id="tempGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#FCA5A5"/>
    </linearGradient>
    <style>
      .title{font:700 28px sans-serif; fill:#111827}
      .label{font:600 18px sans-serif; fill:#111827}
      .small{font:500 15px sans-serif; fill:#374151}
      .tiny{font:500 13px sans-serif; fill:#6B7280}
      .box{fill:#F9FAFB; stroke:#CBD5E1; stroke-width:2}
      .panel{fill:white; stroke:#CBD5E1; stroke-width:2}
      .soft{fill:#DBEAFE; stroke:#60A5FA; stroke-width:2}
      .sharp{fill:#FEE2E2; stroke:#F87171; stroke-width:2}
      .accent{fill:#ECFDF5; stroke:#34D399; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .dash{stroke:#9CA3AF; stroke-width:2.5; stroke-dasharray:7 7; fill:none; marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="960" height="620" fill="#FFFFFF"/>

  <text x="480" y="52" text-anchor="middle" class="title">高温先稳，低温变稀疏</text>

  <!-- Main timeline block -->
  <rect x="80" y="95" rx="18" ry="18" width="800" height="120" fill="url(#tempGrad)" opacity="0.18"/>
  <line x1="150" y1="155" x2="810" y2="155" class="arrow"/>
  <circle cx="200" cy="155" r="20" fill="#93C5FD" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="480" cy="155" r="20" fill="#C4B5FD" stroke="#8B5CF6" stroke-width="3"/>
  <circle cx="760" cy="155" r="20" fill="#FCA5A5" stroke="#F87171" stroke-width="3"/>
  <text x="200" y="120" text-anchor="middle" class="label">τ 高</text>
  <text x="480" y="120" text-anchor="middle" class="label">线性退火</text>
  <text x="760" y="120" text-anchor="middle" class="label">τ 低</text>
  <text x="200" y="192" text-anchor="middle" class="small">平滑，梯度稳</text>
  <text x="760" y="192" text-anchor="middle" class="small">接近置换矩阵</text>

  <!-- Left matrix -->
  <rect x="110" y="275" rx="18" ry="18" width="290" height="255" class="panel"/>
  <text x="255" y="305" text-anchor="middle" class="label">训练初期</text>
  <rect x="170" y="335" width="170" height="170" class="soft"/>
  <!-- soft matrix cells -->
  <g opacity="0.9">
    <rect x="180" y="345" width="24" height="24" fill="#BFDBFE"/>
    <rect x="208" y="345" width="24" height="24" fill="#93C5FD"/>
    <rect x="236" y="345" width="24" height="24" fill="#BFDBFE"/>
    <rect x="264" y="345" width="24" height="24" fill="#93C5FD"/>
    <rect x="292" y="345" width="24" height="24" fill="#BFDBFE"/>

    <rect x="180" y="373" width="24" height="24" fill="#93C5FD"/>
    <rect x="208" y="373" width="24" height="24" fill="#BFDBFE"/>
    <rect x="236" y="373" width="24" height="24" fill="#93C5FD"/>
    <rect x="264" y="373" width="24" height="24" fill="#BFDBFE"/>
    <rect x="292" y="373" width="24" height="24" fill="#93C5FD"/>

    <rect x="180" y="401" width="24" height="24" fill="#BFDBFE"/>
    <rect x="208" y="401" width="24" height="24" fill="#93C5FD"/>
    <rect x="236" y="401" width="24" height="24" fill="#BFDBFE"/>
    <rect x="264" y="401" width="24" height="24" fill="#93C5FD"/>
    <rect x="292" y="401" width="24" height="24" fill="#BFDBFE"/>

    <rect x="180" y="429" width="24" height="24" fill="#93C5FD"/>
    <rect x="208" y="429" width="24" height="24" fill="#BFDBFE"/>
    <rect x="236" y="429" width="24" height="24" fill="#93C5FD"/>
    <rect x="264" y="429" width="24" height="24" fill="#BFDBFE"/>
    <rect x="292" y="429" width="24" height="24" fill="#93C5FD"/>

    <rect x="180" y="457" width="24" height="24" fill="#BFDBFE"/>
    <rect x="208" y="457" width="24" height="24" fill="#93C5FD"/>
    <rect x="236" y="457" width="24" height="24" fill="#BFDBFE"/>
    <rect x="264" y="457" width="24" height="24" fill="#93C5FD"/>
    <rect x="292" y="457" width="24" height="24" fill="#BFDBFE"/>
  </g>
  <text x="255" y="555" text-anchor="middle" class="small">像“软草图”</text>

  <!-- Middle sinkhorn -->
  <rect x="415" y="315" rx="20" ry="20" width="130" height="170" class="accent"/>
  <text x="480" y="395" text-anchor="middle" class="label">÷ τ</text>
  <text x="480" y="425" text-anchor="middle" class="label">Sinkhorn</text>

  <!-- Right matrix -->
  <rect x="560" y="275" rx="18" ry="18" width="290" height="255" class="panel"/>
  <text x="705" y="305" text-anchor="middle" class="label">训练后期</text>
  <rect x="620" y="335" width="170" height="170" class="sharp"/>
  <!-- sparse matrix stripes -->
  <g>
    <rect x="630" y="345" width="24" height="24" fill="#FCA5A5"/>
    <rect x="658" y="345" width="24" height="24" fill="#FEE2E2"/>
    <rect x="686" y="345" width="24" height="24" fill="#FEE2E2"/>
    <rect x="714" y="345" width="24" height="24" fill="#FEE2E2"/>
    <rect x="742" y="345" width="24" height="24" fill="#FEE2E2"/>

    <rect x="630" y="373" width="24" height="24" fill="#FEE2E2"/>
    <rect x="658" y="373" width="24" height="24" fill="#FCA5A5"/>
    <rect x="686" y="373" width="24" height="24" fill="#FEE2E2"/>
    <rect x="714" y="373" width="24" height="24" fill="#FEE2E2"/>
    <rect x="742" y="373" width="24" height="24" fill="#FEE2E2"/>

    <rect x="630" y="401" width="24" height="24" fill="#FEE2E2"/>
    <rect x="658" y="401" width="24" height="24" fill="#FEE2E2"/>
    <rect x="686" y="401" width="24" height="24" fill="#FCA5A5"/>
    <rect x="714" y="401" width="24" height="24" fill="#FEE2E2"/>
    <rect x="742" y="401" width="24" height="24" fill="#FEE2E2"/>

    <rect x="630" y="429" width="24" height="24" fill="#FEE2E2"/>
    <rect x="658" y="429" width="24" height="24" fill="#FEE2E2"/>
    <rect x="686" y="429" width="24" height="24" fill="#FEE2E2"/>
    <rect x="714" y="429" width="24" height="24" fill="#FCA5A5"/>
    <rect x="742" y="429" width="24" height="24" fill="#FEE2E2"/>

    <rect x="630" y="457" width="24" height="24" fill="#FEE2E2"/>
    <rect x="658" y="457" width="24" height="24" fill="#FEE2E2"/>
    <rect x="686" y="457" width="24" height="24" fill="#FEE2E2"/>
    <rect x="714" y="457" width="24" height="24" fill="#FEE2E2"/>
    <rect x="742" y="457" width="24" height="24" fill="#FCA5A5"/>
  </g>
  <text x="705" y="555" text-anchor="middle" class="small">强交互只留少数</text>

  <!-- Arrows -->
  <path d="M400 420 C420 420, 395 400, 415 400" class="arrow"/>
  <path d="M545 400 C565 400, 540 420, 560 420" class="arrow"/>

  <!-- Warm-up note -->
  <rect x="300" y="548" rx="16" ry="16" width="360" height="42" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="480" y="575" text-anchor="middle" class="small">数据少时：先高温收敛，再低温继续</text>

  <!-- tiny footer cue -->
  <path d="M760 135 Q805 155 840 175" class="dash"/>
  <text x="842" y="188" class="tiny">更尖锐</text>
</svg>