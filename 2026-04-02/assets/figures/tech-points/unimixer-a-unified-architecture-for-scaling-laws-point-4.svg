<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="hotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffa502;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.15"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="18" fill="#fafbfc" stroke="#ddd" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">温度退火：从模糊到稀疏的训练策略</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#7f8c8d">Temperature Annealing — UniMixer 中影响最大的训练技巧</text>

  <!-- ============ LEFT: High Temperature ============ -->
  <rect x="40" y="90" width="260" height="340" rx="16" fill="url(#hotGrad)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="170" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#e74c3c">🔥 高温 τ = 1.0</text>
  <text x="170" y="142" text-anchor="middle" font-size="12" fill="#c0392b">训练初期</text>

  <!-- Uniform matrix visualization -->
  <rect x="75" y="160" width="190" height="130" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <!-- Grid cells - uniform colors -->
  <g opacity="0.7">
    <!-- Row 1 -->
    <rect x="80" y="165" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="118" y="165" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="156" y="165" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="194" y="165" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="232" y="165" width="28" height="24" rx="3" fill="#ffcccc"/>
    <!-- Row 2 -->
    <rect x="80" y="192" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="118" y="192" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="156" y="192" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="194" y="192" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="232" y="192" width="28" height="24" rx="3" fill="#ffd5cc"/>
    <!-- Row 3 -->
    <rect x="80" y="219" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="118" y="219" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="156" y="219" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="194" y="219" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="232" y="219" width="28" height="24" rx="3" fill="#ffcccc"/>
    <!-- Row 4 -->
    <rect x="80" y="246" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="118" y="246" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="156" y="246" width="36" height="24" rx="3" fill="#ffd5cc"/>
    <rect x="194" y="246" width="36" height="24" rx="3" fill="#ffcccc"/>
    <rect x="232" y="246" width="28" height="24" rx="3" fill="#ffd5cc"/>
  </g>
  <text x="170" y="305" text-anchor="middle" font-size="13" fill="#555">权重 ≈ 均匀分布</text>
  <text x="170" y="323" text-anchor="middle" font-size="12" fill="#888">每个元素 ≈ 1/N</text>

  <!-- Benefit label -->
  <rect x="68" y="345" width="204" height="36" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="170" y="368" text-anchor="middle" font-size="13" fill="#e65100">✅ 梯度平滑，训练稳定</text>

  <!-- Metaphor -->
  <text x="170" y="410" text-anchor="middle" font-size="12" fill="#999" font-style="italic">🖌️ "软笔画草图"</text>

  <!-- ============ CENTER: Arrow / Annealing ============ -->
  <line x1="310" y1="260" x2="390" y2="260" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="350" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">线性退火</text>
  <text x="350" y="280" text-anchor="middle" font-size="12" fill="#e67e22">τ: 1.0 → 0.05</text>

  <!-- Temperature curve mini-chart -->
  <g transform="translate(315, 300)">
    <rect x="0" y="0" width="70" height="45" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <polyline points="8,8 20,12 35,22 50,32 62,38" stroke="#e67e22" stroke-width="2" fill="none"/>
    <text x="35" y="55" text-anchor="middle" font-size="9" fill="#999">τ 随训练下降</text>
  </g>

  <!-- ============ RIGHT: Low Temperature ============ -->
  <rect x="410" y="90" width="260" height="340" rx="16" fill="url(#coldGrad)" stroke="#3498db" stroke-width="2"/>
  <text x="540" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#2980b9">❄️ 低温 τ = 0.05</text>
  <text x="540" y="142" text-anchor="middle" font-size="12" fill="#2471a3">训练后期</text>

  <!-- Sparse matrix visualization -->
  <rect x="445" y="160" width="190" height="130" rx="8" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <g opacity="0.85">
    <!-- Row 1 - sparse: only one dark -->
    <rect x="450" y="165" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="488" y="165" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="526" y="165" width="36" height="24" rx="3" fill="#2980b9"/>
    <rect x="564" y="165" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="602" y="165" width="28" height="24" rx="3" fill="#e8f4fd"/>
    <!-- Row 2 -->
    <rect x="450" y="192" width="36" height="24" rx="3" fill="#2980b9"/>
    <rect x="488" y="192" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="526" y="192" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="564" y="192" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="602" y="192" width="28" height="24" rx="3" fill="#e8f4fd"/>
    <!-- Row 3 -->
    <rect x="450" y="219" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="488" y="219" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="526" y="219" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="564" y="219" width="36" height="24" rx="3" fill="#2980b9"/>
    <rect x="602" y="219" width="28" height="24" rx="3" fill="#e8f4fd"/>
    <!-- Row 4 -->
    <rect x="450" y="246" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="488" y="246" width="36" height="24" rx="3" fill="#2980b9"/>
    <rect x="526" y="246" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="564" y="246" width="36" height="24" rx="3" fill="#e8f4fd"/>
    <rect x="602" y="246" width="28" height="24" rx="3" fill="#e8f4fd"/>
  </g>
  <text x="540" y="305" text-anchor="middle" font-size="13" fill="#555">趋近置换矩阵</text>
  <text x="540" y="323" text-anchor="middle" font-size="12" fill="#888">每行仅 1-2 个非零值</text>

  <!-- Benefit label -->
  <rect x="438" y="345" width="204" height="36" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
  <text x="540" y="368" text-anchor="middle" font-size="13" fill="#1565c0">✅ 精准稀疏，聚焦交互</text>

  <!-- Metaphor -->
  <text x="540" y="410" text-anchor="middle" font-size="12" fill="#999" font-style="italic">✒️ "硬笔勾细节"</text>

  <!-- ============ RIGHT PANEL: Impact ============ -->
  <rect x="700" y="100" width="180" height="320" rx="14" fill="#f0faf0" stroke="#27ae60" stroke-width="2"/>
  <text x="790" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#27ae60">消融实验影响</text>

  <!-- Bar 1 -->
  <rect x="720" y="160" width="140" height="42" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="790" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">去掉温度系数</text>
  <text x="790" y="196" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">AUC -0.16%</text>

  <!-- Bar 2 -->
  <rect x="720" y="220" width="140" height="42" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="790" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">去掉 Warm-up</text>
  <text x="790" y="256" text-anchor="middle" font-size="18" font-weight="bold" fill="#e67e22">AUC -0.086%</text>

  <!-- Impact note -->
  <text x="790" y="290" text-anchor="middle" font-size="11" fill="#666">⬆ 影响最大的两个因素</text>

  <!-- Online result -->
  <rect x="720" y="310" width="140" height="50" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="790" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">快手广告上线</text>
  <text x="790" y="352" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">CAD +15%</text>

  <!-- Sinkhorn note -->
  <rect x="720" y="375" width="140" height="30" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="790" y="395" text-anchor="middle" font-size="10" fill="#666">Sinkhorn-Knopp 投影</text>

  <!-- Bottom summary -->
  <rect x="40" y="452" width="630" height="52" rx="12" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
  <text x="355" y="474" text-anchor="middle" font-size="14" fill="#555">
    <tspan font-weight="bold" fill="#e67e22">核心思想：</tspan>
    <tspan>先高温让梯度稳定探索方向，再低温退火让矩阵变稀疏 → 精准特征交互</tspan>
  </text>
  <text x="355" y="494" text-anchor="middle" font-size="12" fill="#999">W ← Sinkhorn(W / τ) ，τ 从 1.0 线性降到 0.05</text>
</svg>