<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="PingFang SC, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e67e22"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2aa84a"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b7dd8"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#222">个性化门控：按人决定"搬多少日常知识"</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">预热期数据稀疏 → 用门控自适应迁移日常CVR塔 / ATC塔的隐层特征</text>

  <!-- Gate module -->
  <rect x="330" y="95" width="240" height="90" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="450" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#b35900">门控 MLP + Sigmoid</text>
  <text x="450" y="145" text-anchor="middle" font-size="12" fill="#555">输入: 用户Emb + 加购序列 + 购买序列</text>
  <text x="450" y="165" text-anchor="middle" font-size="12" fill="#555">输出: 每层门控向量 g ∈ (0,1)</text>

  <!-- Source towers -->
  <rect x="70" y="235" width="180" height="70" rx="8" fill="#e8f1ff" stroke="#3b7dd8" stroke-width="2"/>
  <text x="160" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#1f4e9d">日常 CVR 塔 (冻结)</text>
  <text x="160" y="285" text-anchor="middle" font-size="12" fill="#555">隐层表示 h_cvr</text>

  <rect x="650" y="235" width="180" height="70" rx="8" fill="#e8f1ff" stroke="#3b7dd8" stroke-width="2"/>
  <text x="740" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#1f4e9d">ATC 塔 (冻结)</text>
  <text x="740" y="285" text-anchor="middle" font-size="12" fill="#555">隐层表示 h_atc</text>

  <!-- Multiply nodes -->
  <circle cx="270" cy="355" r="22" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="270" y="362" text-anchor="middle" font-size="20" font-weight="700" fill="#e67e22">⊙</text>
  <circle cx="630" cy="355" r="22" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="630" y="362" text-anchor="middle" font-size="20" font-weight="700" fill="#e67e22">⊙</text>

  <!-- Delayed tower -->
  <rect x="330" y="400" width="240" height="80" rx="10" fill="#eafbe7" stroke="#2aa84a" stroke-width="2.5"/>
  <text x="450" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#1f7a35">延迟 CVR 塔</text>
  <text x="450" y="452" text-anchor="middle" font-size="12" fill="#555">拼入被门控筛选过的日常知识</text>
  <text x="450" y="470" text-anchor="middle" font-size="12" fill="#555">→ 预热期转化预测</text>

  <!-- arrows from towers to multiply -->
  <path d="M160,305 L160,355 L246,355" stroke="#3b7dd8" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M740,305 L740,355 L654,355" stroke="#3b7dd8" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <!-- gate to multiply -->
  <path d="M360,185 Q300,260 275,335" stroke="#e67e22" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#ao)"/>
  <path d="M540,185 Q600,260 625,335" stroke="#e67e22" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#ao)"/>
  <text x="295" y="248" font-size="12" font-weight="700" fill="#b35900">g_cvr</text>
  <text x="590" y="248" font-size="12" font-weight="700" fill="#b35900">g_atc</text>

  <!-- multiply to delayed tower -->
  <path d="M288,372 L335,410" stroke="#2aa84a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M612,372 L565,410" stroke="#2aa84a" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <!-- Two personas bottom -->
  <rect x="60" y="515" width="370" height="85" rx="8" fill="#fff" stroke="#bbb"/>
  <text x="80" y="540" font-size="14" font-weight="700" fill="#333">用户A：疯狂加购10件</text>
  <text x="80" y="562" font-size="12" fill="#555">日常门 g_cvr = 0.3 ↓关小通用偏好</text>
  <text x="80" y="582" font-size="12" fill="#555">ATC门 g_atc = 0.9 ↑放大"囤货型"证据</text>

  <rect x="470" y="515" width="370" height="85" rx="8" fill="#fff" stroke="#bbb"/>
  <text x="490" y="540" font-size="14" font-weight="700" fill="#333">用户B：几乎没加购</text>
  <text x="490" y="562" font-size="12" fill="#555">日常门 g_cvr = 0.85 ↑日常兴趣主导</text>
  <text x="490" y="582" font-size="12" fill="#555">ATC门 g_atc 很小 ↓加购信号弱</text>
</svg>