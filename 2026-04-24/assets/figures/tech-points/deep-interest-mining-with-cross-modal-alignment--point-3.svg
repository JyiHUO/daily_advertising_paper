<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
  </defs>

  <text x="440" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">QARM：不仅要猜中，还要猜得"语义清晰"</text>
  <text x="440" y="58" text-anchor="middle" font-size="13" fill="#666">Qwen 先给兴趣打质量分，再加权奖励 → GRPO 更新策略</text>

  <!-- Policy -->
  <rect x="40" y="100" width="180" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="130" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">生成策略</text>
  <text x="130" y="156" text-anchor="middle" font-size="12" fill="#3730a3">用户历史 + 兴趣</text>
  <text x="130" y="176" text-anchor="middle" font-size="12" fill="#3730a3">→ rollout SID 序列</text>

  <!-- Item A -->
  <rect x="290" y="95" width="260" height="100" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Item A  ✓ 命中</text>
  <text x="420" y="142" text-anchor="middle" font-size="12" fill="#166534">兴趣："职场通勤妆 / 秋冬换季"（具体可执行）</text>
  <rect x="310" y="160" width="90" height="22" rx="4" fill="#16a34a"/>
  <text x="355" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">QARM = 1</text>

  <!-- Item B -->
  <rect x="290" y="215" width="260" height="100" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="420" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Item B  ✓ 命中</text>
  <text x="420" y="262" text-anchor="middle" font-size="12" fill="#991b1b">兴趣："价格便宜的买家"（空泛 / 幻觉）</text>
  <rect x="310" y="280" width="90" height="22" rx="4" fill="#dc2626"/>
  <text x="355" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">QARM = 0</text>

  <!-- Qwen judge -->
  <rect x="290" y="345" width="260" height="60" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="420" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">轻量 Qwen 分类器</text>
  <text x="420" y="390" text-anchor="middle" font-size="12" fill="#9a3412">zero-shot 判断兴趣是否具体</text>

  <!-- policy -> items -->
  <line x1="220" y1="135" x2="286" y2="135" stroke="#444" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="220" y1="160" x2="286" y2="260" stroke="#444" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Qwen -> items (dashed) -->
  <line x1="470" y1="345" x2="470" y2="316" stroke="#ea580c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <line x1="370" y1="345" x2="370" y2="196" stroke="#ea580c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar)"/>

  <!-- Reward A -->
  <rect x="620" y="95" width="220" height="100" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="730" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Reward(A)</text>
  <text x="730" y="148" text-anchor="middle" font-size="13" fill="#166534">1.0  +  0.5 × 1</text>
  <text x="730" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="#16a34a">= 1.5</text>

  <!-- Reward B -->
  <rect x="620" y="215" width="220" height="100" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="730" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Reward(B)</text>
  <text x="730" y="268" text-anchor="middle" font-size="13" fill="#991b1b">1.0  +  0.5 × 0</text>
  <text x="730" y="298" text-anchor="middle" font-size="18" font-weight="800" fill="#dc2626">= 1.0</text>

  <line x1="550" y1="145" x2="616" y2="145" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arG)"/>
  <line x1="550" y1="265" x2="616" y2="265" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arR)"/>

  <!-- GRPO -->
  <rect x="230" y="440" width="420" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="440" y="467" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">GRPO 组内相对优势 + KL 正则</text>
  <text x="440" y="490" text-anchor="middle" font-size="12" fill="#3730a3">A 优势 &gt; B → 策略倾向生成"兴趣清晰"的 SID 路径</text>
  <text x="440" y="510" text-anchor="middle" font-size="12" fill="#888">低质 SID 被逐步冷落</text>

  <!-- rewards -> GRPO (aggregate) -->
  <path d="M730,315 L730,410 L440,410 L440,436" fill="none" stroke="#444" stroke-width="2" marker-end="url(#ar)"/>

  <!-- GRPO -> policy (update / closed loop) -->
  <path d="M230,485 L130,485 L130,192" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arI)"/>
  <text x="140" y="478" font-size="11" font-weight="700" fill="#6366f1">策略更新</text>
</svg>