<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#333"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2e8b57"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#222">预热期 CVR = 日常塔(冻结) + 延迟塔(新学)</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">把"当天买的人"和"拖到双11才买的人"拆成两个塔</text>

  <!-- Input -->
  <rect x="60" y="260" width="130" height="70" rx="10" fill="#ecf4fb" stroke="#3b6fa3" stroke-width="1.5"/>
  <text x="125" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#2c4a6b">用户点击</text>
  <text x="125" y="310" text-anchor="middle" font-size="12" fill="#5d7794">共享 Embedding</text>

  <!-- CVR tower (frozen) -->
  <rect x="300" y="120" width="230" height="130" rx="12" fill="#eaf6ee" stroke="#2e8b57" stroke-width="2"/>
  <text x="415" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#1f6b42">日常 CVR 塔 🔒</text>
  <text x="415" y="175" text-anchor="middle" font-size="12" fill="#3e7a58">预测：当天就买</text>
  <text x="415" y="200" text-anchor="middle" font-size="12" fill="#888">stop-gradient · 冻结</text>
  <text x="415" y="232" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6b42">p₁ = 0.02</text>

  <!-- Delay CVR tower (new) -->
  <rect x="300" y="340" width="230" height="130" rx="12" fill="#fdecec" stroke="#c0392b" stroke-width="2"/>
  <text x="415" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#9e2a1e">延迟 CVR 塔（新）✨</text>
  <text x="415" y="395" text-anchor="middle" font-size="12" fill="#b24a3e">预热期点击 → 促销日转化</text>
  <text x="415" y="420" text-anchor="middle" font-size="12" fill="#b24a3e">专门补"延迟到促销日"残差</text>
  <text x="415" y="452" text-anchor="middle" font-size="15" font-weight="700" fill="#9e2a1e">p₂ = 0.18</text>

  <!-- Sum -->
  <circle cx="650" cy="295" r="40" fill="#fff4d6" stroke="#d4a017" stroke-width="2"/>
  <text x="650" y="292" text-anchor="middle" font-size="26" font-weight="700" fill="#8a6a0a">＋</text>
  <text x="650" y="316" text-anchor="middle" font-size="11" fill="#8a6a0a">相加</text>

  <!-- Output -->
  <rect x="740" y="255" width="135" height="85" rx="10" fill="#222"/>
  <text x="807" y="285" text-anchor="middle" font-size="13" fill="#ddd">总 CVR</text>
  <text x="807" y="318" text-anchor="middle" font-size="22" font-weight="700" fill="#ffd866">0.20</text>

  <!-- Arrows from input to towers -->
  <path d="M190 280 Q 245 185 300 185" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>
  <path d="M190 310 Q 245 405 300 405" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Arrows to sum -->
  <path d="M530 210 Q 600 230 618 272" fill="none" stroke="#2e8b57" stroke-width="2" marker-end="url(#ag)"/>
  <path d="M530 400 Q 600 360 618 318" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Arrow to output -->
  <path d="M690 295 L738 295" fill="none" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <!-- Bottom caption example -->
  <rect x="60" y="505" width="815" height="75" rx="8" fill="#f6f6f6" stroke="#ccc"/>
  <text x="75" y="530" font-size="13" font-weight="600" fill="#333">🧥 例：11/8 点击羽绒服</text>
  <text x="75" y="553" font-size="12" fill="#666">老塔："当天买概率 0.02" → 若单独用会压低出价</text>
  <text x="75" y="572" font-size="12" fill="#c0392b">新塔补上"加购党拖到双11" 0.18，合计 0.20 → 识别为高价值点击，该抢！</text>
</svg>