<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fa8"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">ATC 因果正则：把"加购→转化"的干净因果信号灌进延迟塔</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">Doubly Robust 估计反事实 μ(x,1)，监督延迟 CVR</text>

  <!-- Left: problem illustration -->
  <g>
    <rect x="40" y="95" width="260" height="170" rx="10" fill="#fff4f0" stroke="#e89377" stroke-width="1.5"/>
    <text x="170" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#c0392b">只看相关性会被带偏</text>
    <text x="170" y="148" text-anchor="middle" font-size="13" fill="#333">热门商品 → 加购率高 &amp; CVR 高</text>
    <text x="170" y="178" text-anchor="middle" font-size="13" fill="#888">延迟塔预测 CVR = 0.50</text>
    <text x="170" y="202" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">虚高，来自商品热度</text>
    <text x="170" y="234" text-anchor="middle" font-size="12" fill="#888">→ 出价 / 排序被误导</text>
  </g>

  <!-- Right: DR estimator -->
  <g>
    <rect x="600" y="95" width="260" height="170" rx="10" fill="#eef6ff" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="730" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1f5fa8">Doubly Robust 估计</text>
    
    <rect x="620" y="135" width="100" height="44" rx="6" fill="#fff" stroke="#4a90d9"/>
    <text x="670" y="154" text-anchor="middle" font-size="12" fill="#1f5fa8">结果模型</text>
    <text x="670" y="171" text-anchor="middle" font-size="12" fill="#333">μ(x, A=1/0)</text>

    <rect x="740" y="135" width="100" height="44" rx="6" fill="#fff" stroke="#4a90d9"/>
    <text x="790" y="154" text-anchor="middle" font-size="12" fill="#1f5fa8">倾向分 IPW</text>
    <text x="790" y="171" text-anchor="middle" font-size="12" fill="#333">ATC 预训练</text>

    <text x="730" y="205" text-anchor="middle" font-size="12" fill="#666">互相纠偏，一个错另一个兜底</text>
    <text x="730" y="232" text-anchor="middle" font-size="15" font-weight="700" fill="#1f5fa8">μ(x,1) = 0.35</text>
    <text x="730" y="252" text-anchor="middle" font-size="11" fill="#888">加购条件下"应得"转化概率</text>
  </g>

  <!-- Middle: delay tower being pulled -->
  <g>
    <rect x="330" y="315" width="240" height="115" rx="10" fill="#fffbe6" stroke="#e0a800" stroke-width="2"/>
    <text x="450" y="342" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6d00">延迟 CVR 预测塔</text>
    <text x="450" y="370" text-anchor="middle" font-size="13" fill="#666">原始输出： <tspan fill="#c0392b" font-weight="700">0.50</tspan></text>
    <text x="450" y="392" text-anchor="middle" font-size="13" fill="#666">被正则拉向： <tspan fill="#1f5fa8" font-weight="700">0.35</tspan></text>
    <text x="450" y="415" text-anchor="middle" font-size="12" fill="#8a6d00">→ 贴近真实因果意愿</text>
  </g>

  <!-- arrows pulling -->
  <path d="M 240 265 Q 320 300 380 315" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#ar)"/>
  <text x="260" y="295" font-size="11" fill="#c0392b" font-weight="700">带偏的相关性</text>

  <path d="M 660 265 Q 580 300 520 315" stroke="#1f5fa8" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="560" y="295" font-size="12" fill="#1f5fa8" font-weight="700">因果正则拉回</text>

  <!-- Loss formula -->
  <g>
    <rect x="150" y="470" width="600" height="95" rx="10" fill="#f5f5f5" stroke="#999"/>
    <text x="450" y="497" text-anchor="middle" font-size="14" font-weight="700" fill="#222">总损失</text>
    <text x="450" y="528" text-anchor="middle" font-size="15" fill="#333">L = L(延迟CVR) + L(全转化) + <tspan fill="#1f5fa8" font-weight="700">L(因果正则)</tspan></text>
    <text x="450" y="552" text-anchor="middle" font-size="12" fill="#666">让延迟塔输出对齐反事实 μ(x,1)，去掉商品热度混淆</text>
  </g>
</svg>