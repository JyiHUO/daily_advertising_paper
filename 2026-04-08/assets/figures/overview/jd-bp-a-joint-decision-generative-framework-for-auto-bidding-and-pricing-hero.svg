<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="880" viewBox="0 0 1460 880"><defs><linearGradient id="overviewBg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F8FAFC"/></linearGradient><linearGradient id="heroBand" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E0EAFF"/><stop offset="100%" stop-color="#ECFDF5"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="1460" height="880" fill="url(#overviewBg)"/><rect x="34" y="32" width="1392" height="816" rx="34" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/><rect x="52" y="50" width="1356" height="164" rx="28" fill="url(#heroBand)" stroke="#D8E6F5" stroke-width="1.2"/><text x="72" y="92" font-size="30" font-weight="800" fill="#0F172A">JD-BP: A Joint-Decision Generative Framework for Auto-Bidding and Pricing</text><text x="72" y="126" font-size="15" font-weight="700" fill="#475569">论文核心机制总览</text><rect x="72" y="146" width="920" height="44" rx="22" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.2"/><text x="92" y="174" font-size="16" font-weight="700" fill="#3730A3">一句话理解：直接针对广告自动出价与定价的联合决策框架，将出价（bidding）与定价修正（pricing correction）解耦为两个协同动作，在京东线上A/B测试中实现广告收入+4.70%、目标成本达成率+</text><rect x="80.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="72.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.6"/><text x="94" y="244.0" font-size="14" font-weight="700" fill="#7C2D12">自动出价系统需要在预算和ROI等KPI约束下最大</text><text x="94" y="262.0" font-size="14" font-weight="700" fill="#7C2D12">化广告价值，但CTR/CVR预估误差和转化延迟会</text><text x="94" y="280.0" font-size="14" font-weight="700" fill="#7C2D12">导致实时ROI偏离目标。传统方法在发现ROI违…</text><rect x="1076.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1068.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="1.6"/><text x="1090" y="244.0" font-size="14" font-weight="700" fill="#3730A3">直接针对广告自动出价与定价的联合决策框架，将出价</text><text x="1090" y="262.0" font-size="14" font-weight="700" fill="#3730A3">（bidding）与定价修正（pricing</text><text x="1090" y="280.0" font-size="14" font-weight="700" fill="#3730A3">correction）解耦为两个协同动作，在京…</text><path d="M 468.0 427.0 C 502.0 427.0, 532.0 427.0, 566.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><path d="M 890.0 427.0 C 924.0 427.0, 954.0 427.0, 988.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="176.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="168.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/><rect x="188.0" y="336.0" width="86" height="30" rx="15" fill="#DBEAFE"/><text x="231.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#60A5FA">核心模块</text><text x="318.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">出价与定价修正解耦框架</text><text x="194.0" y="458.0" font-size="14" font-weight="600" fill="#334155">想象你在竞拍中因为预估偏差已经多</text><text x="194.0" y="476.0" font-size="14" font-weight="600" fill="#334155">花了一笔钱（历史亏损bal），传</text><text x="194.0" y="494.0" font-size="14" font-weight="600" fill="#334155">统方法会让你之后出价变得保守来省</text><text x="194.0" y="512.0" font-size="14" font-weight="600" fill="#334155">钱补回来。JD-BP的做法不同…</text><rect x="598.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="590.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#F0FDF4" stroke="#10B981" stroke-width="1.6"/><rect x="610.0" y="336.0" width="86" height="30" rx="15" fill="#BBF7D0"/><text x="653.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#10B981">核心模块</text><text x="740.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">无记忆RTG设计</text><text x="616.0" y="458.0" font-size="14" font-weight="600" fill="#334155">RTG是Decision</text><text x="616.0" y="476.0" font-size="14" font-weight="600" fill="#334155">Transformer用来告诉模</text><text x="616.0" y="494.0" font-size="14" font-weight="600" fill="#334155">型&#x27;你还期望获得多少回报&#x27;的信号</text><text x="616.0" y="512.0" font-size="14" font-weight="600" fill="#334155">。如果把历史违约信息也放进出价…</text><rect x="1020.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1012.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.6"/><rect x="1032.0" y="336.0" width="86" height="30" rx="15" fill="#FDE68A"/><text x="1075.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#F59E0B">核心模块</text><text x="1162.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">双流Transformer</text><text x="1162.0" y="434.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">与门控交叉注意力</text><text x="1038.0" y="458.0" font-size="14" font-weight="600" fill="#334155">出价模型和定价模型各自有一条Tr</text><text x="1038.0" y="476.0" font-size="14" font-weight="600" fill="#334155">ansformer&#x27;流水线&#x27;。出</text><text x="1038.0" y="494.0" font-size="14" font-weight="600" fill="#334155">价模型先独立做出决策；定价模型在</text><text x="1038.0" y="512.0" font-size="14" font-weight="600" fill="#334155">做决策之前，通过一个&#x27;门控窗口…</text><rect x="72" y="614" width="1316" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/><text x="94" y="650" font-size="18" font-weight="800" fill="#0F172A">为什么这篇论文值得放主图</text><text x="94" y="684.0" font-size="15" font-weight="600" fill="#334155">自动出价系统需要在预算和ROI等KPI约束下最大化广告价值，但CTR/CVR预估误差和转化延迟会导致实时ROI偏离目</text><text x="94" y="706.0" font-size="15" font-weight="600" fill="#334155">标。传统方法在发现ROI违约后会压低未来出价来补偿历史亏损，这让广告主错失高价值流量，并降低整体分配效率。JD-BP</text><text x="94" y="728.0" font-size="15" font-weight="600" fill="#334155">的核心洞察是：与其让出价同时承担&#x27;争取价值&#x27;和&#x27;补偿历史违约&#x27;两个目标，不如把它们拆成两个独立但协同的动作——出价专</text><text x="94" y="750.0" font-size="15" font-weight="600" fill="#334155">注于价值最大化，定价修正项专门处理历史KPI缺口。论文在AuctionNet离线数据集上大幅领先已有方法，并在京东线</text><text x="94" y="772.0" font-size="15" font-weight="600" fill="#334155">上实验验证了实际效果，值得关注。</text><text x="72" y="836" font-size="14" font-weight="600" fill="#64748B">图示：候选主图不可靠时，自动回退为论文机制总览 SVG。</text></svg>