"/><text x="653.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#10B981">核心模块</text><text x="740.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">转化加权评估协议</text><text x="616.0" y="458.0" font-size="14" font-weight="600" fill="#334155">广告场景中转化（如下单、付费）的</text><text x="616.0" y="476.0" font-size="14" font-weight="600" fill="#334155">价值远高于点击，所以评估指标给转</text><text x="616.0" y="494.0" font-size="14" font-weight="600" fill="#334155">化事件更高的权重。如果模型在To</text><text x="616.0" y="512.0" font-size="14" font-weight="600" fill="#334155">p-10中命中了一个转化广告，…</text><rect x="1020.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1012.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.6"/><rect x="1032.0" y="336.0" width="86" height="30" rx="15" fill="#FDE68A"/><text x="1075.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#F59E0B">核心模块</text><text x="1162.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">Baseline:</text><text x="1162.0" y="434.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">因果Transforme…</text><text x="1038.0" y="458.0" font-size="14" font-weight="600" fill="#334155">这个baseline本质上是把用</text><text x="1038.0" y="476.0" font-size="14" font-weight="600" fill="#334155">户历史编码成一个向量，然后和所有</text><text x="1038.0" y="494.0" font-size="14" font-weight="600" fill="#334155">候选广告的向量做内积排序。训练时</text><text x="1038.0" y="512.0" font-size="14" font-weight="600" fill="#334155">用对比学习让正确的下一个广告的…</text><rect x="72" y="614" width="1316" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/><text x="94" y="650" font-size="18" font-weight="800" fill="#0F172A">为什么这篇论文值得放主图</text><text x="94" y="684.0" font-size="15" font-weight="600" fill="#334155">生成式推荐（Generative Recommendation）正在从判别式范式（对固定候选集打分）转向自回归生成范</text><text x="94" y="706.0" font-size="15" font-weight="600" fill="#334155">式（直接生成用户下一个可能交互的物品），但目前缺乏大规模、包含完整多模态信息（协同ID+文本+视觉）且面向广告场景（</text><text x="94" y="728.0" font-size="15" font-weight="600" fill="#334155">含点击和转化信号）的公开基准数据集。本文发布了Tencent GR-1M和Tencent</text><text x="94" y="750.0" font-size="15" font-weight="600" fill="#334155">GR-10M两个数据集，来源于真实脱敏的腾讯广告日志，包含百万到千万用户的行为序列，每条交互附带稀疏ID、类目属性、</text><text x="94" y="772.0" font-size="15" font-weight="600" fill="#334155">行为类型（曝光/点击/转化）以及多个预训练模型提取的文本和视觉embedding，并以此为基础举办了全球竞赛，吸引…</text><text x="72" y="836" font-size="14" font-weight="600" fill="#64748B">图示：候选主图不可靠时，自动回退为论文机制总览 SVG。</text></svg>