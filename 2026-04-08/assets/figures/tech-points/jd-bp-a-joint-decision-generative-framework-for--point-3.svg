<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="18" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">双流 Transformer + 门控交叉注意力 (GCA)</text>
  <text x="450" y="67" text-anchor="middle" font-size="14" fill="#64748B">核心：出价先行独立决策，定价通过门控窗口感知出价再修正</text>

  <!-- ====== Bidding Stream (Top) ====== -->
  <rect x="40" y="100" width="380" height="170" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="128" text-anchor="middle" font-size="17" font-weight="bold" fill="#2563EB">出价流 (Bidding Stream)</text>

  <!-- Input -->
  <rect x="65" y="148" width="100" height="44" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="115" y="167" text-anchor="middle" font-size="11" fill="#1E40AF">状态 s_t</text>
  <text x="115" y="181" text-anchor="middle" font-size="11" fill="#1E40AF">历史动作</text>

  <!-- Causal Transformer -->
  <rect x="195" y="148" width="120" height="44" rx="8" fill="#2563EB"/>
  <text x="255" y="167" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">因果</text>
  <text x="255" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">Transformer</text>

  <!-- Bid output -->
  <rect x="345" y="148" width="56" height="44" rx="8" fill="#1D4ED8"/>
  <text x="373" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">出价</text>

  <!-- Arrows in bidding stream -->
  <line x1="165" y1="170" x2="192" y2="170" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="315" y1="170" x2="342" y2="170" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Hidden states label -->
  <rect x="200" y="208" width="110" height="26" rx="6" fill="#BFDBFE"/>
  <text x="255" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">隐状态 h_bid</text>

  <!-- Causal note -->
  <text x="230" y="258" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">独立决策，不受定价干扰 ✓</text>

  <!-- ====== Pricing Stream (Bottom) ====== -->
  <rect x="40" y="310" width="580" height="170" rx="14" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="338" text-anchor="middle" font-size="17" font-weight="bold" fill="#EA580C">定价流 (Pricing Stream)</text>

  <!-- Input -->
  <rect x="65" y="358" width="100" height="44" rx="8" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="115" y="377" text-anchor="middle" font-size="11" fill="#9A3412">状态 s_t</text>
  <text x="115" y="391" text-anchor="middle" font-size="11" fill="#9A3412">KPI 缺口</text>

  <!-- Pricing Transformer -->
  <rect x="195" y="358" width="120" height="44" rx="8" fill="#EA580C"/>
  <text x="255" y="377" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">因果</text>
  <text x="255" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">Transformer</text>

  <!-- Arrows -->
  <line x1="165" y1="380" x2="192" y2="380" stroke="#EA580C" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Hidden states pricing -->
  <rect x="200" y="418" width="110" height="26" rx="6" fill="#FED7AA"/>
  <text x="255" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">隐状态 h_price</text>

  <!-- ====== GCA Module (Center-Right) ====== -->
  <rect x="460" y="140" width="200" height="200" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="560" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400E">GCA 门控模块</text>

  <!-- Sigmoid gate -->
  <rect x="485" y="188" width="150" height="34" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="560" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#78350F">σ(h_bid) → 门控权重</text>

  <!-- Cross attention -->
  <rect x="485" y="238" width="150" height="34" rx="8" fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
  <text x="560" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="#78350F">Cross-Attention</text>

  <!-- Merge -->
  <rect x="485" y="288" width="150" height="34" rx="8" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
  <text x="560" y="309" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">融合 → 定价输出</text>

  <!-- Internal arrows in GCA -->
  <line x1="560" y1="222" x2="560" y2="236" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="272" x2="560" y2="286" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ====== Connection: Bid hidden → GCA (top) ====== -->
  <path d="M310 221 L430 221 Q445 221 445 210 L445 205 Q445 195 455 195 L483 205" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 3" marker-end="url(#arr-blue)"/>
  <text x="395" y="210" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="bold">h_bid</text>

  <!-- Connection: Pricing hidden → GCA (bottom) -->
  <path d="M310 431 L430 431 Q445 431 445 400 L445 272 Q445 260 455 260 L483 255" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 3" marker-end="url(#arr-orange)"/>
  <text x="420" y="350" text-anchor="middle" font-size="10" fill="#EA580C" font-weight="bold">h_price</text>

  <!-- ====== Output: Pricing correction ====== -->
  <rect x="700" y="280" width="160" height="50" rx="12" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="780" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">定价修正 Δp</text>
  <text x="780" y="320" text-anchor="middle" font-size="11" fill="#FFF">补偿KPI缺口</text>

  <line x1="635" y1="305" x2="697" y2="305" stroke="#D97706" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ====== Bid output arrow to right ====== -->
  <rect x="700" y="140" width="160" height="50" rx="12" fill="#1D4ED8" filter="url(#shadow)"/>
  <text x="780" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">出价动作 a_bid</text>
  <text x="780" y="180" text-anchor="middle" font-size="11" fill="#FFF">价值最大化</text>

  <line x1="401" y1="170" x2="420" y2="170" stroke="#2563EB" stroke-width="2"/>
  <path d="M420 170 L680 165 Q698 165 698 165" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- ====== Key insight at bottom ====== -->
  <rect x="180" y="505" width="540" height="40" rx="10" fill="#1E293B"/>
  <text x="450" y="530" text-anchor="middle" font-size="15" font-weight="bold" fill="#FDE68A">关键：因果单向 — 出价 → 定价，定价感知出价但出价不被污染</text>

  <!-- Small cross icon between streams -->
  <g transform="translate(22,282)">
    <line x1="0" y1="0" x2="16" y2="16" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="0" x2="0" y2="16" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="52" y="295" font-size="10" fill="#DC2626" font-weight="bold">无反向影响</text>
</svg>