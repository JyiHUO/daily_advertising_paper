<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F9E"/>
    </linearGradient>
    <linearGradient id="priceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8833A"/>
      <stop offset="100%" stop-color="#C25A12"/>
    </linearGradient>
    <linearGradient id="gcaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#5A1D8E"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2C5F9E"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C25A12"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B2FBE"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">双流 Transformer + 门控交叉注意力 (GCA)</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#666">核心创新：出价独立决策，定价通过门控窗口感知出价后再修正</text>

  <!-- ===== Bidding Stream (Top) ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="105" width="340" height="160" rx="14" fill="url(#bidGrad)" opacity="0.92"/>
  </g>
  <text x="230" y="136" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">🔵 出价流 (Bidding Stream)</text>
  <text x="230" y="160" text-anchor="middle" font-size="13" fill="#D4E4F7">因果 Transformer</text>

  <!-- Input tokens -->
  <rect x="85" y="178" width="70" height="32" rx="6" fill="#fff" opacity="0.25"/>
  <text x="120" y="199" text-anchor="middle" font-size="11" fill="#fff">s_t</text>
  <rect x="165" y="178" width="70" height="32" rx="6" fill="#fff" opacity="0.25"/>
  <text x="200" y="199" text-anchor="middle" font-size="11" fill="#fff">R^b_t</text>
  <rect x="245" y="178" width="70" height="32" rx="6" fill="#fff" opacity="0.25"/>
  <text x="280" y="199" text-anchor="middle" font-size="11" fill="#fff">a^b_t</text>

  <!-- Output -->
  <rect x="140" y="225" width="180" height="28" rx="8" fill="#fff" opacity="0.3"/>
  <text x="230" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">→ 出价动作</text>

  <!-- ===== Pricing Stream (Bottom) ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="340" width="340" height="160" rx="14" fill="url(#priceGrad)" opacity="0.92"/>
  </g>
  <text x="230" y="371" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">🟠 定价流 (Pricing Stream)</text>
  <text x="230" y="395" text-anchor="middle" font-size="13" fill="#FDDCBF">因果 Transformer + GCA</text>

  <!-- Output -->
  <rect x="140" y="455" width="180" height="28" rx="8" fill="#fff" opacity="0.3"/>
  <text x="230" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">→ 定价修正</text>

  <!-- ===== GCA Module (Right Center) ===== -->
  <g filter="url(#shadow)">
    <rect x="510" y="195" width="330" height="210" rx="16" fill="url(#gcaGrad)" opacity="0.93"/>
  </g>
  <text x="675" y="228" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">⚙️ 门控交叉注意力 (GCA)</text>

  <!-- Step 1: Sigmoid gate -->
  <rect x="535" y="248" width="280" height="38" rx="8" fill="#fff" opacity="0.18"/>
  <text x="675" y="263" text-anchor="middle" font-size="12" fill="#E8D4FF">① Sigmoid 门控出价隐状态</text>
  <text x="675" y="279" text-anchor="middle" font-size="11" fill="#C9ABEF">选择性提取有用的出价信息</text>

  <!-- Step 2: Concat + Cross Attn -->
  <rect x="535" y="296" width="280" height="38" rx="8" fill="#fff" opacity="0.18"/>
  <text x="675" y="311" text-anchor="middle" font-size="12" fill="#E8D4FF">② 拼接为 Query → 交叉注意力</text>
  <text x="675" y="327" text-anchor="middle" font-size="11" fill="#C9ABEF">定价隐状态作 Key &amp; Value</text>

  <!-- Step 3: Residual -->
  <rect x="535" y="344" width="280" height="38" rx="8" fill="#fff" opacity="0.18"/>
  <text x="675" y="359" text-anchor="middle" font-size="12" fill="#E8D4FF">③ 残差回定价流 → 输出修正</text>
  <text x="675" y="375" text-anchor="middle" font-size="11" fill="#C9ABEF">出价不受定价干扰 ✓</text>

  <!-- ===== Arrows ===== -->
  <!-- Bidding → GCA (hidden states) -->
  <path d="M 400 200 C 440 200, 470 260, 510 270" fill="none" stroke="#4A90D9" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="448" y="220" font-size="11" fill="#2C5F9E" font-weight="bold" transform="rotate(-20, 448, 220)">隐状态</text>

  <!-- GCA → Pricing (enriched context) -->
  <path d="M 510 370 C 470 390, 440 410, 400 420" fill="none" stroke="#E8833A" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="438" y="412" font-size="11" fill="#C25A12" font-weight="bold">增强上下文</text>

  <!-- Pricing → GCA (pricing hidden) -->
  <path d="M 400 380 C 440 370, 470 340, 510 320" fill="none" stroke="#7B2FBE" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="445" y="358" font-size="10" fill="#7B2FBE">定价隐状态</text>

  <!-- One-way causal arrow between streams -->
  <line x1="230" y1="265" x2="230" y2="340" stroke="#555" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="244" y="308" font-size="12" fill="#555" font-weight="bold">单向因果</text>

  <!-- ===== Cross-out symbol on reverse direction ===== -->
  <line x1="212" y1="340" x2="196" y2="295" stroke="#D44" stroke-width="2.5"/>
  <line x1="196" y1="340" x2="212" y2="295" stroke="#D44" stroke-width="2.5"/>
  <text x="176" y="325" font-size="10" fill="#D44" font-weight="bold">✗ 反向</text>

  <!-- ===== Bottom Legend / Key Insight ===== -->
  <rect x="120" y="525" width="660" height="40" rx="10" fill="#2C2C2C" opacity="0.07"/>
  <text x="450" y="550" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">💡 出价专注价值最大化，定价通过 GCA 门控感知出价后做 KPI 补偿修正</text>
</svg>