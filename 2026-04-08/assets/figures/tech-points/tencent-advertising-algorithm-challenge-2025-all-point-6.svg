<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#10b981"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">统一生成检索与排序：一个模型同时完成两件事</text>
  <text x="450" y="65" text-anchor="middle" fill="#64748b" font-size="13">Unified Generative Retrieval &amp; Ranking with Single Decoder-Only Model</text>

  <!-- ===== LEFT: User Sequence Input ===== -->
  <rect x="30" y="110" width="160" height="200" rx="14" fill="url(#gBlue)" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="140" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">用户行为序列</text>
  <!-- items -->
  <rect x="50" y="158" width="120" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="178" text-anchor="middle" fill="#bfdbfe" font-size="12">广告A · 点击</text>
  <rect x="50" y="196" width="120" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="216" text-anchor="middle" fill="#bfdbfe" font-size="12">广告B · 曝光</text>
  <rect x="50" y="234" width="120" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="254" text-anchor="middle" fill="#bfdbfe" font-size="12">广告C · 转化</text>
  <text x="110" y="290" text-anchor="middle" fill="#64748b" font-size="11">ID + 文本 + 视觉</text>

  <!-- Arrow: Input → Model -->
  <line x1="195" y1="210" x2="268" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== CENTER: Unified Decoder Model ===== -->
  <rect x="275" y="95" width="310" height="235" rx="16" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" opacity="0.9"/>
  <text x="430" y="125" text-anchor="middle" fill="#c4b5fd" font-size="17" font-weight="bold">统一 Decoder-Only 模型</text>

  <!-- MoE badge -->
  <rect x="295" y="140" width="130" height="32" rx="8" fill="url(#gPurple)" opacity="0.25" stroke="#a78bfa" stroke-width="1"/>
  <text x="360" y="161" text-anchor="middle" fill="#c4b5fd" font-size="12">MoE 混合专家层</text>

  <!-- Attention badge -->
  <rect x="440" y="140" width="128" height="32" rx="8" fill="url(#gPurple)" opacity="0.25" stroke="#a78bfa" stroke-width="1"/>
  <text x="504" y="161" text-anchor="middle" fill="#c4b5fd" font-size="12">FlashAttn + RoPE</text>

  <!-- Auto-regressive tokens -->
  <text x="430" y="200" text-anchor="middle" fill="#94a3b8" font-size="12">自回归逐步生成 ↓</text>

  <!-- Token 1 -->
  <rect x="295" y="215" width="80" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="335" y="234" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Token 1</text>
  <text x="335" y="250" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">码=23</text>

  <!-- Arrow T1→T2 -->
  <line x1="380" y1="237" x2="400" y2="237" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Token 2 -->
  <rect x="405" y="215" width="80" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="445" y="234" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Token 2</text>
  <text x="445" y="250" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">码=7</text>

  <!-- Arrow T2→T3 -->
  <line x1="490" y1="237" x2="510" y2="237" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Token 3 (behavior) -->
  <rect x="515" y="215" width="55" height="44" rx="8" fill="#1a332e" stroke="#10b981" stroke-width="1.5"/>
  <text x="542" y="234" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">Token 3</text>
  <text x="542" y="250" text-anchor="middle" fill="#34d399" font-size="11">行为</text>

  <!-- Label: semantic ID -->
  <text x="370" y="280" text-anchor="middle" fill="#60a5fa" font-size="11">语义ID生成</text>
  <line x1="295" y1="270" x2="485" y2="270" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Label: behavior -->
  <text x="542" y="280" text-anchor="middle" fill="#34d399" font-size="11">行为预测</text>

  <!-- ===== RIGHT TOP: Retrieval Output ===== -->
  <line x1="430" y1="335" x2="430" y2="370" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Combined output -->
  <rect x="275" y="378" width="310" height="75" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="403" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">检索结果</text>
  <text x="340" y="423" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">(23, 7) → 广告D</text>
  <text x="340" y="443" text-anchor="middle" fill="#92400e" font-size="11">语义ID唯一映射</text>

  <text x="512" y="403" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">排序分数</text>
  <text x="512" y="423" text-anchor="middle" fill="#34d399" font-size="15">点击 0.8</text>
  <text x="512" y="443" text-anchor="middle" fill="#34d399" font-size="15">转化 0.3</text>

  <!-- Divider line in output box -->
  <line x1="430" y1="388" x2="430" y2="448" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== BOTTOM: Collision Resolution ===== -->
  <rect x="50" y="490" width="380" height="105" rx="14" fill="#27172f" stroke="#ec4899" stroke-width="1.5"/>
  <text x="240" y="518" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="bold">碰撞消解机制</text>

  <!-- Before -->
  <rect x="70" y="532" width="140" height="46" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
  <text x="140" y="551" text-anchor="middle" fill="#fca5a5" font-size="12">广告A → (5,3)</text>
  <text x="140" y="569" text-anchor="middle" fill="#fca5a5" font-size="12">广告B → (5,3) ✗</text>

  <!-- Arrow -->
  <line x1="218" y1="555" x2="258" y2="555" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="238" y="548" text-anchor="middle" fill="#f472b6" font-size="10">重分配</text>

  <!-- After -->
  <rect x="265" y="532" width="145" height="46" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
  <text x="337" y="551" text-anchor="middle" fill="#6ee7b7" font-size="12">广告A → (5,3) ✓</text>
  <text x="337" y="569" text-anchor="middle" fill="#6ee7b7" font-size="12">广告B → (5,4) ✓</text>

  <!-- ===== BOTTOM RIGHT: Key insight ===== -->
  <rect x="470" y="490" width="400" height="105" rx="14" fill="#172234" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="670" y="520" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">💡 核心创新</text>
  <text x="670" y="546" text-anchor="middle" fill="#cbd5e1" font-size="13">传统：检索模型 → 精排模型（两阶段）</text>
  <line x1="520" y1="556" x2="820" y2="556" stroke="#475569" stroke-width="0.8"/>
  <text x="670" y="578" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">本方案：一个模型生成ID + 预测行为</text>

  <!-- Decorative connection from collision box to model -->
  <path d="M240,490 Q240,460 320,378" fill="none" stroke="#ec4899" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
</svg>