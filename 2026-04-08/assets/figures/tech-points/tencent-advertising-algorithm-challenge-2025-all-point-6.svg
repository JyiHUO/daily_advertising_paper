<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f4e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f59e0b"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">统一生成：一个模型同时完成检索 + 排序</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Unified Decoder-Only Model for Retrieval &amp; Ranking</text>

  <!-- LEFT SIDE: Traditional (crossed out) -->
  <rect x="30" y="90" width="200" height="200" rx="12" fill="#1e2248" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="130" y="115" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">传统方案 ✗</text>
  <rect x="55" y="130" width="150" height="40" rx="8" fill="#312e81" opacity="0.6"/>
  <text x="130" y="155" text-anchor="middle" fill="#a5b4fc" font-size="13">检索模型</text>
  <line x1="130" y1="170" x2="130" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="55" y="200" width="150" height="40" rx="8" fill="#312e81" opacity="0.6"/>
  <text x="130" y="225" text-anchor="middle" fill="#a5b4fc" font-size="13">排序模型</text>
  <!-- Cross out -->
  <line x1="40" y1="100" x2="220" y2="280" stroke="#ef4444" stroke-width="3" opacity="0.5"/>
  <line x1="220" y1="100" x2="40" y2="280" stroke="#ef4444" stroke-width="3" opacity="0.5"/>

  <!-- VS -->
  <text x="270" y="200" text-anchor="middle" fill="#f59e0b" font-size="28" font-weight="bold">→</text>

  <!-- RIGHT: MAIN UNIFIED MODEL -->
  <!-- User Sequence Input -->
  <rect x="310" y="90" width="560" height="60" rx="12" fill="#1e2248" stroke="url(#g1)" stroke-width="2"/>
  <text x="590" y="118" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="bold">📱 用户行为序列输入</text>
  <text x="590" y="138" text-anchor="middle" fill="#818cf8" font-size="11">广告1 → 广告2 → 广告3 → … → ?</text>

  <!-- Arrow down -->
  <line x1="590" y1="152" x2="590" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decoder Model Block -->
  <rect x="370" y="185" width="440" height="90" rx="16" fill="#1a1540" stroke="url(#g1)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="590" y="215" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="bold">🤖 Decoder-Only 统一模型</text>
  <text x="590" y="238" text-anchor="middle" fill="#a5b4fc" font-size="11">FlashAttention · SwiGLU · RoPE · MoE专家层</text>
  <text x="590" y="258" text-anchor="middle" fill="#818cf8" font-size="10">不同专家处理不同广告类型</text>

  <!-- Two output branches -->
  <!-- Left branch: Semantic ID Generation -->
  <line x1="510" y1="275" x2="430" y2="320" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <!-- Right branch: Behavior Prediction -->
  <line x1="670" y1="275" x2="740" y2="320" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowO)"/>

  <!-- Semantic ID Generation Box -->
  <rect x="310" y="325" width="280" height="130" rx="14" fill="#0d2818" stroke="url(#g3)" stroke-width="2"/>
  <text x="450" y="352" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">🎯 语义ID生成（检索）</text>

  <!-- Token sequence visualization -->
  <rect x="340" y="368" width="70" height="36" rx="8" fill="#065f46"/>
  <text x="375" y="382" text-anchor="middle" fill="#a7f3d0" font-size="11" font-weight="bold">Token 1</text>
  <text x="375" y="396" text-anchor="middle" fill="#6ee7b7" font-size="10">码=23</text>

  <text x="418" y="390" fill="#6ee7b7" font-size="16">→</text>

  <rect x="435" y="368" width="70" height="36" rx="8" fill="#065f46"/>
  <text x="470" y="382" text-anchor="middle" fill="#a7f3d0" font-size="11" font-weight="bold">Token 2</text>
  <text x="470" y="396" text-anchor="middle" fill="#6ee7b7" font-size="10">码=7</text>

  <text x="450" y="440" text-anchor="middle" fill="#34d399" font-size="12">→ 物品 (23, 7)</text>

  <!-- Collision resolution callout -->
  <rect x="320" y="462" width="260" height="50" rx="10" fill="#1a0d2e" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="480" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="bold">💡 碰撞消解</text>
  <text x="450" y="498" text-anchor="middle" fill="#a78bfa" font-size="10">A,B→(5,3)? 自动把B→(5,4)</text>

  <!-- Behavior Prediction Box -->
  <rect x="620" y="325" width="240" height="130" rx="14" fill="#2a1a08" stroke="url(#g2)" stroke-width="2"/>
  <text x="740" y="352" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="bold">📊 行为预测（排序）</text>

  <rect x="650" y="370" width="180" height="28" rx="6" fill="#78350f"/>
  <text x="740" y="390" text-anchor="middle" fill="#fde68a" font-size="12">点击概率: 0.8 ✓</text>

  <rect x="650" y="406" width="180" height="28" rx="6" fill="#78350f"/>
  <text x="740" y="426" text-anchor="middle" fill="#fde68a" font-size="12">转化概率: 0.3</text>

  <!-- Bottom: Unified output -->
  <line x1="450" y1="515" x2="550" y2="555" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="457" x2="650" y2="555" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="555" width="200" height="48" rx="12" fill="url(#g4)" opacity="0.9" filter="url(#glow)"/>
  <text x="610" y="576" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🏆 推荐结果</text>
  <text x="610" y="594" text-anchor="middle" fill="#fce7f3" font-size="11">物品(23,7) · 按行为分排序</text>

  <!-- Key insight label -->
  <rect x="30" y="545" width="260" height="55" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="568" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">核心创新</text>
  <text x="160" y="588" text-anchor="middle" fill="#a5b4fc" font-size="11">一次生成 = 找到谁 + 排多高</text>
</svg>