<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d44"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2a9d4e"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4fa"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a202c">JD-BP：出价与定价修正解耦</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#666">核心洞察：出价专注价值，定价修正弥补亏损</text>

  <!-- ====== LEFT: Traditional ====== -->
  <text x="225" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#c0392b">❌ 传统方法</text>

  <!-- Historical Loss -->
  <rect x="60" y="125" width="330" height="55" rx="10" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="225" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">历史亏损 bal = 100元</text>
  <text x="225" y="167" text-anchor="middle" font-size="12" fill="#888">（预估偏差 / 转化延迟导致ROI不达标）</text>

  <!-- Arrow down -->
  <line x1="225" y1="180" x2="225" y2="210" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Bid box traditional -->
  <rect x="85" y="215" width="280" height="70" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="225" y="243" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">出价被迫压低</text>
  <text x="225" y="265" text-anchor="middle" font-size="13" fill="#777">同时承担「争取价值」+「补偿亏损」</text>

  <!-- Arrow down -->
  <line x1="225" y1="285" x2="225" y2="315" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Result traditional -->
  <rect x="95" y="320" width="260" height="55" rx="10" fill="#fce4e4" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="225" y="344" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">🚫 错失高价值流量</text>
  <text x="225" y="362" text-anchor="middle" font-size="12" fill="#999">整体效率下降</text>

  <!-- ====== Divider ====== -->
  <line x1="450" y1="95" x2="450" y2="400" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="415" text-anchor="middle" font-size="13" fill="#aaa">VS</text>

  <!-- ====== RIGHT: JD-BP ====== -->
  <text x="675" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#2a9d4e">✅ JD-BP 方法</text>

  <!-- Historical Loss right -->
  <rect x="510" y="125" width="330" height="55" rx="10" fill="#e8f5e9" stroke="#2a9d4e" stroke-width="1.5"/>
  <text x="675" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a9d4e">历史亏损 bal = 100元</text>
  <text x="675" y="167" text-anchor="middle" font-size="12" fill="#888">同样的亏损，不同的处理方式</text>

  <!-- Two branches -->
  <!-- Left branch: Bidding -->
  <line x1="610" y1="180" x2="580" y2="218" stroke="#2a9d4e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- Right branch: Pricing -->
  <line x1="740" y1="180" x2="770" y2="218" stroke="#2a9d4e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Bid box - JD-BP -->
  <rect x="510" y="222" width="160" height="80" rx="12" fill="#fff" stroke="#2980b9" stroke-width="2.5"/>
  <text x="590" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">🎯 出价</text>
  <text x="590" y="270" text-anchor="middle" font-size="12" fill="#555">专注价值最大化</text>
  <text x="590" y="288" text-anchor="middle" font-size="11" fill="#888">预算放宽至 B+bal</text>

  <!-- Pricing correction box -->
  <rect x="690" y="222" width="160" height="80" rx="12" fill="#fff" stroke="#e67e22" stroke-width="2.5"/>
  <text x="770" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">💰 定价修正</text>
  <text x="770" y="270" text-anchor="middle" font-size="12" fill="#555">每次结算扣回</text>
  <text x="770" y="288" text-anchor="middle" font-size="11" fill="#e67e22">y_t = -100/50 = -2元</text>

  <!-- Merge arrows -->
  <line x1="590" y1="302" x2="640" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="302" x2="710" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result JD-BP -->
  <rect x="560" y="335" width="230" height="55" rx="10" fill="#d5f5e3" stroke="#2a9d4e" stroke-width="2"/>
  <text x="675" y="358" text-anchor="middle" font-size="14" fill="#2a9d4e" font-weight="bold">✅ 不错过高价值流量</text>
  <text x="675" y="376" text-anchor="middle" font-size="12" fill="#555">亏损被均摊补平</text>

  <!-- ====== Bottom: Formula / Key Insight ====== -->
  <rect x="100" y="440" width="700" height="110" rx="14" fill="#fff" stroke="#4a6fa5" stroke-width="2"/>

  <!-- Formula -->
  <text x="450" y="472" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a202c">最终支付 p_t = c_t + y_t</text>
  <text x="450" y="498" text-anchor="middle" font-size="13" fill="#666">
    <tspan>c_t = 原始出价成本　　y_t = 定价修正项　　</tspan>
  </text>
  <text x="450" y="520" text-anchor="middle" font-size="13" fill="#4a6fa5" font-weight="bold">约束：Σ y_t = -bal（修正总额恰好弥补历史亏损）</text>
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#999">最优出价公式不变，仅预算上界从 B 放宽到 B + bal</text>

  <!-- Decorative icons -->
  <circle cx="130" y="472" r="18" fill="#eef2ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="130" y="478" text-anchor="middle" font-size="18">📐</text>

  <circle cx="770" y="472" r="18" fill="#eef2ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="770" y="478" text-anchor="middle" font-size="18">🔑</text>
</svg>