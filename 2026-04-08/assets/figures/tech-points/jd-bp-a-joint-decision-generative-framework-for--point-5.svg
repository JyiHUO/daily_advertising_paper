<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#e8edf2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">即插即用轨迹增强：冷启动数据生成</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">JD-BP: 无需定价修正历史数据，自动生成DPO训练样本</text>

  <!-- ===== Left: Baseline Model ===== -->
  <rect x="40" y="90" width="160" height="70" rx="14" fill="#5c6bc0" opacity="0.9"/>
  <text x="120" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">基线出价模型</text>
  <text x="120" y="145" text-anchor="middle" font-size="12" fill="#e8eaf6">任意已有策略</text>

  <!-- Arrow from baseline down to fork -->
  <line x1="120" y1="160" x2="120" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fork point -->
  <circle cx="120" cy="210" r="12" fill="#fff" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="120" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#5c6bc0">⑂</text>

  <!-- ===== Two Trajectories ===== -->
  <!-- Upper path: with PID correction -->
  <line x1="132" y1="205" x2="260" y2="165" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <!-- Lower path: no correction -->
  <line x1="132" y1="218" x2="260" y2="340" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- ===== Trajectory A: WITH correction ===== -->
  <rect x="265" y="110" width="320" height="120" rx="16" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="425" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">✅ 轨迹 A：有定价修正</text>

  <!-- PID block inside -->
  <rect x="285" y="152" width="110" height="50" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="340" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">PID控制器</text>
  <text x="340" y="192" text-anchor="middle" font-size="11" fill="#555">CPA → TCPA</text>

  <!-- Arrow inside -->
  <line x1="395" y1="177" x2="430" y2="177" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Correction value -->
  <rect x="435" y="155" width="130" height="46" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="500" y="175" text-anchor="middle" font-size="13" fill="#333">bid=3.0, <tspan font-weight="bold" fill="#2e7d32">y=-0.5</tspan></text>
  <text x="500" y="192" text-anchor="middle" font-size="11" fill="#888">修正后状态→下一步</text>

  <!-- ===== Trajectory B: WITHOUT correction ===== -->
  <rect x="265" y="290" width="320" height="110" rx="16" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="425" y="318" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">❌ 轨迹 B：无定价修正</text>

  <rect x="310" y="335" width="230" height="46" rx="10" fill="#fff" stroke="#c62828" stroke-width="1.5"/>
  <text x="425" y="355" text-anchor="middle" font-size="13" fill="#333">bid=2.8, <tspan font-weight="bold" fill="#c62828">y=0</tspan></text>
  <text x="425" y="372" text-anchor="middle" font-size="11" fill="#888">成本偏高 → 隐含保守</text>

  <!-- ===== Comparison / Advantage block ===== -->
  <!-- Arrows from both trajectories to comparison -->
  <line x1="585" y1="185" x2="650" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="585" y1="350" x2="650" y2="290" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="650" y="235" width="210" height="100" rx="18" fill="#fff3e0" stroke="#ef6c00" stroke-width="2.5"/>
  <text x="755" y="262" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">⚖️ 优势值计算</text>
  <text x="755" y="286" text-anchor="middle" font-size="14" fill="#333">A = R<tspan baseline-shift="sub" font-size="10">有修正</tspan> − R<tspan baseline-shift="sub" font-size="10">无修正</tspan></text>
  <text x="755" y="310" text-anchor="middle" font-size="13" fill="#555">A &gt; 0 → 正样本</text>
  <text x="755" y="328" text-anchor="middle" font-size="13" fill="#555">A ≤ 0 → 负样本</text>

  <!-- Arrow to DPO -->
  <line x1="755" y1="335" x2="755" y2="395" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- DPO Training block -->
  <rect x="635" y="400" width="240" height="70" rx="16" fill="#7e57c2" opacity="0.92"/>
  <text x="755" y="433" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">DPO 微调训练</text>
  <text x="755" y="455" text-anchor="middle" font-size="12" fill="#ede7f6">正/负样本对 → 偏好学习</text>

  <!-- ===== Key insight callout ===== -->
  <rect x="40" y="440" width="540" height="90" rx="14" fill="#fff" stroke="#5c6bc0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="468" font-size="14" font-weight="bold" fill="#1a237e">💡 核心思路</text>
  <text x="60" y="492" font-size="13" fill="#333">无历史数据？用已有出价模型 + PID控制器 自动生成两条对照轨迹</text>
  <text x="60" y="514" font-size="13" fill="#333">通过"有修正 vs 无修正"的回报差异，自动标注正负样本，即插即用！</text>

  <!-- Small labels -->
  <text x="170" y="180" font-size="11" fill="#5c6bc0" font-weight="bold">分叉</text>
</svg>