<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">JD-BP: 无记忆 RTG 设计</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#7f8c8d">出价只看未来，定价负责善后</text>

  <!-- ===== LEFT SIDE: Traditional (Problem) ===== -->
  <rect x="30" y="95" width="400" height="500" rx="14" fill="#fff5f5" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="230" y="124" text-anchor="middle" font-size="17" font-weight="bold" fill="#c0392b">❌ 传统 RTG（带历史记忆）</text>

  <!-- Timeline bar -->
  <rect x="60" y="150" width="340" height="36" rx="6" fill="#fde8e8"/>
  <rect x="60" y="150" width="170" height="36" rx="6" fill="#e74c3c" opacity="0.3"/>
  <text x="145" y="173" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">历史 t=0→50</text>
  <text x="315" y="173" text-anchor="middle" font-size="13" fill="#888">未来 t=50→T</text>
  <line x1="230" y1="150" x2="230" y2="186" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="232" y="199" font-size="11" fill="#c0392b">当前 t=50</text>

  <!-- Historical ROI bad signal -->
  <rect x="65" y="218" width="155" height="60" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="142" y="241" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">历史 ROI = 6</text>
  <text x="142" y="259" text-anchor="middle" font-size="12" fill="#e74c3c">目标 ROI = 10 💀</text>

  <!-- Arrow into single RTG -->
  <line x1="220" y1="248" x2="260" y2="310" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="340" y1="248" x2="310" y2="310" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Future value -->
  <rect x="240" y="218" width="150" height="60" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="315" y="241" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">未来价值高 ✨</text>
  <text x="315" y="259" text-anchor="middle" font-size="12" fill="#555">优质流量</text>

  <!-- Combined RTG -->
  <rect x="220" y="316" width="140" height="48" rx="10" fill="#e74c3c" opacity="0.85"/>
  <text x="290" y="337" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">RTG 混合</text>
  <text x="290" y="354" text-anchor="middle" font-size="12" fill="#ffe0e0">历史+未来 → 很低</text>

  <!-- Arrow down to bid -->
  <line x1="290" y1="364" x2="290" y2="398" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Bid result -->
  <rect x="190" y="402" width="200" height="55" rx="12" fill="#c0392b"/>
  <text x="290" y="425" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">出价大幅压低 📉</text>
  <text x="290" y="445" text-anchor="middle" font-size="12" fill="#ffcccc">优质流量白白浪费</text>

  <!-- Sad result -->
  <rect x="100" y="490" width="260" height="46" rx="10" fill="#fdf2f2" stroke="#e74c3c" stroke-width="1"/>
  <text x="230" y="519" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">💸 效率下降，价值损失</text>

  <!-- ===== RIGHT SIDE: JD-BP (Solution) ===== -->
  <rect x="470" y="95" width="400" height="500" rx="14" fill="#f0faf5" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="670" y="124" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e8449">✅ JD-BP 双 RTG（解耦设计）</text>

  <!-- Two parallel streams -->
  <!-- Bidding stream -->
  <rect x="490" y="148" width="165" height="155" rx="12" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="572" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">出价流 RTG</text>
  
  <!-- Memory-less icon -->
  <rect x="510" y="182" width="125" height="34" rx="8" fill="#27ae60" opacity="0.15"/>
  <text x="572" y="204" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">🧠 无记忆</text>
  
  <text x="572" y="234" text-anchor="middle" font-size="11" fill="#555">只看 t→T 未来</text>
  <text x="572" y="252" text-anchor="middle" font-size="11" fill="#555">价值 × 约束满足度</text>
  <text x="572" y="274" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">历史违约？不知道！</text>
  <line x1="508" y1="266" x2="636" y2="266" stroke="#27ae60" stroke-width="0.5" opacity="0.3"/>

  <!-- Pricing stream -->
  <rect x="680" y="148" width="170" height="155" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="765" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#d68910">定价流 RTG</text>

  <rect x="700" y="182" width="130" height="34" rx="8" fill="#f39c12" opacity="0.15"/>
  <text x="765" y="204" text-anchor="middle" font-size="13" fill="#d68910" font-weight="bold">📋 全局记忆</text>

  <text x="765" y="234" text-anchor="middle" font-size="11" fill="#555">含历史+未来</text>
  <text x="765" y="252" text-anchor="middle" font-size="11" fill="#555">修正后成本比率</text>
  <text x="765" y="274" text-anchor="middle" font-size="11" fill="#d68910" font-weight="bold">知道还差多少</text>

  <!-- Arrows down from streams -->
  <line x1="572" y1="303" x2="572" y2="340" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="765" y1="303" x2="765" y2="340" stroke="#f39c12" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Bid action -->
  <rect x="500" y="345" width="145" height="52" rx="12" fill="#27ae60"/>
  <text x="572" y="368" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">积极出价 📈</text>
  <text x="572" y="386" text-anchor="middle" font-size="11" fill="#d5f5e3">抢高价值流量</text>

  <!-- Price correction action -->
  <rect x="693" y="345" width="145" height="52" rx="12" fill="#f39c12"/>
  <text x="765" y="368" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">定价修正 🔧</text>
  <text x="765" y="386" text-anchor="middle" font-size="11" fill="#fef9e7">补回历史缺口</text>

  <!-- Merge arrows -->
  <line x1="572" y1="397" x2="630" y2="440" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="765" y1="397" x2="710" y2="440" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Combined result -->
  <rect x="580" y="440" width="180" height="55" rx="14" fill="#1e8449"/>
  <text x="670" y="464" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">协同决策 🤝</text>
  <text x="670" y="484" text-anchor="middle" font-size="12" fill="#d5f5e3">价值↑ 且 KPI达标</text>

  <!-- Happy result -->
  <rect x="540" y="520" width="260" height="46" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="670" y="549" text-anchor="middle" font-size="14" fill="#1e8449" font-weight="bold">🚀 收入+4.7%  达成率+6.5%</text>

  <!-- Central VS divider -->
  <circle cx="450" cy="370" r="22" fill="#2c3e50"/>
  <text x="450" y="376" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">VS</text>

  <!-- Key insight at bottom -->
  <rect x="150" y="575" width="600" height="34" rx="10" fill="#2c3e50" opacity="0.9"/>
  <text x="450" y="597" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">核心：出价专注争取价值（失忆），定价专注修复违约（记忆）</text>
</svg>