<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2B7CE9"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2fa"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Baseline: 因果 Transformer + InfoNCE 对比学习</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#888">单层 · 32维 · 轻量起点</text>

  <!-- ============ LEFT: Encoding Pipeline ============ -->

  <!-- Module 1: User History Tokens -->
  <rect x="40" y="100" width="200" height="80" rx="14" fill="#fff" stroke="#2B7CE9" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#2B7CE9">用户历史序列</text>
  <text x="140" y="152" text-anchor="middle" font-size="12" fill="#555">50个交互 Token</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#999">稀疏ID + 文本emb + 图像emb</text>

  <!-- Small token boxes -->
  <g transform="translate(60, 108)">
    <rect x="0" y="0" width="18" height="12" rx="3" fill="#2B7CE9" opacity="0.2"/>
    <rect x="22" y="0" width="18" height="12" rx="3" fill="#2B7CE9" opacity="0.3"/>
    <rect x="44" y="0" width="18" height="12" rx="3" fill="#2B7CE9" opacity="0.4"/>
    <text x="70" y="10" font-size="10" fill="#2B7CE9">...</text>
  </g>

  <!-- Arrow down -->
  <line x1="140" y1="180" x2="140" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="178" y="203" font-size="11" fill="#e67e22" font-weight="bold">MLP → 32维</text>

  <!-- Module 2: Causal Transformer -->
  <rect x="40" y="220" width="200" height="90" rx="14" fill="#2B7CE9" filter="url(#shadow)"/>
  <text x="140" y="253" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">因果 Transformer</text>
  <text x="140" y="275" text-anchor="middle" font-size="12" fill="#d4e6ff">1层 · 1头 · dim=32</text>
  <text x="140" y="295" text-anchor="middle" font-size="11" fill="#a8ccf7">+ 可学习位置编码</text>

  <!-- Arrow down -->
  <line x1="140" y1="310" x2="140" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="178" y="335" font-size="11" fill="#888">最后位置</text>

  <!-- Module 3: User Vector -->
  <rect x="70" y="350" width="140" height="55" rx="28" fill="#27ae60" filter="url(#shadow)"/>
  <text x="140" y="375" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">用户向量</text>
  <text x="140" y="394" text-anchor="middle" font-size="11" fill="#d5f5e3">32维</text>

  <!-- ============ RIGHT: Candidate Ad ============ -->
  <rect x="600" y="140" width="200" height="70" rx="14" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#e74c3c">候选广告池</text>
  <text x="700" y="190" text-anchor="middle" font-size="12" fill="#888">66万广告 → 32维向量</text>

  <!-- Positive sample -->
  <rect x="630" y="240" width="140" height="40" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="700" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">✓ 正样本（下一个曝光）</text>

  <!-- Negative sample -->
  <rect x="630" y="295" width="140" height="40" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="700" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">✗ 随机负样本</text>

  <!-- ============ CENTER: InfoNCE Loss ============ -->
  <rect x="340" y="370" width="220" height="80" rx="16" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="450" y="400" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">InfoNCE 损失</text>
  <text x="450" y="420" text-anchor="middle" font-size="12" fill="#e8d5f5">拉近正样本 · 推远负样本</text>
  <text x="450" y="438" text-anchor="middle" font-size="11" fill="#d2b4e8">转化样本 → 更高权重</text>

  <!-- Arrow: user vector → InfoNCE -->
  <path d="M210,377 Q280,377 335,400" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Arrow: positive → InfoNCE -->
  <path d="M630,265 Q540,320 500,370" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

  <!-- Arrow: negative → InfoNCE -->
  <path d="M630,320 Q560,355 510,375" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

  <!-- Inner product annotation -->
  <text x="400" y="350" text-anchor="middle" font-size="12" fill="#8e44ad" font-weight="bold">⟨u, ad⟩ 内积打分</text>

  <!-- ============ BOTTOM: Inference ============ -->
  <rect x="300" y="480" width="300" height="55" rx="14" fill="#fff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="505" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">推理：Faiss ANN → Top-K</text>
  <text x="450" y="524" text-anchor="middle" font-size="12" fill="#888">用户向量查询候选索引，返回Top-10</text>

  <!-- Arrow: InfoNCE → Inference -->
  <line x1="450" y1="450" x2="450" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decorative: dim=32 badge -->
  <rect x="740" y="480" width="100" height="36" rx="18" fill="#2B7CE9" opacity="0.12"/>
  <text x="790" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B7CE9">dim = 32</text>

</svg>