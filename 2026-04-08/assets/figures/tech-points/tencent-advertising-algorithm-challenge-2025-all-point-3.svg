<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#E8ECF8"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="18" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">Baseline: Causal Transformer + InfoNCE</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">单层轻量模型 → 用户向量 → ANN检索Top-K广告</text>

  <!-- ===== MODULE 1: Token Embedding ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="230" height="180" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  </g>
  <text x="145" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#C2410C">① Token Embedding</text>

  <!-- Small sub-blocks inside -->
  <rect x="50" y="145" width="85" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.2"/>
  <text x="92" y="168" text-anchor="middle" font-size="11" fill="#9A3412">稀疏ID查表</text>

  <rect x="145" y="145" width="100" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.2"/>
  <text x="195" y="168" text-anchor="middle" font-size="11" fill="#9A3412">多模态Embed</text>

  <!-- Concat arrow -->
  <text x="145" y="202" text-anchor="middle" font-size="12" fill="#EA580C">拼接 → MLP</text>
  <rect x="70" y="215" width="150" height="34" rx="8" fill="#F97316" opacity="0.15" stroke="#F97316" stroke-width="1.5"/>
  <text x="145" y="237" text-anchor="middle" font-size="13" font-weight="bold" fill="#C2410C">32维 token向量</text>
  <text x="145" y="260" text-anchor="middle" font-size="10" fill="#9A3412">×50个历史交互</text>

  <!-- Arrow from Module 1 to Module 2 -->
  <line x1="260" y1="200" x2="310" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== MODULE 2: Causal Transformer ===== -->
  <g filter="url(#shadow)">
    <rect x="315" y="100" width="240" height="180" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  </g>
  <text x="435" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#1D4ED8">② Causal Transformer</text>

  <!-- Transformer visual: stacked block -->
  <rect x="355" y="148" width="160" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="435" y="165" text-anchor="middle" font-size="11" fill="#1E40AF">单层 · 单头注意力</text>
  <text x="435" y="180" text-anchor="middle" font-size="10" fill="#3B82F6">+ 因果Mask + 位置编码</text>

  <!-- Output -->
  <line x1="435" y1="192" x2="435" y2="218" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="365" y="220" width="140" height="38" rx="10" fill="#2563EB" opacity="0.9"/>
  <text x="435" y="244" text-anchor="middle" font-size="14" font-weight="bold" fill="white">用户向量 (32d)</text>
  <text x="435" y="270" text-anchor="middle" font-size="10" fill="#60A5FA">取最后位置隐状态</text>

  <!-- Arrow from Module 2 to Module 3 -->
  <line x1="555" y1="240" x2="610" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== MODULE 3: InfoNCE Training ===== -->
  <g filter="url(#shadow)">
    <rect x="615" y="100" width="250" height="180" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  </g>
  <text x="740" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803D">③ InfoNCE 对比学习</text>

  <!-- Positive -->
  <rect x="640" y="148" width="100" height="32" rx="7" fill="#BBF7D0" stroke="#22C55E" stroke-width="1.5"/>
  <text x="690" y="169" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">正样本 ✓</text>
  <text x="690" y="192" text-anchor="middle" font-size="10" fill="#15803D">下一个真实广告</text>

  <!-- Negative -->
  <rect x="760" y="148" width="90" height="32" rx="7" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="805" y="169" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">负样本 ✗</text>
  <text x="805" y="192" text-anchor="middle" font-size="10" fill="#B91C1C">随机采样广告</text>

  <!-- Score comparison -->
  <text x="740" y="220" text-anchor="middle" font-size="13" fill="#166534">内积得分: 正 ≫ 负</text>

  <!-- Conversion weight note -->
  <rect x="650" y="234" width="180" height="28" rx="6" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="740" y="253" text-anchor="middle" font-size="11" fill="#166534">转化样本 → 更高权重</text>

  <!-- ===== MODULE 4: ANN Retrieval (Bottom) ===== -->
  <g filter="url(#shadow)">
    <rect x="200" y="370" width="500" height="160" rx="16" fill="#FEFCE8" stroke="#CA8A04" stroke-width="2"/>
  </g>
  <text x="450" y="400" text-anchor="middle" font-size="16" font-weight="bold" fill="#A16207">④ 推理: Faiss ANN 检索</text>

  <!-- User vector -->
  <rect x="230" y="420" width="120" height="45" rx="10" fill="#2563EB" opacity="0.85"/>
  <text x="290" y="448" text-anchor="middle" font-size="13" font-weight="bold" fill="white">用户向量</text>

  <!-- Arrow -->
  <line x1="350" y1="442" x2="400" y2="442" stroke="#CA8A04" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="375" y="432" text-anchor="middle" font-size="11" fill="#A16207">查询</text>

  <!-- Index block -->
  <rect x="405" y="415" width="150" height="55" rx="10" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.8"/>
  <text x="480" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#854D0E">66万候选广告</text>
  <text x="480" y="456" text-anchor="middle" font-size="11" fill="#A16207">32维向量索引</text>

  <!-- Arrow to result -->
  <line x1="555" y1="442" x2="605" y2="442" stroke="#CA8A04" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Result -->
  <rect x="610" y="418" width="70" height="48" rx="10" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="2"/>
  <text x="645" y="440" text-anchor="middle" font-size="16" font-weight="bold" fill="#B45309">Top</text>
  <text x="645" y="458" text-anchor="middle" font-size="16" font-weight="bold" fill="#B45309">10</text>

  <!-- Bottom note -->
  <text x="450" y="510" text-anchor="middle" font-size="12" fill="#92400E">轻量起点：单层Transformer · 32维 · 对比学习 → 快速跑通全流程</text>

  <!-- Connection arrow from Transformer to retrieval -->
  <path d="M435,280 L435,320 Q435,340 435,340 L390,370" fill="none" stroke="#555" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="465" y="330" font-size="10" fill="#64748B">训练完成</text>

  <!-- Connection arrow from InfoNCE to retrieval -->
  <path d="M740,280 L740,340 Q740,355 650,370" fill="none" stroke="#555" stroke-width="1.8" stroke-dasharray="6,3"/>

</svg>