<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">🏆 冠军方案核心：行为条件生成 + 语义ID</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">同一广告，不同行为 → 不同表示 | 多模态向量 → 离散语义ID → 自回归生成</text>

  <!-- ============ LEFT SECTION: FiLM Action Conditioning ============ -->
  <!-- Section Label -->
  <text x="250" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563EB">❶ 行为条件机制 (FiLM层)</text>

  <!-- Ad A base box -->
  <rect x="155" y="125" width="190" height="50" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="147" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">广告 A 向量</text>
  <text x="250" y="165" text-anchor="middle" font-size="11" fill="#3B82F6">多模态 embedding</text>

  <!-- Split arrows -->
  <line x1="210" y1="175" x2="130" y2="220" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="290" y1="175" x2="370" y2="220" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Exposure FiLM -->
  <rect x="40" y="220" width="185" height="100" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="132" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">👁 曝光 (行为=0)</text>
  <text x="132" y="270" text-anchor="middle" font-size="12" fill="#78350F">FiLM: γ₀·x + β₀</text>
  <rect x="62" y="282" width="140" height="26" rx="6" fill="#FDE68A" stroke="#B45309" stroke-width="1.5"/>
  <text x="132" y="300" text-anchor="middle" font-size="11" fill="#78350F">弱兴趣隐状态 h₀</text>

  <!-- Click FiLM -->
  <rect x="275" y="220" width="185" height="100" rx="14" fill="#DCFCE7" stroke="#16A34A" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="368" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">👆 点击 (行为=1)</text>
  <text x="368" y="270" text-anchor="middle" font-size="12" fill="#14532D">FiLM: γ₁·x + β₁</text>
  <rect x="298" y="282" width="140" height="26" rx="6" fill="#BBF7D0" stroke="#15803D" stroke-width="1.5"/>
  <text x="368" y="300" text-anchor="middle" font-size="11" fill="#14532D">强兴趣隐状态 h₁</text>

  <!-- Not equal sign between them -->
  <text x="250" y="278" text-anchor="middle" font-size="28" font-weight="bold" fill="#DC2626">≠</text>

  <!-- Key insight callout -->
  <rect x="80" y="340" width="340" height="38" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="250" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">💡 同一广告 × 不同行为 = 不同语义滤镜 → 不同隐状态</text>

  <!-- ============ RIGHT SECTION: Semantic ID ============ -->
  <text x="680" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#EA580C">❷ 语义ID (RQ-KMeans)</text>

  <!-- High-dim embedding -->
  <rect x="590" y="125" width="180" height="48" rx="12" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730A3">高维多模态向量</text>
  <text x="680" y="163" text-anchor="middle" font-size="10" fill="#6366F1">768-dim embedding</text>

  <!-- Arrow down -->
  <line x1="680" y1="173" x2="680" y2="200" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="705" y="192" font-size="10" fill="#EA580C" font-weight="bold">量化</text>

  <!-- Level 1 -->
  <rect x="600" y="205" width="160" height="36" rx="10" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
  <text x="680" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A3412">L1: 簇 12</text>

  <line x1="680" y1="241" x2="680" y2="258" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Level 2 -->
  <rect x="610" y="260" width="140" height="34" rx="10" fill="#FED7AA" stroke="#EA580C" stroke-width="2"/>
  <text x="680" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A3412">L2: 子簇 7</text>

  <line x1="680" y1="294" x2="680" y2="311" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Level 3 -->
  <rect x="620" y="313" width="120" height="34" rx="10" fill="#FDBA74" stroke="#C2410C" stroke-width="2"/>
  <text x="680" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2D12">L3: 子子簇 3</text>

  <!-- Resulting token sequence -->
  <line x1="680" y1="347" x2="680" y2="370" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="598" y="372" width="164" height="40" rx="10" fill="#FFF7ED" stroke="#C2410C" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="680" y="397" text-anchor="middle" font-size="14" font-weight="bold" fill="#7C2D12">(12, 7, 3)</text>
  <text x="810" y="397" font-size="11" fill="#9A3412">← 离散 Token</text>

  <!-- ============ BOTTOM: Autoregressive Generation ============ -->
  <rect x="90" y="420" width="720" height="170" rx="16" fill="white" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="450" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">❸ 自回归生成 → ANN检索</text>

  <!-- Sequence tokens -->
  <g>
    <!-- token 1 -->
    <rect x="130" y="470" width="80" height="50" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="170" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400E">广告B</text>
    <text x="170" y="508" text-anchor="middle" font-size="9" fill="#B45309">曝光</text>

    <!-- token 2 -->
    <rect x="225" y="470" width="80" height="50" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="265" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">广告A</text>
    <text x="265" y="508" text-anchor="middle" font-size="9" fill="#15803D">点击</text>

    <!-- token 3 -->
    <rect x="320" y="470" width="80" height="50" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="360" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#5B21B6">广告C</text>
    <text x="360" y="508" text-anchor="middle" font-size="9" fill="#6D28D9">转化</text>

    <!-- dots -->
    <text x="420" y="500" text-anchor="middle" font-size="18" fill="#94A3B8">···</text>

    <!-- Qwen backbone -->
    <rect x="448" y="468" width="120" height="54" rx="10" fill="#1E293B" stroke="#0F172A" stroke-width="2"/>
    <text x="508" y="492" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Qwen 骨干</text>
    <text x="508" y="509" text-anchor="middle" font-size="10" fill="#94A3B8">自回归解码</text>

    <!-- Arrow to output -->
    <line x1="568" y1="495" x2="600" y2="495" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

    <!-- Output vector -->
    <rect x="605" y="470" width="100" height="50" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="655" y="492" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">用户向量</text>
    <text x="655" y="508" text-anchor="middle" font-size="10" fill="#3B82F6">生成输出</text>

    <!-- Arrow to ANN -->
    <line x1="705" y1="495" x2="730" y2="495" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

    <!-- ANN -->
    <rect x="735" y="473" width="55" height="44" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <text x="762" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">ANN</text>
  </g>

  <!-- Bottom labels -->
  <text x="265" y="545" text-anchor="middle" font-size="11" fill="#64748B">行为条件Token序列</text>
  <text x="508" y="545" text-anchor="middle" font-size="11" fill="#64748B">稠密语言模型</text>
  <text x="700" y="545" text-anchor="middle" font-size="11" fill="#64748B">端到端检索</text>

  <!-- Arrows connecting top sections to bottom -->
  <path d="M 250 378 Q 250 400, 300 430" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <path d="M 680 412 Q 680 425, 550 440" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

  <!-- Divider line -->
  <line x1="510" y1="115" x2="510" y2="405" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Footer -->
  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#94A3B8">Tencent Advertising Algorithm Challenge 2025 — 1st Place Solution</text>
</svg>