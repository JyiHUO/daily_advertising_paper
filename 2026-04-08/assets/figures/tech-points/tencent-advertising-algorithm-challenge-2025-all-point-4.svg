<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <linearGradient id="expose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="click" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="convert" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="rqGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">🏆 冠军方案核心：行为条件生成 + 语义ID</text>
  <text x="450" y="65" text-anchor="middle" fill="#94a3b8" font-size="13">同一广告，不同行为 → 不同表示 | 多模态向量 → 离散语义码</text>

  <!-- ===== LEFT PART: FiLM Action Conditioning ===== -->
  <!-- Section label -->
  <text x="260" y="100" text-anchor="middle" fill="#f472b6" font-size="16" font-weight="bold">核心创新①：FiLM 行为条件机制</text>

  <!-- Ad A box (shared) -->
  <rect x="60" y="130" width="130" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="125" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">广告 A</text>
  <text x="125" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">相同特征向量</text>

  <!-- Arrows from Ad A to two FiLM boxes -->
  <line x1="190" y1="155" x2="240" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="165" x2="240" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FiLM Box 1: Expose -->
  <rect x="245" y="180" width="220" height="90" rx="12" fill="none" stroke="url(#expose)" stroke-width="2" opacity="0.8"/>
  <rect x="245" y="180" width="220" height="90" rx="12" fill="#6366f1" opacity="0.1"/>
  <!-- Action badge -->
  <rect x="255" y="188" width="55" height="22" rx="6" fill="url(#expose)"/>
  <text x="282" y="204" text-anchor="middle" fill="white" font-size="11" font-weight="bold">曝光</text>
  <!-- FiLM formula -->
  <text x="355" y="225" text-anchor="middle" fill="#c7d2fe" font-size="13">FiLM: γ₀·x + β₀</text>
  <text x="355" y="250" text-anchor="middle" fill="#a5b4fc" font-size="11">→ 弱兴趣表示</text>

  <!-- FiLM Box 2: Click -->
  <rect x="245" y="310" width="220" height="90" rx="12" fill="none" stroke="url(#click)" stroke-width="2" opacity="0.8"/>
  <rect x="245" y="310" width="220" height="90" rx="12" fill="#f59e0b" opacity="0.1"/>
  <rect x="255" y="318" width="55" height="22" rx="6" fill="url(#click)"/>
  <text x="282" y="334" text-anchor="middle" fill="#1a1e3a" font-size="11" font-weight="bold">点击</text>
  <text x="355" y="355" text-anchor="middle" fill="#fde68a" font-size="13">FiLM: γ₁·x + β₁</text>
  <text x="355" y="380" text-anchor="middle" fill="#fcd34d" font-size="11">→ 强兴趣表示</text>

  <!-- VS / contrast indicator -->
  <text x="355" y="290" text-anchor="middle" fill="#64748b" font-size="20" font-weight="bold">≠</text>
  <text x="355" y="305" text-anchor="middle" fill="#64748b" font-size="10">不同隐状态</text>

  <!-- Analogy label -->
  <text x="125" y="210" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">同一广告</text>
  <text x="125" y="225" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">不同"滤镜"</text>

  <!-- Small convert badge for completeness -->
  <rect x="245" y="420" width="220" height="45" rx="10" fill="none" stroke="url(#convert)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <rect x="255" y="428" width="55" height="22" rx="6" fill="url(#convert)" opacity="0.7"/>
  <text x="282" y="444" text-anchor="middle" fill="white" font-size="11" font-weight="bold">转化</text>
  <text x="385" y="444" text-anchor="middle" fill="#6ee7b7" font-size="12" opacity="0.7">γ₂·x + β₂ → 最强信号</text>
  <line x1="190" y1="170" x2="240" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- ===== RIGHT PART: RQ-KMeans Semantic ID ===== -->
  <text x="690" y="100" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold">核心创新②：RQ-KMeans 语义ID</text>

  <!-- Multimodal embedding blob -->
  <rect x="590" y="130" width="200" height="55" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="690" y="153" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">多模态 Embedding</text>
  <text x="690" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">文本 + 视觉 + ID (高维)</text>

  <!-- Arrow down -->
  <line x1="690" y1="185" x2="690" y2="210" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RQ Level 1 -->
  <rect x="610" y="215" width="160" height="42" rx="8" fill="url(#rqGrad)" opacity="0.85"/>
  <text x="690" y="240" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Level 1: 簇 12</text>

  <!-- Arrow -->
  <line x1="690" y1="257" x2="690" y2="278" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="272" fill="#94a3b8" font-size="10">残差↓</text>

  <!-- RQ Level 2 -->
  <rect x="610" y="282" width="160" height="42" rx="8" fill="url(#rqGrad)" opacity="0.65"/>
  <text x="690" y="307" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Level 2: 子簇 7</text>

  <!-- Arrow -->
  <line x1="690" y1="324" x2="690" y2="345" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="339" fill="#94a3b8" font-size="10">残差↓</text>

  <!-- RQ Level 3 -->
  <rect x="610" y="349" width="160" height="42" rx="8" fill="url(#rqGrad)" opacity="0.45"/>
  <text x="690" y="374" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Level 3: 子子簇 3</text>

  <!-- Result semantic ID -->
  <line x1="690" y1="391" x2="690" y2="420" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="608" y="425" width="164" height="48" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="690" y="446" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">语义ID: (12, 7, 3)</text>
  <text x="690" y="464" text-anchor="middle" fill="#94a3b8" font-size="10">离散码 → 可自回归生成</text>

  <!-- ===== BOTTOM: Autoregressive generation flow ===== -->
  <rect x="60" y="495" width="780" height="100" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="520" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Qwen 自回归骨干：端到端生成</text>

  <!-- Sequence tokens -->
  <rect x="90" y="535" width="80" height="38" rx="6" fill="url(#expose)" opacity="0.6"/>
  <text x="130" y="558" text-anchor="middle" fill="white" font-size="10">广告A·曝光</text>

  <text x="183" y="558" fill="#94a3b8" font-size="16">→</text>

  <rect x="200" y="535" width="80" height="38" rx="6" fill="url(#click)" opacity="0.6"/>
  <text x="240" y="558" text-anchor="middle" fill="#1a1e3a" font-size="10">广告A·点击</text>

  <text x="293" y="558" fill="#94a3b8" font-size="16">→</text>

  <rect x="310" y="535" width="80" height="38" rx="6" fill="url(#convert)" opacity="0.6"/>
  <text x="350" y="558" text-anchor="middle" fill="white" font-size="10">广告B·转化</text>

  <text x="403" y="558" fill="#94a3b8" font-size="16">→</text>

  <rect x="420" y="535" width="50" height="38" rx="6" fill="#475569" opacity="0.5"/>
  <text x="445" y="558" text-anchor="middle" fill="#cbd5e1" font-size="14">…</text>

  <text x="483" y="558" fill="#94a3b8" font-size="16">→</text>

  <!-- Generated output -->
  <rect x="500" y="530" width="160" height="48" rx="8" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <text x="580" y="552" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">生成: (12, 7, 3)</text>
  <text x="580" y="568" text-anchor="middle" fill="#f472b6" font-size="10">→ ANN 检索广告</text>

  <!-- Arrow to final -->
  <text x="673" y="558" fill="#94a3b8" font-size="16">→</text>

  <rect x="690" y="535" width="130" height="38" rx="8" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
  <text x="755" y="558" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">🎯 推荐结果</text>

</svg>