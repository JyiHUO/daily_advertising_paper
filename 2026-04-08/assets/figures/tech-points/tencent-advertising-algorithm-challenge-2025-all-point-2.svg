<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="clickGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="convGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>
    <linearGradient id="expGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#484f58"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">转化加权评估：命中转化 &gt;&gt; 命中点击</text>
  <text x="400" y="66" text-anchor="middle" fill="#8b949e" font-size="13">Conversion-Weighted Evaluation Protocol</text>

  <!-- Left panel: Weight assignment -->
  <rect x="40" y="90" width="220" height="200" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="150" y="118" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="bold">行为权重分配</text>

  <!-- Exposure bar -->
  <rect x="70" y="138" width="20" height="20" rx="4" fill="url(#expGrad)"/>
  <text x="100" y="153" fill="#8b949e" font-size="13">曝光</text>
  <text x="230" y="153" text-anchor="end" fill="#484f58" font-size="18" font-weight="bold">× 0</text>

  <!-- Click bar -->
  <rect x="70" y="178" width="60" height="20" rx="4" fill="url(#clickGrad)"/>
  <text x="140" y="193" fill="#58a6ff" font-size="13">点击</text>
  <text x="230" y="193" text-anchor="end" fill="#58a6ff" font-size="18" font-weight="bold">× 1</text>

  <!-- Conversion bar -->
  <rect x="70" y="218" width="150" height="24" rx="4" fill="url(#convGrad)" filter="url(#glow)"/>
  <text x="140" y="236" fill="#fff" font-size="13" font-weight="bold">转化</text>
  <text x="230" y="236" text-anchor="end" fill="#f0883e" font-size="18" font-weight="bold">× 2.5</text>

  <text x="150" y="276" text-anchor="middle" fill="#8b949e" font-size="11">转化价值 = 2.5 × 点击价值</text>

  <!-- Arrow from left to right -->
  <path d="M 270 190 L 310 190" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- Right panel: Comparison example -->
  <rect x="320" y="90" width="440" height="200" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="118" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="bold">对比：命中不同广告的得分差异</text>
  <text x="540" y="136" text-anchor="middle" fill="#8b949e" font-size="11">用户真实标签：1个转化(2.5) + 1个点击(1) → 总权重 3.5</text>

  <!-- Scenario A: Hit conversion -->
  <rect x="345" y="152" width="190" height="120" rx="10" fill="#1a1e24" stroke="#f0883e" stroke-width="2"/>
  <text x="440" y="175" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">✓ 命中转化广告</text>

  <!-- Score circle A -->
  <circle cx="440" cy="228" r="34" fill="none" stroke="#f0883e" stroke-width="3" filter="url(#glow)"/>
  <text x="440" y="224" text-anchor="middle" fill="#f0883e" font-size="22" font-weight="bold">0.71</text>
  <text x="440" y="244" text-anchor="middle" fill="#8b949e" font-size="10">2.5 / 3.5</text>

  <!-- Scenario B: Hit click -->
  <rect x="555" y="152" width="190" height="120" rx="10" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="650" y="175" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">✓ 命中点击广告</text>

  <!-- Score circle B -->
  <circle cx="650" cy="228" r="34" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="650" y="224" text-anchor="middle" fill="#58a6ff" font-size="22" font-weight="bold">0.29</text>
  <text x="650" y="244" text-anchor="middle" fill="#8b949e" font-size="10">1.0 / 3.5</text>

  <!-- VS label -->
  <text x="540" y="220" text-anchor="middle" fill="#484f58" font-size="16" font-weight="bold">VS</text>

  <!-- Multiplier callout -->
  <path d="M 475 230 Q 497 255 540 255 Q 583 255 615 230" stroke="#f0883e" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="540" y="270" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">2.5× 收益差距</text>

  <!-- Bottom: Formula bar -->
  <rect x="40" y="320" width="720" height="80" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="348" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="bold">决赛排行榜公式</text>
  <text x="400" y="378" text-anchor="middle" fill="#8b949e" font-size="14">
    Score = 0.31 × <tspan fill="#58a6ff">加权 Hit Rate@10</tspan> + 0.69 × <tspan fill="#f0883e">加权 NDCG@10</tspan>
  </text>

  <!-- Bottom insight -->
  <rect x="140" y="425" width="520" height="60" rx="30" fill="#21262d" stroke="#f0883e" stroke-width="2"/>
  <text x="400" y="450" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="bold">💡 核心洞察</text>
  <text x="400" y="472" text-anchor="middle" fill="#c9d1d9" font-size="13">迫使模型学会识别高转化意图，而非仅优化点击率</text>
</svg>