<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d4a"/>
    </linearGradient>
    <linearGradient id="clickGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="convGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">转化加权评估协议</text>
  <text x="400" y="66" text-anchor="middle" fill="#8eafc5" font-size="13">Conversion-Weighted Evaluation — 让模型关注高价值行为</text>

  <!-- ===== LEFT: User ground truth ===== -->
  <rect x="40" y="95" width="200" height="180" rx="14" fill="#162840" stroke="#3a5a7c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="120" text-anchor="middle" fill="#b0c8e0" font-size="13" font-weight="bold">用户真实标签</text>

  <!-- Click item -->
  <rect x="60" y="138" width="160" height="44" rx="8" fill="url(#clickGrad)" opacity="0.85"/>
  <text x="90" y="165" fill="#fff" font-size="15" font-weight="bold">🖱 点击广告</text>
  <text x="195" y="165" text-anchor="end" fill="#d0e8ff" font-size="13">×1.0</text>

  <!-- Conversion item -->
  <rect x="60" y="194" width="160" height="44" rx="8" fill="url(#convGrad)" opacity="0.9"/>
  <text x="90" y="221" fill="#fff" font-size="15" font-weight="bold">💰 转化广告</text>
  <text x="195" y="221" text-anchor="end" fill="#ffe0c0" font-size="13">×2.5</text>

  <!-- Total weight -->
  <text x="140" y="260" text-anchor="middle" fill="#8eafc5" font-size="12">总权重 = 1.0 + 2.5 = 3.5</text>

  <!-- Arrow to right -->
  <path d="M250 185 L295 185" stroke="#5a8aaa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a8aaa"/>
    </marker>
  </defs>

  <!-- ===== CENTER: Two scenarios (comparison) ===== -->
  <!-- Scenario A: Hit conversion -->
  <rect x="305" y="95" width="210" height="130" rx="14" fill="#1e3322" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="118" text-anchor="middle" fill="#81c784" font-size="13" font-weight="bold">场景 A：命中转化广告</text>
  <rect x="325" y="132" width="170" height="36" rx="7" fill="url(#convGrad)" opacity="0.8"/>
  <text x="410" y="156" text-anchor="middle" fill="#fff" font-size="14">✅ 💰 转化 命中</text>
  <rect x="325" y="174" width="170" height="30" rx="7" fill="#253040" stroke="#555" stroke-width="1"/>
  <text x="410" y="194" text-anchor="middle" fill="#888" font-size="13">❌ 🖱 点击 未命中</text>

  <!-- Scenario B: Hit click -->
  <rect x="305" y="240" width="210" height="130" rx="14" fill="#33201e" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="263" text-anchor="middle" fill="#ffab91" font-size="13" font-weight="bold">场景 B：命中点击广告</text>
  <rect x="325" y="277" width="170" height="30" rx="7" fill="#253040" stroke="#555" stroke-width="1"/>
  <text x="410" y="297" text-anchor="middle" fill="#888" font-size="13">❌ 💰 转化 未命中</text>
  <rect x="325" y="313" width="170" height="36" rx="7" fill="url(#clickGrad)" opacity="0.8"/>
  <text x="410" y="337" text-anchor="middle" fill="#fff" font-size="14">✅ 🖱 点击 命中</text>

  <!-- Arrows to scores -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>
  <path d="M525 160 L575 160" stroke="#4caf50" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M525 305 L575 305" stroke="#e65100" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- ===== RIGHT: Score results ===== -->
  <!-- Score A -->
  <rect x="585" y="115" width="175" height="90" rx="14" fill="#1e3322" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="145" text-anchor="middle" fill="#c8e6c9" font-size="12">加权 Hit Rate</text>
  <text x="672" y="178" text-anchor="middle" fill="#66ff88" font-size="32" font-weight="bold">0.71</text>
  <text x="672" y="196" text-anchor="middle" fill="#81c784" font-size="11">2.5 / 3.5</text>

  <!-- Score B -->
  <rect x="585" y="260" width="175" height="90" rx="14" fill="#33201e" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="290" text-anchor="middle" fill="#ffccbc" font-size="12">加权 Hit Rate</text>
  <text x="672" y="323" text-anchor="middle" fill="#ff8866" font-size="32" font-weight="bold">0.29</text>
  <text x="672" y="341" text-anchor="middle" fill="#ffab91" font-size="11">1.0 / 3.5</text>

  <!-- VS badge -->
  <circle cx="672" cy="230" r="18" fill="#1b2d4a" stroke="#ffd54f" stroke-width="2"/>
  <text x="672" y="235" text-anchor="middle" fill="#ffd54f" font-size="13" font-weight="bold">VS</text>

  <!-- ===== BOTTOM: Key insight ===== -->
  <rect x="100" y="410" width="600" height="80" rx="14" fill="#1a2744" stroke="#ffd54f" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="440" text-anchor="middle" fill="#ffd54f" font-size="16" font-weight="bold">💡 核心设计</text>
  <text x="400" y="465" text-anchor="middle" fill="#d0dde8" font-size="14">命中一个转化广告的得分 = 命中一个点击广告的 <tspan fill="#ff6b35" font-weight="bold">2.5 倍</tspan></text>
  <text x="400" y="483" text-anchor="middle" fill="#8eafc5" font-size="12">→ 迫使模型学会识别高价值转化意图，而非仅优化点击</text>

  <!-- Weight legend at top right -->
  <rect x="590" y="50" width="170" height="38" rx="8" fill="#162840" stroke="#3a5a7c" stroke-width="1"/>
  <circle cx="615" cy="69" r="6" fill="#3a86ff"/>
  <text x="630" y="73" fill="#8eafc5" font-size="11">点击 w=1</text>
  <circle cx="700" cy="69" r="6" fill="#e63946"/>
  <text x="715" y="73" fill="#8eafc5" font-size="11">转化 w=2.5</text>
</svg>