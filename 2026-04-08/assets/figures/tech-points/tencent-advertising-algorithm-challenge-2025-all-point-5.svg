<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8833A"/>
      <stop offset="100%" stop-color="#D4722E"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="16" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">亚军 vs 季军：精巧架构 vs 暴力规模</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#7F8C8D">腾讯广告算法大赛 2025 · 生成式推荐 Top 方案对比</text>

  <!-- ===== LEFT: 2nd Place ===== -->
  <rect x="30" y="85" width="400" height="380" rx="14" fill="white" stroke="#4A90D9" stroke-width="2.5" opacity="0.95"/>
  <rect x="30" y="85" width="400" height="44" rx="14" fill="url(#g1)"/>
  <rect x="30" y="115" width="400" height="14" fill="url(#g1)"/>
  <text x="230" y="114" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🥈 亚军：Encoder-Decoder + GNN</text>

  <!-- Encoder block -->
  <rect x="60" y="150" width="150" height="60" rx="10" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="135" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">编码器</text>
  <text x="135" y="193" text-anchor="middle" font-size="11" fill="#5D6D7E">门控MLP + GNN</text>

  <!-- GNN illustration: small graph -->
  <circle cx="85" cy="260" r="14" fill="#D4E6F1" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="85" y="264" text-anchor="middle" font-size="9" fill="#2C3E50">用户</text>
  <circle cx="135" cy="235" r="12" fill="#D4E6F1" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="135" y="239" text-anchor="middle" font-size="8" fill="#2C3E50">邻居</text>
  <circle cx="145" cy="280" r="12" fill="#D4E6F1" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="145" y="284" text-anchor="middle" font-size="8" fill="#2C3E50">邻居</text>
  <line x1="97" y1="252" x2="125" y2="240" stroke="#4A90D9" stroke-width="1.2"/>
  <line x1="99" y1="266" x2="134" y2="275" stroke="#4A90D9" stroke-width="1.2"/>
  <line x1="140" y1="247" x2="143" y2="268" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="110" y="310" text-anchor="middle" font-size="10" fill="#7F8C8D" font-style="italic">"问邻居的意见"</text>

  <!-- Arrow encoder to decoder -->
  <line x1="210" y1="180" x2="250" y2="180" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Decoder block -->
  <rect x="258" y="150" width="150" height="60" rx="10" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="333" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">解码器</text>
  <text x="333" y="193" text-anchor="middle" font-size="11" fill="#5D6D7E">SASRec 8层×8头</text>

  <!-- Two-stage training -->
  <rect x="258" y="235" width="150" height="28" rx="6" fill="#FDEBD0" stroke="#E8833A" stroke-width="1"/>
  <text x="333" y="254" text-anchor="middle" font-size="11" fill="#A04000">阶段1: 曝光预训练</text>
  <rect x="258" y="270" width="150" height="28" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
  <text x="333" y="289" text-anchor="middle" font-size="11" fill="#922B21">阶段2: 点击+转化微调</text>

  <!-- Arrow to ANN -->
  <line x1="333" y1="210" x2="333" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="120" y="340" width="220" height="36" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="230" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E8449">→ ANN 检索候选广告</text>

  <!-- Key label -->
  <text x="230" y="420" text-anchor="middle" font-size="12" fill="#4A90D9" font-weight="bold">核心：架构精巧 + 图增强上下文</text>
  <text x="230" y="440" text-anchor="middle" font-size="11" fill="#7F8C8D">关系建模带来额外信息增益</text>

  <!-- ===== RIGHT: 3rd Place ===== -->
  <rect x="470" y="85" width="400" height="380" rx="14" fill="white" stroke="#E8833A" stroke-width="2.5" opacity="0.95"/>
  <rect x="470" y="85" width="400" height="44" rx="14" fill="url(#g2)"/>
  <rect x="470" y="115" width="400" height="14" fill="url(#g2)"/>
  <text x="670" y="114" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🥉 季军：Decoder-Only + Scaling</text>

  <!-- Simple decoder block -->
  <rect x="545" y="150" width="250" height="60" rx="10" fill="#FEF5E7" stroke="#E8833A" stroke-width="1.5"/>
  <text x="670" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">纯 Decoder Transformer</text>
  <text x="670" y="193" text-anchor="middle" font-size="11" fill="#5D6D7E">极简架构，无GNN</text>

  <!-- Scaling Law Bar Chart -->
  <text x="670" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#A04000">负样本 Scaling 实验</text>

  <!-- Bars -->
  <rect x="525" y="310" width="50" height="40" rx="4" fill="#F5CBA7"/>
  <text x="550" y="340" text-anchor="middle" font-size="10" fill="#784212" font-weight="bold">1K</text>
  <text x="550" y="306" text-anchor="middle" font-size="9" fill="#A04000">低</text>

  <rect x="590" y="290" width="50" height="60" rx="4" fill="#F0B27A"/>
  <text x="615" y="328" text-anchor="middle" font-size="10" fill="#784212" font-weight="bold">10K</text>
  <text x="615" y="286" text-anchor="middle" font-size="9" fill="#A04000">中</text>

  <rect x="655" y="268" width="50" height="82" rx="4" fill="#E59866"/>
  <text x="680" y="316" text-anchor="middle" font-size="10" fill="white" font-weight="bold">100K</text>
  <text x="680" y="264" text-anchor="middle" font-size="9" fill="#A04000">高</text>

  <rect x="720" y="248" width="58" height="102" rx="4" fill="#D35400"/>
  <text x="749" y="306" text-anchor="middle" font-size="10" fill="white" font-weight="bold">380K</text>
  <text x="749" y="244" text-anchor="middle" font-size="9" fill="#C0392B">最高⬆</text>

  <!-- Baseline -->
  <line x1="520" y1="350" x2="790" y2="350" stroke="#AAA" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="800" y="354" font-size="9" fill="#AAA">baseline</text>

  <!-- NDCG label -->
  <text x="510" y="300" text-anchor="middle" font-size="10" fill="#7F8C8D" transform="rotate(-90,510,300)">NDCG@10 ↑</text>

  <!-- Arrow showing trend -->
  <line x1="540" y1="370" x2="770" y2="370" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="655" y="388" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="bold">负样本越多，效果越好</text>

  <!-- Key label -->
  <text x="670" y="420" text-anchor="middle" font-size="12" fill="#D35400" font-weight="bold">核心：大力出奇迹 Scaling Law</text>
  <text x="670" y="440" text-anchor="middle" font-size="11" fill="#7F8C8D">380K负样本 ≈ 覆盖10%候选池</text>

  <!-- ===== BOTTOM: Shared strategy ===== -->
  <rect x="250" y="485" width="400" height="50" rx="12" fill="url(#g3)" opacity="0.9"/>
  <text x="450" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="white">共同策略：下一行为类型条件生成（PinRec）</text>
  <text x="450" y="527" text-anchor="middle" font-size="11" fill="#E8F8F5">预测时指定"点击"或"转化"作为生成条件</text>

  <!-- Connecting lines to shared -->
  <line x1="230" y1="465" x2="370" y2="485" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="670" y1="465" x2="530" y2="485" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- VS badge -->
  <circle cx="450" cy="275" r="28" fill="#2C3E50" opacity="0.9"/>
  <text x="450" y="280" text-anchor="middle" font-size="18" font-weight="bold" fill="white">VS</text>
</svg>