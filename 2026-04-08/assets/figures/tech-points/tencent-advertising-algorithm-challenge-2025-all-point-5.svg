<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="runnerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6dd4"/>
      <stop offset="100%" stop-color="#0e4a8a"/>
    </linearGradient>
    <linearGradient id="thirdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4691a"/>
      <stop offset="100%" stop-color="#8a4e0e"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">亚军 vs 季军：精巧架构 vs 暴力规模</text>
  <text x="450" y="65" text-anchor="middle" fill="#8b949e" font-size="13">腾讯广告算法大赛 2025 · 生成式推荐 Top 方案对比</text>

  <!-- VS divider -->
  <line x1="450" y1="85" x2="450" y2="530" stroke="#30363d" stroke-width="2" stroke-dasharray="8,6"/>
  <circle cx="450" cy="105" r="20" fill="#21262d" stroke="#484f58" stroke-width="2"/>
  <text x="450" y="111" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="bold">VS</text>

  <!-- ========== LEFT: 2nd Place ========== -->
  <text x="225" y="105" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">🥈 亚军：图增强 Encoder-Decoder</text>

  <!-- Encoder block -->
  <rect x="40" y="130" width="360" height="100" rx="14" fill="url(#runnerGrad)" opacity="0.85" filter="url(#shadow)"/>
  <text x="220" y="157" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="bold">Encoder</text>
  
  <!-- GNN sub-block -->
  <rect x="60" y="168" width="130" height="48" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Graph icon: nodes and edges -->
  <circle cx="90" cy="188" r="6" fill="#58a6ff" opacity="0.8"/>
  <circle cx="115" cy="178" r="5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="115" cy="200" r="5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="140" cy="190" r="6" fill="#58a6ff" opacity="0.8"/>
  <line x1="96" y1="186" x2="110" y2="180" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="96" y1="192" x2="110" y2="198" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="120" y1="180" x2="134" y2="188" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="120" y1="198" x2="134" y2="192" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <text x="163" y="196" text-anchor="middle" fill="#79c0ff" font-size="11">GNN</text>

  <!-- Gated MLP sub-block -->
  <rect x="210" y="168" width="170" height="48" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="295" y="196" text-anchor="middle" fill="#79c0ff" font-size="11">门控 MLP × 多</text>

  <!-- label -->
  <text x="220" y="245" text-anchor="middle" fill="#7ee787" font-size="11" font-style="italic">"问邻居的意见" → 丰富上下文</text>

  <!-- Arrow down -->
  <line x1="220" y1="253" x2="220" y2="275" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Decoder block -->
  <rect x="80" y="280" width="280" height="65" rx="14" fill="#1a3355" opacity="0.9" filter="url(#shadow)"/>
  <text x="220" y="305" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="bold">Decoder: SASRec Transformer</text>
  <text x="220" y="325" text-anchor="middle" fill="#8b949e" font-size="11">2048维 · 8层 · 8头 → ANN检索</text>

  <!-- Two-stage label -->
  <rect x="95" y="360" width="250" height="36" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="220" y="377" text-anchor="middle" fill="#58a6ff" font-size="12">阶段1: 曝光预训练</text>
  <text x="220" y="391" text-anchor="middle" fill="#7ee787" font-size="12">阶段2: 点击+转化微调</text>

  <!-- ========== RIGHT: 3rd Place ========== -->
  <text x="675" y="105" text-anchor="middle" fill="#f97316" font-size="18" font-weight="bold">🥉 季军：Scaling Law 暴力美学</text>

  <!-- Simple decoder block -->
  <rect x="510" y="130" width="330" height="75" rx="14" fill="url(#thirdGrad)" opacity="0.85" filter="url(#shadow)"/>
  <text x="675" y="160" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="bold">Decoder-Only Transformer</text>
  <text x="675" y="180" text-anchor="middle" fill="#fcd9b6" font-size="12">极简架构，不做花哨设计</text>

  <!-- Arrow to scaling -->
  <line x1="675" y1="210" x2="675" y2="238" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Scaling experiment: bar chart -->
  <rect x="510" y="245" width="330" height="175" rx="14" fill="#2a1a0a" opacity="0.9" filter="url(#shadow)" stroke="#f97316" stroke-width="1.5"/>
  <text x="675" y="272" text-anchor="middle" fill="#f97316" font-size="14" font-weight="bold">核心发现：负样本 Scaling</text>

  <!-- Bars -->
  <!-- 1K -->
  <rect x="545" y="350" width="40" height="35" rx="4" fill="#7c3a0e" opacity="0.7"/>
  <text x="565" y="368" text-anchor="middle" fill="#fcd9b6" font-size="10" font-weight="bold">1K</text>
  <text x="565" y="346" text-anchor="middle" fill="#8b949e" font-size="9">低</text>

  <!-- 10K -->
  <rect x="600" y="330" width="40" height="55" rx="4" fill="#a04e0e" opacity="0.8"/>
  <text x="620" y="358" text-anchor="middle" fill="#fcd9b6" font-size="10" font-weight="bold">10K</text>

  <!-- 100K -->
  <rect x="655" y="310" width="40" height="75" rx="4" fill="#d4691a" opacity="0.85"/>
  <text x="675" y="348" text-anchor="middle" fill="#f0f6fc" font-size="10" font-weight="bold">100K</text>

  <!-- 380K -->
  <rect x="710" y="288" width="50" height="97" rx="4" fill="url(#barGrad)" opacity="0.95"/>
  <text x="735" y="338" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">380K</text>
  <text x="735" y="284" text-anchor="middle" fill="#7ee787" font-size="10" font-weight="bold">⬆ 最佳</text>

  <!-- Trending arrow over bars -->
  <path d="M 560 345 Q 640 310 730 285" stroke="#7ee787" stroke-width="2.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="728,282 738,284 730,290" fill="#7ee787"/>

  <text x="675" y="405" text-anchor="middle" fill="#8b949e" font-size="10">每batch负样本数（363万候选池的~10%）</text>

  <!-- Right bottom label -->
  <rect x="530" y="430" width="290" height="36" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="675" y="452" text-anchor="middle" fill="#f97316" font-size="13" font-weight="bold">结论：规模 ＞ 精巧设计</text>

  <!-- Bottom shared element -->
  <rect x="240" y="490" width="420" height="42" rx="10" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="450" y="516" text-anchor="middle" fill="#c9d1d9" font-size="13">共同策略：PinRec 下一行为类型条件生成</text>

  <!-- Connecting lines to shared -->
  <line x1="220" y1="396" x2="350" y2="490" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="675" y1="466" x2="560" y2="490" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Key insight callout -->
  <text x="450" y="558" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="bold">💡 同一任务，两种哲学：复杂建模 vs 大力出奇迹</text>
</svg>