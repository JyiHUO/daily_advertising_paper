<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="posGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="negGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="refGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="curGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">Energy-Based Continuous DPO</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="14">核心洞察：用能量距离替代离散概率，实现连续动作的偏好对齐</text>

  <!-- ============ LEFT SECTION: Number Line ============ -->
  <!-- Number line background -->
  <rect x="30" y="90" width="400" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="118" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="bold">能量 = |预测 - 目标| 的距离</text>

  <!-- Number line -->
  <line x1="70" y1="200" x2="400" y2="200" stroke="#475569" stroke-width="2"/>
  <!-- Ticks -->
  <line x1="100" y1="193" x2="100" y2="207" stroke="#64748b" stroke-width="1.5"/>
  <text x="100" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">3.0</text>
  <line x1="163" y1="193" x2="163" y2="207" stroke="#64748b" stroke-width="1.5"/>
  <text x="163" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">4.0</text>
  <line x1="226" y1="193" x2="226" y2="207" stroke="#64748b" stroke-width="1.5"/>
  <text x="226" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">5.0</text>
  <line x1="289" y1="193" x2="289" y2="207" stroke="#64748b" stroke-width="1.5"/>
  <text x="289" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">6.0</text>
  <line x1="352" y1="193" x2="352" y2="207" stroke="#64748b" stroke-width="1.5"/>
  <text x="352" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">7.0</text>

  <!-- a+ target = 4.2 -->
  <circle cx="176" cy="200" r="8" fill="url(#posGrad)" filter="url(#glow)"/>
  <text x="176" y="178" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">a⁺=4.2</text>
  <text x="176" y="164" text-anchor="middle" fill="#6ee7b7" font-size="10">正样本目标</text>

  <!-- a_ref = 5.0 -->
  <circle cx="226" cy="200" r="8" fill="url(#refGrad)" filter="url(#glow)"/>
  <text x="226" y="252" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="bold">a_ref=5.0</text>
  <text x="226" y="266" text-anchor="middle" fill="#a5b4fc" font-size="10">参考模型</text>

  <!-- current model = 4.5 -->
  <circle cx="195" cy="200" r="8" fill="url(#curGrad)" filter="url(#glow)"/>
  <text x="195" y="252" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">a=4.5</text>
  <text x="195" y="266" text-anchor="middle" fill="#fcd34d" font-size="10">当前模型</text>

  <!-- a- target = 6.5 -->
  <circle cx="320" cy="200" r="8" fill="url(#negGrad)" filter="url(#glow)"/>
  <text x="320" y="178" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">a⁻=6.5</text>
  <text x="320" y="164" text-anchor="middle" fill="#fca5a5" font-size="10">负样本目标</text>

  <!-- Distance annotations for positive -->
  <!-- ref to a+ -->
  <line x1="180" y1="142" x2="222" y2="142" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="201" y="137" text-anchor="middle" fill="#818cf8" font-size="10">0.8</text>
  <!-- cur to a+ -->
  <line x1="179" y1="150" x2="192" y2="150" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="186" y="147" text-anchor="middle" fill="#fbbf24" font-size="9">0.3</text>

  <!-- Section label -->
  <text x="230" y="295" text-anchor="middle" fill="#64748b" font-size="11">▲ 数轴上的能量距离示意</text>

  <!-- ============ RIGHT SECTION: Energy Gain Comparison ============ -->
  <rect x="460" y="90" width="410" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="665" y="118" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="bold">能量增益对比</text>

  <!-- Positive sample box -->
  <rect x="485" y="135" width="170" height="100" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="570" y="157" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">✓ 正样本 a⁺</text>
  <text x="570" y="178" text-anchor="middle" fill="#a7f3d0" font-size="12">|5.0-4.2| - |4.5-4.2|</text>
  <text x="570" y="198" text-anchor="middle" fill="#a7f3d0" font-size="12">= 0.8 - 0.3</text>
  <text x="570" y="222" text-anchor="middle" fill="#10b981" font-size="20" font-weight="bold">+0.5</text>

  <!-- Negative sample box -->
  <rect x="680" y="135" width="170" height="100" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="765" y="157" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">✗ 负样本 a⁻</text>
  <text x="765" y="178" text-anchor="middle" fill="#fecaca" font-size="12">|5.0-6.5| - |4.5-6.5|</text>
  <text x="765" y="198" text-anchor="middle" fill="#fecaca" font-size="12">= 1.5 - 2.0</text>
  <text x="765" y="222" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="bold">-0.5</text>

  <!-- VS -->
  <text x="668" y="195" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">≫</text>

  <!-- Arrow showing the gap -->
  <text x="665" y="260" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">增益差 = +0.5 - (-0.5) = 1.0 → 最大化!</text>
  <text x="665" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">梯度推动模型向 a⁺ 方向靠拢</text>
  <text x="665" y="295" text-anchor="middle" fill="#64748b" font-size="11">▲ 能量增益 = E_ref - E_cur</text>

  <!-- ============ BOTTOM: Core Formula & Flow ============ -->
  <rect x="30" y="325" width="840" height="250" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Left: Standard DPO (discrete) -->
  <rect x="55" y="350" width="200" height="85" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <text x="155" y="373" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="bold">标准 DPO</text>
  <text x="155" y="393" text-anchor="middle" fill="#a5b4fc" font-size="12">log π(a)/π_ref(a)</text>
  <text x="155" y="413" text-anchor="middle" fill="#818cf8" font-size="11">⚠ 需要离散概率分布</text>
  <line x1="130" y1="425" x2="180" y2="425" stroke="#ef4444" stroke-width="2"/>

  <!-- Arrow -->
  <line x1="265" y1="392" x2="320" y2="392" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="293" y="385" text-anchor="middle" fill="#fbbf24" font-size="18">→</text>
  <text x="293" y="415" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">改造</text>

  <!-- Middle: Energy-based DPO -->
  <rect x="330" y="345" width="250" height="95" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="455" y="370" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="bold">Energy-Based DPO</text>
  <text x="455" y="393" text-anchor="middle" fill="#bae6fd" font-size="12">E(a, y) = |a - y_target|</text>
  <text x="455" y="413" text-anchor="middle" fill="#bae6fd" font-size="12">增益 = E_ref(a,y) - E_cur(a,y)</text>
  <text x="455" y="430" text-anchor="middle" fill="#38bdf8" font-size="11">✓ 适用于连续标量输出</text>

  <!-- Arrow -->
  <line x1="590" y1="392" x2="640" y2="392" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- Right: Result -->
  <rect x="650" y="350" width="195" height="85" rx="10" fill="#1c1917" stroke="#fbbf24" stroke-width="2"/>
  <text x="747" y="373" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="bold">训练目标</text>
  <text x="747" y="396" text-anchor="middle" fill="#fef3c7" font-size="11">max σ(ΔE⁺ - ΔE⁻)</text>
  <text x="747" y="416" text-anchor="middle" fill="#fbbf24" font-size="11">偏好高回报动作区域</text>

  <!-- Bottom flow: how samples are generated -->
  <text x="450" y="475" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">正/负样本构造</text>

  <!-- Positive flow -->
  <rect x="80" y="492" width="220" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="190" y="513" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">✓ 定价修正后 RTG 提升</text>
  <text x="190" y="530" text-anchor="middle" fill="#a7f3d0" font-size="11">→ 正样本 a⁺</text>

  <!-- Arrow to center -->
  <line x1="310" y1="517" x2="380" y2="517" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Center: DPO Loss -->
  <rect x="385" y="490" width="130" height="55" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="513" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">DPO Loss</text>
  <text x="450" y="532" text-anchor="middle" fill="#bae6fd" font-size="11">偏好对齐</text>

  <!-- Negative flow -->
  <rect x="600" y="492" width="220" height="50" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="710" y="513" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">✗ 定价修正后 RTG 未提升</text>
  <text x="710" y="530" text-anchor="middle" fill="#fecaca" font-size="11">→ 负样本 a⁻</text>

  <!-- Arrow to center -->
  <line x1="595" y1="517" x2="525" y2="517" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Subtle watermark -->
  <text x="450" y="580" text-anchor="middle" fill="#334155" font-size="10">JD-BP: Joint-Decision Bidding &amp; Pricing — Energy-Based Continuous DPO</text>
</svg>