<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="posGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="negGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="refGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">Energy-Based Continuous DPO</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">将离散DPO扩展到连续出价/定价：用能量距离替代token概率</text>

  <!-- ===== Number Line (Central Concept) ===== -->
  <g transform="translate(450, 200)">
    <!-- axis -->
    <line x1="-340" y1="0" x2="340" y2="0" stroke="#475569" stroke-width="2"/>
    <!-- ticks -->
    <line x1="-200" y1="-8" x2="-200" y2="8" stroke="#475569" stroke-width="2"/>
    <line x1="-60" y1="-8" x2="-60" y2="8" stroke="#475569" stroke-width="2"/>
    <line x1="80" y1="-8" x2="80" y2="8" stroke="#475569" stroke-width="2"/>
    <line x1="260" y1="-8" x2="260" y2="8" stroke="#475569" stroke-width="2"/>

    <!-- a+ = 4.2 (positive target) -->
    <circle cx="-200" cy="0" r="16" fill="url(#posGrad)" opacity="0.9" filter="url(#glow)"/>
    <text x="-200" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">a⁺</text>
    <text x="-200" y="-28" text-anchor="middle" fill="#10b981" font-size="12">4.2 (RTG↑)</text>

    <!-- current model = 4.5 -->
    <circle cx="-60" cy="0" r="16" fill="url(#modelGrad)" opacity="0.9" filter="url(#glow)"/>
    <text x="-60" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">π</text>
    <text x="-60" y="-28" text-anchor="middle" fill="#f59e0b" font-size="12">4.5 (当前)</text>

    <!-- ref model = 5.0 -->
    <circle cx="80" cy="0" r="16" fill="url(#refGrad)" opacity="0.9" filter="url(#glow)"/>
    <text x="80" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">π_ref</text>
    <text x="80" y="-28" text-anchor="middle" fill="#818cf8" font-size="12">5.0 (参考)</text>

    <!-- a- = 6.5 (negative target) -->
    <circle cx="260" cy="0" r="16" fill="url(#negGrad)" opacity="0.9" filter="url(#glow)"/>
    <text x="260" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">a⁻</text>
    <text x="260" y="-28" text-anchor="middle" fill="#ef4444" font-size="12">6.5 (RTG未↑)</text>

    <!-- Energy = |prediction - target| brackets -->
    <!-- ref to a+ distance -->
    <line x1="-200" y1="35" x2="80" y2="35" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-60" y="52" text-anchor="middle" fill="#818cf8" font-size="11">|π_ref − a⁺| = 0.8</text>

    <!-- model to a+ distance -->
    <line x1="-200" y1="68" x2="-60" y2="68" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-130" y="85" text-anchor="middle" fill="#f59e0b" font-size="11">|π − a⁺| = 0.3</text>
  </g>

  <!-- ===== Two comparison cards ===== -->
  <!-- Positive sample card -->
  <g transform="translate(120, 330)">
    <rect x="0" y="0" width="300" height="140" rx="14" fill="#0f2922" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="28" text-anchor="middle" fill="#10b981" font-size="15" font-weight="bold">✓ 正样本能量增益</text>
    <text x="150" y="56" text-anchor="middle" fill="#d1fae5" font-size="13">E_ref − E_π</text>
    <text x="150" y="80" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">0.8 − 0.3 = +0.5</text>
    <text x="150" y="108" text-anchor="middle" fill="#6ee7b7" font-size="12">模型比参考更接近好动作 ✓</text>
    <text x="150" y="128" text-anchor="middle" fill="#4ade80" font-size="20">⬆</text>
  </g>

  <!-- Negative sample card -->
  <g transform="translate(480, 330)">
    <rect x="0" y="0" width="300" height="140" rx="14" fill="#2a0f0f" stroke="#ef4444" stroke-width="2"/>
    <text x="150" y="28" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">✗ 负样本能量增益</text>
    <text x="150" y="56" text-anchor="middle" fill="#fecaca" font-size="13">E_ref − E_π</text>
    <text x="150" y="80" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">1.5 − 2.0 = −0.5</text>
    <text x="150" y="108" text-anchor="middle" fill="#fca5a5" font-size="12">模型并未更接近坏动作 ✓</text>
    <text x="150" y="128" text-anchor="middle" fill="#f87171" font-size="20">⬇</text>
  </g>

  <!-- Arrow between cards -->
  <text x="450" y="410" text-anchor="middle" fill="#94a3b8" font-size="22">VS</text>

  <!-- ===== Bottom: DPO Loss Summary ===== -->
  <g transform="translate(450, 530)">
    <rect x="-330" y="-30" width="660" height="70" rx="14" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">DPO 损失目标</text>
    <text x="0" y="22" text-anchor="middle" fill="#e2e8f0" font-size="15">
      L = −log σ( β · [ ΔE(a⁺) − ΔE(a⁻) ] )
    </text>
    <text x="260" y="22" fill="#94a3b8" font-size="11">← 让正增益 ≫ 负增益</text>
  </g>

  <!-- ===== Core insight label ===== -->
  <g transform="translate(450, 128)">
    <rect x="-175" y="-18" width="350" height="36" rx="18" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#c7d2fe" font-size="14" font-weight="bold">核心：能量 E(a) = |预测 − 目标| 替代概率</text>
  </g>

  <!-- Gradient arrow hint -->
  <g transform="translate(320, 260)">
    <line x1="0" y1="0" x2="-55" y2="0" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <text x="-28" y="-10" text-anchor="middle" fill="#10b981" font-size="11">梯度方向</text>
  </g>
</svg>