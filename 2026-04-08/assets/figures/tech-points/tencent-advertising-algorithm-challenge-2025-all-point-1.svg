<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2B7AE0"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FA"/>
      <stop offset="100%" stop-color="#E2EAF5"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">全模态序列生成式推荐 —— "广告版GPT补全"</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">不打分候选，而是生成兴趣向量 → 近邻检索百万候选广告</text>

  <!-- ==================== Module 1: User Sequence ==================== -->
  <rect x="30" y="90" width="260" height="340" rx="14" fill="#fff" stroke="#B0C4DE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="90" width="260" height="40" rx="14" fill="#3A6EA5"/>
  <rect x="30" y="116" width="260" height="14" fill="#3A6EA5"/>
  <text x="160" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">① 用户历史序列</text>

  <!-- User Profile Token -->
  <rect x="50" y="148" width="220" height="48" rx="8" fill="#E8F0FE" stroke="#6DA3E0" stroke-width="1.2"/>
  <text x="160" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B5EA7">👤 用户画像 Token</text>
  <text x="160" y="185" text-anchor="middle" font-size="11" fill="#555">年龄 · 性别 · 属性</text>

  <!-- Item Tokens -->
  <rect x="50" y="210" width="220" height="130" rx="8" fill="#FFF7E6" stroke="#E8A838" stroke-width="1.2"/>
  <text x="160" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#B07413">📦 物品交互 Token ×N</text>

  <!-- Sub-elements inside item token -->
  <rect x="62" y="244" width="90" height="26" rx="5" fill="#FFE8CC"/>
  <text x="107" y="262" text-anchor="middle" font-size="10" fill="#8B5E14">稀疏ID/类目</text>

  <rect x="162" y="244" width="96" height="26" rx="5" fill="#FFE8CC"/>
  <text x="210" y="262" text-anchor="middle" font-size="10" fill="#8B5E14">行为类型</text>

  <!-- Behavior labels -->
  <rect x="62" y="278" width="50" height="20" rx="4" fill="#D4EDDA"/>
  <text x="87" y="292" text-anchor="middle" font-size="9" fill="#2D6A4F">曝光</text>
  <rect x="118" y="278" width="50" height="20" rx="4" fill="#B8DAFF"/>
  <text x="143" y="292" text-anchor="middle" font-size="9" fill="#1B4F72">点击</text>
  <rect x="174" y="278" width="50" height="20" rx="4" fill="#F8D7DA"/>
  <text x="199" y="292" text-anchor="middle" font-size="9" fill="#922B21">转化</text>

  <!-- Multi-modal embeddings -->
  <rect x="50" y="350" width="220" height="62" rx="8" fill="#F3E8FF" stroke="#9B59B6" stroke-width="1.2"/>
  <text x="160" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#6C3483">🎨 多模态 Embedding ×6</text>
  <text x="160" y="388" text-anchor="middle" font-size="10" fill="#7D3C98">BERT · GTE-Qwen2 · LLaVA</text>
  <text x="160" y="402" text-anchor="middle" font-size="10" fill="#7D3C98">Conan · HunYuan · QQMM</text>

  <!-- ==================== Arrow 1 ==================== -->
  <line x1="296" y1="260" x2="368" y2="260" stroke="#555" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="332" y="250" text-anchor="middle" font-size="11" fill="#555">输入</text>

  <!-- ==================== Module 2: Generative Model ==================== -->
  <rect x="375" y="155" width="180" height="210" rx="16" fill="#fff" stroke="#2B7AE0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="375" y="155" width="180" height="42" rx="16" fill="#2B7AE0"/>
  <rect x="375" y="183" width="180" height="14" fill="#2B7AE0"/>
  <text x="465" y="182" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">② 生成模型</text>

  <!-- Model inner -->
  <text x="465" y="222" text-anchor="middle" font-size="13" fill="#333">自回归 Transformer</text>

  <!-- Sequence visualization -->
  <g transform="translate(400, 240)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="#E8F0FE" stroke="#6DA3E0"/>
    <rect x="26" y="0" width="22" height="22" rx="3" fill="#FFE8CC" stroke="#E8A838"/>
    <rect x="52" y="0" width="22" height="22" rx="3" fill="#FFE8CC" stroke="#E8A838"/>
    <rect x="78" y="0" width="22" height="22" rx="3" fill="#FFE8CC" stroke="#E8A838"/>
    <text x="108" y="16" font-size="14" fill="#888">…</text>
    <text x="65" y="42" text-anchor="middle" font-size="10" fill="#666">序列编码</text>
  </g>

  <!-- Output vector -->
  <rect x="410" y="305" width="110" height="40" rx="20" fill="#E74C3C" opacity="0.15" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="465" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#C0392B">兴趣向量 →</text>

  <!-- ==================== Arrow 2 ==================== -->
  <line x1="560" y1="325" x2="630" y2="325" stroke="#2B7AE0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="595" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B7AE0">ANN</text>
  <text x="595" y="340" text-anchor="middle" font-size="10" fill="#2B7AE0">检索</text>

  <!-- ==================== Module 3: Candidate Pool ==================== -->
  <rect x="638" y="130" width="230" height="280" rx="14" fill="#fff" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="638" y="130" width="230" height="42" rx="14" fill="#27AE60"/>
  <rect x="638" y="158" width="230" height="14" fill="#27AE60"/>
  <text x="753" y="157" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">③ 候选广告池</text>

  <!-- Pool visualization -->
  <g transform="translate(658, 190)">
    <!-- Grid of ad items -->
    <rect x="0" y="0" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60"/>
    <text x="21" y="26" text-anchor="middle" font-size="18">📱</text>
    <rect x="50" y="0" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60"/>
    <text x="71" y="26" text-anchor="middle" font-size="18">👗</text>
    <rect x="100" y="0" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60"/>
    <text x="121" y="26" text-anchor="middle" font-size="18">🚗</text>
    <rect x="150" y="0" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60"/>
    <text x="171" y="26" text-anchor="middle" font-size="18">🎮</text>

    <rect x="0" y="50" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60" opacity="0.6"/>
    <rect x="50" y="50" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60" opacity="0.6"/>
    <rect x="100" y="50" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60" opacity="0.4"/>
    <rect x="150" y="50" width="42" height="42" rx="6" fill="#D5F5E3" stroke="#27AE60" opacity="0.3"/>

    <text x="96" y="116" text-anchor="middle" font-size="12" fill="#888">… 66万～363万 广告 …</text>
  </g>

  <!-- Top-K results highlight -->
  <rect x="658" y="330" width="190" height="60" rx="10" fill="#FEF9E7" stroke="#F1C40F" stroke-width="1.5"/>
  <text x="753" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#B7950B">🏆 Top-10 推荐结果</text>
  <text x="753" y="372" text-anchor="middle" font-size="11" fill="#7D6608">最可能点击/转化的广告</text>

  <!-- ==================== Bottom comparison ==================== -->
  <rect x="120" y="455" width="280" height="48" rx="10" fill="#FADBD8" stroke="#E74C3C" stroke-width="1.2"/>
  <text x="260" y="476" text-anchor="middle" font-size="12" fill="#922B21">❌ 传统：固定候选集逐一打分</text>
  <text x="260" y="493" text-anchor="middle" font-size="11" fill="#C0392B">判别式 — 效率低</text>

  <rect x="500" y="455" width="280" height="48" rx="10" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="640" y="476" text-anchor="middle" font-size="12" fill="#1E8449">✅ 本文：生成向量 + ANN检索</text>
  <text x="640" y="493" text-anchor="middle" font-size="11" fill="#27AE60">生成式 — 可扩展至百万级</text>

  <text x="440" y="476" text-anchor="middle" font-size="16" fill="#555">→</text>
</svg>