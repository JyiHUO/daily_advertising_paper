<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f7f8fb"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a2340">双模型在线估计增量效应</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">两个分类器并行学习，差值 = 广告真正带来的增量</text>

  <!-- User -->
  <g>
    <circle cx="90" cy="290" r="38" fill="#ffd86b" stroke="#b38600" stroke-width="2"/>
    <text x="90" y="298" text-anchor="middle" font-size="26">👤</text>
    <text x="90" y="348" text-anchor="middle" font-size="13" fill="#333">新用户特征</text>
  </g>

  <!-- Treatment model -->
  <g>
    <rect x="280" y="130" width="260" height="130" rx="14" fill="#ffe1e1" stroke="#d94a4a" stroke-width="2"/>
    <text x="410" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#9b1c1c">处理组模型 (投广告)</text>
    <text x="410" y="192" text-anchor="middle" font-size="13" fill="#333">P(转化 | 特征, T=1)</text>
    <text x="410" y="228" text-anchor="middle" font-size="22" font-weight="700" fill="#d94a4a">0.004</text>
    <text x="410" y="248" text-anchor="middle" font-size="11" fill="#888">SGD 增量更新</text>
  </g>

  <!-- Control model -->
  <g>
    <rect x="280" y="320" width="260" height="130" rx="14" fill="#e1ecff" stroke="#3a6fd6" stroke-width="2"/>
    <text x="410" y="352" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3f8f">对照组模型 (不投)</text>
    <text x="410" y="382" text-anchor="middle" font-size="13" fill="#333">P(转化 | 特征, T=0)</text>
    <text x="410" y="418" text-anchor="middle" font-size="22" font-weight="700" fill="#3a6fd6">0.001</text>
    <text x="410" y="438" text-anchor="middle" font-size="11" fill="#888">SGD 增量更新</text>
  </g>

  <!-- Arrows from user to models -->
  <path d="M128,278 L278,200" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <path d="M128,302 L278,380" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>

  <!-- Minus sign -->
  <text x="600" y="298" text-anchor="middle" font-size="42" font-weight="700" fill="#333">−</text>

  <!-- Arrows to uplift -->
  <path d="M540,200 L688,275" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <path d="M540,380 L688,305" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>

  <!-- Uplift box -->
  <g>
    <rect x="690" y="230" width="170" height="120" rx="14" fill="#1a2340" stroke="#000"/>
    <text x="775" y="262" text-anchor="middle" font-size="14" fill="#ffd86b" font-weight="700">预测增量</text>
    <text x="775" y="302" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">0.003</text>
    <text x="775" y="328" text-anchor="middle" font-size="11" fill="#bbb">= 广告的真实效应</text>
  </g>

  <!-- Cold start callout -->
  <g>
    <rect x="60" y="450" width="780" height="80" rx="12" fill="#fff7d6" stroke="#c9a227" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="90" y="482" font-size="15" font-weight="700" fill="#8a6d00">冷启动 ❄</text>
    <text x="90" y="505" font-size="13" fill="#5a4600">任一侧样本 &lt; 50 时，直接给乐观先验 增量 = 0.002</text>
    <text x="90" y="522" font-size="12" fill="#7a5e00">→ 鼓励早期多投放，先探索再学习</text>
  </g>
</svg>