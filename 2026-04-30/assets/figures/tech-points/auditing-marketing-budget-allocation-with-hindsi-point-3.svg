<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">
    稳定性约束 δ：别让优化器冲进数据稀疏区自嗨
  </text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">
    相邻期预算变动比例 ≤ δ，平衡理论收益与可信度
  </text>

  <!-- Panel 1: δ=20% -->
  <g transform="translate(40,100)">
    <rect width="260" height="380" rx="10" fill="#f4f9ff" stroke="#4a90d9" stroke-width="2"/>
    <text x="130" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1a4a7a">δ = ±20%</text>
    <text x="130" y="54" text-anchor="middle" font-size="12" fill="#4a90d9">保守 · 贴近运营节奏</text>

    <g transform="translate(30,90)">
      <rect x="0" y="60" width="40" height="80" fill="#bcd"/>
      <rect x="50" y="48" width="40" height="92" fill="#4a90d9"/>
      <rect x="110" y="70" width="40" height="70" fill="#bcd"/>
      <rect x="160" y="62" width="40" height="78" fill="#4a90d9"/>
      <line x1="-5" y1="140" x2="205" y2="140" stroke="#888"/>
      <text x="100" y="178" text-anchor="middle" font-size="11" fill="#666">仅小幅调整</text>
    </g>

    <g transform="translate(20,300)" font-size="13" fill="#1a4a7a">
      <text x="0" y="0">平均增益</text>
      <text x="220" y="0" text-anchor="end" font-weight="700">8.2%</text>
      <text x="0" y="28">可认证 (0.6)</text>
      <text x="220" y="28" text-anchor="end" font-weight="700">59%</text>
    </g>
  </g>

  <!-- Panel 2: δ=40% -->
  <g transform="translate(320,100)">
    <rect width="260" height="380" rx="10" fill="#f1fbf4" stroke="#3aa55d" stroke-width="2.5"/>
    <text x="130" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e6a37">δ = ±40%  ★</text>
    <text x="130" y="54" text-anchor="middle" font-size="12" fill="#3aa55d">甜点区 · 收益与可信兼得</text>

    <g transform="translate(30,90)">
      <rect x="0" y="70" width="40" height="70" fill="#bcd"/>
      <rect x="50" y="36" width="40" height="104" fill="#3aa55d"/>
      <rect x="110" y="78" width="40" height="62" fill="#bcd"/>
      <rect x="160" y="56" width="40" height="84" fill="#3aa55d"/>
      <line x1="-5" y1="140" x2="205" y2="140" stroke="#888"/>
      <text x="100" y="178" text-anchor="middle" font-size="11" fill="#666">中等幅度重分</text>
    </g>

    <g transform="translate(20,300)" font-size="13" fill="#1e6a37">
      <text x="0" y="0">平均增益</text>
      <text x="220" y="0" text-anchor="end" font-weight="700">9.9%</text>
      <text x="0" y="28">可认证 (0.6)</text>
      <text x="220" y="28" text-anchor="end" font-weight="700">88%</text>
    </g>
  </g>

  <!-- Panel 3: unconstrained -->
  <g transform="translate(600,100)">
    <rect width="260" height="380" rx="10" fill="#fff4f0" stroke="#d9693a" stroke-width="2"/>
    <text x="130" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#8a3a14">无约束</text>
    <text x="130" y="54" text-anchor="middle" font-size="12" fill="#d9693a">激进 · 冲进稀疏区</text>

    <g transform="translate(30,90)">
      <rect x="0" y="110" width="40" height="30" fill="#bcd"/>
      <rect x="50" y="0" width="40" height="140" fill="#d9693a"/>
      <rect x="110" y="120" width="40" height="20" fill="#bcd"/>
      <rect x="160" y="88" width="40" height="52" fill="#d9693a"/>
      <line x1="-5" y1="140" x2="205" y2="140" stroke="#888"/>
      <text x="100" y="178" text-anchor="middle" font-size="11" fill="#8a3a14">预算剧烈搬家</text>
    </g>

    <g transform="translate(20,300)" font-size="13" fill="#8a3a14">
      <text x="0" y="0">均值看似</text>
      <text x="220" y="0" text-anchor="end" font-weight="700">12.5%</text>
      <text x="0" y="28">可认证 (0.9)</text>
      <text x="220" y="28" text-anchor="end" font-weight="700" fill="#c0392b">仅 22%</text>
    </g>
  </g>

  <!-- summary arrow -->
  <line x1="60" y1="515" x2="835" y2="515" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="60" y="538" font-size="12" fill="#555">放松 δ → 目标上限变高</text>
  <text x="840" y="538" text-anchor="end" font-size="12" fill="#c0392b" font-weight="700">但不确定性暴涨，期望后悔反而可能下降</text>
</svg>