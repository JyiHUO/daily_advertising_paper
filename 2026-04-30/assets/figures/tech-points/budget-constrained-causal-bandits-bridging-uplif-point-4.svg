<svg height="600" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">历史数据多少才值得训离线Uplift？</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">Criteo Uplift · 10万用户 · 预算5000 · 转化数 (mean ± std)</text>

  <!-- Axis -->
  <line x1="90" y1="440" x2="830" y2="440" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="838" y="458" font-size="12" fill="#333">历史训练数据量</text>
  <line x1="90" y1="440" x2="90" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="98" y="95" font-size="12" fill="#333">转化数</text>

  <!-- x ticks -->
  <g font-size="12" fill="#444" text-anchor="middle">
    <text x="200" y="460">1K</text>
    <text x="360" y="460">2K</text>
    <text x="520" y="460">10K</text>
    <text x="720" y="460">50K+</text>
  </g>

  <!-- Crossover marker (drawn first so it sits behind) -->
  <line x1="620" y1="110" x2="620" y2="440" stroke="#999" stroke-dasharray="4,4"/>
  <text x="625" y="125" font-size="13" fill="#555" font-weight="bold">交叉点 ≈ 5万条</text>

  <!-- BCCB flat band (online) -->
  <rect x="90" y="360" width="740" height="28" fill="#2a9d8f" fill-opacity="0.18" stroke="#2a9d8f" stroke-dasharray="5,4"/>
  <line x1="90" y1="374" x2="830" y2="374" stroke="#2a9d8f" stroke-width="3"/>
  <circle cx="200" cy="374" r="6" fill="#2a9d8f"/>
  <circle cx="360" cy="374" r="6" fill="#2a9d8f"/>
  <circle cx="520" cy="374" r="6" fill="#2a9d8f"/>
  <circle cx="720" cy="374" r="6" fill="#2a9d8f"/>
  <text x="790" y="345" font-size="13" font-weight="bold" fill="#1b7068">BCCB (在线) 方差低 3–5×</text>

  <!-- Offline: crash at 1K -->
  <g>
    <rect x="185" y="428" width="30" height="12" fill="#c0392b"/>
    <text x="200" y="420" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">0</text>
    <text x="200" y="485" text-anchor="middle" font-size="11" fill="#888">训不出</text>
  </g>

  <!-- Offline: 2K huge variance -->
  <g>
    <line x1="360" y1="200" x2="360" y2="430" stroke="#e76f51" stroke-width="3"/>
    <line x1="348" y1="200" x2="372" y2="200" stroke="#e76f51" stroke-width="3"/>
    <line x1="348" y1="430" x2="372" y2="430" stroke="#e76f51" stroke-width="3"/>
    <circle cx="360" cy="335" r="7" fill="#e76f51"/>
    <text x="360" y="190" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">45 ± 64</text>
    <text x="360" y="485" text-anchor="middle" font-size="11" fill="#888">像抽奖</text>
  </g>

  <!-- Offline: 10K still noisy -->
  <g>
    <line x1="520" y1="270" x2="520" y2="360" stroke="#e76f51" stroke-width="3"/>
    <line x1="510" y1="270" x2="530" y2="270" stroke="#e76f51" stroke-width="3"/>
    <line x1="510" y1="360" x2="530" y2="360" stroke="#e76f51" stroke-width="3"/>
    <circle cx="520" cy="310" r="7" fill="#e76f51"/>
    <text x="520" y="485" text-anchor="middle" font-size="11" fill="#888">仍不稳</text>
  </g>

  <!-- Offline: 50K wins -->
  <g>
    <line x1="720" y1="150" x2="720" y2="210" stroke="#2d6cdf" stroke-width="3"/>
    <line x1="710" y1="150" x2="730" y2="150" stroke="#2d6cdf" stroke-width="3"/>
    <line x1="710" y1="210" x2="730" y2="210" stroke="#2d6cdf" stroke-width="3"/>
    <circle cx="720" cy="175" r="7" fill="#2d6cdf"/>
    <text x="720" y="140" text-anchor="middle" font-size="12" fill="#1a4fa8" font-weight="bold">显著反超</text>
    <text x="720" y="485" text-anchor="middle" font-size="11" fill="#888">离线更强</text>
  </g>

  <!-- Conclusion bar -->
  <rect x="60" y="510" width="780" height="40" fill="#f4f4f4" stroke="#ccc"/>
  <text x="150" y="535" font-size="14" font-weight="bold" fill="#1b7068">数据少 → 用 BCCB 在线学</text>
  <text x="510" y="535" font-size="14" font-weight="bold" fill="#1a4fa8">数据多 (≥5万) → 离线 Uplift 更优</text>
</svg>