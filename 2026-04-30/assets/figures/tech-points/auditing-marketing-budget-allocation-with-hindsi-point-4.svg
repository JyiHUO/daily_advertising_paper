<svg height="600" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a1a">蒙特卡洛后悔分布：不是一个数，而是一条分布</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#666">固定事后最优 s*(δ)，反复重采样反事实回报</text>

  <!-- Left: sampling box -->
  <rect x="40" y="80" width="240" height="200" rx="10" fill="#eaf2fb" stroke="#3b78c2" stroke-width="1.8"/>
  <text x="160" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3e72">反事实回报采样</text>
  <text x="160" y="125" text-anchor="middle" font-size="11" fill="#333">GP 均值 + 异方差方差</text>

  <!-- mini curve -->
  <path d="M60 230 Q110 160 160 180 T260 170" fill="none" stroke="#3b78c2" stroke-width="2"/>
  <path d="M60 240 Q110 175 160 195 T260 185" fill="none" stroke="#3b78c2" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <path d="M60 220 Q110 145 160 165 T260 155" fill="none" stroke="#3b78c2" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="110" cy="178" r="3" fill="#e67"/>
  <circle cx="170" cy="183" r="3" fill="#e67"/>
  <circle cx="220" cy="170" r="3" fill="#e67"/>
  <text x="160" y="268" text-anchor="middle" font-size="10" fill="#666">每渠道·每期独立抽样</text>

  <!-- arrow to middle -->
  <path d="M282 180 L376 180" stroke="#333" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="329" y="172" text-anchor="middle" font-size="11" fill="#333">重复 J 次</text>

  <!-- Middle: per-sample regret -->
  <rect x="380" y="110" width="180" height="140" rx="10" fill="#fff4e0" stroke="#d88a1a" stroke-width="1.8"/>
  <text x="470" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4a08">单次后悔</text>
  <text x="470" y="178" text-anchor="middle" font-size="14" fill="#333">R* − R_actual</text>
  <text x="470" y="212" text-anchor="middle" font-size="11" fill="#666">最优总回报 − 实际总回报</text>

  <!-- arrow from middle to distribution -->
  <path d="M560 220 Q610 260 610 288" stroke="#333" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <!-- Right: distribution -->
  <rect x="330" y="300" width="530" height="220" rx="10" fill="#f3f7ec" stroke="#5a8a3a" stroke-width="1.8"/>
  <text x="595" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e5a18">后悔分布（J = 1000）</text>

  <!-- axis -->
  <line x1="360" y1="480" x2="830" y2="480" stroke="#333" stroke-width="1.5"/>
  <line x1="560" y1="350" x2="560" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="560" y="495" text-anchor="middle" font-size="10" fill="#666">0</text>
  <text x="828" y="495" text-anchor="end" font-size="10" fill="#666">regret %</text>

  <!-- histogram bell -->
  <path d="M370 480 Q480 478 540 460 Q600 420 640 370 Q680 345 710 375 Q750 420 800 470 Q820 478 830 480 L370 480 Z"
        fill="#a7c97a" stroke="#5a8a3a" stroke-width="1.8" opacity="0.85"/>

  <!-- mean line -->
  <line x1="660" y1="350" x2="660" y2="480" stroke="#c0392b" stroke-width="2"/>
  <text x="660" y="345" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">均值 +9.4%</text>

  <!-- CI brackets -->
  <line x1="500" y1="470" x2="500" y2="490" stroke="#2c5aa0" stroke-width="2"/>
  <line x1="800" y1="470" x2="800" y2="490" stroke="#2c5aa0" stroke-width="2"/>
  <line x1="500" y1="488" x2="800" y2="488" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="650" y="510" text-anchor="middle" font-size="11" fill="#2c5aa0">95% 可信区间（跨过 0）</text>

  <!-- P>0 -->
  <text x="820" y="360" text-anchor="end" font-size="12" fill="#2e5a18" font-weight="bold">P(后悔 &gt; 0) = 75%</text>

  <!-- Bottom takeaway -->
  <rect x="40" y="440" width="240" height="80" rx="8" fill="#fff" stroke="#888" stroke-dasharray="4,3"/>
  <text x="160" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">结论不再是一句话</text>
  <text x="160" y="488" text-anchor="middle" font-size="11" fill="#555">约 9% 改进空间，四分之三把握</text>
  <text x="160" y="506" text-anchor="middle" font-size="11" fill="#555">但别指望稳赢</text>
</svg>