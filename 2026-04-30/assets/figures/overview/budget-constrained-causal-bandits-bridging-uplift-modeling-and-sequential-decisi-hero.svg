<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <linearGradient id="offG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd8d8"/>
      <stop offset="1" stop-color="#ff8a8a"/>
    </linearGradient>
    <linearGradient id="onG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7e7ff"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">BCCB：预算约束下的因果 Bandit</text>
  <text x="500" y="64" text-anchor="middle" font-size="13" fill="#475569">冷启动场景中，边学 uplift、边探索、边配速花钱 —— 从第 1 个用户就能跑</text>

  <!-- Left: offline pipeline -->
  <g transform="translate(40,100)">
    <rect x="0" y="0" width="300" height="470" rx="14" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="300" height="36" rx="14" fill="url(#offG)"/>
    <text x="150" y="23" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">离线两阶段 Pipeline</text>

    <g transform="translate(20,60)">
      <rect width="260" height="55" rx="8" fill="#fff1f1" stroke="#fca5a5"/>
      <text x="130" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">① 收集历史 RCT 数据</text>
      <text x="130" y="42" text-anchor="middle" font-size="11" fill="#7f1d1d">需 ~10K 条才稳定</text>
    </g>
    <path d="M150,125 L150,145" stroke="#b91c1c" stroke-width="2" marker-end="url(#ar)"/>

    <g transform="translate(20,150)">
      <rect width="260" height="55" rx="8" fill="#fff1f1" stroke="#fca5a5"/>
      <text x="130" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">② 训练 Uplift / HTE 模型</text>
      <text x="130" y="42" text-anchor="middle" font-size="11" fill="#7f1d1d">&lt;2K 条直接训不出</text>
    </g>
    <path d="M150,215 L150,235" stroke="#b91c1c" stroke-width="2" marker-end="url(#ar)"/>

    <g transform="translate(20,240)">
      <rect width="260" height="55" rx="8" fill="#fff1f1" stroke="#fca5a5"/>
      <text x="130" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">③ 带预算背包优化</text>
      <text x="130" y="42" text-anchor="middle" font-size="11" fill="#7f1d1d">一次性排定全部投放</text>
    </g>

    <g transform="translate(20,320)">
      <rect width="260" height="130" rx="10" fill="#fef2f2" stroke="#f87171" stroke-dasharray="4 3"/>
      <text x="130" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">冷启动痛点</text>
      <text x="20" y="46" font-size="11" fill="#7f1d1d">• 新活动 / 新市场无历史</text>
      <text x="20" y="66" font-size="11" fill="#7f1d1d">• 2K~10K 条时方差 &gt; 均值</text>
      <text x="20" y="86" font-size="11" fill="#7f1d1d">• 三次跑结果：0 / 50 / 87</text>
      <text x="20" y="106" font-size="11" fill="#7f1d1d">• 无法对广告主承诺 KPI</text>
    </g>
  </g>

  <!-- VS divider -->
  <g transform="translate(370,330)">
    <circle r="20" fill="#0f172a"/>
    <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">VS</text>
  </g>

  <!-- Right: BCCB online loop -->
  <g transform="translate(400,100)">
    <rect x="0" y="0" width="560" height="470" rx="14" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="560" height="36" rx="14" fill="url(#onG)"/>
    <text x="280" y="23" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">BCCB 在线单用户决策闭环</text>

    <!-- User stream -->
    <g transform="translate(20,58)">
      <rect width="110" height="54" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="55" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">用户流 u_t</text>
      <text x="55" y="40" text-anchor="middle" font-size="10" fill="#1e40af">逐个到达</text>
    </g>

    <!-- Two models -->
    <g transform="translate(160,58)">
      <rect width="175" height="120" rx="10" fill="#f0f9ff" stroke="#38bdf8"/>
      <text x="87" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#075985">双模型增量估计</text>
      <rect x="10" y="32" width="75" height="36" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
      <text x="47" y="48" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">P(y|x,T=1)</text>
      <text x="47" y="62" text-anchor="middle" font-size="9" fill="#1e40af">处理组 LR</text>
      <rect x="90" y="32" width="75" height="36" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="127" y="48" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">P(y|x,T=0)</text>
      <text x="127" y="62" text-anchor="middle" font-size="9" fill="#991b1b">对照组 LR</text>
      <text x="87" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">τ̂ = P₁ − P₀（SGD 增量）</text>
    </g>

    <!-- Thompson bonus -->
    <g transform="translate(160,188)">
      <rect width="175" height="72" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="87" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Thompson 探索加成</text>
      <text x="87" y="42" text-anchor="middle" font-size="10" fill="#92400e">Beta(T=1) − Beta(T=0)</text>
      <text x="87" y="58" text-anchor="middle" font-size="10" fill="#92400e">把模糊用户推过阈值</text>
    </g>

    <!-- Pacing -->
    <g transform="translate(365,58)">
      <rect width="175" height="202" rx="10" fill="#ecfdf5" stroke="#10b981"/>
      <text x="87" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">自适应预算配速</text>
      <text x="87" y="42" text-anchor="middle" font-size="10" fill="#047857">ρ = (B剩/B) ÷ (t剩/T)</text>

      <!-- gauge -->
      <g transform="translate(20,60)">
        <rect width="135" height="10" rx="5" fill="#d1fae5"/>
        <rect width="90" height="10" rx="5" fill="#10b981"/>
        <line x1="67" y1="-3" x2="67" y2="13" stroke="#065f46" stroke-width="1.5"/>
        <text x="0" y="28" font-size="9" fill="#065f46">花得慢 ρ&gt;1</text>
        <text x="135" y="28" text-anchor="end" font-size="9" fill="#065f46">花得快 ρ&lt;1</text>
      </g>

      <text x="87" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">投放判据</text>
      <text x="87" y="140" text-anchor="middle" font-size="10" fill="#065f46">(τ̂ + 探索) / cost &gt; λ / ρ</text>
      <text x="87" y="172" text-anchor="middle" font-size="9.5" fill="#475569">硬约束：cost ≤ 剩余预算</text>
    </g>

    <!-- Arrows user -> models &amp; TS -->
    <path d="M130,85 L160,118" stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M130,95 C145,140 145,200 158,222" stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

    <!-- models/ts -> pacing -->
    <path d="M335,118 L363,140" stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M335,220 L363,180" stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

    <!-- Decision output -->
    <g transform="translate(365,285)">
      <rect width="175" height="50" rx="10" fill="#1e293b"/>
      <text x="87" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">决策：投 / 不投</text>
      <text x="87" y="40" text-anchor="middle" font-size="10" fill="#cbd5e1">观测 y_t，消耗 c_t</text>
    </g>
    <path d="M452,260 L452,283" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arB)"/>

    <!-- Feedback loop: 决策反馈到用户流 -->
    <path d="M365,310 L60,310 L60,90 L128,90"
          stroke="#1d4ed8" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arB)"/>
    <text x="70" y="200" font-size="10.5" font-weight="600" fill="#1d4ed8">反馈更新</text>
    <text x="70" y="216" font-size="10.5" font-weight="600" fill="#1d4ed8">模型 &amp; Beta</text>

    <!-- Bottom result bar -->
    <g transform="translate(20,355)">
      <rect width="520" height="95" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="3 3"/>
      <text x="260" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Criteo Uplift 实证：数据效率交叉点</text>

      <g transform="translate(20,38)">
        <circle cx="8" cy="8" r="5" fill="#3b82f6"/>
        <text x="20" y="12" font-size="11" fill="#1e3a8a" font-weight="600">BCCB：第 1 个用户起可用</text>
        <text x="20" y="28" font-size="10" fill="#334155">方差低 3–5×，23 ± 9 次转化</text>
      </g>
      <g transform="translate(280,38)">
        <circle cx="8" cy="8" r="5" fill="#ef4444"/>
        <text x="20" y="12" font-size="11" fill="#7f1d1d" font-weight="600">离线：需 ~10K 历史数据</text>
        <text x="20" y="28" font-size="10" fill="#334155">数据充足后反超，冷启动不可用</text>
      </g>
    </g>
  </g>
</svg>