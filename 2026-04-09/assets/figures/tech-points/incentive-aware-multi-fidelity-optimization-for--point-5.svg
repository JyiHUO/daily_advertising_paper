<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">语义过饱和：广告强度 vs 社会福利的非单调权衡</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Semantic Saturation — Why the optimum hides in the middle</text>

  <!-- ===== CENTER: Welfare Curve ===== -->
  <g transform="translate(180, 100)">
    <!-- Axes -->
    <line x1="40" y1="240" x2="520" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="40" y1="240" x2="40" y2="20" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="280" y="275" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">广告推广强度 s →</text>
    <text x="18" y="130" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold" transform="rotate(-90,18,130)">社会福利 W →</text>

    <!-- Curve: inverted U shape -->
    <path d="M60,220 Q120,180 180,100 Q240,30 300,60 Q360,90 420,180 Q460,230 500,235" 
          fill="none" stroke="url(#curveGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Optimal point -->
    <circle cx="260" cy="48" r="8" fill="#facc15" opacity="0.9" filter="url(#glow)"/>
    <line x1="260" y1="56" x2="260" y2="240" stroke="#facc15" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="260" y="38" text-anchor="middle" fill="#facc15" font-size="13" font-weight="bold">✦ 最优点</text>

    <!-- Zone labels -->
    <!-- Low zone -->
    <rect x="60" y="185" width="100" height="28" rx="6" fill="#4ade80" opacity="0.15"/>
    <text x="110" y="204" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">太弱：无商业价值</text>

    <!-- Collapse zone -->
    <rect x="380" y="185" width="120" height="28" rx="6" fill="#ef4444" opacity="0.15"/>
    <text x="440" y="204" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">太强：语义崩溃 💥</text>
  </g>

  <!-- ===== BOTTOM: Three comparison panels ===== -->
  <!-- Panel 1: Low -->
  <g transform="translate(30, 400)">
    <rect width="260" height="185" rx="12" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
    <rect width="260" height="32" rx="12" fill="#4ade80" opacity="0.2"/>
    <text x="130" y="22" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">🟢 低强度 · 自然</text>
    
    <!-- Chat bubble -->
    <rect x="20" y="45" width="220" height="50" rx="8" fill="#334155"/>
    <text x="30" y="65" fill="#e2e8f0" font-size="11">👤 我想吃辣的</text>
    <rect x="20" y="100" width="220" height="68" rx="8" fill="#1a3a2a"/>
    <text x="30" y="118" fill="#86efac" font-size="11">🤖 泰式咖喱和川菜都不错~</text>
    <text x="30" y="136" fill="#86efac" font-size="11">Thai Spice Garden 有好评，</text>
    <text x="30" y="154" fill="#86efac" font-size="11">Sichuan House 也值得一试</text>
  </g>

  <!-- Panel 2: Over-promoted text -->
  <g transform="translate(320, 400)">
    <rect width="260" height="185" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <rect width="260" height="32" rx="12" fill="#f97316" opacity="0.2"/>
    <text x="130" y="22" text-anchor="middle" fill="#f97316" font-size="14" font-weight="bold">🟠 高强度 · 强推</text>

    <rect x="20" y="45" width="220" height="50" rx="8" fill="#334155"/>
    <text x="30" y="65" fill="#e2e8f0" font-size="11">👤 我想吃辣的</text>
    <rect x="20" y="100" width="220" height="68" rx="8" fill="#3a2a1a"/>
    <text x="30" y="118" fill="#fdba74" font-size="11">🤖 绝对要选 Thai Spice Garden！</text>
    <text x="30" y="136" fill="#fdba74" font-size="11">他们的咖喱是你的命中注定——</text>
    <text x="30" y="154" fill="#fdba74" font-size="11">错过绝对后悔！🚨</text>
  </g>

  <!-- Panel 3: Collapse -->
  <g transform="translate(610, 400)">
    <rect width="260" height="185" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect width="260" height="32" rx="12" fill="#ef4444" opacity="0.2"/>
    <text x="130" y="22" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">🔴 拉满 · 语义崩溃</text>

    <!-- Image collapse illustration -->
    <rect x="20" y="45" width="220" height="120" rx="8" fill="#2a1a1a"/>
    <!-- Two logos merging into chaos -->
    <circle cx="80" cy="90" r="30" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
    <text x="80" y="95" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Alpha</text>
    <circle cx="160" cy="90" r="30" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.6"/>
    <text x="160" y="95" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Beta</text>
    <!-- Merge zone -->
    <ellipse cx="120" cy="90" rx="22" ry="28" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="120" y="88" text-anchor="middle" fill="#fca5a5" font-size="16" font-weight="bold">AB?</text>
    <text x="120" y="104" text-anchor="middle" fill="#fca5a5" font-size="9">混合不可辨</text>
    
    <text x="130" y="155" text-anchor="middle" fill="#f87171" font-size="11">品牌 Logo 融合 → 结构崩溃</text>
  </g>

  <!-- Connecting arrows from curve zones to panels -->
  <path d="M250,340 L160,398" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <path d="M420,340 L450,398" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <path d="M560,340 L740,398" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>

  <!-- Key insight callout -->
  <rect x="580" y="110" width="280" height="70" rx="10" fill="#1e293b" stroke="#facc15" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="720" y="135" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="bold">💡 核心洞察</text>
  <text x="720" y="157" text-anchor="middle" fill="#fde68a" font-size="12">最优解藏在中间 → 需精确搜索</text>
  <text x="720" y="173" text-anchor="middle" fill="#94a3b8" font-size="11">（多保真度优化降低搜索成本）</text>
</svg>