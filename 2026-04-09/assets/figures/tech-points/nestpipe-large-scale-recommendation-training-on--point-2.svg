<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="commGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="compGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="hideGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <marker id="arrowW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#e2e8f0"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">Frozen Window Pipeline (FWP)</text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="14">用参数冻结窗口重叠 All2All 通信与 Dense 计算</text>

  <!-- ===== LEFT: Before (Naive Sequential) ===== -->
  <text x="220" y="95" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold">❌ 朴素串行</text>

  <!-- Naive timeline -->
  <g transform="translate(40, 110)">
    <!-- MB1 comm -->
    <rect x="0" y="0" width="80" height="34" rx="5" fill="url(#commGrad)" opacity="0.9"/>
    <text x="40" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">A2A ①</text>
    <!-- MB1 comp -->
    <rect x="82" y="0" width="80" height="34" rx="5" fill="url(#compGrad)" opacity="0.9"/>
    <text x="122" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">计算 ①</text>
    <!-- MB2 comm -->
    <rect x="164" y="0" width="80" height="34" rx="5" fill="url(#commGrad)" opacity="0.9"/>
    <text x="204" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">A2A ②</text>
    <!-- MB2 comp -->
    <rect x="246" y="0" width="80" height="34" rx="5" fill="url(#compGrad)" opacity="0.9"/>
    <text x="286" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">计算 ②</text>
    <!-- ... -->
    <text x="340" y="22" fill="#64748b" font-size="16">…</text>

    <!-- total bar -->
    <line x1="0" y1="46" x2="355" y2="46" stroke="#f87171" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="178" y="62" text-anchor="middle" fill="#f87171" font-size="12">通信全部暴露在关键路径</text>
  </g>

  <!-- ===== RIGHT: After (FWP) ===== -->
  <text x="670" y="95" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold">✅ FWP 嵌套流水线</text>

  <g transform="translate(470, 110)">
    <!-- exposed comm MB1 -->
    <rect x="0" y="0" width="60" height="34" rx="5" fill="url(#commGrad)" opacity="0.9" stroke="#f97316" stroke-width="2"/>
    <text x="30" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">A2A ①</text>
    <!-- Overlapped: comp1 + comm2 -->
    <rect x="62" y="0" width="100" height="34" rx="5" fill="url(#compGrad)" opacity="0.9"/>
    <text x="112" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">计算 ①</text>
    <rect x="62" y="20" width="100" height="14" rx="3" fill="url(#commGrad)" opacity="0.5"/>
    <text x="112" y="31" text-anchor="middle" fill="#fff" font-size="9">A2A ② 隐藏</text>
    <!-- Overlapped: comp2 + comm3 -->
    <rect x="164" y="0" width="100" height="34" rx="5" fill="url(#compGrad)" opacity="0.9"/>
    <text x="214" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">计算 ②</text>
    <rect x="164" y="20" width="100" height="14" rx="3" fill="url(#commGrad)" opacity="0.5"/>
    <text x="214" y="31" text-anchor="middle" fill="#fff" font-size="9">A2A ③ 隐藏</text>
    <!-- comp3 + comm4 -->
    <rect x="266" y="0" width="100" height="34" rx="5" fill="url(#compGrad)" opacity="0.9"/>
    <text x="316" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">计算 ③</text>
    <rect x="266" y="20" width="100" height="14" rx="3" fill="url(#commGrad)" opacity="0.5"/>
    <text x="316" y="31" text-anchor="middle" fill="#fff" font-size="9">A2A ④ 隐藏</text>

    <!-- exposed tail -->
    <rect x="266" y="36" width="100" height="0" rx="3" fill="none"/>

    <!-- total bar shorter -->
    <line x1="0" y1="46" x2="366" y2="46" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="183" y="62" text-anchor="middle" fill="#4ade80" font-size="12">仅首尾 A2A 暴露 → 暴露比 1/N</text>
  </g>

  <!-- ===== CENTER: Core Insight Illustration ===== -->
  <!-- Book analogy -->
  <rect x="60" y="200" width="780" height="230" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="230" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="bold">核心洞察：参数冻结窗口</text>

  <!-- Frozen window visual -->
  <g transform="translate(80, 250)">
    <!-- The "book" = batch -->
    <rect x="0" y="0" width="720" height="60" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <!-- 4 chapters = micro-batches -->
    <rect x="5" y="5" width="170" height="50" rx="6" fill="#1e3a5f"/>
    <text x="90" y="35" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">μ-batch ①</text>
    <rect x="185" y="5" width="170" height="50" rx="6" fill="#1e3a5f"/>
    <text x="270" y="35" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">μ-batch ②</text>
    <rect x="365" y="5" width="170" height="50" rx="6" fill="#1e3a5f"/>
    <text x="450" y="35" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">μ-batch ③</text>
    <rect x="545" y="5" width="170" height="50" rx="6" fill="#1e3a5f"/>
    <text x="630" y="35" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">μ-batch ④</text>

    <!-- Frozen bracket -->
    <line x1="5" y1="68" x2="715" y2="68" stroke="#4ade80" stroke-width="2.5"/>
    <line x1="5" y1="62" x2="5" y2="74" stroke="#4ade80" stroke-width="2.5"/>
    <line x1="715" y1="62" x2="715" y2="74" stroke="#4ade80" stroke-width="2.5"/>
    <text x="360" y="90" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">🔒 参数冻结窗口：只累积梯度，不更新 Embedding</text>

    <!-- Update arrow after -->
    <line x1="720" y1="30" x2="738" y2="30" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowW)"/>
  </g>

  <!-- Update box -->
  <rect x="820" y="275" width="16" height="60" rx="4" fill="#a855f7"/>
  <text x="828" y="340" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold" transform="rotate(-90,828,315)">更新</text>

  <!-- Two streams diagram -->
  <g transform="translate(110, 365)">
    <text x="0" y="14" fill="#fb923c" font-size="13" font-weight="bold">📡 通信流</text>
    <text x="0" y="40" fill="#60a5fa" font-size="13" font-weight="bold">🔢 计算流</text>

    <!-- Comm stream blocks -->
    <rect x="100" y="0" width="90" height="22" rx="4" fill="url(#commGrad)" opacity="0.85"/>
    <text x="145" y="16" text-anchor="middle" fill="#fff" font-size="10">A2A ①</text>

    <rect x="195" y="0" width="90" height="22" rx="4" fill="url(#commGrad)" opacity="0.55"/>
    <text x="240" y="16" text-anchor="middle" fill="#fff" font-size="10">A2A ②</text>

    <rect x="290" y="0" width="90" height="22" rx="4" fill="url(#commGrad)" opacity="0.55"/>
    <text x="335" y="16" text-anchor="middle" fill="#fff" font-size="10">A2A ③</text>

    <rect x="385" y="0" width="90" height="22" rx="4" fill="url(#commGrad)" opacity="0.55"/>
    <text x="430" y="16" text-anchor="middle" fill="#fff" font-size="10">A2A ④</text>

    <!-- Comp stream blocks (offset right) -->
    <rect x="195" y="26" width="90" height="22" rx="4" fill="url(#compGrad)" opacity="0.9"/>
    <text x="240" y="42" text-anchor="middle" fill="#fff" font-size="10">Dense ①</text>

    <rect x="290" y="26" width="90" height="22" rx="4" fill="url(#compGrad)" opacity="0.9"/>
    <text x="335" y="42" text-anchor="middle" fill="#fff" font-size="10">Dense ②</text>

    <rect x="385" y="26" width="90" height="22" rx="4" fill="url(#compGrad)" opacity="0.9"/>
    <text x="430" y="42" text-anchor="middle" fill="#fff" font-size="10">Dense ③</text>

    <rect x="480" y="26" width="90" height="22" rx="4" fill="url(#compGrad)" opacity="0.9"/>
    <text x="525" y="42" text-anchor="middle" fill="#fff" font-size="10">Dense ④</text>

    <!-- Hidden overlap indicators -->
    <rect x="195" y="-3" width="280" height="52" rx="6" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="335" y="70" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">通信被计算完全遮盖 ✓</text>

    <!-- Exposed markers -->
    <rect x="100" y="-3" width="90" height="25" rx="4" fill="none" stroke="#f87171" stroke-width="1.8" stroke-dasharray="3,2"/>
    <text x="145" y="-10" text-anchor="middle" fill="#f87171" font-size="10">暴露</text>
  </g>

  <!-- Bottom stat -->
  <rect x="260" y="460" width="380" height="44" rx="10" fill="#0f4c3a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="480" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">1536 卡实测：1185ms 通信 → 仅暴露 154ms</text>
  <text x="450" y="496" text-anchor="middle" fill="#86efac" font-size="12">3.06× 加速 · 94% 扩展效率 · 严格同步训练</text>
</svg>