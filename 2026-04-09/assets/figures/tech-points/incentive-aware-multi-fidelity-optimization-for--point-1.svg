<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#55efc4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" opacity="0.7"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">多保真度搜索：从粗到精的逐级筛选</text>
  <text x="450" y="68" text-anchor="middle" fill="#8899bb" font-size="14">Multi-Fidelity Search — 用低成本前缀快速淘汰，高成本精确评估少数候选</text>

  <!-- Funnel visualization — 4 stages -->
  <!-- Stage 1: 25 candidates, fidelity 1 -->
  <g transform="translate(450, 160)">
    <rect x="-340" y="-45" width="680" height="90" rx="16" fill="url(#g1)" opacity="0.18" stroke="#ff6b6b" stroke-width="2"/>
    <!-- Dots representing 25 candidates -->
    <g fill="#ff6b6b" opacity="0.9">
      <circle cx="-290" cy="0" r="8"/><circle cx="-260" cy="0" r="8"/><circle cx="-230" cy="0" r="8"/>
      <circle cx="-200" cy="0" r="8"/><circle cx="-170" cy="0" r="8"/><circle cx="-140" cy="0" r="8"/>
      <circle cx="-110" cy="0" r="8"/><circle cx="-80" cy="0" r="8"/><circle cx="-50" cy="0" r="8"/>
      <circle cx="-20" cy="0" r="8"/><circle cx="10" cy="0" r="8"/><circle cx="40" cy="0" r="8"/>
      <circle cx="70" cy="0" r="8"/><circle cx="100" cy="0" r="8"/><circle cx="130" cy="0" r="8"/>
      <circle cx="160" cy="0" r="8"/><circle cx="190" cy="0" r="8"/><circle cx="220" cy="0" r="8"/>
      <circle cx="250" cy="0" r="8"/><circle cx="280" cy="0" r="8"/>
      <circle cx="-260" cy="26" r="8"/><circle cx="-230" cy="26" r="8"/><circle cx="-200" cy="26" r="8"/>
      <circle cx="-170" cy="26" r="8"/><circle cx="-140" cy="26" r="8"/>
    </g>
    <!-- Label left -->
    <text x="-340" y="-52" fill="#ff6b6b" font-size="15" font-weight="bold">第1轮</text>
    <!-- Label right -->
    <text x="345" y="-12" fill="#ffaa99" font-size="13" text-anchor="start">25个配置</text>
    <text x="345" y="8" fill="#ffaa99" font-size="13" text-anchor="start">30 token/次</text>
    <text x="345" y="28" fill="#ffaa99" font-size="12" text-anchor="start" opacity="0.7">≈3000 token</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="210" x2="450" y2="240" stroke="#ffffff" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="480" y="232" fill="#ff6b6b" font-size="11" opacity="0.8">淘汰12个 ✗</text>

  <!-- Stage 2: 13 candidates -->
  <g transform="translate(450, 278)">
    <rect x="-250" y="-35" width="500" height="70" rx="14" fill="url(#g2)" opacity="0.18" stroke="#f9ca24" stroke-width="2"/>
    <g fill="#f9ca24" opacity="0.9">
      <circle cx="-200" cy="0" r="8"/><circle cx="-165" cy="0" r="8"/><circle cx="-130" cy="0" r="8"/>
      <circle cx="-95" cy="0" r="8"/><circle cx="-60" cy="0" r="8"/><circle cx="-25" cy="0" r="8"/>
      <circle cx="10" cy="0" r="8"/><circle cx="45" cy="0" r="8"/><circle cx="80" cy="0" r="8"/>
      <circle cx="115" cy="0" r="8"/><circle cx="150" cy="0" r="8"/><circle cx="185" cy="0" r="8"/>
      <circle cx="-10" cy="26" r="8"/>
    </g>
    <text x="-250" y="-42" fill="#f9ca24" font-size="15" font-weight="bold">第2轮</text>
    <text x="260" y="-5" fill="#f0d080" font-size="13" text-anchor="start">13个配置</text>
    <text x="260" y="15" fill="#f0d080" font-size="13" text-anchor="start">60 token/次</text>
    <text x="260" y="33" fill="#f0d080" font-size="12" text-anchor="start" opacity="0.7">≈5000 token</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="318" x2="450" y2="348" stroke="#ffffff" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="480" y="340" fill="#f9ca24" font-size="11" opacity="0.8">淘汰7个 ✗</text>

  <!-- Stage 3: 6 candidates -->
  <g transform="translate(450, 386)">
    <rect x="-160" y="-30" width="320" height="60" rx="12" fill="url(#g3)" opacity="0.18" stroke="#a29bfe" stroke-width="2"/>
    <g fill="#a29bfe" opacity="0.9">
      <circle cx="-110" cy="0" r="9"/><circle cx="-60" cy="0" r="9"/><circle cx="-10" cy="0" r="9"/>
      <circle cx="40" cy="0" r="9"/><circle cx="90" cy="0" r="9"/><circle cx="140" cy="0" r="9" opacity="0.5"/>
    </g>
    <text x="-160" y="-37" fill="#a29bfe" font-size="15" font-weight="bold">第3轮</text>
    <text x="170" y="-2" fill="#c0b0ff" font-size="13" text-anchor="start">6个配置</text>
    <text x="170" y="18" fill="#c0b0ff" font-size="13" text-anchor="start">120 token/次</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="420" x2="450" y2="450" stroke="#ffffff" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="480" y="442" fill="#a29bfe" font-size="11" opacity="0.8">淘汰3个 ✗</text>

  <!-- Stage 4: 3 candidates → 1 winner -->
  <g transform="translate(450, 494)">
    <rect x="-100" y="-32" width="200" height="64" rx="12" fill="url(#g4)" opacity="0.22" stroke="#55efc4" stroke-width="2.5"/>
    <g filter="url(#glow)">
      <circle cx="-40" cy="0" r="12" fill="#55efc4" opacity="0.5"/>
      <circle cx="40" cy="0" r="12" fill="#55efc4" opacity="0.5"/>
      <circle cx="0" cy="0" r="14" fill="#00b894" stroke="#55efc4" stroke-width="2"/>
    </g>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">★</text>
    <text x="-100" y="-39" fill="#55efc4" font-size="15" font-weight="bold">第4轮</text>
    <text x="110" y="-5" fill="#80dcc0" font-size="13" text-anchor="start">3个候选</text>
    <text x="110" y="15" fill="#80dcc0" font-size="13" text-anchor="start">240 token/次</text>
    <text x="110" y="33" fill="#80dcc0" font-size="12" text-anchor="start" opacity="0.7">精确评估</text>
  </g>

  <!-- Winner label -->
  <text x="450" y="570" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">✓ 最优广告配置</text>

  <!-- Key insight box -->
  <rect x="20" y="90" width="175" height="80" rx="10" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <text x="108" y="112" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">核心洞察</text>
  <text x="108" y="132" text-anchor="middle" fill="#aabbdd" font-size="11">前缀评估 = 完整评估</text>
  <text x="108" y="148" text-anchor="middle" fill="#aabbdd" font-size="11">的无偏估计</text>
  <text x="108" y="164" text-anchor="middle" fill="#77aacc" font-size="10" font-style="italic">低成本高方差 → 高成本低方差</text>

  <!-- Cost bar on right side -->
  <g transform="translate(830, 140)">
    <text x="0" y="0" text-anchor="middle" fill="#8899bb" font-size="12">成本</text>
    <rect x="-8" y="10" width="16" height="400" rx="8" fill="#ffffff" opacity="0.05"/>
    <rect x="-6" y="350" width="12" height="55" rx="6" fill="url(#g1)" opacity="0.6"/>
    <rect x="-6" y="270" width="12" height="75" rx="6" fill="url(#g2)" opacity="0.6"/>
    <rect x="-6" y="200" width="12" height="65" rx="6" fill="url(#g3)" opacity="0.6"/>
    <rect x="-6" y="170" width="12" height="25" rx="6" fill="url(#g4)" opacity="0.6"/>
    <text x="0" y="425" text-anchor="middle" fill="#8899bb" font-size="10">低</text>
    <text x="0" y="165" text-anchor="middle" fill="#8899bb" font-size="10">高</text>
  </g>
</svg>