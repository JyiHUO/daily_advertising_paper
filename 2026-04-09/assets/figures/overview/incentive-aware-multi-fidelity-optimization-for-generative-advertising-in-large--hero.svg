<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="880" viewBox="0 0 1460 880"><defs><linearGradient id="overviewBg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F8FAFC"/></linearGradient><linearGradient id="heroBand" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E0EAFF"/><stop offset="100%" stop-color="#ECFDF5"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="1460" height="880" fill="url(#overviewBg)"/><rect x="34" y="32" width="1392" height="816" rx="34" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/><rect x="52" y="50" width="1356" height="164" rx="28" fill="url(#heroBand)" stroke="#D8E6F5" stroke-width="1.2"/><text x="72" y="92" font-size="30" font-weight="800" fill="#0F172A">Incentive-Aware Multi-Fidelity Optimization for Generative Advertising in Large Language Models</text><text x="72" y="126" font-size="15" font-weight="700" fill="#475569">论文核心机制总览</text><rect x="72" y="146" width="920" height="44" rx="22" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.2"/><text x="92" y="174" font-size="16" font-weight="700" fill="#3730A3">一句话理解：这是一篇直接的计算广告论文，提出了面向LLM生成式广告的激励感知多保真度优化机制(IAMFM)，将VCG拍卖机制与多保真度黑盒优化结合，解决广告主策略性误报和LLM生成高成本两大核心问题，对生成式广告</text><rect x="80.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="72.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.6"/><text x="94" y="244.0" font-size="14" font-weight="700" fill="#7C2D12">随着LLM被用于对话推荐等场景，多个广告主竞争影</text><text x="94" y="262.0" font-size="14" font-weight="700" fill="#7C2D12">响同一条LLM生成内容，平台需要选择一个&#x27;影响力</text><text x="94" y="280.0" font-size="14" font-weight="700" fill="#7C2D12">配置向量&#x27;（每个广告主的推广强度）来最大化社会…</text><rect x="1076.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1068.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="1.6"/><text x="1090" y="244.0" font-size="14" font-weight="700" fill="#3730A3">这是一篇直接的计算广告论文，提出了面向LLM生成</text><text x="1090" y="262.0" font-size="14" font-weight="700" fill="#3730A3">式广告的激励感知多保真度优化机制(IAMFM)，</text><text x="1090" y="280.0" font-size="14" font-weight="700" fill="#3730A3">将VCG拍卖机制与多保真度黑盒优化结合，解决广…</text><path d="M 468.0 427.0 C 502.0 427.0, 532.0 427.0, 566.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><path d="M 890.0 427.0 C 924.0 427.0, 954.0 427.0, 988.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="176.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="168.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/><rect x="188.0" y="336.0" width="86" height="30" rx="15" fill="#DBEAFE"/><text x="231.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#60A5FA">核心模块</text><text x="318.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">多保真度搜索框架</text><text x="194.0" y="458.0" font-size="14" font-weight="600" fill="#334155">想象你要从25种广告配置中选最优</text><text x="194.0" y="476.0" font-size="14" font-weight="600" fill="#334155">的，但每次完整评估要花很多tok</text><text x="194.0" y="494.0" font-size="14" font-weight="600" fill="#334155">en成本。多保真度的思路是：先让</text><text x="194.0" y="512.0" font-size="14" font-weight="600" fill="#334155">LLM只生成30个token的…</text><rect x="598.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="590.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#F0FDF4" stroke="#10B981" stroke-width="1.6"/><rect x="610.0" y="336.0" width="86" height="30" rx="15" fill="#BBF7D0"/><text x="653.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#10B981">核心模块</text><text x="740.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">VCG激励兼容层</text><text x="616.0" y="458.0" font-size="14" font-weight="600" fill="#334155">VCG的核心逻辑是：你的支付等于</text><text x="616.0" y="476.0" font-size="14" font-weight="600" fill="#334155">你加入后对别人造成的&#x27;机会成本&#x27;</text><text x="616.0" y="494.0" font-size="14" font-weight="600" fill="#334155">。具体来说，平台先算出有你参与时</text><text x="616.0" y="512.0" font-size="14" font-weight="600" fill="#334155">的最优配置s*下大家的总福利，…</text><rect x="1020.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1012.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.6"/><rect x="1032.0" y="336.0" width="86" height="30" rx="15" fill="#FDE68A"/><text x="1075.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#F59E0B">核心模块</text><text x="1162.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">主动反事实优化ACO</text><text x="1038.0" y="458.0" font-size="14" font-weight="600" fill="#334155">VCG最大的实际障碍是计算量：有</text><text x="1038.0" y="476.0" font-size="14" font-weight="600" fill="#334155">N个广告主就要额外做N次优化。A</text><text x="1038.0" y="494.0" font-size="14" font-weight="600" fill="#334155">CO的核心思想是&#x27;不要从头算&#x27;。</text><text x="1038.0" y="512.0" font-size="14" font-weight="600" fill="#334155">在MFBO方案中，主优化已经训…</text><rect x="72" y="614" width="1316" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/><text x="94" y="650" font-size="18" font-weight="800" fill="#0F172A">为什么这篇论文值得放主图</text><text x="94" y="684.0" font-size="15" font-weight="600" fill="#334155">随着LLM被用于对话推荐等场景，多个广告主竞争影响同一条LLM生成内容，平台需要选择一个&#x27;影响力配置向量&#x27;（每个广告</text><text x="94" y="706.0" font-size="15" font-weight="600" fill="#334155">主的推广强度）来最大化社会福利（广告主价值+用户满意度）。但存在三大难题：广告主会策略性地谎报自己的价值以操纵结果；</text><text x="94" y="728.0" font-size="15" font-weight="600" fill="#334155">评估每个配置需要大量LLM生成开销，穷举不可行；且过度推广会导致&#x27;语义崩溃&#x27;——生成内容变得像推销话术甚至出现品牌融</text><text x="94" y="750.0" font-size="15" font-weight="600" fill="#334155">合乱象，反而损害用户体验。现有工作要么不考虑激励兼容，要么没有解决LLM评估的高成本问题，这篇论文首次将VCG拍卖机</text><text x="94" y="772.0" font-size="15" font-weight="600" fill="#334155">制与多保真度优化统一起来处理生成式广告场景。</text><text x="72" y="836" font-size="14" font-weight="600" fill="#64748B">图示：候选主图不可靠时，自动回退为论文机制总览 SVG。</text></svg>