<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eaf0f7"/>
    </linearGradient>
    <linearGradient id="gGood" x1="0" x2="1">
      <stop offset="0" stop-color="#2d8f5f"/>
      <stop offset="1" stop-color="#5ec488"/>
    </linearGradient>
    <linearGradient id="gBad" x1="0" x2="1">
      <stop offset="0" stop-color="#b04848"/>
      <stop offset="1" stop-color="#d67a7a"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0" x2="1">
      <stop offset="0" stop-color="#8a8f96"/>
      <stop offset="1" stop-color="#b7bcc4"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4a5c"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d8f5f"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b04848"/>
    </marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8f96"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2a3c">预算分配中的 MPC：何时真的值得上预测式控制？</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#5a6b80">季度预算 12 周切分 · 执行噪声 + 周-周 ±20% 平滑 · 反应式 Pacing vs Model Predictive Control</text>

  <!-- Central mechanism: closed loop -->
  <g filter="url(#sh)">
    <rect x="330" y="220" width="340" height="180" rx="14" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.6"/>
  </g>
  <text x="500" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1f3a5f">MPC 闭环规划器（Receding Horizon）</text>

  <!-- inner loop nodes -->
  <g>
    <circle cx="385" cy="310" r="36" fill="#e8eef8" stroke="#1f3a5f"/>
    <text x="385" y="306" text-anchor="middle" font-size="11" fill="#1f3a5f">预测 θ</text>
    <text x="385" y="322" text-anchor="middle" font-size="10" fill="#4a6280">未来 H 周</text>

    <circle cx="500" cy="310" r="36" fill="#fff3d9" stroke="#a8761a"/>
    <text x="500" y="306" text-anchor="middle" font-size="11" fill="#6b4910">解 NLP</text>
    <text x="500" y="322" text-anchor="middle" font-size="10" fill="#8a6420">max Σ回报</text>

    <circle cx="615" cy="310" r="36" fill="#e5f3ea" stroke="#2d8f5f"/>
    <text x="615" y="306" text-anchor="middle" font-size="11" fill="#1f5a3a">执行首周</text>
    <text x="615" y="322" text-anchor="middle" font-size="10" fill="#3a7a54">观测 s,r</text>
  </g>

  <!-- arrows inside -->
  <path d="M421,310 L464,310" stroke="#3a4a5c" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M536,310 L579,310" stroke="#3a4a5c" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M615,346 Q615,378 500,378 Q385,378 385,346" stroke="#3a4a5c" stroke-width="1.8" fill="none" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <text x="500" y="393" text-anchor="middle" font-size="10" fill="#5a6b80" font-style="italic">下一周重新规划</text>

  <!-- Left: inputs / constraints -->
  <g>
    <text x="50" y="150" font-size="13" font-weight="700" fill="#1b2a3c">输入与约束</text>
    <rect x="50" y="165" width="220" height="34" rx="6" fill="#ffffff" stroke="#9aa7b8"/>
    <text x="60" y="187" font-size="11" fill="#2d3a4c">季度预算 B_Q ≈ 1200 万</text>

    <rect x="50" y="207" width="220" height="34" rx="6" fill="#ffffff" stroke="#9aa7b8"/>
    <text x="60" y="229" font-size="11" fill="#2d3a4c">一阶执行动力学 + 噪声</text>

    <rect x="50" y="249" width="220" height="34" rx="6" fill="#ffffff" stroke="#9aa7b8"/>
    <text x="60" y="271" font-size="11" fill="#2d3a4c">周-周变化 ±20% 平滑</text>

    <rect x="50" y="291" width="220" height="34" rx="6" fill="#ffffff" stroke="#9aa7b8"/>
    <text x="60" y="313" font-size="11" fill="#2d3a4c">Richards 饱和响应 r(s;θ)</text>
  </g>
  <path d="M272,300 Q300,300 326,300" stroke="#1f3a5f" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>

  <!-- Reactive baseline (left-bottom, as contrast) -->
  <g>
    <rect x="50" y="470" width="220" height="130" rx="10" fill="#f4f0e6" stroke="#a8761a" stroke-width="1.4"/>
    <text x="160" y="493" text-anchor="middle" font-size="13" font-weight="700" fill="#6b4910">反应式 Pacing 基线</text>
    <text x="60" y="517" font-size="11" fill="#5c4a1f">· 按去年同期周占比分配</text>
    <text x="60" y="537" font-size="11" fill="#5c4a1f">· 剩余预算 / 剩余周 摊平</text>
    <text x="60" y="557" font-size="11" fill="#5c4a1f">· 不预测未来 θ</text>
    <text x="60" y="577" font-size="11" fill="#5c4a1f">· 差额 carry-over</text>
  </g>

  <!-- VS badge -->
  <circle cx="310" cy="530" r="22" fill="#1f3a5f"/>
  <text x="310" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">VS</text>

  <!-- Right: three regimes as verdict -->
  <g>
    <text x="950" y="150" text-anchor="end" font-size="13" font-weight="700" fill="#1b2a3c">三种非平稳场景下的判决</text>

    <!-- Regime 1: static -->
    <g>
      <rect x="720" y="170" width="230" height="72" rx="10" fill="#ffffff" stroke="#8a8f96" stroke-width="1.4"/>
      <rect x="720" y="170" width="6" height="72" fill="url(#gMid)"/>
      <text x="736" y="191" font-size="12" font-weight="700" fill="#3a4a5c">① 静态 / 随机漂移</text>
      <text x="736" y="210" font-size="10.5" fill="#5a6b80">效率不变或不可预测抖动</text>
      <text x="736" y="230" font-size="12" font-weight="700" fill="#8a3a3a">MPC ≈ 基线，甚至 −0.3%</text>
    </g>

    <!-- Regime 2: weak seasonal -->
    <g>
      <rect x="720" y="258" width="230" height="72" rx="10" fill="#ffffff" stroke="#b04848" stroke-width="1.4"/>
      <rect x="720" y="258" width="6" height="72" fill="url(#gBad)"/>
      <text x="736" y="279" font-size="12" font-weight="700" fill="#3a4a5c">② 弱季节性 (δ=5%)</text>
      <text x="736" y="298" font-size="10.5" fill="#5a6b80">结构太弱，预测抵不过噪声</text>
      <text x="736" y="318" font-size="12" font-weight="700" fill="#b04848">MPC −3.2%</text>
    </g>

    <!-- Regime 3: strong seasonal -->
    <g>
      <rect x="720" y="346" width="230" height="96" rx="10" fill="#ffffff" stroke="#2d8f5f" stroke-width="1.8"/>
      <rect x="720" y="346" width="6" height="96" fill="url(#gGood)"/>
      <text x="736" y="367" font-size="12" font-weight="700" fill="#1f5a3a">③ 可预测衰减 (δ=10~20%)</text>
      <text x="736" y="385" font-size="10.5" fill="#3a7a54">SARIMAX 抓住结构，预算前置</text>
      <text x="736" y="410" font-size="14" font-weight="800" fill="#2d8f5f">MPC +4.2% / +11.2% / +14.0%</text>
      <text x="736" y="430" font-size="10" fill="#3a7a54" font-style="italic">被 ±20% 平滑约束顶住上限</text>
    </g>
  </g>

  <!-- Arrows from center to regimes -->
  <path d="M672,270 Q695,240 718,206" stroke="#8a8f96" stroke-width="1.5" fill="none" marker-end="url(#arrM)"/>
  <path d="M672,310 Q695,300 718,294" stroke="#b04848" stroke-width="1.5" fill="none" marker-end="url(#arrR)"/>
  <path d="M672,350 Q695,370 718,390" stroke="#2d8f5f" stroke-width="2.2" fill="none" marker-end="url(#arrG)"/>

  <!-- Bottom takeaway bar -->
  <g>
    <rect x="310" y="640" width="640" height="60" rx="10" fill="#1f3a5f"/>
    <text x="630" y="663" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">核心结论</text>
    <text x="630" y="685" text-anchor="middle" font-size="12" fill="#dde6f2">非平稳本身不是上 MPC 的理由 — 只有当回报效率存在 <tspan font-weight="700" fill="#9ee2b6">可预测结构</tspan> 时，预测式控制才能把 <tspan font-weight="700" fill="#9ee2b6">跨时段权衡</tspan> 兑现为收益</text>
  </g>

  <!-- 12-week bar motif under center -->
  <g transform="translate(340,425)" opacity="0.95">
    <text x="160" y="14" text-anchor="middle" font-size="11" fill="#3a7a54" font-weight="700">MPC 把预算前置到高效率周（12 周示意）</text>
    <g transform="translate(80,20)">
      <rect x="0" y="18" width="12" height="22" fill="#2d8f5f"/>
      <rect x="16" y="10" width="12" height="30" fill="#2d8f5f"/>
      <rect x="32" y="4" width="12" height="36" fill="#2d8f5f"/>
      <rect x="48" y="14" width="12" height="26" fill="#5ec488"/>
      <rect x="64" y="20" width="12" height="20" fill="#5ec488"/>
      <rect x="80" y="24" width="12" height="16" fill="#a8d5bb"/>
      <rect x="96" y="27" width="12" height="13" fill="#a8d5bb"/>
      <rect x="112" y="29" width="12" height="11" fill="#c9dfd2"/>
      <rect x="128" y="30" width="12" height="10" fill="#c9dfd2"/>
      <rect x="144" y="31" width="12" height="9" fill="#c9dfd2"/>
      <rect x="160" y="32" width="12" height="8" fill="#c9dfd2"/>
      <rect x="176" y="33" width="12" height="7" fill="#c9dfd2"/>
    </g>
  </g>
</svg>