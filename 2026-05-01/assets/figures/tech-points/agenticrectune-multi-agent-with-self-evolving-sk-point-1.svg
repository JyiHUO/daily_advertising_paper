<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">5-Agent 调参闭环：把调参工程师团队塞进 LLM</text>

  <!-- Actor -->
  <g>
    <rect x="60" y="110" width="180" height="90" rx="12" fill="#e8f1ff" stroke="#1f6feb" stroke-width="2"/>
    <text x="150" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f6feb">① Actor</text>
    <text x="150" y="165" text-anchor="middle" font-size="12" fill="#333">出点子</text>
    <text x="150" y="184" text-anchor="middle" font-size="11" fill="#666">CTR权重+0.1 …</text>
  </g>

  <!-- Critic -->
  <g>
    <rect x="300" y="110" width="180" height="90" rx="12" fill="#fff3e6" stroke="#e07a17" stroke-width="2"/>
    <text x="390" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#e07a17">② Critic</text>
    <text x="390" y="165" text-anchor="middle" font-size="12" fill="#333">挑刺筛选</text>
    <text x="390" y="184" text-anchor="middle" font-size="11" fill="#666">越界/违反护栏 ✗</text>
  </g>

  <!-- Online -->
  <g>
    <rect x="540" y="110" width="180" height="90" rx="12" fill="#e8f7ec" stroke="#2ea84c" stroke-width="2"/>
    <text x="630" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#2ea84c">③ Online</text>
    <text x="630" y="165" text-anchor="middle" font-size="12" fill="#333">跑线上 A/B</text>
    <text x="630" y="184" text-anchor="middle" font-size="11" fill="#666">北极星指标回收</text>
  </g>

  <!-- Arrows top row -->
  <line x1="240" y1="155" x2="298" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="155" x2="538" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Insight -->
  <g>
    <rect x="430" y="320" width="180" height="90" rx="12" fill="#f3e8ff" stroke="#7b3fe4" stroke-width="2"/>
    <text x="520" y="350" text-anchor="middle" font-size="16" font-weight="bold" fill="#7b3fe4">④ Insight</text>
    <text x="520" y="372" text-anchor="middle" font-size="12" fill="#333">复盘找规律</text>
    <text x="520" y="391" text-anchor="middle" font-size="11" fill="#666">哪些参数最敏感</text>
  </g>

  <!-- Skill / Skillhub -->
  <g>
    <rect x="170" y="320" width="180" height="90" rx="12" fill="#ffe8ee" stroke="#d33a66" stroke-width="2"/>
    <text x="260" y="350" text-anchor="middle" font-size="16" font-weight="bold" fill="#d33a66">⑤ Skill</text>
    <text x="260" y="372" text-anchor="middle" font-size="12" fill="#333">写回经验手册</text>
    <text x="260" y="391" text-anchor="middle" font-size="11" fill="#666">Skillhub 自进化</text>
  </g>

  <!-- Online -> Insight -->
  <path d="M630,200 Q630,280 608,322" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Insight -> Skill -->
  <line x1="430" y1="365" x2="352" y2="365" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Skill -> Actor (feedback loop, blue highlight) -->
  <path d="M185,320 Q60,300 60,240 Q60,200 148,202" fill="none" stroke="#1f6feb" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrBlue)"/>
  <text x="22" y="268" font-size="11" fill="#1f6feb" font-weight="bold">经验回灌</text>
  <text x="22" y="284" font-size="11" fill="#1f6feb" font-weight="bold">下轮更聪明</text>

  <!-- Bottom caption -->
  <g>
    <rect x="60" y="470" width="780" height="120" rx="10" fill="#fafafa" stroke="#ccc"/>
    <text x="80" y="498" font-size="13" font-weight="bold" fill="#333">例子：调粗排融合权重</text>
    <text x="80" y="522" font-size="12" fill="#555">• Actor：CTR+0.1，dismiss−0.05（附理由）</text>
    <text x="80" y="542" font-size="12" fill="#555">• Critic：剔除越界 / 跌多样性的候选，留 2–3 组</text>
    <text x="80" y="562" font-size="12" fill="#555">• Online：自动写实验配置 → 小流量 A/B → 显著性</text>
    <text x="80" y="582" font-size="12" fill="#555">• Insight + Skill：把 “CTR权重敏感” 写入 Skillhub，下一轮 Actor 直接用</text>
  </g>
</svg>