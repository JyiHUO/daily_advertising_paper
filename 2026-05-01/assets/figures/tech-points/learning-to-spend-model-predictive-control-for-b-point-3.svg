<svg height="600" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="#fafbfc"/>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">MPC 什么时候值得上？关键看"可不可预测"</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#666">非平稳 ≠ 要用 MPC；只有结构化变化才给得起超额收益</text>

  <!-- Panel 1: Static / Random walk -->
  <g transform="translate(40,100)">
    <rect width="280" height="430" rx="10" fill="#fff" stroke="#c9ccd1" stroke-width="1.5"/>
    <rect width="280" height="46" rx="10" fill="#e8ebf0"/>
    <text x="140" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#333">静态 / 随机漂移</text>

    <text x="140" y="72" text-anchor="middle" font-size="12" fill="#888">参数不变 · 或 噪声游走</text>

    <g transform="translate(30,100)">
      <line x1="0" y1="120" x2="220" y2="120" stroke="#bbb"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#bbb"/>
      <polyline fill="none" stroke="#888" stroke-width="2"
        points="0,70 30,55 60,78 90,50 120,82 150,48 180,72 210,60"/>
      <text x="110" y="145" text-anchor="middle" font-size="11" fill="#888">效率 θ(t)：预测不出</text>
    </g>

    <g transform="translate(30,270)">
      <rect width="220" height="48" rx="6" fill="#fdecec" stroke="#e57373"/>
      <text x="110" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b3261e">MPC 反而 -0.3% ~ -0.4%</text>
      <text x="110" y="40" text-anchor="middle" font-size="11" fill="#8b2b20">被噪声反向带偏</text>
    </g>

    <text x="140" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#333">→ 用简单反应式 pacing</text>
    <text x="140" y="380" text-anchor="middle" font-size="11" fill="#777">前瞻没用，诚实最好</text>
  </g>

  <!-- VS -->
  <g transform="translate(355,315)">
    <circle r="22" fill="#333"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">VS</text>
  </g>

  <!-- Panel 2: Seasonal -->
  <g transform="translate(390,100)">
    <rect width="530" height="430" rx="10" fill="#fff" stroke="#2a7de1" stroke-width="2"/>
    <rect width="530" height="46" rx="10" fill="#e3efff"/>
    <text x="265" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1b4a8a">可预测的季节性衰减</text>

    <text x="265" y="72" text-anchor="middle" font-size="12" fill="#555">g(w)=exp(-δw)，跨季度重复 → SARIMAX 能学到</text>

    <g transform="translate(40,100)">
      <line x1="0" y1="120" x2="450" y2="120" stroke="#bbb"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#bbb"/>
      <path d="M0,10 Q120,25 220,65 T450,115" fill="none" stroke="#2a7de1" stroke-width="2.5"/>
      <g fill="#2a7de1" opacity="0.75">
        <rect x="10" y="15" width="28" height="105"/>
        <rect x="50" y="25" width="28" height="95"/>
        <rect x="90" y="45" width="28" height="75"/>
        <rect x="130" y="65" width="28" height="55"/>
        <rect x="170" y="78" width="28" height="42"/>
        <rect x="210" y="88" width="28" height="32"/>
        <rect x="250" y="95" width="28" height="25"/>
        <rect x="290" y="100" width="28" height="20"/>
        <rect x="330" y="104" width="28" height="16"/>
        <rect x="370" y="107" width="28" height="13"/>
        <rect x="410" y="109" width="28" height="11"/>
      </g>
      <text x="25" y="140" font-size="11" fill="#1b4a8a" font-weight="700">前几周顶上界</text>
      <text x="370" y="140" font-size="11" fill="#666">后期收缩</text>
      <text x="225" y="-5" text-anchor="middle" font-size="11" fill="#888">周 w →</text>
    </g>

    <g transform="translate(40,275)">
      <text x="0" y="0" font-size="12" fill="#666">paired MC vs 基线提升：</text>

      <g transform="translate(0,12)">
        <rect width="100" height="54" rx="6" fill="#f4f4f4" stroke="#ccc"/>
        <text x="50" y="20" text-anchor="middle" font-size="12" fill="#666">δ=5%</text>
        <text x="50" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#b3261e">-3.2%</text>
      </g>
      <g transform="translate(115,12)">
        <rect width="100" height="54" rx="6" fill="#eaf3ff" stroke="#2a7de1"/>
        <text x="50" y="20" text-anchor="middle" font-size="12" fill="#1b4a8a">δ=10%</text>
        <text x="50" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1b7a3a">+4.2%</text>
      </g>
      <g transform="translate(230,12)">
        <rect width="100" height="54" rx="6" fill="#d8ebff" stroke="#2a7de1"/>
        <text x="50" y="20" text-anchor="middle" font-size="12" fill="#1b4a8a">δ=15%</text>
        <text x="50" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1b7a3a">+11.2%</text>
      </g>
      <g transform="translate(345,12)">
        <rect width="100" height="54" rx="6" fill="#bfdcff" stroke="#2a7de1"/>
        <text x="50" y="20" text-anchor="middle" font-size="12" fill="#1b4a8a">δ=20%</text>
        <text x="50" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1b7a3a">+14.0%</text>
      </g>
    </g>

    <text x="265" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#1b4a8a">→ 结构越强，MPC 越值</text>
    <text x="265" y="402" text-anchor="middle" font-size="11" fill="#777">瓶颈不是预测精度，而是 ±20% 平滑约束</text>
  </g>

  <text x="480" y="568" text-anchor="middle" font-size="13" fill="#333">判据：变化<tspan font-weight="700" fill="#b3261e">可预测</tspan>才上 MPC；否则反应式 pacing 更稳</text>
</svg>