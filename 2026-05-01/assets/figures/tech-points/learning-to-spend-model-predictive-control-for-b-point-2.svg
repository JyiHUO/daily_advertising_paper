<svg height="600" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="bold">季度预算分配：出纳 vs 管家</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#666">回报效率随时间衰减时，两种策略怎么花钱？</text>

  <!-- Left: Reactive -->
  <rect x="40" y="80" width="380" height="430" rx="12" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="17" font-weight="bold" fill="#c0392b">反应式 Pacing（出纳）</text>
  <text x="230" y="132" text-anchor="middle" font-size="12" fill="#666">只看剩多少钱 × 历史节奏</text>

  <!-- bars reactive -->
  <g>
    <rect x="70"  y="340" width="30" height="80" fill="#e67e73"/>
    <rect x="110" y="330" width="30" height="90" fill="#e67e73"/>
    <rect x="150" y="335" width="30" height="85" fill="#e67e73"/>
    <rect x="190" y="340" width="30" height="80" fill="#e67e73"/>
    <rect x="230" y="345" width="30" height="75" fill="#e67e73"/>
    <rect x="270" y="350" width="30" height="70" fill="#e67e73"/>
    <rect x="310" y="355" width="30" height="65" fill="#e67e73"/>
    <rect x="350" y="360" width="30" height="60" fill="#e67e73"/>
    <line x1="60" y1="420" x2="395" y2="420" stroke="#333"/>
    <text x="230" y="440" text-anchor="middle" font-size="11" fill="#666">周 1 → 周 8</text>
  </g>

  <!-- decay curve overlay -->
  <path d="M70 200 Q 200 260 380 360" stroke="#555" stroke-dasharray="4,3" fill="none" stroke-width="2"/>
  <text x="380" y="195" text-anchor="end" font-size="11" fill="#555">回报效率 θ(t) ↓</text>

  <text x="230" y="475" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">后期低效期仍大量烧钱 ✗</text>
  <text x="230" y="495" text-anchor="middle" font-size="11" fill="#666">不预测未来，只按比例摊</text>

  <!-- Right: MPC -->
  <rect x="480" y="80" width="380" height="430" rx="12" fill="#eaf4fb" stroke="#2471a3" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="17" font-weight="bold" fill="#2471a3">MPC（带预测的管家）</text>
  <text x="670" y="132" text-anchor="middle" font-size="12" fill="#666">预测 H 周 → 优化 → 只执行第一步</text>

  <!-- bars MPC: front-loaded -->
  <g>
    <rect x="510" y="230" width="30" height="190" fill="#5dade2"/>
    <rect x="550" y="245" width="30" height="175" fill="#5dade2"/>
    <rect x="590" y="280" width="30" height="140" fill="#85c1e9"/>
    <rect x="630" y="320" width="30" height="100" fill="#85c1e9"/>
    <rect x="670" y="350" width="30" height="70" fill="#aed6f0"/>
    <rect x="710" y="370" width="30" height="50" fill="#aed6f0"/>
    <rect x="750" y="385" width="30" height="35" fill="#aed6f0"/>
    <rect x="790" y="395" width="30" height="25" fill="#aed6f0"/>
    <line x1="500" y1="420" x2="835" y2="420" stroke="#333"/>
    <text x="670" y="440" text-anchor="middle" font-size="11" fill="#666">高效期重投 → 低效期收手</text>
  </g>

  <!-- same decay dashed -->
  <path d="M510 200 Q 640 260 820 360" stroke="#555" stroke-dasharray="4,3" fill="none" stroke-width="2"/>
  <text x="820" y="195" text-anchor="end" font-size="11" fill="#555">同样的 θ(t) ↓</text>

  <text x="670" y="475" text-anchor="middle" font-size="13" fill="#2471a3" font-weight="bold">把钱推到高回报周 ✓</text>
  <text x="670" y="495" text-anchor="middle" font-size="11" fill="#666">每周滚动重规划 (receding horizon)</text>

  <!-- bottom note -->
  <rect x="150" y="536" width="600" height="30" rx="6" fill="#fff8e1" stroke="#c9a227"/>
  <text x="450" y="556" text-anchor="middle" font-size="12" fill="#7a5d00">前提：MPC 的增益 = 对未来 θ 预测中真正可利用的结构</text>
</svg>