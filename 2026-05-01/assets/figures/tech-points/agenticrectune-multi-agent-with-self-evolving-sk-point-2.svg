<svg height="640" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f8a5c"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Self-Evolving Skillhub：一本会自动更新的调参 SOP</text>

  <!-- Skillhub card (before) -->
  <rect x="330" y="70" width="240" height="150" rx="8" fill="#fff7e6" stroke="#e0a033" stroke-width="2"/>
  <text x="450" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c6b12">Skill: 重排多样性（旧）</text>
  <line x1="350" y1="108" x2="550" y2="108" stroke="#e0a033" stroke-dasharray="3,3"/>
  <text x="345" y="130" font-size="12" fill="#333">• 参数: div_w ∈ [0, 0.6]</text>
  <text x="345" y="152" font-size="12" fill="#333">• 北极星: engagement</text>
  <text x="345" y="174" font-size="12" fill="#333">• 领域知识 / 工具: 部署 + 查 A/B</text>
  <text x="345" y="196" font-size="12" fill="#333">• 初始生产配置</text>

  <!-- Insight Agent -->
  <rect x="60" y="280" width="200" height="90" rx="10" fill="#e8f1ff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="160" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a4a85">Insight Agent</text>
  <text x="160" y="334" text-anchor="middle" font-size="12" fill="#333">翻历史日志 + MapReduce</text>
  <text x="160" y="354" text-anchor="middle" font-size="12" fill="#333">找敏感参数 / 失败模式</text>

  <!-- Finding bubble -->
  <rect x="305" y="280" width="290" height="90" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a1e13">发现规律</text>
  <text x="450" y="332" text-anchor="middle" font-size="13" fill="#333">"div_w &gt; 0.4 → engagement 掉"</text>
  <text x="450" y="354" text-anchor="middle" font-size="13" fill="#333">多次踩坑的组合模式</text>

  <!-- Skill Agent -->
  <rect x="640" y="280" width="200" height="90" rx="10" fill="#e6f7ee" stroke="#1f8a5c" stroke-width="2"/>
  <text x="740" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f5c3b">Skill Agent</text>
  <text x="740" y="334" text-anchor="middle" font-size="12" fill="#333">写进领域知识</text>
  <text x="740" y="354" text-anchor="middle" font-size="12" fill="#333">收紧空间 / 建新 skill</text>

  <!-- Arrows: Insight -> Finding -> Skill -->
  <line x1="260" y1="325" x2="302" y2="325" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="595" y1="325" x2="637" y2="325" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Skill Agent updates Hub (up-left curve to old card's right edge) -->
  <path d="M 740 280 C 740 220, 640 180, 572 160" fill="none" stroke="#1f8a5c" stroke-width="2" marker-end="url(#arG)"/>
  <text x="655" y="210" font-size="12" fill="#1f8a5c">追加/收紧</text>

  <!-- Updated skill card (after) -->
  <rect x="330" y="440" width="240" height="130" rx="8" fill="#eafbe7" stroke="#1f8a5c" stroke-width="2"/>
  <text x="450" y="464" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f5c3b">Skill 更新后</text>
  <line x1="350" y1="474" x2="550" y2="474" stroke="#1f8a5c" stroke-dasharray="3,3"/>
  <text x="345" y="496" font-size="12" fill="#333">• div_w ∈ [0, <tspan font-weight="bold" fill="#c0392b">0.4</tspan>]  ← 上界收紧</text>
  <text x="345" y="518" font-size="12" fill="#333">• 新规则: &gt;0.4 有害</text>
  <text x="345" y="540" font-size="12" fill="#333">• 下轮 Actor 只在安全窗探索</text>
  <text x="345" y="560" font-size="12" fill="#333">• 不再反复踩同一坑</text>

  <!-- Hub -> updated (self-evolve) -->
  <line x1="450" y1="220" x2="450" y2="438" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arR)"/>
  <text x="460" y="335" font-size="12" fill="#c0392b" font-weight="bold">自进化</text>
</svg>