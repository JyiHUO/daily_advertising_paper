<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b5876"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="#fafafa"/>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#222">创意方向 = 三条独立的老虎机臂</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#666">每拍一条广告 = 拉一次；评委分轴打分，分别更新</text>

  <!-- Strategy arm -->
  <g>
    <rect x="60" y="90" width="240" height="190" rx="12" fill="#eaf3fb" stroke="#2b5876" stroke-width="2"/>
    <text x="180" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2b5876">策略 Strategy</text>
    <text x="180" y="148" text-anchor="middle" font-size="13" fill="#333">信息型 / 转化型 / 对比型</text>
    <rect x="90" y="220" width="180" height="40" rx="6" fill="#fff" stroke="#2b5876"/>
    <text x="180" y="246" text-anchor="middle" font-size="13" fill="#2b5876">UCB1 · 卖点分</text>
  </g>

  <!-- Narrative arm -->
  <g>
    <rect x="330" y="90" width="240" height="190" rx="12" fill="#fdf1e6" stroke="#b4651a" stroke-width="2"/>
    <text x="450" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#b4651a">叙事 Narrative</text>
    <text x="450" y="148" text-anchor="middle" font-size="13" fill="#333">分析式 / 生活切片 / 戏剧冲突</text>
    <rect x="360" y="220" width="180" height="40" rx="6" fill="#fff" stroke="#b4651a"/>
    <text x="450" y="246" text-anchor="middle" font-size="13" fill="#b4651a">UCB1 · 叙事分</text>
  </g>

  <!-- Aesthetic arm -->
  <g>
    <rect x="600" y="90" width="240" height="190" rx="12" fill="#ecf7ee" stroke="#2e7d32" stroke-width="2"/>
    <text x="720" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">美学 Aesthetic</text>
    <text x="720" y="148" text-anchor="middle" font-size="13" fill="#333">明快 / 电影感</text>
    <text x="720" y="170" text-anchor="middle" font-size="13" fill="#333">极简 / 粗粝动感</text>
    <rect x="630" y="220" width="180" height="40" rx="6" fill="#fff" stroke="#2e7d32"/>
    <text x="720" y="246" text-anchor="middle" font-size="13" fill="#2e7d32">UCB1 · 美学分</text>
  </g>

  <!-- arrows down to video -->
  <line x1="180" y1="280" x2="385" y2="355" stroke="#2b5876" stroke-width="2" marker-end="url(#a)"/>
  <line x1="450" y1="280" x2="450" y2="355" stroke="#2b5876" stroke-width="2" marker-end="url(#a)"/>
  <line x1="720" y1="280" x2="515" y2="355" stroke="#2b5876" stroke-width="2" marker-end="url(#a)"/>

  <!-- Video -->
  <rect x="360" y="360" width="180" height="70" rx="10" fill="#2b5876"/>
  <text x="450" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">生成广告短片</text>
  <text x="450" y="410" text-anchor="middle" font-size="12" fill="#d9e6f2">一次组合 = 拉一次臂</text>

  <line x1="450" y1="430" x2="450" y2="468" stroke="#2b5876" stroke-width="2" marker-end="url(#a)"/>

  <!-- Judge -->
  <rect x="360" y="470" width="180" height="70" rx="10" fill="#fff3cd" stroke="#b4651a" stroke-width="2"/>
  <text x="450" y="498" text-anchor="middle" font-size="15" font-weight="700" fill="#8a5a00">多模态 AI 评委</text>
  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#8a5a00">分三轴独立打分</text>

  <!-- reward feedback loops -->
  <path d="M365,505 C200,505 130,420 130,282" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#b)"/>
  <path d="M400,540 C360,560 450,575 450,282" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#b)"/>
  <path d="M535,505 C700,505 770,420 770,282" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#b)"/>

  <text x="60" y="410" font-size="12" fill="#c0392b" font-weight="700">卖点分 → 策略臂</text>
  <text x="385" y="580" font-size="12" fill="#c0392b" font-weight="700">叙事分 → 叙事臂</text>
  <text x="720" y="410" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">美学分 → 美学臂</text>

  <!-- bottom notes -->
  <text x="30" y="595" font-size="12" fill="#333">💡 LLM 热启动：合理组合初始期望调高    ✅ 分轴奖励 → 绕开信用分配难题</text>
</svg>