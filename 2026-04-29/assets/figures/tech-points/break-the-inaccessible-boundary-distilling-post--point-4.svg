<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9534f"/>
    </marker>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e8b57"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">老师要先看完剧，学生才学得到东西</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#666">Teacher 冻结后再蒸馏 · 相似度越高，留存 AUC 越高</text>

  <!-- Left: Bad case -->
  <g>
    <rect x="40" y="80" width="370" height="240" rx="10" fill="#fff5f5" stroke="#d9534f" stroke-width="1.5"/>
    <text x="225" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#c0392b">✗ 只做 Stage 2（联合训练）</text>

    <rect x="70" y="130" width="130" height="60" rx="8" fill="#fff" stroke="#d9534f"/>
    <text x="135" y="158" text-anchor="middle" font-size="13" fill="#333">HAE 老师</text>
    <text x="135" y="177" text-anchor="middle" font-size="11" fill="#888">还没学会</text>

    <rect x="250" y="130" width="130" height="60" rx="8" fill="#fff" stroke="#d9534f"/>
    <text x="315" y="158" text-anchor="middle" font-size="13" fill="#333">SFE 学生</text>
    <text x="315" y="177" text-anchor="middle" font-size="11" fill="#888">同时在学</text>

    <path d="M200,150 L247,150" stroke="#d9534f" stroke-width="1.5" marker-end="url(#arRed)"/>
    <path d="M250,173 L203,173" stroke="#d9534f" stroke-width="1.5" marker-end="url(#arRed)"/>

    <text x="225" y="228" text-anchor="middle" font-size="13" fill="#c0392b">互相带偏 → 表示坍塌</text>
    <rect x="115" y="255" width="220" height="44" rx="6" fill="#fff" stroke="#d9534f"/>
    <text x="225" y="282" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">AUC 0.6709（低于 base）</text>
  </g>

  <!-- Right: Good case -->
  <g>
    <rect x="490" y="80" width="370" height="240" rx="10" fill="#f1faf4" stroke="#2e8b57" stroke-width="1.5"/>
    <text x="675" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#1e6b3a">✓ 两阶段：先训老师，再蒸馏</text>

    <rect x="520" y="130" width="130" height="60" rx="8" fill="#fff" stroke="#2e8b57"/>
    <text x="585" y="158" text-anchor="middle" font-size="13" fill="#333">HAE 老师（已冻结）</text>
    <text x="585" y="177" text-anchor="middle" font-size="11" fill="#2e8b57">teacher frozen</text>

    <rect x="700" y="130" width="130" height="60" rx="8" fill="#fff" stroke="#2e8b57"/>
    <text x="765" y="158" text-anchor="middle" font-size="13" fill="#333">SFE 学生</text>
    <text x="765" y="177" text-anchor="middle" font-size="11" fill="#888">向老师对齐</text>

    <path d="M650,160 L697,160" stroke="#2e8b57" stroke-width="2" marker-end="url(#arGreen)"/>

    <text x="675" y="228" text-anchor="middle" font-size="13" fill="#1e6b3a">稳定迁移「未来内容」信号</text>
    <rect x="565" y="255" width="220" height="44" rx="6" fill="#fff" stroke="#2e8b57"/>
    <text x="675" y="282" text-anchor="middle" font-size="14" font-weight="700" fill="#1e6b3a">AUC 0.7369（base 0.7297）</text>
  </g>

  <!-- Bottom: similarity -> AUC chart -->
  <g transform="translate(0,360)">
    <rect x="40" y="0" width="820" height="230" rx="10" fill="#f7f9fc" stroke="#cfd6e0"/>
    <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#222">学生越像老师 → 留存 AUC 单调上升</text>

    <!-- axes -->
    <line x1="120" y1="190" x2="560" y2="190" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
    <line x1="120" y1="190" x2="120" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="340" y="212" text-anchor="middle" font-size="12" fill="#555">cosine(student, teacher)</text>
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90 70,125)">ΔAUC</text>

    <!-- curve -->
    <path d="M140,180 Q250,165 340,130 T540,70" fill="none" stroke="#2e7cf6" stroke-width="3"/>

    <!-- points -->
    <circle cx="160" cy="178" r="5" fill="#888"/>
    <text x="160" y="168" text-anchor="middle" font-size="10" fill="#555">MLP+MLP</text>

    <circle cx="330" cy="132" r="5" fill="#f39c12"/>
    <text x="330" y="122" text-anchor="middle" font-size="10" fill="#555">HAE+MLP</text>

    <circle cx="520" cy="78" r="6" fill="#2e8b57"/>
    <text x="520" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#1e6b3a">HAE+SFE（满配）</text>

    <!-- Online gains box -->
    <rect x="605" y="50" width="235" height="160" rx="8" fill="#fff" stroke="#2e7cf6" stroke-width="1.5"/>
    <text x="722" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7cf6">线上 A/B（硬样本更猛）</text>
    <text x="722" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#1e6b3a">+34%</text>
    <text x="722" y="130" text-anchor="middle" font-size="11" fill="#555">已卸载用户 再激活设备</text>
    <text x="722" y="168" text-anchor="middle" font-size="22" font-weight="700" fill="#1e6b3a">+22%</text>
    <text x="722" y="186" text-anchor="middle" font-size="11" fill="#555">LT30 长期留存</text>
  </g>
</svg>