<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5e6"/>
      <stop offset="1" stop-color="#ffd9a8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#222">GenAD-Bench：给 AI 广告片打分的标准卷</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#888">全虚构品牌 → 防止模型"背题"作弊</text>

  <!-- Left: input dataset -->
  <g>
    <rect x="40" y="100" width="240" height="170" rx="12" fill="url(#g1)" stroke="#e89b3c" stroke-width="2"/>
    <text x="160" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4a0a">400 个虚构广告场景</text>
    <text x="70" y="165" font-size="14" fill="#333">50 个假品牌</text>
    <text x="70" y="195" font-size="14" fill="#333">× 4 款产品  =  200 款</text>
    <text x="70" y="225" font-size="14" fill="#333">× 2 类人群（典型 / 反常）</text>
    <text x="70" y="252" font-size="13" fill="#666" font-style="italic">= 400 场景</text>
  </g>

  <!-- Example card -->
  <g>
    <rect x="40" y="295" width="240" height="275" rx="12" fill="#ffffff" stroke="#bbb" stroke-dasharray="4 3"/>
    <text x="160" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#555">场景示例</text>
    <rect x="60" y="335" width="200" height="100" rx="6" fill="#eef4ff" stroke="#9bb8e0"/>
    <text x="70" y="358" font-size="12" fill="#234">品牌：Aerolux（虚构）</text>
    <text x="70" y="378" font-size="12" fill="#234">产品：高端降噪耳机</text>
    <text x="70" y="398" font-size="12" fill="#234">人群：60 岁 日本乡村女性</text>
    <text x="70" y="423" font-size="12" fill="#888">+ logo / 产品参考图</text>

    <text x="160" y="462" text-anchor="middle" font-size="12" fill="#666">AI 生成广告片</text>
    <rect x="90" y="475" width="140" height="70" rx="6" fill="#222"/>
    <text x="160" y="505" text-anchor="middle" font-size="12" fill="#fff">30s 广告视频</text>
    <text x="160" y="525" text-anchor="middle" font-size="10" fill="#aaa">待评委打分</text>
  </g>

  <!-- Arrow to judge -->
  <path d="M285 390 L383 390" stroke="#444" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- Judge -->
  <g>
    <rect x="385" y="340" width="170" height="100" rx="14" fill="#2a2a3d" stroke="#000"/>
    <text x="470" y="373" text-anchor="middle" font-size="15" font-weight="700" fill="#ffd86b">MLLM 评委</text>
    <text x="470" y="397" text-anchor="middle" font-size="13" fill="#fff">Gemini 3 Pro</text>
    <text x="470" y="422" text-anchor="middle" font-size="11" fill="#aaa">0–100 分 · 接近人类一致性</text>
  </g>

  <!-- Arrows to 4 dimensions -->
  <path d="M558 360 L623 178" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M558 375 L623 288" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M558 405 L623 398" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M558 420 L623 508" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- 4 metric cards -->
  <g>
    <rect x="625" y="140" width="235" height="70" rx="10" fill="#e9f7ec" stroke="#4aa564"/>
    <text x="645" y="168" font-size="15" font-weight="700" fill="#1f7a3a">VAF · 视觉素材保真</text>
    <text x="645" y="192" font-size="12" fill="#466">logo / 产品外观是否还原</text>

    <rect x="625" y="250" width="235" height="70" rx="10" fill="#eef1fb" stroke="#5b77d1"/>
    <text x="645" y="278" font-size="15" font-weight="700" fill="#2d3f8a">DA · 人群匹配</text>
    <text x="645" y="302" font-size="12" fill="#446">性别 / 年龄 / 地域 / 兴趣</text>

    <rect x="625" y="360" width="235" height="70" rx="10" fill="#fdeef0" stroke="#d15b77"/>
    <text x="645" y="388" font-size="15" font-weight="700" fill="#8a2d3f">MA · 营销吸引力</text>
    <text x="645" y="412" font-size="12" fill="#644">AIDA：钩子 / 价值 / 共鸣</text>

    <rect x="625" y="470" width="235" height="70" rx="10" fill="#fff6e0" stroke="#d1a155"/>
    <text x="645" y="498" font-size="15" font-weight="700" fill="#8a6420">VQ · 视觉质量</text>
    <text x="645" y="522" font-size="12" fill="#644">扩散伪影 / 物理合理性</text>
  </g>

  <text x="450" y="595" text-anchor="middle" font-size="12" fill="#999">四维平均分 = 广告自动 QA 打分卡</text>
</svg>