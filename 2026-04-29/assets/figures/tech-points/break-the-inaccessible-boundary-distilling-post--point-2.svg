<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="apurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a4eb0"/>
    </marker>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a8a3a"/>
    </marker>
    <marker id="agold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9a441"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">HAE：两层注意力，把回流日记压成每日摘要</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">Day 内用 profile 提问 → Day 间按因果顺序阅读</text>

  <!-- User profile -->
  <rect x="40" y="250" width="110" height="70" rx="10" fill="#fde7a8" stroke="#d9a441"/>
  <text x="95" y="280" text-anchor="middle" font-size="14" font-weight="bold">用户画像</text>
  <text x="95" y="302" text-anchor="middle" font-size="12" fill="#555">作为 Query</text>

  <!-- Stage 1 title -->
  <text x="270" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c5aa0">① Day 内 Cross-Attention</text>

  <!-- Day1 -->
  <rect x="210" y="115" width="120" height="80" rx="8" fill="#eaf2ff" stroke="#2c5aa0"/>
  <text x="270" y="135" text-anchor="middle" font-size="12" fill="#2c5aa0" font-weight="bold">Day 1 items</text>
  <rect x="220" y="145" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="160" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="175" width="100" height="10" fill="#b8d0f0"/>
  <circle cx="390" cy="155" r="18" fill="#2c5aa0"/>
  <text x="390" y="160" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s₁</text>
  <line x1="330" y1="155" x2="370" y2="155" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Day4 -->
  <rect x="210" y="230" width="120" height="80" rx="8" fill="#eaf2ff" stroke="#2c5aa0"/>
  <text x="270" y="250" text-anchor="middle" font-size="12" fill="#2c5aa0" font-weight="bold">Day 4 items</text>
  <rect x="220" y="260" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="275" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="290" width="100" height="10" fill="#b8d0f0"/>
  <circle cx="390" cy="270" r="18" fill="#2c5aa0"/>
  <text x="390" y="275" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s₄</text>
  <line x1="330" y1="270" x2="370" y2="270" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Day7 -->
  <rect x="210" y="345" width="120" height="80" rx="8" fill="#eaf2ff" stroke="#2c5aa0"/>
  <text x="270" y="365" text-anchor="middle" font-size="12" fill="#2c5aa0" font-weight="bold">Day 7 items</text>
  <rect x="220" y="375" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="390" width="100" height="10" fill="#b8d0f0"/>
  <rect x="220" y="405" width="100" height="10" fill="#b8d0f0"/>
  <circle cx="390" cy="385" r="18" fill="#2c5aa0"/>
  <text x="390" y="390" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s₇</text>
  <line x1="330" y1="385" x2="370" y2="385" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- profile as query arrows -->
  <path d="M150,270 C180,210 185,165 210,155" stroke="#d9a441" stroke-width="1.6" fill="none" stroke-dasharray="4,3" marker-end="url(#agold)"/>
  <line x1="150" y1="285" x2="208" y2="270" stroke="#d9a441" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#agold)"/>
  <path d="M150,305 C180,355 185,375 210,385" stroke="#d9a441" stroke-width="1.6" fill="none" stroke-dasharray="4,3" marker-end="url(#agold)"/>

  <!-- dots between days -->
  <text x="270" y="220" text-anchor="middle" font-size="16" fill="#999">⋮</text>
  <text x="270" y="335" text-anchor="middle" font-size="16" fill="#999">⋮</text>

  <!-- Stage 2 title -->
  <text x="620" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a4eb0">② Day 间 Causal Self-Attention</text>
  <text x="620" y="110" text-anchor="middle" font-size="11" fill="#7a4eb0">（不许偷看未来）</text>

  <rect x="485" y="120" width="180" height="305" rx="12" fill="#f4ecfa" stroke="#7a4eb0" stroke-width="1.5"/>

  <circle cx="575" cy="155" r="20" fill="#7a4eb0"/>
  <text x="575" y="160" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s̃₁</text>
  <circle cx="575" cy="270" r="20" fill="#7a4eb0"/>
  <text x="575" y="275" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s̃₄</text>
  <circle cx="575" cy="385" r="20" fill="#7a4eb0"/>
  <text x="575" y="390" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">s̃₇</text>

  <!-- causal arrows: earlier -> later (on left side, inside box) -->
  <path d="M555,172 C515,210 515,235 555,255" stroke="#7a4eb0" stroke-width="1.6" fill="none" marker-end="url(#apurple)"/>
  <path d="M555,287 C515,325 515,350 555,370" stroke="#7a4eb0" stroke-width="1.6" fill="none" marker-end="url(#apurple)"/>
  <path d="M560,173 C505,230 505,340 558,372" stroke="#7a4eb0" stroke-width="1.4" fill="none" marker-end="url(#apurple)"/>

  <!-- s1 -> s̃1 etc (from day circle to tilde circle) -->
  <line x1="408" y1="155" x2="553" y2="155" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="408" y1="270" x2="553" y2="270" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="408" y1="385" x2="553" y2="385" stroke="#444" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- forbidden future arrow (from s̃7 back to s̃1) -->
  <path d="M595,380 C645,340 645,200 595,165" stroke="#c0392b" stroke-width="1.6" fill="none" stroke-dasharray="5,4"/>
  <line x1="630" y1="262" x2="648" y2="280" stroke="#c0392b" stroke-width="2.8"/>
  <line x1="648" y1="262" x2="630" y2="280" stroke="#c0392b" stroke-width="2.8"/>
  <text x="675" y="268" font-size="11" fill="#c0392b">禁止</text>
  <text x="675" y="283" font-size="11" fill="#c0392b">回看未来</text>

  <!-- LT targets -->
  <rect x="790" y="135" width="75" height="40" rx="6" fill="#d4f0d4" stroke="#3a8a3a"/>
  <text x="827" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#256c25">LT1</text>
  <rect x="790" y="250" width="75" height="40" rx="6" fill="#d4f0d4" stroke="#3a8a3a"/>
  <text x="827" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#256c25">LT4</text>
  <rect x="790" y="365" width="75" height="40" rx="6" fill="#d4f0d4" stroke="#3a8a3a"/>
  <text x="827" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#256c25">LT7</text>

  <line x1="595" y1="155" x2="788" y2="155" stroke="#3a8a3a" stroke-width="1.8" marker-end="url(#agreen)"/>
  <line x1="595" y1="270" x2="788" y2="270" stroke="#3a8a3a" stroke-width="1.8" marker-end="url(#agreen)"/>
  <line x1="595" y1="385" x2="788" y2="385" stroke="#3a8a3a" stroke-width="1.8" marker-end="url(#agreen)"/>

  <!-- bottom note -->
  <rect x="60" y="475" width="780" height="90" rx="10" fill="#fafafa" stroke="#ccc"/>
  <text x="80" y="502" font-size="13" fill="#333">每天日记 → 用画像当 Query 挑重点，压成一个向量 s_d</text>
  <text x="80" y="525" font-size="13" fill="#333">第 d 天只能读 1..d 天的摘要：teacher 自身也零泄漏</text>
  <text x="80" y="548" font-size="13" fill="#333">s̃_d 对齐 LT-d 任务：不同时长留存各取各的 teacher 信号</text>
</svg>