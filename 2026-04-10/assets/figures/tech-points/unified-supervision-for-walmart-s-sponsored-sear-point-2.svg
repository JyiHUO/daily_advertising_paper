<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9534f"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="100%" stop-color="#e8ecf4"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">多通道召回先验 → 难负例挖掘</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#777">Hard Negative Mining via Multi-Channel Retrieval Priors</text>

  <!-- ===== LEFT: 3 Retrieval Channels ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="200" height="220" rx="14" fill="#fff" stroke="#7baaf7" stroke-width="2"/>
  </g>
  <text x="140" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#3367d6">3 个召回通道</text>

  <!-- Channel boxes -->
  <rect x="60" y="145" width="160" height="42" rx="8" fill="#e3edfd"/>
  <text x="140" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#3367d6">通道 A</text>
  <text x="140" y="180" text-anchor="middle" font-size="11" fill="#555">rank = 5</text>

  <rect x="60" y="195" width="160" height="42" rx="8" fill="#e3edfd"/>
  <text x="140" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="#3367d6">通道 B</text>
  <text x="140" y="230" text-anchor="middle" font-size="11" fill="#555">rank = 8</text>

  <rect x="60" y="245" width="160" height="42" rx="8" fill="#e3edfd"/>
  <text x="140" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#3367d6">通道 C</text>
  <text x="140" y="280" text-anchor="middle" font-size="11" fill="#555">未召回</text>

  <text x="140" y="308" text-anchor="middle" font-size="11" fill="#888">共识 C = 2/3</text>

  <!-- Arrow from channels to score -->
  <line x1="240" y1="210" x2="310" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== CENTER: Prior Score Computation ===== -->
  <g filter="url(#shadow)">
    <rect x="315" y="130" width="250" height="170" rx="14" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  </g>
  <text x="440" y="158" text-anchor="middle" font-size="15" font-weight="bold" fill="#c77c00">先验分数计算</text>

  <!-- Formula -->
  <rect x="335" y="170" width="210" height="38" rx="8" fill="#fef8e8"/>
  <text x="440" y="195" text-anchor="middle" font-size="13" fill="#8a6d3b" font-weight="bold">p = 1 − log(rank)/log(R)</text>

  <!-- Aggregation -->
  <rect x="335" y="218" width="210" height="32" rx="8" fill="#fef8e8"/>
  <text x="440" y="240" text-anchor="middle" font-size="12" fill="#8a6d3b">聚合: max(各通道分数)</text>

  <!-- Difficulty -->
  <rect x="335" y="260" width="210" height="28" rx="8" fill="#fce4e4"/>
  <text x="440" y="280" text-anchor="middle" font-size="12" fill="#a94442" font-weight="bold">难度 = w·先验 + (1−w)·token重叠</text>

  <!-- Arrow to right -->
  <line x1="565" y1="210" x2="635" y2="210" stroke="#d9534f" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- ===== RIGHT: Hard Negative Result ===== -->
  <g filter="url(#shadow)">
    <rect x="640" y="120" width="230" height="200" rx="14" fill="#fff" stroke="#d9534f" stroke-width="2.5"/>
  </g>
  <text x="755" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#d9534f">难负例优先采样</text>

  <!-- Hard neg example -->
  <rect x="660" y="165" width="190" height="60" rx="10" fill="#fce4e4"/>
  <text x="755" y="185" text-anchor="middle" font-size="12" fill="#a94442" font-weight="bold">🎯 高难度负例</text>
  <text x="755" y="200" text-anchor="middle" font-size="11" fill="#a94442">排名高 + 不相关</text>
  <text x="755" y="215" text-anchor="middle" font-size="11" fill="#a94442">→ 优先采样训练</text>

  <!-- Easy neg -->
  <rect x="660" y="235" width="190" height="40" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="755" y="258" text-anchor="middle" font-size="12" fill="#999">普通负例（低优先级）</text>

  <!-- Feed to model -->
  <text x="755" y="298" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">↓ 送入 Bi-Encoder</text>

  <!-- ===== BOTTOM: Concrete Example ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="380" width="780" height="210" rx="16" fill="#fff" stroke="#5cb85c" stroke-width="2"/>
  </g>
  <text x="450" y="412" text-anchor="middle" font-size="16" font-weight="bold" fill="#3c763d">💡 具体例子</text>

  <!-- Query -->
  <rect x="90" y="430" width="240" height="50" rx="10" fill="#e8f5e9"/>
  <text x="210" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Query</text>
  <text x="210" y="470" text-anchor="middle" font-size="14" fill="#333">"Nintendo Switch OLED"</text>

  <!-- Arrow -->
  <text x="360" y="460" text-anchor="middle" font-size="22" fill="#888">→</text>

  <!-- Hard neg item -->
  <rect x="400" y="425" width="420" height="60" rx="10" fill="#fce4e4" stroke="#d9534f" stroke-width="1.5"/>
  <text x="610" y="447" text-anchor="middle" font-size="13" font-weight="bold" fill="#d9534f">❌ 手机壳（标题含 "Switch"）</text>
  <text x="610" y="465" text-anchor="middle" font-size="12" fill="#a94442">2个通道 top-10 · 先验=0.8 · token重叠高 · Rel=1</text>
  <text x="610" y="480" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">→ 难度分数极高，优先被采样为负例</text>

  <!-- Insight callout -->
  <rect x="140" y="510" width="620" height="55" rx="12" fill="#fffde7" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="450" y="534" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a6d3b">核心思想：被多通道排在前面却不相关 = 最容易骗过系统</text>
  <text x="450" y="554" text-anchor="middle" font-size="13" fill="#8a6d3b">优先用这些样本训练，迫使模型学会区分"词面匹配"与"真实语义相关"</text>
</svg>