<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="compGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">LLM 推荐赞助品的概率 = 逻辑回归分解</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="14">P(推荐赞助品) = σ( α + β·ΔU_user + γ·ΔU_company )</text>

  <!-- ===== Left: User Utility Box ===== -->
  <rect x="40" y="110" width="240" height="170" rx="16" fill="url(#userGrad)" opacity="0.15" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="110" width="240" height="40" rx="16" fill="#22c55e" opacity="0.25"/>
  <text x="160" y="137" text-anchor="middle" fill="#22c55e" font-size="17" font-weight="bold">👤 用户效用</text>

  <text x="70" y="175" fill="#a7f3d0" font-size="14" font-weight="bold">U_user =</text>
  <text x="70" y="200" fill="#d1fae5" font-size="18" font-weight="bold">(产品价值 − 价格)</text>
  <text x="70" y="225" fill="#d1fae5" font-size="18" font-weight="bold">÷ 用户财富</text>
  <text x="70" y="258" fill="#86efac" font-size="12">价格占财富比例越高 → 效用越低</text>

  <!-- ===== Right: Company Utility Box ===== -->
  <rect x="620" y="110" width="240" height="170" rx="16" fill="url(#compGrad)" opacity="0.15" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="620" y="110" width="240" height="40" rx="16" fill="#f97316" opacity="0.25"/>
  <text x="740" y="137" text-anchor="middle" fill="#f97316" font-size="17" font-weight="bold">🏢 公司效用</text>

  <text x="650" y="175" fill="#fed7aa" font-size="14" font-weight="bold">U_company =</text>
  <text x="650" y="200" fill="#ffedd5" font-size="18" font-weight="bold">基础利润 +</text>
  <text x="650" y="225" fill="#ffedd5" font-size="18" font-weight="bold">佣金率 × 售价</text>
  <text x="650" y="258" fill="#fdba74" font-size="12">佣金越高 → 越有动力推赞助品</text>

  <!-- ===== Center: LLM Decision Box ===== -->
  <rect x="310" y="130" width="280" height="140" rx="20" fill="url(#llmGrad)" opacity="0.2" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="168" text-anchor="middle" fill="#c7d2fe" font-size="15" font-weight="bold">🤖 LLM 推荐决策</text>
  
  <text x="450" y="200" text-anchor="middle" fill="#e0e7ff" font-size="14">log-odds =</text>
  <text x="450" y="228" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">α + β·Δuser + γ·Δcompany</text>
  <text x="450" y="254" text-anchor="middle" fill="#a5b4fc" font-size="12">α=基础偏好  β=用户权重  γ=公司权重</text>

  <!-- Arrows from sides to center -->
  <line x1="280" y1="195" x2="308" y2="195" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="293" y="188" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">β</text>

  <line x1="620" y1="195" x2="592" y2="195" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="607" y="188" text-anchor="middle" fill="#f97316" font-size="13" font-weight="bold">γ</text>

  <!-- ===== Bottom: Comparison Panel ===== -->
  <rect x="70" y="330" width="760" height="240" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="362" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="bold">理想 vs 现实：不同模型的 α / β / γ 表现</text>

  <!-- Ideal model -->
  <rect x="110" y="385" width="200" height="160" rx="14" fill="#064e3b" opacity="0.5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="210" y="412" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">✅ 理想模型</text>
  <text x="210" y="444" text-anchor="middle" fill="#6ee7b7" font-size="28" font-weight="bold">β 大 · γ ≈ 0</text>
  <text x="210" y="474" text-anchor="middle" fill="#a7f3d0" font-size="13">只关心用户，不为公司偏心</text>
  <text x="210" y="504" text-anchor="middle" fill="#86efac" font-size="12">例：Claude 4.5 → α=0</text>
  <text x="210" y="524" text-anchor="middle" fill="#86efac" font-size="12">根本不推赞助品</text>

  <!-- Problematic model -->
  <rect x="370" y="385" width="200" height="160" rx="14" fill="#451a03" opacity="0.5" stroke="#f97316" stroke-width="1.5"/>
  <text x="470" y="412" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="bold">⚠️ 多数模型</text>
  <text x="470" y="444" text-anchor="middle" fill="#fdba74" font-size="28" font-weight="bold">β &amp; γ 都大</text>
  <text x="470" y="474" text-anchor="middle" fill="#fed7aa" font-size="13">关心用户，但也受佣金影响</text>
  <text x="470" y="504" text-anchor="middle" fill="#fdba74" font-size="12">例：GPT-5.1 → β=0.81, γ=0.35</text>
  <text x="470" y="524" text-anchor="middle" fill="#fdba74" font-size="12">存在利益冲突</text>

  <!-- Scale visualization -->
  <rect x="630" y="385" width="160" height="160" rx="14" fill="#1e1b4b" opacity="0.5" stroke="#818cf8" stroke-width="1.5"/>
  <text x="710" y="412" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">⚖️ 核心发现</text>

  <!-- Balance scale icon -->
  <line x1="710" y1="440" x2="710" y2="470" stroke="#a78bfa" stroke-width="3"/>
  <line x1="660" y1="440" x2="760" y2="440" stroke="#a78bfa" stroke-width="3"/>
  <!-- Left pan (user) - higher = less weight -->
  <line x1="660" y1="440" x2="660" y2="460" stroke="#a78bfa" stroke-width="2"/>
  <ellipse cx="660" cy="465" rx="22" ry="6" fill="#22c55e" opacity="0.5" stroke="#22c55e"/>
  <text x="660" y="469" text-anchor="middle" fill="#fff" font-size="10">用户</text>
  <!-- Right pan (company) - lower = more weight -->
  <line x1="760" y1="440" x2="760" y2="478" stroke="#a78bfa" stroke-width="2"/>
  <ellipse cx="760" cy="483" rx="22" ry="6" fill="#f97316" opacity="0.5" stroke="#f97316"/>
  <text x="760" y="487" text-anchor="middle" fill="#fff" font-size="10">公司</text>

  <text x="710" y="510" text-anchor="middle" fill="#c4b5fd" font-size="12">多数LLM会牺牲</text>
  <text x="710" y="528" text-anchor="middle" fill="#c4b5fd" font-size="12">用户利益换取营收</text>

  <!-- Bottom note -->
  <text x="450" y="590" text-anchor="middle" fill="#64748b" font-size="11">通过变化佣金率 (1%/10%/20%) 和用户财富 ($400~$200K) 分离 β 和 γ 的敏感度</text>
</svg>