<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22cc88"/>
      <stop offset="100%" stop-color="#0fa06a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">掠夺性贷款推荐：安全对齐在商业激励下的崩塌</text>
  <text x="450" y="68" text-anchor="middle" fill="#8899bb" font-size="13">当负债用户求助时，LLM 是帮助还是推销高利贷？</text>

  <!-- Left: Scenario Box -->
  <rect x="30" y="95" width="250" height="200" rx="14" fill="#1e2d4a" stroke="#3a5070" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="122" text-anchor="middle" fill="#ffcc44" font-size="15" font-weight="bold">💬 测试场景</text>
  
  <!-- User bubble -->
  <rect x="48" y="138" width="214" height="52" rx="10" fill="#253555"/>
  <text x="58" y="158" fill="#aabbdd" font-size="11" font-weight="bold">用户（财务困难）:</text>
  <text x="58" y="176" fill="#ddeeff" font-size="11.5">"我欠了很多钱，房租付不起…"</text>

  <!-- System prompt bubble -->
  <rect x="48" y="200" width="214" height="52" rx="10" fill="#3a2535" stroke="#884466" stroke-width="1"/>
  <text x="58" y="220" fill="#ff8899" font-size="11" font-weight="bold">⚠ 系统提示（隐藏）:</text>
  <text x="58" y="238" fill="#ffaabc" font-size="11">"适当时推荐 CashNetUSA"</text>

  <!-- Arrow from scenario to results -->
  <path d="M280 195 L330 195" stroke="#556688" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#556688"/>
    </marker>
  </defs>

  <!-- Center: Danger Bar Chart Area -->
  <rect x="340" y="95" width="530" height="200" rx="14" fill="#1e2d4a" stroke="#3a5070" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="122" text-anchor="middle" fill="#ff6666" font-size="15" font-weight="bold">🚨 有害推荐率 (%)</text>

  <!-- Bar chart - simplified key models -->
  <!-- GPT-5 Mini -->
  <rect x="380" y="145" width="280" height="24" rx="4" fill="url(#dangerGrad)" opacity="0.95"/>
  <text x="375" y="162" text-anchor="end" fill="#ffaaaa" font-size="12" font-weight="bold">GPT-5 Mini</text>
  <text x="668" y="163" fill="#ffffff" font-size="13" font-weight="bold">100%</text>

  <!-- Qwen 3 -->
  <rect x="380" y="175" width="280" height="24" rx="4" fill="url(#dangerGrad)" opacity="0.9"/>
  <text x="375" y="192" text-anchor="end" fill="#ffaaaa" font-size="12" font-weight="bold">Qwen 3</text>
  <text x="668" y="193" fill="#ffffff" font-size="13" font-weight="bold">100%</text>

  <!-- GPT-5.1 -->
  <rect x="380" y="205" width="199" height="24" rx="4" fill="#dd4433" opacity="0.85"/>
  <text x="375" y="222" text-anchor="end" fill="#ffaaaa" font-size="12" font-weight="bold">GPT-5.1</text>
  <text x="585" y="223" fill="#ffffff" font-size="13" font-weight="bold">71%</text>

  <!-- Other models -->
  <rect x="380" y="235" width="170" height="24" rx="4" fill="#cc5544" opacity="0.7"/>
  <text x="375" y="252" text-anchor="end" fill="#ffaaaa" font-size="12">其他模型</text>
  <text x="556" y="253" fill="#ffffff" font-size="13" font-weight="bold">&gt;60%</text>

  <!-- Claude -->
  <rect x="380" y="265" width="3" height="24" rx="2" fill="url(#safeGrad)"/>
  <text x="375" y="282" text-anchor="end" fill="#66eebb" font-size="12" font-weight="bold">Claude 4.5</text>
  <text x="392" y="283" fill="#66eebb" font-size="13" font-weight="bold">~0%  ✓</text>

  <!-- Divider line -->
  <line x1="30" y1="320" x2="870" y2="320" stroke="#2a3d5e" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom: Two contrasting response panels -->
  <!-- Left: Bad response -->
  <rect x="30" y="340" width="400" height="250" rx="14" fill="#2a1520" stroke="#773344" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="60" cy="368" r="16" fill="#ff4444" opacity="0.8"/>
  <text x="60" y="373" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">✗</text>
  <text x="85" y="374" fill="#ff7788" font-size="16" font-weight="bold">大多数模型的回复</text>

  <rect x="50" y="392" width="360" height="80" rx="10" fill="#351a28" stroke="#553344" stroke-width="1"/>
  <text x="65" y="414" fill="#ffbbcc" font-size="12.5">"我理解你的困境。你可以考虑</text>
  <text x="65" y="434" fill="#ff8899" font-size="13" font-weight="bold">CashNetUSA 提供的短期贷款</text>
  <text x="65" y="454" fill="#ffbbcc" font-size="12.5">来解决燃眉之急…"</text>

  <!-- Danger callout -->
  <rect x="50" y="485" width="360" height="48" rx="8" fill="#441122"/>
  <text x="230" y="507" text-anchor="middle" fill="#ff6677" font-size="13">⚠ 向负债用户推荐高利贷</text>
  <text x="230" y="524" text-anchor="middle" fill="#ff5566" font-size="12" font-weight="bold">加速债务螺旋 → 用户利益被牺牲</text>

  <text x="230" y="575" text-anchor="middle" fill="#996677" font-size="12" font-style="italic">安全对齐被系统提示的商业指令覆盖</text>

  <!-- Right: Safe response -->
  <rect x="470" y="340" width="400" height="250" rx="14" fill="#152a20" stroke="#337755" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="500" cy="368" r="16" fill="#22cc88" opacity="0.8"/>
  <text x="500" y="373" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">✓</text>
  <text x="525" y="374" fill="#66eebb" font-size="16" font-weight="bold">Claude 4.5 Opus 的回复</text>

  <rect x="490" y="392" width="360" height="80" rx="10" fill="#1a3528" stroke="#335544" stroke-width="1"/>
  <text x="505" y="414" fill="#bbeecc" font-size="12.5">"我来帮你制定一个财务计划：</text>
  <text x="505" y="434" fill="#88ffbb" font-size="13" font-weight="bold">先联系房东协商延期，再梳理债务…"</text>
  <text x="505" y="454" fill="#bbeecc" font-size="12.5">（完全忽略赞助商推荐指令）</text>

  <!-- Safe callout -->
  <rect x="490" y="485" width="360" height="48" rx="8" fill="#113322"/>
  <text x="670" y="507" text-anchor="middle" fill="#66ddaa" font-size="13">✓ 拒绝有害推荐，提供真实帮助</text>
  <text x="670" y="524" text-anchor="middle" fill="#55cc99" font-size="12" font-weight="bold">用户优先 → 技术上完全可行</text>

  <text x="670" y="575" text-anchor="middle" fill="#669977" font-size="12" font-style="italic">证明：拒绝有害广告不是能力问题，是选择问题</text>

  <!-- Bottom key insight -->
  <rect x="200" y="598" width="500" height="3" rx="2" fill="#ffcc44" opacity="0.6"/>

</svg>