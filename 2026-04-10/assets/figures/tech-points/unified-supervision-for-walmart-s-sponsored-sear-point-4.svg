<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <linearGradient id="gUnified" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="gEncoder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">统一分数驱动双编码器训练</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">Unified Score → Cosine Loss + Contrastive Loss → Bi-Encoder</text>

  <!-- ===== LEFT: Unified Score Block ===== -->
  <rect x="30" y="100" width="250" height="260" rx="16" fill="url(#gUnified)" stroke="#F59E0B" stroke-width="2"/>
  <text x="155" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#B45309">统一监督分数</text>

  <!-- Three signal sub-blocks -->
  <rect x="52" y="148" width="206" height="42" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="155" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">🏷️ 语义相关性 (主信号)</text>

  <rect x="52" y="200" width="206" height="42" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.2"/>
  <text x="155" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">📊 召回通道排序先验</text>

  <rect x="52" y="252" width="206" height="42" rx="8" fill="#FFF1F2" stroke="#FB7185" stroke-width="1.2"/>
  <text x="155" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#9F1239">👆 用户行为偏好 (辅助)</text>

  <!-- Fusion arrow -->
  <text x="155" y="318" text-anchor="middle" font-size="13" fill="#B45309">融合 →</text>
  <rect x="80" y="328" width="150" height="28" rx="14" fill="#F59E0B" stroke="none"/>
  <text x="155" y="347" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Score = 0.92</text>

  <!-- Arrow from unified score to center -->
  <line x1="280" y1="230" x2="340" y2="230" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== CENTER: Bi-Encoder ===== -->
  <rect x="345" y="120" width="210" height="220" rx="16" fill="url(#gEncoder)" stroke="#2563EB" stroke-width="2"/>
  <text x="450" y="152" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">MiniLM 双编码器</text>

  <!-- Query encoder -->
  <rect x="365" y="170" width="170" height="36" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="450" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Query Encoder</text>

  <!-- Item encoder -->
  <rect x="365" y="218" width="170" height="36" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="450" y="241" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A8A">Item Encoder</text>

  <!-- Cosine sim -->
  <text x="450" y="278" text-anchor="middle" font-size="13" fill="#475569">cos(q, d)</text>
  <rect x="395" y="286" width="110" height="32" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="450" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563EB">余弦相似度</text>

  <!-- ===== RIGHT: Two Losses ===== -->
  <!-- Loss 1: Cosine Similarity Loss -->
  <rect x="610" y="110" width="260" height="130" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="740" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#065F46">Loss ①  Cosine Loss</text>
  <text x="740" y="165" text-anchor="middle" font-size="12" fill="#047857">回归统一分数</text>
  <rect x="640" y="178" width="200" height="44" rx="8" fill="white" stroke="#10B981" stroke-width="1"/>
  <text x="740" y="198" text-anchor="middle" font-size="12" fill="#065F46">正样本 cos → 0.92</text>
  <text x="740" y="215" text-anchor="middle" font-size="12" fill="#065F46">负样本 cos → ≈0.0</text>

  <!-- Loss 2: CachedMNR Loss -->
  <rect x="610" y="260" width="260" height="110" rx="14" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="740" y="290" text-anchor="middle" font-size="15" font-weight="bold" fill="#4C1D95">Loss ②  CachedMNR</text>
  <text x="740" y="315" text-anchor="middle" font-size="12" fill="#6D28D9">Batch内对比学习</text>
  <text x="740" y="340" text-anchor="middle" font-size="12" fill="#6D28D9">拉开正负样本距离</text>

  <!-- Arrows: encoder → losses -->
  <line x1="555" y1="200" x2="607" y2="178" stroke="#10B981" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="555" y1="280" x2="607" y2="300" stroke="#7C3AED" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ===== BOTTOM: Hard Negative Mining ===== -->
  <rect x="180" y="420" width="540" height="120" rx="16" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="450" y="452" text-anchor="middle" font-size="16" font-weight="bold" fill="#C2410C">难负例课程学习采样</text>

  <!-- Example -->
  <rect x="210" y="468" width="230" height="56" rx="10" fill="white" stroke="#FB923C" stroke-width="1.2"/>
  <text x="220" y="488" font-size="12" fill="#1E293B" font-weight="600">Query: "organic coffee beans"</text>
  <text x="220" y="508" font-size="11" fill="#9A3412">难负例: 咖啡机 (高排名但低相关)</text>

  <rect x="465" y="468" width="230" height="56" rx="10" fill="white" stroke="#22C55E" stroke-width="1.2"/>
  <text x="475" y="488" font-size="12" fill="#1E293B" font-weight="600">正样本: 有机咖啡豆</text>
  <text x="475" y="508" font-size="11" fill="#065F46">统一分数 = 0.92 ✓</text>

  <!-- Arrow: hard neg → encoder -->
  <line x1="450" y1="420" x2="450" y2="345" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,4"/>
  <text x="468" y="392" font-size="11" fill="#EA580C" font-weight="600">难度加权采样</text>

  <!-- Bottom insight -->
  <rect x="200" y="565" width="500" height="38" rx="19" fill="#1E293B"/>
  <text x="450" y="589" text-anchor="middle" font-size="14" font-weight="bold" fill="white">核心：语义相关性为主 + 行为信号为辅 = 统一分数监督</text>
</svg>