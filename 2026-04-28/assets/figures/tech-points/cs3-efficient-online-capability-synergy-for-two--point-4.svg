<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6cdf"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a1a">CS3 在线召回：把向量存储拆两家</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">训练频繁更新 vs 跨模型共享，分开放置，延迟几乎不变</text>

  <!-- 请求入口 -->
  <rect x="40" y="230" width="110" height="70" rx="10" fill="#eef3ff" stroke="#2d6cdf" stroke-width="2"/>
  <text x="95" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">召回请求</text>
  <text x="95" y="284" text-anchor="middle" font-size="12" fill="#555">user_id</text>

  <!-- 并行两路 -->
  <rect x="210" y="130" width="200" height="80" rx="10" fill="#fff7e6" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">ParSvr（参数服务器）</text>
  <text x="310" y="180" text-anchor="middle" font-size="12" fill="#555">稀疏 embedding</text>
  <text x="310" y="198" text-anchor="middle" font-size="12" fill="#555">CTS cross 向量 · EMA 更新</text>

  <rect x="210" y="320" width="200" height="80" rx="10" fill="#e9f7ef" stroke="#28a86a" stroke-width="2"/>
  <text x="310" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">EmbSvr（向量 KV）</text>
  <text x="310" y="370" text-anchor="middle" font-size="12" fill="#555">CMS cascade 向量</text>
  <text x="310" y="388" text-anchor="middle" font-size="12" fill="#555">大体量 · 跨模型共享</text>

  <!-- 并行箭头 -->
  <path d="M150,250 C180,250 180,170 210,170" fill="none" stroke="#2d6cdf" stroke-width="2" marker-end="url(#a)"/>
  <path d="M150,280 C180,280 180,360 210,360" fill="none" stroke="#2d6cdf" stroke-width="2" marker-end="url(#a)"/>
  <text x="160" y="220" font-size="11" fill="#2d6cdf">并行取</text>

  <!-- 用户塔 -->
  <rect x="490" y="210" width="170" height="110" rx="10" fill="#fdeef2" stroke="#c2185b" stroke-width="2"/>
  <text x="575" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">用户塔 (CAS 重加权)</text>
  <text x="575" y="265" text-anchor="middle" font-size="12" fill="#555">s-U + c-U 前向</text>
  <text x="575" y="285" text-anchor="middle" font-size="12" fill="#555">→ 用户向量</text>
  <text x="575" y="307" text-anchor="middle" font-size="11" fill="#888">（实时计算）</text>

  <path d="M410,180 C450,180 450,240 490,240" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#b)"/>
  <path d="M410,350 C450,350 450,290 490,290" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#b)"/>

  <!-- ANN -->
  <rect x="720" y="210" width="150" height="110" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="795" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">FAISS ANN</text>
  <text x="795" y="263" text-anchor="middle" font-size="12" fill="#555">物品向量</text>
  <text x="795" y="281" text-anchor="middle" font-size="12" fill="#555">离线预计算</text>
  <text x="795" y="307" text-anchor="middle" font-size="11" fill="#888">（已缓存）</text>

  <path d="M660,265 L720,265" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#c)"/>

  <!-- 底部收益 -->
  <rect x="140" y="450" width="620" height="75" rx="10" fill="#111827"/>
  <text x="450" y="478" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">只多一次 KV 查询 + 塔内重加权</text>
  <text x="260" y="505" text-anchor="middle" font-size="13" fill="#fbbf24">QPS 下降 &lt; 1%</text>
  <text x="450" y="505" text-anchor="middle" font-size="13" fill="#fbbf24">p99 仍毫秒级</text>
  <text x="640" y="505" text-anchor="middle" font-size="13" fill="#fbbf24">~30min 一次在线迭代</text>
</svg>