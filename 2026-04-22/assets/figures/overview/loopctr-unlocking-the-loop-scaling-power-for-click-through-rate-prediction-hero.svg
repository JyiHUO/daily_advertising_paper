<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="880" viewBox="0 0 1460 880"><defs><linearGradient id="overviewBg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F8FAFC"/></linearGradient><linearGradient id="heroBand" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E0EAFF"/><stop offset="100%" stop-color="#ECFDF5"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="1460" height="880" fill="url(#overviewBg)"/><rect x="34" y="32" width="1392" height="816" rx="34" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/><rect x="52" y="50" width="1356" height="164" rx="28" fill="url(#heroBand)" stroke="#D8E6F5" stroke-width="1.2"/><text x="72" y="92" font-size="30" font-weight="800" fill="#0F172A">LoopCTR: Unlocking the Loop Scaling Power for Click-Through Rate Prediction</text><text x="72" y="126" font-size="15" font-weight="700" fill="#475569">论文核心机制总览</text><rect x="72" y="146" width="920" height="44" rx="22" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.2"/><text x="92" y="174" font-size="16" font-weight="700" fill="#3730A3">一句话理解：直接针对CTR预估的模型架构创新论文，提出循环缩放范式（Loop Scaling），通过递归复用共享参数层来解耦计算量与参数量增长，实现训练时多循环、推理时零循环的策略，在公开与工业数据集上达到SOT</text><rect x="80.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="72.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.6"/><text x="94" y="244.0" font-size="14" font-weight="700" fill="#7C2D12">当前基于Transformer的CTR模型通过堆</text><text x="94" y="262.0" font-size="14" font-weight="700" fill="#7C2D12">叠更多层来提升效果，但参数量和计算/存储开销同步</text><text x="94" y="280.0" font-size="14" font-weight="700" fill="#7C2D12">增长，与工业界低延迟部署约束之间的矛盾日益严重…</text><rect x="1076.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1068.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="1.6"/><text x="1090" y="244.0" font-size="14" font-weight="700" fill="#3730A3">直接针对CTR预估的模型架构创新论文，提出循环缩</text><text x="1090" y="262.0" font-size="14" font-weight="700" fill="#3730A3">放范式（Loop Scaling），通过递归复用</text><text x="1090" y="280.0" font-size="14" font-weight="700" fill="#3730A3">共享参数层来解耦计算量与参数量增长，实现训练时…</text><path d="M 468.0 427.0 C 502.0 427.0, 532.0 427.0, 566.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><path d="M 890.0 427.0 C 924.0 427.0, 954.0 427.0, 988.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="176.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="168.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/><rect x="188.0" y="336.0" width="86" height="30" rx="15" fill="#DBEAFE"/><text x="231.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#60A5FA">核心模块</text><text x="318.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">三明治架构与循环复用</text><text x="194.0" y="458.0" font-size="14" font-weight="600" fill="#334155">可以把这个架构想象成一条流水线：</text><text x="194.0" y="476.0" font-size="14" font-weight="600" fill="#334155">先在Entry Block把各种</text><text x="194.0" y="494.0" font-size="14" font-weight="600" fill="#334155">不同格式的输入特征统一编码，然后</text><text x="194.0" y="512.0" font-size="14" font-weight="600" fill="#334155">进入Loop Block反复&#x27;…</text><rect x="598.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="590.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#F0FDF4" stroke="#10B981" stroke-width="1.6"/><rect x="610.0" y="336.0" width="86" height="30" rx="15" fill="#BBF7D0"/><text x="653.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#10B981">核心模块</text><text x="740.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">超连接残差增强循环表达力</text><text x="616.0" y="458.0" font-size="14" font-weight="600" fill="#334155">标准残差连接像一条固定比例的水管</text><text x="616.0" y="476.0" font-size="14" font-weight="600" fill="#334155">，每次循环只能按1:1混合旧信息</text><text x="616.0" y="494.0" font-size="14" font-weight="600" fill="#334155">和新信息。超连接残差相当于把水管</text><text x="616.0" y="512.0" font-size="14" font-weight="600" fill="#334155">扩成n条并行管道，每条管道的流…</text><rect x="1020.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1012.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.6"/><rect x="1032.0" y="336.0" width="86" height="30" rx="15" fill="#FDE68A"/><text x="1075.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#F59E0B">核心模块</text><text x="1162.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">MoE扩展参数容量</text><text x="1038.0" y="458.0" font-size="14" font-weight="600" fill="#334155">共享参数循环复用的问题是单层容量</text><text x="1038.0" y="476.0" font-size="14" font-weight="600" fill="#334155">可能不够。MoE相当于给这一层准</text><text x="1038.0" y="494.0" font-size="14" font-weight="600" fill="#334155">备了多个&#x27;专家&#x27;子网络，每个to</text><text x="1038.0" y="512.0" font-size="14" font-weight="600" fill="#334155">ken根据自身特征只选几个专家…</text><rect x="72" y="614" width="1316" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/><text x="94" y="650" font-size="18" font-weight="800" fill="#0F172A">为什么这篇论文值得放主图</text><text x="94" y="684.0" font-size="15" font-weight="600" fill="#334155">当前基于Transformer的CTR模型通过堆叠更多层来提升效果，但参数量和计算/存储开销同步增长，与工业界低延迟</text><text x="94" y="706.0" font-size="15" font-weight="600" fill="#334155">部署约束之间的矛盾日益严重。已有的深度缩放、宽度缩放、输入缩放方法都把额外参数与额外计算绑定在一起。LoopCTR提</text><text x="94" y="728.0" font-size="15" font-weight="600" fill="#334155">出一种全新的&#x27;循环缩放&#x27;维度：让同一组共享参数层被递归复用多次，训练时增加计算深度但不增加参数，推理时甚至可以跳过循</text><text x="94" y="750.0" font-size="15" font-weight="600" fill="#334155">环层只做一次前向传播就超越所有基线，同时Oracle分析表明还有0.02-0.04</text><text x="94" y="772.0" font-size="15" font-weight="600" fill="#334155">AUC的未挖掘空间，这对广告系统在不增加线上延迟的前提下提升模型效果具有直接意义。</text><text x="72" y="836" font-size="14" font-weight="600" fill="#64748B">图示：候选主图不可靠时，自动回退为论文机制总览 SVG。</text></svg>