<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fc"/>
      <stop offset="1" stop-color="#eaeef6"/>
    </linearGradient>
    <linearGradient id="loopG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b7ff0"/>
      <stop offset="1" stop-color="#9156e6"/>
    </linearGradient>
    <linearGradient id="entryG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb6a8"/>
      <stop offset="1" stop-color="#4fc3c8"/>
    </linearGradient>
    <linearGradient id="exitG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef7a5a"/>
      <stop offset="1" stop-color="#f2a04a"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475069"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fff6c7"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef7a5a"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2640">LoopCTR · 用「循环缩放」解耦 参数量 与 计算深度</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#5a6480">训练时多次循环共享参数，推理时零循环直接出结果——延迟不变、效果超越 SOTA</text>

  <!-- Top tension bar -->
  <g transform="translate(80,92)">
    <rect width="1040" height="46" rx="10" fill="#ffffff" stroke="#d8ddec"/>
    <text x="20" y="29" font-size="13" fill="#5a6480">既有范式 (深度/宽度/输入缩放)：</text>
    <text x="210" y="29" font-size="13" font-weight="600" fill="#c43a3a">参数 ↑  计算 ↑  延迟 ↑</text>
    <line x1="470" y1="23" x2="540" y2="23" stroke="#9aa3bd" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="560" y="29" font-size="13" fill="#5a6480">LoopCTR 循环缩放：</text>
    <text x="720" y="29" font-size="13" font-weight="600" fill="#2a7d5a">参数不变 · 训练计算 ↑ · 推理计算 = 单次</text>
  </g>

  <!-- Process supervision label -->
  <text x="600" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#c44a22">过程监督：每一循环深度都要能预测 → BCE 平均</text>

  <!-- Process supervision: multiple exits (redrawn cleaner) -->
  <g stroke="#ef7a5a" stroke-width="1.6" fill="none" stroke-dasharray="5 4">
    <path d="M 360 250 C 500 190, 780 190, 878 300" marker-end="url(#arrO)"/>
    <path d="M 550 250 C 650 210, 820 220, 882 310" marker-end="url(#arrO)"/>
    <path d="M 740 250 C 790 235, 850 260, 884 320" marker-end="url(#arrO)"/>
  </g>
  <g font-size="11" fill="#c44a22" font-weight="600">
    <text x="360" y="198">l=1 exit</text>
    <text x="550" y="198">l=2 exit</text>
    <text x="720" y="216">l=L exit</text>
  </g>

  <!-- Entry block -->
  <g transform="translate(70,270)">
    <rect width="150" height="210" rx="14" fill="url(#entryG)"/>
    <text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Entry Block</text>
    <text x="75" y="54" text-anchor="middle" font-size="11" fill="#e6fffa">特征对齐 · 分组投影</text>
    <rect x="15" y="74" width="120" height="28" rx="6" fill="rgba(255,255,255,0.18)"/>
    <text x="75" y="92" text-anchor="middle" font-size="11" fill="#fff">短期行为 tokens</text>
    <rect x="15" y="110" width="120" height="28" rx="6" fill="rgba(255,255,255,0.18)"/>
    <text x="75" y="128" text-anchor="middle" font-size="11" fill="#fff">长期压缩 tokens</text>
    <rect x="15" y="146" width="120" height="28" rx="6" fill="rgba(255,255,255,0.18)"/>
    <text x="75" y="164" text-anchor="middle" font-size="11" fill="#fff">全局 user/item/ctx</text>
    <text x="75" y="192" text-anchor="middle" font-size="10" fill="#d6fff4">前缀注意力掩码</text>
  </g>

  <!-- Loop block (central) -->
  <g transform="translate(320,240)">
    <rect x="40" y="28" width="440" height="240" rx="18" fill="#b9a8f0" opacity="0.35"/>
    <rect x="22" y="14" width="440" height="240" rx="18" fill="#a18ce8" opacity="0.45"/>
    <rect x="0" y="0" width="440" height="240" rx="18" fill="url(#loopG)"/>

    <text x="220" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Loop Block · 共享参数 × L 次</text>
    <text x="220" y="52" text-anchor="middle" font-size="11" fill="#ecd9ff">同一组权重反复调用：参数量 O(1)，计算深度 O(L)</text>

    <g transform="translate(24,72)">
      <rect width="180" height="70" rx="10" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.4)"/>
      <text x="90" y="26" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Hyper-Connected</text>
      <text x="90" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Residuals (n 流)</text>
      <text x="90" y="60" text-anchor="middle" font-size="10" fill="#ecd9ff">多深度自适应混合</text>
    </g>
    <g transform="translate(224,72)">
      <rect width="192" height="70" rx="10" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.4)"/>
      <text x="96" y="26" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">MoE 注意力 + FFN</text>
      <text x="96" y="44" text-anchor="middle" font-size="10" fill="#ecd9ff">WV / WO 路由共享</text>
      <text x="96" y="60" text-anchor="middle" font-size="10" fill="#ecd9ff">稀疏激活扩容量</text>
    </g>

    <!-- recursion arrow -->
    <path d="M 70 180 C 50 215, 80 220, 140 220 L 300 220 C 360 220, 390 215, 370 180"
          fill="none" stroke="#fff6c7" stroke-width="2.5" marker-end="url(#arrL)" opacity="0.95"/>
    <text x="220" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#fff6c7">recursive × L  (共享参数)</text>
  </g>

  <!-- Exit block -->
  <g transform="translate(880,270)">
    <rect width="150" height="210" rx="14" fill="url(#exitG)"/>
    <text x="75" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Exit Block</text>
    <text x="75" y="54" text-anchor="middle" font-size="11" fill="#fff2ea">Cross-Attn + MLP</text>
    <rect x="15" y="82" width="120" height="46" rx="8" fill="rgba(255,255,255,0.2)"/>
    <text x="75" y="102" text-anchor="middle" font-size="12" fill="#fff">全局 tokens 聚合</text>
    <text x="75" y="120" text-anchor="middle" font-size="12" fill="#fff">→ p(click)</text>
    <text x="75" y="158" text-anchor="middle" font-size="11" fill="#fff2ea">每一循环深度</text>
    <text x="75" y="176" text-anchor="middle" font-size="11" fill="#fff2ea">都接一次 Exit</text>
  </g>

  <!-- flow arrows -->
  <line x1="220" y1="375" x2="316" y2="375" stroke="#475069" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="762" y1="375" x2="878" y2="375" stroke="#475069" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom: training vs inference comparison -->
  <g transform="translate(70,530)">
    <rect width="1060" height="190" rx="14" fill="#ffffff" stroke="#d8ddec"/>

    <!-- Training side -->
    <g transform="translate(24,20)">
      <circle cx="14" cy="14" r="7" fill="#7c52e8"/>
      <text x="32" y="19" font-size="14" font-weight="700" fill="#1f2640">训练 Training</text>
      <text x="32" y="42" font-size="12" fill="#5a6480">Entry → Loop × L → Exit，每一深度监督</text>
      <g transform="translate(0,62)">
        <rect width="490" height="90" rx="10" fill="#f3eeff" stroke="#d6c8f5"/>
        <text x="16" y="26" font-size="11" fill="#2d3553">• 共享参数被迫在每个深度都学出可用表征</text>
        <text x="16" y="50" font-size="11" fill="#2d3553">• Hyper-Residual 打破 1:1 残差瓶颈</text>
        <text x="16" y="74" font-size="11" fill="#2d3553">• MoE 扩容量，单 token 稀疏激活</text>
      </g>
    </g>

    <!-- divider -->
    <line x1="540" y1="30" x2="540" y2="170" stroke="#d8ddec" stroke-dasharray="4 4"/>

    <!-- Inference side -->
    <g transform="translate(564,20)">
      <circle cx="14" cy="14" r="7" fill="#ef7a5a"/>
      <text x="32" y="19" font-size="14" font-weight="700" fill="#1f2640">推理 Inference · 零循环</text>
      <text x="32" y="42" font-size="12" fill="#5a6480">直接走 l=0：Entry → Exit，跳过 Loop Block</text>
      <g transform="translate(0,62)">
        <rect width="472" height="90" rx="10" fill="#fff0e8" stroke="#f5c8b1"/>
        <text x="16" y="28" font-size="11" font-weight="600" fill="#c44a22">InHouse：13.38M FLOPs · 9.26ms</text>
        <text x="16" y="52" font-size="11" fill="#5a6480">vs HSTU：2150M FLOPs · 775ms</text>
        <text x="16" y="76" font-size="11" font-weight="600" fill="#2a7d5a">Amazon AUC 0.8715 &gt; 所有基线 0.8690</text>
      </g>
    </g>
  </g>
</svg>