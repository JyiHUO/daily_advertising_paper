<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fc"/>
      <stop offset="1" stop-color="#eceff7"/>
    </linearGradient>
    <linearGradient id="loopg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5bf2"/>
      <stop offset="1" stop-color="#a066e8"/>
    </linearGradient>
    <linearGradient id="trainG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd7a8"/>
      <stop offset="1" stop-color="#ffb37a"/>
    </linearGradient>
    <linearGradient id="inferG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a8e8c6"/>
      <stop offset="1" stop-color="#6fd49e"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a4a6a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2fa36a"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffe27a"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2340">LoopCTR：用循环缩放解耦 CTR 模型的「算力」与「参数」</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#5b6080">训练时多循环打磨共享参数 · 推理时零循环仍超越所有基线</text>

  <!-- Tension bar -->
  <g transform="translate(60,100)">
    <rect x="0" y="0" width="1080" height="44" rx="10" fill="#ffffff" stroke="#e3e6f0" filter="url(#sh)"/>
    <circle cx="24" cy="22" r="6" fill="#ff6b6b"/>
    <text x="40" y="27" font-size="13" fill="#2a2f4a"><tspan font-weight="700">核心矛盾：</tspan>堆参数 → 效果↑ 但 延迟 / 存储 ↑↑，与工业部署约束冲突</text>
    <text x="1056" y="27" text-anchor="end" font-size="12" fill="#8a8fa8">参数 ⇢ 计算 <tspan fill="#6d5bf2" font-weight="700">需要解耦</tspan></text>
  </g>

  <!-- LEFT: Training -->
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="560" height="500" rx="16" fill="#fff8ef" stroke="#f3d7b0" filter="url(#sh)"/>
    <rect x="0" y="0" width="560" height="34" rx="16" fill="url(#trainG)"/>
    <text x="20" y="23" font-size="14" font-weight="700" fill="#6b3a12">训练阶段 · Train-Multi-Loop</text>
    <text x="540" y="23" text-anchor="end" font-size="12" fill="#6b3a12">过程监督 ℓ=0..L</text>

    <!-- Entry -->
    <rect x="30" y="58" width="500" height="52" rx="10" fill="#fff" stroke="#d8b98f"/>
    <text x="50" y="80" font-size="13" font-weight="700" fill="#2a2f4a">Entry Block</text>
    <text x="50" y="98" font-size="11" fill="#6b6f8a">异构特征分组投影 + 组内自注意力 → 统一 token 空间</text>

    <!-- Loop core -->
    <g transform="translate(120,130)">
      <rect x="0" y="0" width="320" height="190" rx="14" fill="url(#loopg)" opacity="0.95"/>
      <text x="160" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Loop Block（共享参数，递归 L 次）</text>

      <rect x="40" y="48" width="240" height="30" rx="6" fill="#ffffff" opacity="0.92"/>
      <text x="160" y="68" text-anchor="middle" font-size="11" fill="#4a3a8a" font-weight="700">Prefix-Attn + FFN (MoE · top-k)</text>

      <rect x="40" y="86" width="240" height="22" rx="6" fill="#ffffff" opacity="0.75"/>
      <text x="160" y="101" text-anchor="middle" font-size="10" fill="#4a3a8a">Hyper-Connected Residuals · n-stream</text>

      <rect x="40" y="116" width="240" height="22" rx="6" fill="#ffffff" opacity="0.55"/>
      <text x="160" y="131" text-anchor="middle" font-size="10" fill="#4a3a8a">同一组权重，不同深度动态路由</text>

      <text x="160" y="165" text-anchor="middle" font-size="11" fill="#fff" opacity="0.95">参数量固定 · 计算深度 ↑</text>

      <!-- recursion loop arrow (clean closed loop) -->
      <path d="M 295 63 C 345 63 345 155 295 155" fill="none" stroke="#ffe27a" stroke-width="3" marker-end="url(#arrY)"/>
      <text x="352" y="113" font-size="12" fill="#fff" font-weight="700">× L</text>
    </g>

    <!-- Exit taps: process supervision -->
    <g font-size="10" fill="#6b3a12">
      <circle cx="70" cy="195" r="9" fill="#ffb37a"/>
      <text x="70" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">0</text>
      <text x="70" y="220" text-anchor="middle">ℓ=0 BCE</text>

      <circle cx="70" cy="255" r="9" fill="#ffb37a"/>
      <text x="70" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
      <text x="70" y="280" text-anchor="middle">ℓ=1 BCE</text>

      <circle cx="480" cy="195" r="9" fill="#ffb37a"/>
      <text x="480" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
      <text x="480" y="220" text-anchor="middle">ℓ=2 BCE</text>

      <circle cx="480" cy="255" r="9" fill="#ff8a3d"/>
      <text x="480" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">L</text>
      <text x="480" y="280" text-anchor="middle">ℓ=L BCE</text>
    </g>

    <!-- Exit -->
    <rect x="30" y="340" width="500" height="50" rx="10" fill="#fff" stroke="#d8b98f"/>
    <text x="50" y="362" font-size="13" font-weight="700" fill="#2a2f4a">Exit Block</text>
    <text x="50" y="380" font-size="11" fill="#6b6f8a">全局 token 交叉注意力聚合 → MLP → 点击概率</text>

    <!-- Loss -->
    <rect x="120" y="410" width="320" height="60" rx="10" fill="#fff3dc" stroke="#e9b875"/>
    <text x="280" y="433" text-anchor="middle" font-size="13" font-weight="700" fill="#6b3a12">Loss = mean( BCE_ℓ ),  ℓ = 0 .. L</text>
    <text x="280" y="454" text-anchor="middle" font-size="11" fill="#8a5a20">每个深度都要产出有效预测 → 多循环收益内化到共享参数</text>

    <!-- flow arrows -->
    <path d="M280 110 L280 128" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)" fill="none"/>
    <path d="M280 322 L280 338" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)" fill="none"/>
    <path d="M280 390 L280 408" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)" fill="none"/>
  </g>

  <!-- Middle transfer arrow -->
  <g transform="translate(620,400)">
    <path d="M10 20 L62 20" stroke="#6d5bf2" stroke-width="3" fill="none" marker-end="url(#arr)"/>
    <text x="36" y="10" text-anchor="middle" font-size="11" fill="#6d5bf2" font-weight="700">知识内化</text>
    <text x="36" y="42" text-anchor="middle" font-size="10" fill="#8a8fa8">部署</text>
  </g>

  <!-- RIGHT: Inference -->
  <g transform="translate(690,170)">
    <rect x="0" y="0" width="450" height="500" rx="16" fill="#effaf3" stroke="#b5e4c8" filter="url(#sh)"/>
    <rect x="0" y="0" width="450" height="34" rx="16" fill="url(#inferG)"/>
    <text x="20" y="23" font-size="14" font-weight="700" fill="#1f5a3a">推理阶段 · Infer-Zero-Loop</text>
    <text x="430" y="23" text-anchor="end" font-size="12" fill="#1f5a3a">单次前向</text>

    <!-- Entry -->
    <rect x="30" y="58" width="390" height="48" rx="10" fill="#fff" stroke="#9ed2b5"/>
    <text x="225" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#1f5a3a">Entry Block</text>

    <!-- Loop block crossed out -->
    <rect x="30" y="130" width="390" height="130" rx="12" fill="#f3f3f3" stroke="#cccccc" stroke-dasharray="6,4"/>
    <text x="225" y="170" text-anchor="middle" font-size="13" fill="#9a9a9a" font-weight="700">Loop Block</text>
    <text x="225" y="192" text-anchor="middle" font-size="11" fill="#9a9a9a">训练时 × L，推理时 × 0</text>
    <line x1="60" y1="145" x2="390" y2="245" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
    <text x="380" y="240" text-anchor="end" font-size="11" font-weight="700" fill="#ff6b6b">SKIP</text>

    <!-- Exit -->
    <rect x="30" y="282" width="390" height="48" rx="10" fill="#fff" stroke="#9ed2b5"/>
    <text x="225" y="311" text-anchor="middle" font-size="13" font-weight="700" fill="#1f5a3a">Exit Block → CTR</text>

    <!-- bypass arrow: Entry -> Exit, clearly landing on Exit top edge -->
    <path d="M405 106 C 445 170 445 240 405 282" stroke="#2fa36a" stroke-width="3" fill="none" marker-end="url(#arrG)"/>
    <text x="435" y="198" text-anchor="end" font-size="11" fill="#2fa36a" font-weight="700">zero-loop bypass</text>

    <!-- Results -->
    <rect x="30" y="352" width="390" height="120" rx="12" fill="#ffffff" stroke="#9ed2b5"/>
    <text x="50" y="375" font-size="12" font-weight="700" fill="#1f5a3a">收益 · 已超越所有基线</text>

    <g font-size="11" fill="#2a2f4a">
      <text x="50" y="400">FLOPs</text>
      <text x="420" y="400" text-anchor="end"><tspan fill="#9a9a9a">HSTU 2150M</tspan> → <tspan fill="#1f5a3a" font-weight="700">13.4M</tspan></text>

      <text x="50" y="422">延迟</text>
      <text x="420" y="422" text-anchor="end"><tspan fill="#9a9a9a">775 ms</tspan> → <tspan fill="#1f5a3a" font-weight="700">9.26 ms</tspan></text>

      <text x="50" y="444">Amazon AUC</text>
      <text x="420" y="444" text-anchor="end"><tspan fill="#9a9a9a">baseline 0.8690</tspan> → <tspan fill="#1f5a3a" font-weight="700">0.8715</tspan></text>

      <text x="50" y="466">Oracle headroom</text>
      <text x="420" y="466" text-anchor="end" fill="#6d5bf2" font-weight="700">+0.02 ~ 0.04 AUC 可挖掘</text>
    </g>
  </g>

  <!-- Footer caption -->
  <text x="600" y="708" text-anchor="middle" font-size="12" fill="#5b6080">同一组共享参数在训练中被「反复打磨」，推理时不再循环也已足够强 —— 让算力不再绑定参数</text>
  <text x="600" y="730" text-anchor="middle" font-size="11" fill="#8a8fa8">三明治架构 · Hyper-Connected Residuals · MoE 扩容 · 过程监督</text>
</svg>