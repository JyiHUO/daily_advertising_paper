<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1530"/>
      <stop offset="1" stop-color="#1a2348"/>
    </linearGradient>
    <linearGradient id="userT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d7bff"/>
      <stop offset="1" stop-color="#2149b8"/>
    </linearGradient>
    <linearGradient id="itemT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#c9541a"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd24d"/>
      <stop offset="1" stop-color="#ff6fa0"/>
    </linearGradient>
    <linearGradient id="rank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a5cff"/>
      <stop offset="1" stop-color="#5c8cff"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e6ecff"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffd24d"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9bffb0"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b79bff"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700">CS3: 让轻量双塔召回同时补齐三道能力裂缝</text>
  <text x="500" y="66" text-anchor="middle" fill="#9bb0e8" font-size="13">单塔表达弱 · 双塔未对齐 · 与精排断层  →  三个即插即用模块，在线学习闭环</text>

  <!-- Three gaps row -->
  <g font-size="11" fill="#ffd24d">
    <text x="160" y="100" text-anchor="middle">Gap 1 · 单塔表达</text>
    <text x="500" y="100" text-anchor="middle">Gap 2 · 双塔不对齐</text>
    <text x="840" y="100" text-anchor="middle">Gap 3 · 与精排断层</text>
  </g>

  <!-- User Tower -->
  <g>
    <rect x="60" y="175" width="200" height="260" rx="14" fill="url(#userT)" opacity="0.92"/>
    <text x="160" y="202" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">User Tower</text>
    <g fill="#ffffff" opacity="0.18">
      <rect x="80" y="220" width="160" height="26" rx="4"/>
      <rect x="80" y="254" width="160" height="26" rx="4"/>
      <rect x="80" y="288" width="160" height="26" rx="4"/>
    </g>
    <text x="160" y="237" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>
    <text x="160" y="271" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>
    <text x="160" y="305" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>

    <rect x="80" y="340" width="48" height="22" rx="4" fill="#0f1530" stroke="#ffd24d" stroke-width="1"/>
    <text x="104" y="355" text-anchor="middle" fill="#ffd24d" font-size="10">feat</text>
    <rect x="132" y="340" width="48" height="22" rx="4" fill="#0f1530" stroke="#9bffb0" stroke-width="1"/>
    <text x="156" y="355" text-anchor="middle" fill="#9bffb0" font-size="10">cross</text>
    <rect x="184" y="340" width="56" height="22" rx="4" fill="#0f1530" stroke="#b79bff" stroke-width="1"/>
    <text x="212" y="355" text-anchor="middle" fill="#b79bff" font-size="10">cascade</text>
    <text x="160" y="380" text-anchor="middle" fill="#e6ecff" font-size="10">输入 = 原始特征 ⊕ CTS ⊕ CMS</text>

    <circle cx="160" cy="412" r="10" fill="#ffd24d"/>
    <text x="160" y="416" text-anchor="middle" fill="#0f1530" font-size="11" font-weight="700">u</text>
  </g>

  <!-- Item Tower -->
  <g>
    <rect x="740" y="175" width="200" height="260" rx="14" fill="url(#itemT)" opacity="0.92"/>
    <text x="840" y="202" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Item Tower</text>
    <g fill="#ffffff" opacity="0.18">
      <rect x="760" y="220" width="160" height="26" rx="4"/>
      <rect x="760" y="254" width="160" height="26" rx="4"/>
      <rect x="760" y="288" width="160" height="26" rx="4"/>
    </g>
    <text x="840" y="237" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>
    <text x="840" y="271" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>
    <text x="840" y="305" text-anchor="middle" fill="#fff" font-size="11">FC + CAS 去噪门控</text>

    <rect x="760" y="340" width="48" height="22" rx="4" fill="#0f1530" stroke="#ffd24d" stroke-width="1"/>
    <text x="784" y="355" text-anchor="middle" fill="#ffd24d" font-size="10">feat</text>
    <rect x="812" y="340" width="48" height="22" rx="4" fill="#0f1530" stroke="#9bffb0" stroke-width="1"/>
    <text x="836" y="355" text-anchor="middle" fill="#9bffb0" font-size="10">cross</text>
    <rect x="864" y="340" width="56" height="22" rx="4" fill="#0f1530" stroke="#b79bff" stroke-width="1"/>
    <text x="892" y="355" text-anchor="middle" fill="#b79bff" font-size="10">cascade</text>
    <text x="840" y="380" text-anchor="middle" fill="#e6ecff" font-size="10">输入 = 原始特征 ⊕ CTS ⊕ CMS</text>

    <circle cx="840" cy="412" r="10" fill="#ffd24d"/>
    <text x="840" y="416" text-anchor="middle" fill="#0f1530" font-size="11" font-weight="700">v</text>
  </g>

  <!-- CAS side label -->
  <text x="30" y="305" fill="#ffd24d" font-size="11" font-weight="700" transform="rotate(-90 30 305)">CAS · 塔内自修正</text>

  <!-- Center: CTS cross-tower sync -->
  <g>
    <ellipse cx="500" cy="295" rx="130" ry="68" fill="url(#core)" opacity="0.95"/>
    <text x="500" y="283" text-anchor="middle" fill="#2a1a00" font-size="15" font-weight="700">CTS · 跨塔对齐</text>
    <text x="500" y="303" text-anchor="middle" fill="#2a1a00" font-size="11">缓存对方塔正样本的 EMA 摘要</text>
    <text x="500" y="323" text-anchor="middle" fill="#2a1a00" font-size="10" font-style="italic">仅正样本更新 → ParSvr</text>
  </g>

  <!-- CTS: towers -> center (summary in) -->
  <path d="M 260 260 Q 340 240 372 265" stroke="#ffd24d" stroke-width="2" fill="none" marker-end="url(#arrY)" opacity="0.9"/>
  <path d="M 740 260 Q 660 240 628 265" stroke="#ffd24d" stroke-width="2" fill="none" marker-end="url(#arrY)" opacity="0.9"/>

  <!-- CTS: center -> towers' cross slot (feedback) -->
  <path d="M 420 340 Q 300 360 182 342" stroke="#9bffb0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)" opacity="0.9"/>
  <path d="M 580 340 Q 700 360 814 342" stroke="#9bffb0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)" opacity="0.9"/>

  <!-- Bottom: Cascade Rank Model (CMS) -->
  <g>
    <rect x="260" y="470" width="480" height="72" rx="12" fill="url(#rank)" opacity="0.95"/>
    <text x="500" y="496" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">CMS · 级联精排知识共享</text>
    <text x="500" y="515" text-anchor="middle" fill="#e6ecff" font-size="11">精排倒数第二层 h(u,v) → EMA 写入 EmbSvr，正负样本都更新</text>
    <text x="500" y="532" text-anchor="middle" fill="#ffd24d" font-size="10" font-style="italic">线上收益最大 · p99 &lt; 5ms</text>
  </g>

  <!-- CMS arrows to towers' cascade slot -->
  <path d="M 300 470 Q 220 430 212 364" stroke="#b79bff" stroke-width="2" fill="none" marker-end="url(#arrP)" opacity="0.95"/>
  <path d="M 700 470 Q 780 430 792 364" stroke="#b79bff" stroke-width="2" fill="none" marker-end="url(#arrP)" opacity="0.95"/>

  <!-- Final dot-product result -->
  <g>
    <circle cx="500" cy="412" r="16" fill="#0f1530" stroke="#ffd24d" stroke-width="2"/>
    <text x="500" y="418" text-anchor="middle" fill="#ffd24d" font-size="16" font-weight="700">·</text>
  </g>
  <line x1="176" y1="412" x2="482" y2="412" stroke="#e6ecff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.85"/>
  <line x1="824" y1="412" x2="518" y2="412" stroke="#e6ecff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.85"/>

  <!-- Result badge -->
  <g>
    <rect x="400" y="565" width="200" height="40" rx="20" fill="#ffd24d"/>
    <text x="500" y="582" text-anchor="middle" fill="#2a1a00" font-size="12" font-weight="700">快手广告线上收益</text>
    <text x="500" y="598" text-anchor="middle" fill="#2a1a00" font-size="12" font-weight="700">+8.36% Revenue · QPS 下降 &lt; 1%</text>
  </g>

  <!-- Legend -->
  <g font-size="10" fill="#9bb0e8">
    <rect x="40" y="580" width="10" height="10" fill="#ffd24d"/>
    <text x="56" y="589">CTS 摘要</text>
    <rect x="130" y="580" width="10" height="10" fill="#9bffb0"/>
    <text x="146" y="589">cross (ParSvr)</text>
    <rect x="240" y="580" width="10" height="10" fill="#b79bff"/>
    <text x="256" y="589">cascade (EmbSvr)</text>
  </g>
</svg>