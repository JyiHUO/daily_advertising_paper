<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="880" viewBox="0 0 1460 880"><defs><linearGradient id="overviewBg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F8FAFC"/></linearGradient><linearGradient id="heroBand" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E0EAFF"/><stop offset="100%" stop-color="#ECFDF5"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker></defs><rect x="0" y="0" width="1460" height="880" fill="url(#overviewBg)"/><rect x="34" y="32" width="1392" height="816" rx="34" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/><rect x="52" y="50" width="1356" height="164" rx="28" fill="url(#heroBand)" stroke="#D8E6F5" stroke-width="1.2"/><text x="72" y="92" font-size="30" font-weight="800" fill="#0F172A">CS3: Efficient Online Capability Synergy for Two-Tower Recommendation</text><text x="72" y="126" font-size="15" font-weight="700" fill="#475569">论文核心机制总览</text><rect x="72" y="146" width="920" height="44" rx="22" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.2"/><text x="92" y="174" font-size="16" font-weight="700" fill="#3730A3">一句话理解：直接面向广告场景的双塔召回增强框架，已在快手大规模广告系统上线并取得最高8.36%收入提升，对广告召回模型的在线学习优化有很强的实践参考价值。</text><rect x="80.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="72.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.6"/><text x="94" y="244.0" font-size="14" font-weight="700" fill="#7C2D12">工业推荐系统普遍采用双塔模型做大规模召回，但双塔</text><text x="94" y="262.0" font-size="14" font-weight="700" fill="#7C2D12">结构天然存在三个短板：单塔表达能力受限、用户和物</text><text x="94" y="280.0" font-size="14" font-weight="700" fill="#7C2D12">品嵌入空间缺乏对齐、与下游精排模型之间存在能力…</text><rect x="1076.0" y="226.0" width="320.0" height="78.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1068.0" y="216.0" width="320.0" height="78.0" rx="28" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="1.6"/><text x="1090" y="244.0" font-size="14" font-weight="700" fill="#3730A3">直接面向广告场景的双塔召回增强框架，已在快手大规</text><text x="1090" y="262.0" font-size="14" font-weight="700" fill="#3730A3">模广告系统上线并取得最高8.36%收入提升，对广</text><text x="1090" y="280.0" font-size="14" font-weight="700" fill="#3730A3">告召回模型的在线学习优化有很强的实践参考价值。</text><path d="M 468.0 427.0 C 502.0 427.0, 532.0 427.0, 566.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><path d="M 890.0 427.0 C 924.0 427.0, 954.0 427.0, 988.0 427.0" fill="none" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/><rect x="176.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="168.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/><rect x="188.0" y="336.0" width="86" height="30" rx="15" fill="#DBEAFE"/><text x="231.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#60A5FA">核心模块</text><text x="318.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">塔内自适应去噪(CAS)</text><text x="194.0" y="458.0" font-size="14" font-weight="600" fill="#334155">可以把CAS理解为：每层先快速&#x27;</text><text x="194.0" y="476.0" font-size="14" font-weight="600" fill="#334155">看一眼&#x27;输出长什么样，然后回头给</text><text x="194.0" y="494.0" font-size="14" font-weight="600" fill="#334155">输入的每个特征维度打一个重要性分</text><text x="194.0" y="512.0" font-size="14" font-weight="600" fill="#334155">数——不重要的维度被压低（相当…</text><rect x="598.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="590.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#F0FDF4" stroke="#10B981" stroke-width="1.6"/><rect x="610.0" y="336.0" width="86" height="30" rx="15" fill="#BBF7D0"/><text x="653.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#10B981">核心模块</text><text x="740.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">跨塔同步对齐(CTS)</text><text x="616.0" y="458.0" font-size="14" font-weight="600" fill="#334155">双塔的核心痛点是用户塔和物品塔在</text><text x="616.0" y="476.0" font-size="14" font-weight="600" fill="#334155">打分前完全不&#x27;看&#x27;对方。CTS的</text><text x="616.0" y="494.0" font-size="14" font-weight="600" fill="#334155">做法是给每个用户缓存一个&#x27;我喜欢</text><text x="616.0" y="512.0" font-size="14" font-weight="600" fill="#334155">过的物品长什么样&#x27;的摘要向量，…</text><rect x="1020.0" y="328.0" width="300.0" height="218.0" rx="28" fill="#0F172A" opacity="0.05"/><rect x="1012.0" y="318.0" width="300.0" height="218.0" rx="28" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.6"/><rect x="1032.0" y="336.0" width="86" height="30" rx="15" fill="#FDE68A"/><text x="1075.0" y="356.0" text-anchor="middle" font-size="12" font-weight="800" fill="#F59E0B">核心模块</text><text x="1162.0" y="406.0" text-anchor="middle" font-size="26" font-weight="800" fill="#0F172A">级联模型知识共享(CMS)</text><text x="1038.0" y="458.0" font-size="14" font-weight="600" fill="#334155">精排模型能利用用户-物品交叉特征</text><text x="1038.0" y="476.0" font-size="14" font-weight="600" fill="#334155">和复杂序列建模，表达能力远强于双</text><text x="1038.0" y="494.0" font-size="14" font-weight="600" fill="#334155">塔。CMS的思路不是蒸馏损失函数</text><text x="1038.0" y="512.0" font-size="14" font-weight="600" fill="#334155">，而是直接把精排模型的中间层输…</text><rect x="72" y="614" width="1316" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/><text x="94" y="650" font-size="18" font-weight="800" fill="#0F172A">为什么这篇论文值得放主图</text><text x="94" y="684.0" font-size="15" font-weight="600" fill="#334155">工业推荐系统普遍采用双塔模型做大规模召回，但双塔结构天然存在三个短板：单塔表达能力受限、用户和物品嵌入空间缺乏对齐、</text><text x="94" y="706.0" font-size="15" font-weight="600" fill="#334155">与下游精排模型之间存在能力断层。已有方法（如late interaction、知识蒸馏）往往只解决其中一个问题，且容</text><text x="94" y="728.0" font-size="15" font-weight="600" fill="#334155">易增加延迟或难以适配在线学习场景。CS3在快手广告系统中提出了一套同时补齐这三个短板的轻量框架，三个模块即插即用、兼</text><text x="94" y="750.0" font-size="15" font-weight="600" fill="#334155">容在线学习，并在三个线上广告场景取得了显著收入和DAC提升，值得关注。</text><text x="72" y="836" font-size="14" font-weight="600" fill="#64748B">图示：候选主图不可靠时，自动回退为论文机制总览 SVG。</text></svg>