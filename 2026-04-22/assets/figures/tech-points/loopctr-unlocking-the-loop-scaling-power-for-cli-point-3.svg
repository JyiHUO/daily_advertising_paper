<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="440" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#222">MoE：每个 token 只挑 2 个专家</text>
  <text x="440" y="62" text-anchor="middle" font-size="13" fill="#666">参数池 ×8，单次计算 ≈ 原来的 1/4</text>

  <!-- Token A -->
  <g>
    <rect x="40" y="110" width="170" height="60" rx="10" fill="#e8f1ff" stroke="#3a6fd8" stroke-width="2"/>
    <text x="125" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3d80">Token A</text>
    <text x="125" y="155" text-anchor="middle" font-size="12" fill="#1a3d80">电子产品重度用户</text>
  </g>

  <!-- Token B -->
  <g>
    <rect x="40" y="390" width="170" height="60" rx="10" fill="#fff1e6" stroke="#d8853a" stroke-width="2"/>
    <text x="125" y="415" text-anchor="middle" font-size="14" font-weight="700" fill="#8a4a10">Token B</text>
    <text x="125" y="435" text-anchor="middle" font-size="12" fill="#8a4a10">服饰偶尔浏览</text>
  </g>

  <!-- Router -->
  <g>
    <rect x="260" y="245" width="130" height="70" rx="35" fill="#fff9d6" stroke="#b58b00" stroke-width="2"/>
    <text x="325" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#6b5200">Router</text>
    <text x="325" y="295" text-anchor="middle" font-size="12" fill="#6b5200">top-k = 2</text>
  </g>

  <!-- arrows to router -->
  <path d="M210,140 C245,170 270,215 285,245" stroke="#3a6fd8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M210,420 C245,390 270,345 285,315" stroke="#d8853a" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- Experts pool -->
  <rect x="450" y="100" width="390" height="215" rx="14" fill="#f6f6fb" stroke="#bbb" stroke-dasharray="5 4"/>
  <text x="645" y="122" text-anchor="middle" font-size="13" fill="#666">专家池（共享参数 × 8）</text>

  <!-- 8 experts, default grey -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="475" y="140" width="80" height="60" rx="8" fill="#ffe4cc" stroke="#d8853a" stroke-width="3"/>
    <text x="515" y="175" fill="#8a4a10">E1</text>
    <rect x="565" y="140" width="80" height="60" rx="8" fill="#ececec" stroke="#bbb"/>
    <text x="605" y="175" fill="#777">E2</text>
    <rect x="655" y="140" width="80" height="60" rx="8" fill="#d6e4ff" stroke="#3a6fd8" stroke-width="3"/>
    <text x="695" y="175" fill="#1a3d80">E3</text>
    <rect x="745" y="140" width="80" height="60" rx="8" fill="#ececec" stroke="#bbb"/>
    <text x="785" y="175" fill="#777">E4</text>

    <rect x="475" y="230" width="80" height="60" rx="8" fill="#ffe4cc" stroke="#d8853a" stroke-width="3"/>
    <text x="515" y="265" fill="#8a4a10">E5</text>
    <rect x="565" y="230" width="80" height="60" rx="8" fill="#ececec" stroke="#bbb"/>
    <text x="605" y="265" fill="#777">E6</text>
    <rect x="655" y="230" width="80" height="60" rx="8" fill="#d6e4ff" stroke="#3a6fd8" stroke-width="3"/>
    <text x="695" y="265" fill="#1a3d80">E7</text>
    <rect x="745" y="230" width="80" height="60" rx="8" fill="#ececec" stroke="#bbb"/>
    <text x="785" y="265" fill="#777">E8</text>
  </g>

  <!-- Routing arrows from router to picked experts -->
  <!-- A (blue) -> E3, E7 -->
  <path d="M390,265 C500,230 580,195 655,170" stroke="#3a6fd8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390,285 C500,275 580,265 655,260" stroke="#3a6fd8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <!-- B (orange) -> E1, E5 -->
  <path d="M390,275 C420,240 445,195 475,175" stroke="#d8853a" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390,295 C420,280 445,270 475,260" stroke="#d8853a" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- Bottom summary -->
  <g font-size="13">
    <rect x="100" y="470" width="680" height="70" rx="10" fill="#ffffff" stroke="#ccc"/>
    <text x="120" y="493" fill="#222" font-weight="700">每个 token 激活 2 / 8 专家</text>
    <circle cx="128" cy="514" r="5" fill="#3a6fd8"/>
    <text x="142" y="519" fill="#1a3d80">A → E3 + E7（电子产品风格编码）</text>
    <circle cx="430" cy="514" r="5" fill="#d8853a"/>
    <text x="444" y="519" fill="#8a4a10">B → E1 + E5（服饰浏览风格编码）</text>
  </g>

  <!-- Bottom caption -->
  <text x="440" y="430" text-anchor="middle" font-size="12.5" fill="#444">用于 Attention 的 W_V / W_O 和 FFN 层 · 消融 MoE：AUC −0.006</text>
  <text x="440" y="450" text-anchor="middle" font-size="12" fill="#888">解决循环共享层容量不足的问题：参数变多，延迟几乎不变</text>
</svg>