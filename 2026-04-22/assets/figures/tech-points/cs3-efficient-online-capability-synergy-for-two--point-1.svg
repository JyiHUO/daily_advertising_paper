<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2979FF"/>
    </marker>
    <linearGradient id="gInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="gScore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="gClean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A237E">CAS: 塔内自适应去噪</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#666">Capability-Aware Self-Denoising — 替换双塔中每个FC层</text>

  <!-- ====== STEP 1: Input x → FC → z ====== -->
  <!-- Input box -->
  <rect x="40" y="100" width="140" height="60" rx="12" fill="url(#gInput)" stroke="#1565C0" stroke-width="2"/>
  <text x="110" y="127" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">输入 x</text>
  <text x="110" y="147" text-anchor="middle" font-size="12" fill="#555">128维向量</text>

  <!-- FC block -->
  <rect x="250" y="100" width="120" height="60" rx="12" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="310" y="127" text-anchor="middle" font-size="15" font-weight="bold" fill="#3F51B5">FC层</text>
  <text x="310" y="147" text-anchor="middle" font-size="12" fill="#555">标准前向</text>

  <!-- z output -->
  <rect x="440" y="100" width="120" height="60" rx="12" fill="#EDE7F6" stroke="#7E57C2" stroke-width="2"/>
  <text x="500" y="127" text-anchor="middle" font-size="15" font-weight="bold" fill="#7E57C2">中间输出 z</text>
  <text x="500" y="147" text-anchor="middle" font-size="12" fill="#555">64维</text>

  <!-- Arrows step 1 -->
  <line x1="180" y1="130" x2="247" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="130" x2="437" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step label -->
  <text x="30" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57C00" transform="rotate(-90,30,128)">①先看一眼</text>

  <!-- ====== STEP 2: z → Scoring → e → Denoise ====== -->
  <!-- Scoring network -->
  <rect x="440" y="220" width="160" height="70" rx="14" fill="url(#gScore)" stroke="#E65100" stroke-width="2"/>
  <text x="520" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">打分网络</text>
  <text x="520" y="268" text-anchor="middle" font-size="12" fill="#777">Linear + Sigmoid</text>
  <text x="520" y="283" text-anchor="middle" font-size="11" fill="#999">64→128维</text>

  <!-- Arrow z → scoring -->
  <path d="M 500 160 L 500 180 Q 500 195 510 200 L 520 217" stroke="#7E57C2" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="535" y="195" font-size="11" fill="#7E57C2">z</text>

  <!-- Importance weights e -->
  <rect x="250" y="230" width="140" height="50" rx="12" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="320" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57F17">权重 e</text>
  <text x="320" y="270" text-anchor="middle" font-size="11" fill="#888">128维，∈[0,1]</text>

  <!-- Arrow scoring → e -->
  <line x1="440" y1="255" x2="393" y2="255" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step label -->
  <text x="680" y="260" font-size="13" font-weight="bold" fill="#E65100">② 给每维打重要性分</text>

  <!-- ====== Denoise: x ⊙ 2e ====== -->
  <!-- Multiply node -->
  <circle cx="170" cy="255" r="28" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="170" y="261" text-anchor="middle" font-size="18" font-weight="bold" fill="#2E7D32">⊙2e</text>

  <!-- Arrow x down to multiply -->
  <path d="M 110 160 L 110 230 Q 110 255 140 255" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="95" y="210" font-size="11" fill="#1565C0">x</text>

  <!-- Arrow e → multiply -->
  <line x1="250" y1="255" x2="201" y2="255" stroke="#F9A825" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="225" y="247" font-size="11" fill="#F57F17">e</text>

  <!-- ====== Visual: importance bar example ====== -->
  <g transform="translate(55, 310)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#555">示例：去噪效果</text>
    <!-- bars before -->
    <text x="0" y="20" font-size="10" fill="#888">原始x:</text>
    <rect x="50" y="12" width="40" height="12" rx="3" fill="#90CAF9"/>
    <rect x="95" y="12" width="40" height="12" rx="3" fill="#90CAF9"/>
    <rect x="140" y="12" width="40" height="12" rx="3" fill="#90CAF9"/>
    <rect x="185" y="12" width="40" height="12" rx="3" fill="#90CAF9"/>
    <text x="65" y="22" font-size="9" fill="#333">d5</text>
    <text x="107" y="22" font-size="9" fill="#333">d10</text>
    <text x="155" y="22" font-size="9" fill="#333">…</text>
    <text x="200" y="22" font-size="9" fill="#333">d128</text>

    <!-- bars after -->
    <text x="0" y="45" font-size="10" fill="#888">去噪后:</text>
    <rect x="50" y="37" width="8" height="12" rx="3" fill="#EF9A9A"/>
    <rect x="95" y="37" width="72" height="12" rx="3" fill="#66BB6A"/>
    <rect x="140" y="37" width="35" height="12" rx="3" fill="#A5D6A7"/>
    <rect x="185" y="37" width="40" height="12" rx="3" fill="#A5D6A7"/>
    <text x="52" y="47" font-size="8" fill="#C62828">×0.2</text>
    <text x="115" y="47" font-size="8" fill="#fff">×1.8</text>
    <text x="155" y="47" font-size="8" fill="#333">…</text>

    <text x="240" y="30" font-size="10" fill="#C62828">噪声↓</text>
    <text x="240" y="47" font-size="10" fill="#2E7D32">重要↑</text>
  </g>

  <!-- ====== STEP 3: Denoised x' → same FC → final output ====== -->
  <rect x="60" y="400" width="160" height="55" rx="12" fill="url(#gClean)" stroke="#2E7D32" stroke-width="2"/>
  <text x="140" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">去噪输入 x'</text>
  <text x="140" y="443" text-anchor="middle" font-size="11" fill="#666">= x ⊙ 2e</text>

  <!-- Arrow from multiply to denoised -->
  <path d="M 170 283 L 170 295 Q 170 310 155 340 Q 145 365 140 397" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Same FC block -->
  <rect x="310" y="400" width="140" height="55" rx="12" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="380" y="423" text-anchor="middle" font-size="14" font-weight="bold" fill="#3F51B5">同一FC层</text>
  <text x="380" y="443" text-anchor="middle" font-size="12" fill="#888">共享参数</text>

  <!-- Final output -->
  <rect x="540" y="395" width="160" height="65" rx="14" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <text x="620" y="422" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B5E20">更干净的输出</text>
  <text x="620" y="444" text-anchor="middle" font-size="12" fill="#555">→ 送入下一层</text>

  <!-- Arrows step 3 -->
  <line x1="220" y1="427" x2="307" y2="427" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="427" x2="537" y2="427" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step label -->
  <text x="380" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">③ 用去噪输入重新前向 → 更干净表示</text>

  <!-- Lightweight callout -->
  <rect x="620" y="100" width="155" height="65" rx="10" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="697" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">💡 极轻量</text>
  <text x="697" y="140" text-anchor="middle" font-size="11" fill="#C62828">仅多一个小线性层</text>
  <text x="697" y="155" text-anchor="middle" font-size="11" fill="#C62828">QPS下降 &lt; 1%</text>

  <!-- Dashed link from FC to same FC indicating shared -->
  <path d="M 310 160 Q 280 280 350 397" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="5,4" fill="none"/>
  <text x="280" y="290" font-size="10" fill="#3F51B5" transform="rotate(-65,280,290)">共享参数</text>

</svg>