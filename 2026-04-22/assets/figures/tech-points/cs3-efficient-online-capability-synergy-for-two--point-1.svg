<svg height="600" width="960" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e8b57"/>
    </marker>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#ffe7a8"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#222">CAS：塔内自适应去噪（同一 FC 跑两次）</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#666">先看一眼 → 给输入打分去噪 → 用同一层再跑一次</text>

  <!-- Input x -->
  <rect x="40" y="210" width="120" height="90" rx="10" fill="#e8f0ff" stroke="#3b6ea8" stroke-width="2"/>
  <text x="100" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#234">输入 x</text>
  <text x="100" y="273" text-anchor="middle" font-size="12" fill="#567">128 维（含噪声）</text>

  <!-- FC (shared) -->
  <rect x="380" y="120" width="160" height="90" rx="10" fill="url(#g1)" stroke="#b8862a" stroke-width="2"/>
  <text x="460" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#5a3a00">同一个 FC 层</text>
  <text x="460" y="182" text-anchor="middle" font-size="12" fill="#5a3a00">参数共享，跑两次</text>
  <text x="460" y="200" text-anchor="middle" font-size="11" fill="#7a5a10">① 预览　② 正式</text>

  <!-- Scorer -->
  <rect x="380" y="400" width="160" height="90" rx="10" fill="#ffe3e3" stroke="#c0392b" stroke-width="2"/>
  <text x="460" y="432" text-anchor="middle" font-size="15" font-weight="700" fill="#7a1f12">小打分网络</text>
  <text x="460" y="454" text-anchor="middle" font-size="12" fill="#7a1f12">Linear + Sigmoid</text>
  <text x="460" y="474" text-anchor="middle" font-size="11" fill="#7a1f12">输出权重 e ∈ (0,1)</text>

  <!-- Denoised x -->
  <rect x="180" y="400" width="140" height="90" rx="10" fill="#e6f7ec" stroke="#2e8b57" stroke-width="2"/>
  <text x="250" y="432" text-anchor="middle" font-size="15" font-weight="700" fill="#1e5a3a">去噪输入</text>
  <text x="250" y="455" text-anchor="middle" font-size="13" fill="#1e5a3a">x' = x ⊙ 2e</text>
  <text x="250" y="475" text-anchor="middle" font-size="11" fill="#467">2倍缩放：期望=1</text>

  <!-- Output -->
  <rect x="780" y="210" width="140" height="90" rx="10" fill="#d9ecff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="850" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#153e6b">干净输出</text>
  <text x="850" y="273" text-anchor="middle" font-size="12" fill="#153e6b">64 维，送下一层</text>

  <!-- Flow: x -> FC (preview) -->
  <path d="M160,240 C260,240 320,170 378,165" fill="none" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>
  <text x="230" y="195" font-size="12" fill="#333">① 先预览</text>

  <!-- FC -> Scorer (z) -->
  <path d="M460,210 L460,398" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="468" y="310" font-size="12" fill="#c0392b">中间输出 z</text>

  <!-- Scorer -> Denoised (weights e) -->
  <path d="M380,445 L322,445" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="330" y="438" font-size="12" fill="#c0392b">权重 e</text>

  <!-- x -> Denoised (乘法) -->
  <path d="M100,300 L100,445 L178,445" fill="none" stroke="#2e8b57" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="108" y="378" font-size="12" fill="#2e8b57">x</text>

  <!-- Denoised -> FC (second pass) -->
  <path d="M320,420 C380,360 400,250 432,212" fill="none" stroke="#2e8b57" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="338" y="340" font-size="12" fill="#2e8b57">② 重跑同一层</text>

  <!-- FC -> Output -->
  <path d="M540,175 C640,175 700,235 778,250" fill="none" stroke="#2b6cb0" stroke-width="2.2" marker-end="url(#ar)"/>

  <!-- Example mini -->
  <rect x="40" y="510" width="880" height="70" rx="10" fill="#f7f7fb" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="60" y="535" font-size="13" font-weight="700" fill="#333">举例：</text>
  <text x="60" y="557" font-size="12" fill="#444">e₅=0.1 → x₅ × 0.2（压成噪声）　　e₁₀=0.9 → x₁₀ × 1.8（重要维度放大）</text>
  <text x="60" y="575" font-size="11" fill="#888">开销：仅多 1 个小线性层 + 1 次同参前向；线上 QPS 下降 &lt; 1%</text>
</svg>