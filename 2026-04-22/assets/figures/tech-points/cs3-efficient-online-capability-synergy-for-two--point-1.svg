<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arro" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98f00"/>
    </marker>
    <linearGradient id="gscore" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffb3b3"/>
      <stop offset="0.5" stop-color="#ffe6a1"/>
      <stop offset="1" stop-color="#a8e6a3"/>
    </linearGradient>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">CAS: 塔内自适应去噪 —— 同一 FC 层走两遍</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">先看一眼 → 给输入打重要性分 → 去噪后再过同一层</text>

  <!-- Step 1: first forward -->
  <text x="100" y="96" font-size="12" fill="#3b63b8" font-weight="bold" text-anchor="middle">① 第一次前向</text>
  <rect x="40" y="110" width="120" height="70" rx="8" fill="#eef3ff" stroke="#3b63b8" stroke-width="1.8"/>
  <text x="100" y="140" text-anchor="middle" font-size="14" fill="#1a2a55">输入 x</text>
  <text x="100" y="162" text-anchor="middle" font-size="12" fill="#666">128 维</text>

  <rect x="200" y="105" width="110" height="80" rx="8" fill="#fff" stroke="#3b63b8" stroke-width="2"/>
  <text x="255" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2a55">FC 层</text>
  <text x="255" y="162" text-anchor="middle" font-size="11" fill="#888">(参数共享)</text>

  <rect x="350" y="110" width="100" height="70" rx="8" fill="#eef3ff" stroke="#3b63b8" stroke-width="1.8"/>
  <text x="400" y="140" text-anchor="middle" font-size="14" fill="#1a2a55">z (64 维)</text>
  <text x="400" y="162" text-anchor="middle" font-size="11" fill="#666">预览输出</text>

  <line x1="160" y1="145" x2="198" y2="145" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="310" y1="145" x2="348" y2="145" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: scoring -->
  <text x="565" y="96" font-size="12" fill="#d98f00" font-weight="bold" text-anchor="middle">② 打重要性分</text>
  <rect x="490" y="105" width="150" height="80" rx="8" fill="#fff7e6" stroke="#d98f00" stroke-width="2"/>
  <text x="565" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4a00">小线性层 64→128</text>
  <text x="565" y="152" text-anchor="middle" font-size="12" fill="#7a4a00">+ Sigmoid → e</text>
  <text x="565" y="172" text-anchor="middle" font-size="10" fill="#b07a1a">(唯一新增参数)</text>

  <line x1="450" y1="145" x2="488" y2="145" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- importance vector e -->
  <text x="775" y="96" font-size="12" fill="#d98f00" font-weight="bold" text-anchor="middle">权重 2e ∈ [0, 2]，均值=1</text>
  <rect x="680" y="105" width="190" height="40" fill="url(#gscore)" stroke="#999"/>
  <text x="695" y="130" font-size="11" fill="#333">0.2×</text>
  <text x="763" y="130" font-size="11" fill="#333">1.0×</text>
  <text x="832" y="130" font-size="11" fill="#333">1.8×</text>
  <text x="775" y="162" font-size="11" fill="#666" text-anchor="middle">噪声维度 ← → 关键维度</text>
  <text x="775" y="180" font-size="11" fill="#666" text-anchor="middle">不破坏梯度</text>

  <line x1="640" y1="130" x2="678" y2="125" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 3: second forward -->
  <text x="40" y="300" font-size="13" fill="#1a7a3a" font-weight="bold">③ 逐元素相乘去噪后，再过同一 FC</text>

  <rect x="40" y="330" width="140" height="80" rx="8" fill="#e8f7ea" stroke="#1a7a3a" stroke-width="1.8"/>
  <text x="110" y="362" text-anchor="middle" font-size="13" fill="#0e4a24">x' = x ⊙ 2e</text>
  <text x="110" y="384" text-anchor="middle" font-size="11" fill="#1a7a3a">去噪后输入</text>

  <rect x="260" y="325" width="110" height="90" rx="8" fill="#fff" stroke="#3b63b8" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="315" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2a55">同一 FC</text>
  <text x="315" y="380" text-anchor="middle" font-size="11" fill="#3b63b8">(复用参数)</text>
  <text x="315" y="400" text-anchor="middle" font-size="10" fill="#888">零额外 FC 参数</text>

  <rect x="450" y="330" width="160" height="80" rx="8" fill="#dff0e0" stroke="#1a7a3a" stroke-width="2"/>
  <text x="530" y="362" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e4a24">更干净的输出</text>
  <text x="530" y="384" text-anchor="middle" font-size="11" fill="#1a7a3a">送入下一层</text>

  <line x1="180" y1="370" x2="258" y2="370" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="370" y1="370" x2="448" y2="370" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Loop arrow from e to x' (回箭头表示循环自修正) -->
  <path d="M 565 190 Q 565 270 110 270 L 110 328" fill="none" stroke="#d98f00" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arro)"/>
  <text x="340" y="262" font-size="12" fill="#d98f00" font-weight="bold" text-anchor="middle">用 e 回头修正输入 x</text>

  <!-- bottom callout -->
  <rect x="660" y="330" width="220" height="130" rx="10" fill="#f5f5fa" stroke="#555"/>
  <text x="770" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">开销极小</text>
  <text x="675" y="382" font-size="12" fill="#333">• 只多 1 个小线性层</text>
  <text x="675" y="404" font-size="12" fill="#333">• FC 参数完全复用</text>
  <text x="675" y="426" font-size="12" fill="#333">• item 侧可缓存</text>
  <text x="675" y="450" font-size="12" fill="#c0392b" font-weight="bold">• 线上 QPS 下降 &lt; 1%</text>
</svg>