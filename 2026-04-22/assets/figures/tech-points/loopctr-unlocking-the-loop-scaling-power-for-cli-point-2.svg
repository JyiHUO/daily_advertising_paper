<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#EA580C">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">超连接残差 vs 标准残差：循环复用的关键</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">Hyper-Connected Residuals — 让共享参数层在不同循环深度自适应计算</text>

  <!-- ========== LEFT: Standard Residual ========== -->
  <rect x="40" y="90" width="350" height="500" rx="16" fill="white" stroke="#CBD5E1" stroke-width="1.5" opacity="0.9"/>
  <text x="215" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#94A3B8">标准残差（固定 1:1）</text>

  <!-- Single pipe -->
  <rect x="170" y="150" width="90" height="36" rx="8" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="215" y="173" text-anchor="middle" font-size="13" fill="#475569">h (单流)</text>

  <line x1="215" y1="186" x2="215" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Transformer layer -->
  <rect x="140" y="228" width="150" height="50" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="215" y="258" text-anchor="middle" font-size="14" fill="#475569">Transformer 子层</text>

  <line x1="215" y1="278" x2="215" y2="312" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Add -->
  <circle cx="215" cy="330" r="18" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="215" y="335" text-anchor="middle" font-size="18" font-weight="bold" fill="#94A3B8">+</text>

  <!-- Skip connection -->
  <path d="M160 168 L90 168 L90 330 L197 330" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="80" y="250" text-anchor="middle" font-size="11" fill="#94A3B8" transform="rotate(-90,80,250)">skip 1:1</text>

  <line x1="215" y1="348" x2="215" y2="385" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="160" y="388" width="110" height="36" rx="8" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="215" y="411" text-anchor="middle" font-size="13" fill="#475569">h + f(h)</text>

  <!-- Loop label -->
  <text x="215" y="460" text-anchor="middle" font-size="12" fill="#94A3B8">循环第1轮 = 循环第3轮</text>
  <text x="215" y="478" text-anchor="middle" font-size="12" fill="#DC2626">❌ 混合比例固定不变</text>

  <!-- Sad emoji representation -->
  <circle cx="215" cy="530" r="28" fill="#FEE2E2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="215" y="537" text-anchor="middle" font-size="24">😐</text>
  <text x="215" y="572" text-anchor="middle" font-size="11" fill="#94A3B8">表达力受限</text>

  <!-- ========== RIGHT: Hyper-Connected ========== -->
  <rect x="420" y="90" width="450" height="500" rx="16" fill="white" stroke="#2563EB" stroke-width="2" opacity="0.95"/>
  <text x="645" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#2563EB">超连接残差（动态 n 流）</text>

  <!-- n parallel streams -->
  <rect x="490" y="150" width="80" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="530" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">流 1</text>

  <rect x="600" y="150" width="80" height="36" rx="8" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="640" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#C2410C">流 2</text>

  <rect x="710" y="150" width="80" height="36" rx="8" fill="#E9D5FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="750" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">流 n</text>

  <text x="683" y="173" text-anchor="middle" font-size="16" fill="#94A3B8">…</text>

  <!-- Am: merge arrows converging -->
  <line x1="530" y1="186" x2="615" y2="235" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="186" x2="625" y2="235" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="750" y1="186" x2="640" y2="235" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Am label box -->
  <rect x="560" y="208" width="100" height="28" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="610" y="227" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563EB">Aₘ 融合系数</text>

  <!-- Transformer sub-layer -->
  <rect x="555" y="248" width="150" height="50" rx="10" fill="#2563EB" stroke="#1D4ED8" stroke-width="1.5" opacity="0.12"/>
  <rect x="555" y="248" width="150" height="50" rx="10" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="630" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">Transformer 子层</text>

  <!-- B: split -->
  <rect x="580" y="310" width="100" height="28" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1"/>
  <text x="630" y="329" text-anchor="middle" font-size="12" font-weight="bold" fill="#EA580C">B 分发系数</text>

  <line x1="615" y1="338" x2="530" y2="378" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="625" y1="338" x2="640" y2="378" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="640" y1="338" x2="750" y2="378" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Ar: residual mix -->
  <rect x="475" y="382" width="110" height="32" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="530" y="403" text-anchor="middle" font-size="12" fill="#1D4ED8">Aᵣ 残差混合</text>

  <rect x="585" y="382" width="110" height="32" rx="8" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="640" y="403" text-anchor="middle" font-size="12" fill="#C2410C">Aᵣ 残差混合</text>

  <rect x="705" y="382" width="90" height="32" rx="8" fill="#E9D5FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="750" y="403" text-anchor="middle" font-size="12" fill="#6D28D9">Aᵣ 混合</text>

  <!-- Skip connection for Ar (dashed arcs) -->
  <path d="M490 168 L450 168 L450 398 L475 398" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M600 168 L590 168 L570 398 L585 398" fill="none" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Dynamic coefficient callout -->
  <rect x="445" y="432" width="410" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="650" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="#16A34A">🔑 系数 = 静态可学习参数 + 动态扰动(RMSNorm → 投影 → tanh)</text>
  <text x="650" y="473" text-anchor="middle" font-size="12" fill="#15803D">初始化时动态=0 → 退化为标准 Pre-Norm Transformer</text>

  <!-- Loop comparison -->
  <rect x="455" y="502" width="180" height="46" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="545" y="521" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">循环第1轮</text>
  <text x="545" y="537" text-anchor="middle" font-size="11" fill="#2563EB">流1权重↑ 保留原始输入</text>

  <text x="650" y="528" text-anchor="middle" font-size="18" fill="#16A34A">≠</text>

  <rect x="665" y="502" width="180" height="46" rx="8" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="755" y="521" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">循环第3轮</text>
  <text x="755" y="537" text-anchor="middle" font-size="11" fill="#EA580C">流2权重↑ 利用精炼表征</text>

  <!-- Happy result -->
  <text x="645" y="575" text-anchor="middle" font-size="13" fill="#16A34A" font-weight="bold">✅ 同一层在不同深度 → 不同计算路径</text>

  <!-- VS divider -->
  <rect x="397" y="290" width="36" height="36" rx="18" fill="#1E293B"/>
  <text x="415" y="314" text-anchor="middle" font-size="15" font-weight="bold" fill="white">VS</text>
</svg>