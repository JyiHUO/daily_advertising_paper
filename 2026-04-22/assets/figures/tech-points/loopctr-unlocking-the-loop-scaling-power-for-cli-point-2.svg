<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b74c4"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e07b00"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Hyper-Connected Residuals：把单流残差扩成 n 条可调流</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#666">共享层循环复用时，每轮按输入自适应地重新分配信息流</text>

  <!-- LEFT: standard residual -->
  <g>
    <rect x="40" y="80" width="320" height="440" rx="10" fill="#f5f7fa" stroke="#c9d2dc"/>
    <text x="200" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#555">标准残差 (1:1 单流)</text>

    <line x1="200" y1="135" x2="200" y2="200" stroke="#888" stroke-width="6"/>
    <text x="215" y="175" font-size="13" fill="#333">h</text>

    <rect x="135" y="205" width="130" height="55" rx="6" fill="#fff" stroke="#888"/>
    <text x="200" y="239" text-anchor="middle" font-size="14" fill="#333">Sub-layer f(·)</text>

    <line x1="200" y1="265" x2="200" y2="335" stroke="#888" stroke-width="6" marker-end="url(#a)"/>
    <text x="215" y="305" font-size="13" fill="#333">h + f(h)</text>

    <rect x="80" y="395" width="240" height="100" rx="8" fill="#ffecec" stroke="#d46a6a"/>
    <text x="200" y="425" text-anchor="middle" font-size="13" fill="#8a2a2a">固定比例 1:1 混合</text>
    <text x="200" y="450" text-anchor="middle" font-size="13" fill="#8a2a2a">循环多轮都是同一条水管</text>
    <text x="200" y="477" text-anchor="middle" font-size="12" fill="#a05252">→ 共享参数表达力受限</text>
  </g>

  <!-- RIGHT: hyper-connected -->
  <g>
    <rect x="390" y="80" width="470" height="440" rx="10" fill="#eef6ff" stroke="#79a9d6"/>
    <text x="625" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1b4e80">超连接残差 (n 条并行流)</text>

    <!-- n parallel streams -->
    <text x="490" y="132" text-anchor="middle" font-size="12" fill="#1b4e80">n 条隐状态流</text>
    <line x1="450" y1="140" x2="450" y2="220" stroke="#1b74c4" stroke-width="5"/>
    <line x1="490" y1="140" x2="490" y2="220" stroke="#4ea3e0" stroke-width="5"/>
    <line x1="530" y1="140" x2="530" y2="220" stroke="#8fc8ee" stroke-width="5"/>

    <!-- Am merge -->
    <path d="M450,220 L595,250 M490,220 L595,258 M530,220 L595,266" stroke="#1b74c4" stroke-width="2" fill="none"/>
    <rect x="595" y="235" width="50" height="50" rx="6" fill="#fff" stroke="#1b74c4"/>
    <text x="620" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#1b74c4">Am</text>

    <!-- sublayer -->
    <line x1="645" y1="260" x2="685" y2="260" stroke="#1b74c4" stroke-width="2" marker-end="url(#ab)"/>
    <rect x="690" y="235" width="140" height="50" rx="6" fill="#fff" stroke="#333"/>
    <text x="760" y="265" text-anchor="middle" font-size="13" fill="#222">共享 Sub-layer</text>

    <!-- B distribute -->
    <path d="M760,285 C760,315 740,320 725,320" stroke="#e07b00" stroke-width="2" fill="none" marker-end="url(#ao)"/>
    <rect x="680" y="320" width="50" height="40" rx="6" fill="#fff" stroke="#e07b00"/>
    <text x="705" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#e07b00">B</text>

    <!-- distribute back to Ar -->
    <path d="M680,340 L560,370 M685,350 L580,380 M690,358 L600,388" stroke="#e07b00" stroke-width="2" fill="none"/>

    <!-- Ar residual mix -->
    <rect x="440" y="380" width="180" height="42" rx="6" fill="#fff" stroke="#6b3fb0"/>
    <text x="530" y="407" text-anchor="middle" font-size="13" font-weight="700" fill="#6b3fb0">Ar  流间残差混合</text>

    <line x1="530" y1="422" x2="530" y2="452" stroke="#6b3fb0" stroke-width="3" marker-end="url(#a)"/>
    <text x="530" y="470" text-anchor="middle" font-size="12" fill="#333">→ 下一轮循环的 n 流</text>

    <!-- dynamic note -->
    <rect x="410" y="483" width="430" height="30" rx="6" fill="#fff4e0" stroke="#e0a060"/>
    <text x="625" y="503" text-anchor="middle" font-size="12" fill="#7a4a00">Am / B / Ar = 静态权重 + 依赖输入的动态门控 (tanh)</text>
  </g>

  <!-- bottom takeaway -->
  <text x="450" y="545" text-anchor="middle" font-size="13" fill="#333">同一层在第 1 轮和第 3 轮循环时，可走出不同的信息路径</text>
</svg>