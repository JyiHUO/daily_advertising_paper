<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">三明治架构：中间层循环复用，参数不变，深度翻倍</text>

  <!-- Entry Block -->
  <rect x="50" y="180" width="180" height="180" rx="10" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="140" y="215" text-anchor="middle" font-size="17" font-weight="bold" fill="#1c7ed6">Entry Block</text>
  <text x="140" y="255" text-anchor="middle" font-size="12" fill="#333">短期行为 / 长期压缩 token</text>
  <text x="140" y="278" text-anchor="middle" font-size="12" fill="#333">用户 / 物品 / 上下文 token</text>
  <text x="140" y="325" text-anchor="middle" font-size="12" fill="#666">分组投影 + 组内自注意力</text>
  <text x="140" y="345" text-anchor="middle" font-size="12" fill="#666">→ 对齐到统一空间</text>

  <!-- Loop Block (center) -->
  <rect x="290" y="150" width="300" height="240" rx="14" fill="#fff4e6" stroke="#d9480f" stroke-width="3"/>
  <text x="440" y="182" text-anchor="middle" font-size="19" font-weight="bold" fill="#d9480f">Loop Block（共享参数）</text>

  <!-- inside loop: one layer -->
  <rect x="340" y="220" width="200" height="80" rx="8" fill="#ffd8a8" stroke="#d9480f" stroke-width="2"/>
  <text x="440" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#5f3b00">前缀注意力层（一组参数）</text>
  <text x="440" y="282" text-anchor="middle" font-size="12" fill="#5f3b00">序列↔序列，全局→全部</text>

  <!-- Loop arrow: clean closed loop back to input -->
  <path d="M 540 240 C 580 235, 580 290, 540 290" fill="none" stroke="#d9480f" stroke-width="2.5" marker-end="url(#arLoop)"/>
  <text x="558" y="268" font-size="13" font-weight="bold" fill="#d9480f">× L</text>

  <text x="440" y="340" text-anchor="middle" font-size="13" fill="#333">同一把"刷子"反复打磨表征</text>
  <text x="440" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">参数量不增，计算深度增加</text>

  <!-- Exit Block -->
  <rect x="670" y="180" width="180" height="180" rx="10" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="760" y="215" text-anchor="middle" font-size="17" font-weight="bold" fill="#1c7ed6">Exit Block</text>
  <text x="760" y="260" text-anchor="middle" font-size="12" fill="#333">Cross-Attention + MLP</text>
  <text x="760" y="295" text-anchor="middle" font-size="12" fill="#666">全局 token 聚合序列信息</text>
  <text x="760" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1c7ed6">→ CTR 点击概率</text>

  <!-- Arrows between blocks -->
  <line x1="230" y1="270" x2="288" y2="270" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="590" y1="270" x2="668" y2="270" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Bottom highlight -->
  <rect x="140" y="440" width="620" height="80" rx="10" fill="#f1f3f5" stroke="#868e96" stroke-width="1.5"/>
  <text x="450" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">训练：循环 L 次，效果更强</text>
  <text x="450" y="495" text-anchor="middle" font-size="14" fill="#2b8a3e">推理：可跳过循环（L=0），一次前向即超越基线 —— 零额外延迟</text>
</svg>