<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e88e5"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e53935"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">CTS 跨塔同步：给每座塔装一面"对方的镜子"</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">双塔不再互不相见 — 用 EMA 缓存对方塔的正样本表示</text>

  <!-- User Tower -->
  <rect x="60" y="150" width="220" height="230" rx="12" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <text x="170" y="178" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e88e5">User Tower</text>
  <text x="170" y="196" text-anchor="middle" font-size="11" fill="#1e88e5">编码时能"看见"物品侧</text>

  <rect x="80" y="210" width="180" height="32" rx="4" fill="#fff" stroke="#90caf9"/>
  <text x="170" y="231" text-anchor="middle" font-size="13" fill="#333">用户原始特征</text>

  <rect x="80" y="252" width="180" height="44" rx="4" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="170" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">cross vector (u)</text>
  <text x="170" y="287" text-anchor="middle" font-size="11" fill="#e65100">= 我喜欢过的物品 摘要</text>

  <text x="170" y="318" text-anchor="middle" font-size="12" fill="#555">拼接后编码 ↓</text>
  <rect x="110" y="328" width="120" height="34" rx="4" fill="#1e88e5"/>
  <text x="170" y="350" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">u-t</text>

  <!-- Item Tower -->
  <rect x="620" y="150" width="220" height="230" rx="12" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="730" y="178" text-anchor="middle" font-size="17" font-weight="bold" fill="#e53935">Item Tower</text>
  <text x="730" y="196" text-anchor="middle" font-size="11" fill="#e53935">编码时能"看见"用户侧</text>

  <rect x="640" y="210" width="180" height="32" rx="4" fill="#fff" stroke="#ef9a9a"/>
  <text x="730" y="231" text-anchor="middle" font-size="13" fill="#333">物品原始特征</text>

  <rect x="640" y="252" width="180" height="44" rx="4" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="730" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">cross vector (v)</text>
  <text x="730" y="287" text-anchor="middle" font-size="11" fill="#e65100">= 喜欢我的用户 摘要</text>

  <text x="730" y="318" text-anchor="middle" font-size="12" fill="#555">拼接后编码 ↓</text>
  <rect x="670" y="328" width="120" height="34" rx="4" fill="#e53935"/>
  <text x="730" y="350" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">v-t</text>

  <!-- Positive interaction center -->
  <rect x="360" y="250" width="180" height="60" rx="30" fill="#fffde7" stroke="#fbc02d" stroke-width="2"/>
  <text x="450" y="277" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">正交互 (label=1)</text>
  <text x="450" y="297" text-anchor="middle" font-size="12" fill="#795548">负样本不更新</text>

  <!-- v-t -> user's cross vector (red) -->
  <path d="M 670 345 C 560 430, 320 430, 235 300" fill="none" stroke="#e53935" stroke-width="2.2" marker-end="url(#arR)"/>
  <text x="450" y="448" text-anchor="middle" font-size="13" fill="#e53935" font-weight="bold">v-t  →  EMA 更新 user 的 cross vector</text>

  <!-- u-t -> item's cross vector (blue) -->
  <path d="M 230 345 C 340 500, 560 500, 665 300" fill="none" stroke="#1e88e5" stroke-width="2.2" marker-end="url(#arB)"/>
  <text x="450" y="518" text-anchor="middle" font-size="13" fill="#1e88e5" font-weight="bold">u-t  →  EMA 更新 item 的 cross vector</text>

  <!-- EMA formula -->
  <rect x="300" y="545" width="300" height="40" rx="8" fill="#f5f5f5" stroke="#999"/>
  <text x="450" y="571" text-anchor="middle" font-size="14" fill="#222" font-family="monospace">c ← α·c + (1−α)·对方塔输出</text>
</svg>