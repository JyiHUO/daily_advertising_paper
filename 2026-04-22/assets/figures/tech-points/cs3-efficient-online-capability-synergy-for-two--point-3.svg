<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c05621"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">CMS：把精排的"知识"借给双塔</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#4a5568">中间层表示 h_uv 经 EMA 缓存，作为额外特征回喂召回</text>

  <!-- 精排模型 -->
  <rect x="60" y="110" width="240" height="130" rx="10" fill="#fef3c7" stroke="#b7791f" stroke-width="2"/>
  <text x="180" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#744210">精排模型 (Cascade Rank)</text>
  <text x="180" y="165" text-anchor="middle" font-size="12" fill="#744210">交叉特征 · 序列建模</text>
  <rect x="95" y="185" width="170" height="40" rx="6" fill="#fff" stroke="#b7791f"/>
  <text x="180" y="210" text-anchor="middle" font-size="13" fill="#744210">倒数第二层 h_uv</text>

  <!-- EMA -->
  <rect x="370" y="130" width="160" height="90" rx="45" fill="#e9d8fd" stroke="#6b46c1" stroke-width="2"/>
  <text x="450" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#44337a">EMA 更新</text>
  <text x="450" y="195" text-anchor="middle" font-size="12" fill="#44337a">正负样本都吸收</text>

  <!-- Embedding Server -->
  <rect x="600" y="110" width="240" height="130" rx="10" fill="#c6f6d5" stroke="#276749" stroke-width="2"/>
  <text x="720" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#22543d">Embedding Server</text>
  <text x="720" y="165" text-anchor="middle" font-size="12" fill="#22543d">分布式 KV · p99 &lt; 5ms</text>
  <rect x="625" y="180" width="90" height="45" rx="6" fill="#fff" stroke="#276749"/>
  <text x="670" y="208" text-anchor="middle" font-size="13" fill="#22543d">s_u</text>
  <rect x="725" y="180" width="90" height="45" rx="6" fill="#fff" stroke="#276749"/>
  <text x="770" y="208" text-anchor="middle" font-size="13" fill="#22543d">s_v</text>

  <!-- Arrows top row -->
  <line x1="300" y1="175" x2="368" y2="175" stroke="#2b6cb0" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="530" y1="175" x2="598" y2="175" stroke="#2b6cb0" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 双塔 -->
  <rect x="180" y="360" width="240" height="170" rx="10" fill="#bee3f8" stroke="#2c5282" stroke-width="2"/>
  <text x="300" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="#1a365d">User Tower</text>
  <rect x="205" y="410" width="190" height="30" rx="5" fill="#fff" stroke="#2c5282"/>
  <text x="300" y="430" text-anchor="middle" font-size="12" fill="#1a365d">原始特征</text>
  <rect x="205" y="448" width="190" height="30" rx="5" fill="#fff" stroke="#2c5282"/>
  <text x="300" y="468" text-anchor="middle" font-size="12" fill="#1a365d">cross vector</text>
  <rect x="205" y="486" width="190" height="30" rx="5" fill="#fbd38d" stroke="#c05621" stroke-width="2"/>
  <text x="300" y="506" text-anchor="middle" font-size="12" font-weight="700" fill="#7b341e">cascade vector ← s_u</text>

  <rect x="480" y="360" width="240" height="170" rx="10" fill="#bee3f8" stroke="#2c5282" stroke-width="2"/>
  <text x="600" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="#1a365d">Item Tower</text>
  <rect x="505" y="410" width="190" height="30" rx="5" fill="#fff" stroke="#2c5282"/>
  <text x="600" y="430" text-anchor="middle" font-size="12" fill="#1a365d">原始特征</text>
  <rect x="505" y="448" width="190" height="30" rx="5" fill="#fff" stroke="#2c5282"/>
  <text x="600" y="468" text-anchor="middle" font-size="12" fill="#1a365d">cross vector</text>
  <rect x="505" y="486" width="190" height="30" rx="5" fill="#fbd38d" stroke="#c05621" stroke-width="2"/>
  <text x="600" y="506" text-anchor="middle" font-size="12" font-weight="700" fill="#7b341e">cascade vector ← s_v</text>

  <!-- Arrows from KV to towers -->
  <path d="M670 240 Q 500 320 310 486" stroke="#c05621" stroke-width="2.5" fill="none" marker-end="url(#b)" stroke-dasharray="6,4"/>
  <path d="M770 240 Q 720 340 610 486" stroke="#c05621" stroke-width="2.5" fill="none" marker-end="url(#b)" stroke-dasharray="6,4"/>

  <text x="450" y="575" text-anchor="middle" font-size="13" fill="#2d3748" font-style="italic">轻量双塔"看见"了精排的交叉与序列信号 · 并行取数几乎零延迟</text>
</svg>