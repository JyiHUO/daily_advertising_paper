<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e67e22"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">CMS：把精排中间层借给双塔</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#666">不用蒸馏损失，直接缓存中间表示当特征</text>

  <!-- Top: Rank model -->
  <rect x="280" y="75" width="340" height="80" rx="10" fill="#2c3e50"/>
  <text x="450" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">精排模型 (Cascade Rank)</text>
  <text x="450" y="122" text-anchor="middle" font-size="12" fill="#bdc3c7">交叉特征 + 序列建模 · 表达力强</text>
  <text x="450" y="142" text-anchor="middle" font-size="12" fill="#f39c12">倒数第二层输出 h_uv (128维)</text>

  <!-- Arrow down from rank to EMA -->
  <line x1="450" y1="155" x2="450" y2="198" stroke="#e67e22" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="460" y="180" font-size="12" fill="#e67e22">h_uv</text>

  <!-- EMA box -->
  <rect x="310" y="205" width="280" height="58" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="450" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">EMA 更新（正负样本都更新）</text>
  <text x="450" y="250" text-anchor="middle" font-size="12" fill="#555">s ← β·s + (1−β)·h_uv</text>

  <!-- Arrow EMA -> server -->
  <line x1="450" y1="263" x2="450" y2="288" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <!-- Embedding server -->
  <rect x="330" y="290" width="240" height="58" rx="8" fill="#ecf0f1" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="450" y="313" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Embedding Server (KV)</text>
  <text x="450" y="333" text-anchor="middle" font-size="11" fill="#666">存储 s_u / s_v  ·  p99 &lt; 5ms</text>

  <!-- split arrows down -->
  <line x1="390" y1="348" x2="240" y2="398" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <line x1="510" y1="348" x2="660" y2="398" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="290" y="375" font-size="12" font-weight="bold" fill="#b9770e">s_u</text>
  <text x="600" y="375" font-size="12" font-weight="bold" fill="#b9770e">s_v</text>

  <!-- User tower -->
  <rect x="90" y="405" width="260" height="130" rx="10" fill="#e8f4fd" stroke="#2980b9" stroke-width="2"/>
  <text x="220" y="428" text-anchor="middle" font-size="15" font-weight="bold" fill="#2980b9">User Tower</text>
  <rect x="105" y="442" width="105" height="28" rx="4" fill="#fff" stroke="#95a5a6"/>
  <text x="157" y="461" text-anchor="middle" font-size="11" fill="#333">原始特征</text>
  <rect x="220" y="442" width="120" height="28" rx="4" fill="#fdebd0" stroke="#e67e22"/>
  <text x="280" y="461" text-anchor="middle" font-size="11" fill="#b9770e">+ cascade s_u</text>
  <text x="220" y="495" text-anchor="middle" font-size="11" fill="#555">拼接输入 → 编码</text>
  <text x="220" y="516" text-anchor="middle" font-size="11" fill="#27ae60">间接获得精排知识</text>

  <!-- Item tower -->
  <rect x="550" y="405" width="260" height="130" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="680" y="428" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8449">Item Tower</text>
  <rect x="565" y="442" width="105" height="28" rx="4" fill="#fff" stroke="#95a5a6"/>
  <text x="617" y="461" text-anchor="middle" font-size="11" fill="#333">原始特征</text>
  <rect x="680" y="442" width="120" height="28" rx="4" fill="#fdebd0" stroke="#e67e22"/>
  <text x="740" y="461" text-anchor="middle" font-size="11" fill="#b9770e">+ cascade s_v</text>
  <text x="680" y="495" text-anchor="middle" font-size="11" fill="#555">拼接输入 → 编码</text>
  <text x="680" y="516" text-anchor="middle" font-size="11" fill="#27ae60">几乎无额外延迟</text>

  <!-- bottom tag -->
  <rect x="340" y="548" width="220" height="24" rx="12" fill="#c0392b"/>
  <text x="450" y="565" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">三模块中收益最大</text>
</svg>