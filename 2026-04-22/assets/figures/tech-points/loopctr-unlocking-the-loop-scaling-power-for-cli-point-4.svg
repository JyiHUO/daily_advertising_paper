<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a9d4f"/>
    </marker>
    <marker id="arO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98c00"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">过程监督：训练时多循环，推理时零循环</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#666">共享参数在每一步都被迫给出好预测 → 推理可直接跳过循环</text>

  <!-- Training panel -->
  <rect x="30" y="80" width="510" height="460" rx="12" fill="#f5f8ff" stroke="#3b6fd6" stroke-width="1.5"/>
  <text x="50" y="105" font-size="15" font-weight="bold" fill="#3b6fd6">训练阶段：每一步都算损失</text>

  <!-- Entry -->
  <rect x="60" y="135" width="100" height="46" rx="6" fill="#dbe7ff" stroke="#3b6fd6"/>
  <text x="110" y="163" text-anchor="middle" font-size="13" font-weight="bold">Entry</text>

  <!-- Entry->Loop -->
  <line x1="160" y1="158" x2="228" y2="158" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Loop shared -->
  <rect x="230" y="135" width="140" height="46" rx="6" fill="#ffe6b3" stroke="#d98c00"/>
  <text x="300" y="156" text-anchor="middle" font-size="13" font-weight="bold">Loop Block</text>
  <text x="300" y="172" text-anchor="middle" font-size="10" fill="#666">(共享参数)</text>

  <!-- loop back arrow -->
  <path d="M300 135 C 300 100, 370 100, 370 135" fill="none" stroke="#d98c00" stroke-width="2" marker-end="url(#arO)"/>
  <text x="335" y="98" text-anchor="middle" font-size="11" fill="#d98c00">递归 L 次</text>

  <!-- Exits at each depth -->
  <!-- l=0 from Entry -->
  <line x1="110" y1="181" x2="110" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="70" y="233" width="80" height="30" rx="4" fill="#d4f5dd" stroke="#2a9d4f"/>
  <text x="110" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a9d4f">Exit (l=0)</text>
  <text x="110" y="282" text-anchor="middle" font-size="12">BCE₀</text>

  <!-- l=1 -->
  <line x1="250" y1="181" x2="225" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="185" y="233" width="80" height="30" rx="4" fill="#d4f5dd" stroke="#2a9d4f"/>
  <text x="225" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a9d4f">Exit (l=1)</text>
  <text x="225" y="282" text-anchor="middle" font-size="12">BCE₁</text>

  <!-- l=2 -->
  <line x1="310" y1="181" x2="335" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="295" y="233" width="80" height="30" rx="4" fill="#d4f5dd" stroke="#2a9d4f"/>
  <text x="335" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a9d4f">Exit (l=2)</text>
  <text x="335" y="282" text-anchor="middle" font-size="12">BCE₂</text>

  <!-- l=3 -->
  <line x1="360" y1="181" x2="445" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="405" y="233" width="80" height="30" rx="4" fill="#d4f5dd" stroke="#2a9d4f"/>
  <text x="445" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a9d4f">Exit (l=3)</text>
  <text x="445" y="282" text-anchor="middle" font-size="12">BCE₃</text>

  <!-- aggregation arrows to total loss -->
  <line x1="110" y1="295" x2="220" y2="335" stroke="#888" stroke-width="1"/>
  <line x1="225" y1="295" x2="260" y2="335" stroke="#888" stroke-width="1"/>
  <line x1="335" y1="295" x2="300" y2="335" stroke="#888" stroke-width="1"/>
  <line x1="445" y1="295" x2="340" y2="335" stroke="#888" stroke-width="1"/>

  <!-- Total loss -->
  <rect x="140" y="335" width="290" height="52" rx="8" fill="#fff4d6" stroke="#c78a00" stroke-width="1.5"/>
  <text x="285" y="359" text-anchor="middle" font-size="14" font-weight="bold">总损失 = mean(BCE₀ … BCE_L)</text>
  <text x="285" y="378" text-anchor="middle" font-size="11" fill="#666">每个深度都必须输出好预测</text>

  <text x="285" y="425" text-anchor="middle" font-size="12" fill="#333">多轮迭代的能力被"内化"进共享参数</text>
  <text x="285" y="470" text-anchor="middle" font-size="12" fill="#555">类比：学生每一步都要写中间答案，</text>
  <text x="285" y="490" text-anchor="middle" font-size="12" fill="#555">而不是只交最终结果</text>

  <!-- Inference panel -->
  <rect x="560" y="80" width="310" height="460" rx="12" fill="#eafaf0" stroke="#2a9d4f" stroke-width="1.5"/>
  <text x="580" y="105" font-size="15" font-weight="bold" fill="#2a9d4f">推理阶段：零循环</text>

  <rect x="610" y="140" width="210" height="50" rx="6" fill="#dbe7ff" stroke="#3b6fd6"/>
  <text x="715" y="170" text-anchor="middle" font-size="14" font-weight="bold">Entry</text>

  <line x1="715" y1="190" x2="715" y2="228" stroke="#2a9d4f" stroke-width="2" marker-end="url(#arG)"/>
  <text x="770" y="213" text-anchor="middle" font-size="11" fill="#2a9d4f">跳过 Loop</text>

  <rect x="610" y="232" width="210" height="50" rx="6" fill="#d4f5dd" stroke="#2a9d4f"/>
  <text x="715" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a9d4f">Exit (l=0)</text>

  <line x1="715" y1="282" x2="715" y2="318" stroke="#2a9d4f" stroke-width="2" marker-end="url(#arG)"/>

  <rect x="610" y="322" width="210" height="46" rx="6" fill="#ffffff" stroke="#2a9d4f"/>
  <text x="715" y="350" text-anchor="middle" font-size="14" font-weight="bold">CTR 预测</text>

  <!-- efficiency -->
  <rect x="590" y="395" width="250" height="120" rx="8" fill="#ffffff" stroke="#2a9d4f" stroke-dasharray="4 3"/>
  <text x="715" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a9d4f">单次前向就超过所有基线</text>
  <text x="610" y="443" font-size="11" fill="#333">FLOPs:   2150M  →  13.4M</text>
  <text x="610" y="465" font-size="11" fill="#333">延迟:     775ms  →  9.3ms</text>
  <text x="610" y="487" font-size="11" fill="#333">AUC:     0.8690  →  0.8715</text>
  <text x="610" y="507" font-size="10" fill="#888">(HSTU 基线 → LoopCTR 零循环)</text>
</svg>