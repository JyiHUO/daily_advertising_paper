<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/>
    </marker>
    <marker id="arY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b37400"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2ca05a"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="#f7f8fb"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">CS3 在线学习：两层存储打通双塔与精排</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">ParSvr 管自家参数  ·  EmbSvr 做跨模型中转站</text>

  <!-- Two Tower -->
  <rect x="50" y="190" width="190" height="130" rx="10" fill="#e8f0fe" stroke="#1f6feb" stroke-width="2"/>
  <text x="145" y="222" text-anchor="middle" font-size="17" font-weight="700" fill="#1f6feb">双塔召回模型</text>
  <text x="145" y="252" text-anchor="middle" font-size="12" fill="#333">读 cross vector (ParSvr)</text>
  <text x="145" y="275" text-anchor="middle" font-size="12" fill="#333">读 cascade vector (EmbSvr)</text>
  <text x="145" y="300" text-anchor="middle" font-size="11" fill="#888">role: reader</text>

  <!-- Ranking -->
  <rect x="660" y="190" width="190" height="130" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="755" y="222" text-anchor="middle" font-size="17" font-weight="700" fill="#c0392b">精排 Cascade 模型</text>
  <text x="755" y="252" text-anchor="middle" font-size="12" fill="#333">写 cascade vector</text>
  <text x="755" y="275" text-anchor="middle" font-size="12" fill="#333">独立数据流 / 采样</text>
  <text x="755" y="300" text-anchor="middle" font-size="11" fill="#888">role: writer</text>

  <!-- ParSvr -->
  <rect x="330" y="115" width="240" height="95" rx="10" fill="#ffffff" stroke="#444" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">ParSvr · 参数服务器</text>
  <text x="450" y="170" text-anchor="middle" font-size="12" fill="#555">双塔参数 + CTS cross vector</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#888">同一训练任务内同步更新 / 导出</text>

  <!-- EmbSvr -->
  <rect x="330" y="290" width="240" height="100" rx="10" fill="#fff7e6" stroke="#e6a700" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#b37400">EmbSvr · 嵌入服务器</text>
  <text x="450" y="344" text-anchor="middle" font-size="12" fill="#555">跨模型 KV 中转：cascade vector</text>
  <text x="450" y="364" text-anchor="middle" font-size="11" fill="#888">高 QPS 分布式 KV，读取 &lt; 5ms</text>
  <text x="450" y="381" text-anchor="middle" font-size="11" fill="#888">精排写 → 双塔读</text>

  <!-- ParSvr <-> TwoTower -->
  <path d="M330,175 L240,210" stroke="#1f6feb" stroke-width="2" fill="none" marker-end="url(#arB)"/>
  <path d="M240,225 L330,195" stroke="#1f6feb" stroke-width="2" fill="none" marker-end="url(#arB)"/>
  <text x="258" y="182" font-size="11" fill="#1f6feb">params ↔</text>

  <!-- EmbSvr -> TwoTower (read cascade) -->
  <path d="M330,325 L240,290" stroke="#b37400" stroke-width="2.2" fill="none" marker-end="url(#arY)"/>
  <text x="250" y="318" font-size="11" fill="#996600">read cascade</text>

  <!-- Ranking -> EmbSvr (write cascade) -->
  <path d="M660,290 L570,325" stroke="#c0392b" stroke-width="2.2" fill="none" marker-end="url(#arW)"/>
  <text x="600" y="305" font-size="11" fill="#c0392b">write cascade</text>

  <!-- Loop label -->
  <rect x="290" y="435" width="320" height="60" rx="10" fill="#eafaf0" stroke="#2ca05a" stroke-width="2"/>
  <text x="450" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#1f7a3f">在线学习闭环 ≈ 30 分钟</text>
  <text x="450" y="482" text-anchor="middle" font-size="11" fill="#2c6e45">展示 → 日志 → 训练 → 参数推送 → 线上生效</text>

  <!-- closed loop: TwoTower -> loop -> Ranking -->
  <path d="M145,320 L145,465 L290,465" stroke="#2ca05a" stroke-width="1.8" fill="none" stroke-dasharray="5,4" marker-end="url(#arG)"/>
  <path d="M610,465 L755,465 L755,320" stroke="#2ca05a" stroke-width="1.8" fill="none" stroke-dasharray="5,4" marker-end="url(#arG)"/>

  <!-- Bottom note -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#555">双塔与精排训练任务不共享，EmbSvr 作为桥梁实现实时能力协同</text>
  <text x="450" y="560" text-anchor="middle" font-size="11" fill="#888">CAS / CTS / CMS 三模块均在此架构下即插即用</text>
</svg>