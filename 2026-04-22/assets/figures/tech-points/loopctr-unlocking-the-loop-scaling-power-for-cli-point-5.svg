<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c03030"/>
    </marker>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#d5e8ff"/>
      <stop offset="1" stop-color="#ffd9d9"/>
    </linearGradient>
  </defs>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">不同样本，需要不同的「思考深度」</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">Oracle 分析：若能逐样本选最优循环深度，AUC 还可大幅提升</text>

  <!-- Input samples -->
  <rect x="40" y="130" width="140" height="55" rx="8" fill="#fff4d6" stroke="#d4a017" stroke-width="2"/>
  <text x="110" y="155" text-anchor="middle" font-size="14" font-weight="bold">简单样本</text>
  <text x="110" y="174" text-anchor="middle" font-size="12" fill="#555">只需 0 轮</text>

  <rect x="40" y="250" width="140" height="55" rx="8" fill="#ffe4d6" stroke="#d47017" stroke-width="2"/>
  <text x="110" y="275" text-anchor="middle" font-size="14" font-weight="bold">中等样本</text>
  <text x="110" y="294" text-anchor="middle" font-size="12" fill="#555">1 轮最合适</text>

  <rect x="40" y="370" width="140" height="55" rx="8" fill="#ffd6d6" stroke="#c03030" stroke-width="2"/>
  <text x="110" y="395" text-anchor="middle" font-size="14" font-weight="bold">复杂样本</text>
  <text x="110" y="414" text-anchor="middle" font-size="12" fill="#555">需要 3 轮</text>

  <!-- Oracle router -->
  <rect x="250" y="230" width="170" height="100" rx="14" fill="#e8f0ff" stroke="#3060c0" stroke-width="2.5"/>
  <text x="335" y="265" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3a80">Oracle 裁判</text>
  <text x="335" y="290" text-anchor="middle" font-size="12" fill="#333">为每个样本</text>
  <text x="335" y="310" text-anchor="middle" font-size="12" fill="#333">挑选最佳循环深度</text>

  <!-- Arrows to router -->
  <line x1="180" y1="158" x2="250" y2="250" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="180" y1="278" x2="248" y2="280" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="180" y1="398" x2="250" y2="315" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Output loops -->
  <circle cx="540" cy="158" r="28" fill="#fff" stroke="#d4a017" stroke-width="2.5"/>
  <text x="540" y="163" text-anchor="middle" font-size="14" font-weight="bold">i=0</text>
  <circle cx="540" cy="280" r="28" fill="#fff" stroke="#d47017" stroke-width="2.5"/>
  <text x="540" y="285" text-anchor="middle" font-size="14" font-weight="bold">i=1</text>
  <circle cx="540" cy="398" r="28" fill="#fff" stroke="#c03030" stroke-width="2.5"/>
  <text x="540" y="403" text-anchor="middle" font-size="14" font-weight="bold">i=3</text>

  <line x1="420" y1="250" x2="512" y2="170" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="420" y1="280" x2="510" y2="280" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="420" y1="315" x2="512" y2="388" stroke="#333" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- AUC gain panel -->
  <rect x="620" y="120" width="250" height="310" rx="12" fill="url(#g1)" stroke="#888" stroke-width="1.5"/>
  <text x="745" y="148" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">TaobaoAds AUC</text>

  <!-- Bars baseline -->
  <line x1="650" y1="370" x2="860" y2="370" stroke="#666" stroke-width="1"/>

  <rect x="670" y="280" width="60" height="90" fill="#7aa3e0" stroke="#2a5ca8"/>
  <text x="700" y="272" text-anchor="middle" font-size="12" fill="#333">实际最优</text>
  <text x="700" y="388" text-anchor="middle" font-size="12" font-weight="bold">0.6441</text>

  <rect x="780" y="220" width="60" height="150" fill="#e07a7a" stroke="#a83030"/>
  <text x="810" y="212" text-anchor="middle" font-size="12" fill="#333">Oracle</text>
  <text x="810" y="388" text-anchor="middle" font-size="12" font-weight="bold">0.6672</text>

  <!-- gap arrow -->
  <line x1="735" y1="240" x2="775" y2="240" stroke="#c03030" stroke-width="2" marker-end="url(#ar)"/>
  <text x="745" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#a02020">+0.023 未挖掘空间</text>

  <!-- Bottom insight -->
  <rect x="60" y="460" width="780" height="75" rx="10" fill="#f4f4f4" stroke="#aaa" stroke-dasharray="4 3"/>
  <text x="450" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">反直觉发现：训练循环越少 (L=1)，Oracle 上限反而越高</text>
  <text x="450" y="513" text-anchor="middle" font-size="12" fill="#555">各深度表征差异更大，为未来「自适应路由」留下更大空间</text>
</svg>