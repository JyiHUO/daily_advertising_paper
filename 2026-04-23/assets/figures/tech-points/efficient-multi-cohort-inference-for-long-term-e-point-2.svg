<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#222">逆方差加权多队列估计 δ-MC(t)</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">同一个学习效应 δ(5)，不同队列对都能估 —— 按精度加权合并</text>

  <!-- Left: many cohort pair estimates -->
  <g>
    <rect x="40" y="90" width="300" height="380" rx="10" fill="#f4f7fb" stroke="#c9d4e2"/>
    <text x="190" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334">9 个队列对估计 (k=0..8)</text>

    <g font-size="11" fill="#333">
      <g transform="translate(70,145)">
        <text x="-20" y="4">k=0</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="80" y1="-6" x2="80" y2="6" stroke="#5a7fb0"/>
        <line x1="180" y1="-6" x2="180" y2="6" stroke="#5a7fb0"/>
        <line x1="80" y1="0" x2="180" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="130" cy="0" r="4" fill="#2c5aa0"/>
        <text x="232" y="4" fill="#888">宽·权重低</text>
      </g>
      <g transform="translate(70,180)">
        <text x="-20" y="4">k=1</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="95" y1="-6" x2="95" y2="6" stroke="#5a7fb0"/>
        <line x1="165" y1="-6" x2="165" y2="6" stroke="#5a7fb0"/>
        <line x1="95" y1="0" x2="165" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="128" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,215)">
        <text x="-20" y="4">k=2</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="105" y1="-6" x2="105" y2="6" stroke="#5a7fb0"/>
        <line x1="150" y1="-6" x2="150" y2="6" stroke="#5a7fb0"/>
        <line x1="105" y1="0" x2="150" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="132" cy="0" r="4" fill="#2c5aa0"/>
        <text x="232" y="4" fill="#2a7a2a">窄·权重高</text>
      </g>
      <g transform="translate(70,250)">
        <text x="-20" y="4">k=3</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="100" y1="-6" x2="100" y2="6" stroke="#5a7fb0"/>
        <line x1="160" y1="-6" x2="160" y2="6" stroke="#5a7fb0"/>
        <line x1="100" y1="0" x2="160" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="126" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,285)">
        <text x="-20" y="4">k=4</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="110" y1="-6" x2="110" y2="6" stroke="#5a7fb0"/>
        <line x1="155" y1="-6" x2="155" y2="6" stroke="#5a7fb0"/>
        <line x1="110" y1="0" x2="155" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="134" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,320)">
        <text x="-20" y="4">k=5</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="85" y1="-6" x2="85" y2="6" stroke="#5a7fb0"/>
        <line x1="175" y1="-6" x2="175" y2="6" stroke="#5a7fb0"/>
        <line x1="85" y1="0" x2="175" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="124" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,355)">
        <text x="-20" y="4">k=6</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="75" y1="-6" x2="75" y2="6" stroke="#5a7fb0"/>
        <line x1="190" y1="-6" x2="190" y2="6" stroke="#5a7fb0"/>
        <line x1="75" y1="0" x2="190" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="135" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,390)">
        <text x="-20" y="4">k=7</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="65" y1="-6" x2="65" y2="6" stroke="#5a7fb0"/>
        <line x1="200" y1="-6" x2="200" y2="6" stroke="#5a7fb0"/>
        <line x1="65" y1="0" x2="200" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="122" cy="0" r="4" fill="#2c5aa0"/>
      </g>
      <g transform="translate(70,425)">
        <text x="-20" y="4">k=8</text>
        <line x1="20" y1="0" x2="220" y2="0" stroke="#b8c7d9"/>
        <line x1="55" y1="-6" x2="55" y2="6" stroke="#5a7fb0"/>
        <line x1="215" y1="-6" x2="215" y2="6" stroke="#5a7fb0"/>
        <line x1="55" y1="0" x2="215" y2="0" stroke="#5a7fb0" stroke-width="3"/>
        <circle cx="138" cy="0" r="4" fill="#2c5aa0"/>
      </g>
    </g>
    <text x="190" y="458" text-anchor="middle" font-size="11" fill="#777">每条 = 一个无偏估计 + 它的方差</text>
  </g>

  <!-- Arrow -->
  <g>
    <path d="M350 280 L486 280" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
    <text x="418" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#333">按 1/方差加权平均</text>
  </g>

  <!-- Right: merged estimator -->
  <g>
    <rect x="490" y="150" width="370" height="180" rx="10" fill="#eaf5ea" stroke="#6fb86f"/>
    <text x="675" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#234">合成估计 δ-MC(t)</text>

    <line x1="540" y1="235" x2="820" y2="235" stroke="#b8c7d9"/>
    <line x1="650" y1="225" x2="650" y2="245" stroke="#2a7a2a" stroke-width="2"/>
    <line x1="700" y1="225" x2="700" y2="245" stroke="#2a7a2a" stroke-width="2"/>
    <line x1="650" y1="235" x2="700" y2="235" stroke="#2a7a2a" stroke-width="5"/>
    <circle cx="675" cy="235" r="6" fill="#1f6b1f"/>
    <text x="675" y="275" text-anchor="middle" font-size="13" fill="#234">置信区间显著更窄</text>
    <text x="675" y="308" text-anchor="middle" font-size="12" fill="#555">同样逻辑也用于处理/对照序列与留存曲线</text>
  </g>

  <!-- Bottom comparison box -->
  <g>
    <rect x="490" y="360" width="370" height="130" rx="10" fill="#fff5f2" stroke="#e6a89a"/>
    <text x="675" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#8a2b1a">对比基线：浪费了数据</text>

    <circle cx="525" cy="420" r="5" fill="#d9534f"/>
    <text x="540" y="424" font-size="12" fill="#333">CCD：只用 1 对队列</text>

    <circle cx="525" cy="448" r="5" fill="#d9534f"/>
    <text x="540" y="452" font-size="12" fill="#333">DiD：只用最早进入那批人</text>

    <text x="675" y="478" text-anchor="middle" font-size="12" font-weight="700" fill="#2a7a2a">MC 置信区间 ≈ CCD 的 1/2、DiD 的 1/3</text>
  </g>
</svg>