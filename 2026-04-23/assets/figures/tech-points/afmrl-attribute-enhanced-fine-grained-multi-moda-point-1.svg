<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ahR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="ahG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e8b57"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">AGCL：用属性"小抄"重新定义对比学习里的负样本</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">MLLM先生成关键属性 → 按属性文本重打分 → 放大硬负 / 剔除假负</text>

  <!-- Query -->
  <g>
    <rect x="40" y="100" width="240" height="140" rx="10" fill="#fff7e6" stroke="#e29a1f" stroke-width="2"/>
    <text x="160" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#b36b00">Query 商品</text>
    <text x="160" y="152" text-anchor="middle" font-size="12" fill="#333">深红 · V领 · A字 · 真丝 · 连衣裙</text>
    <rect x="60" y="178" width="200" height="48" rx="6" fill="#fff" stroke="#e29a1f" stroke-dasharray="3,3"/>
    <text x="160" y="198" text-anchor="middle" font-size="11" fill="#b36b00">MLLM 生成的属性小抄</text>
    <text x="160" y="216" text-anchor="middle" font-size="11" fill="#666">用于 BM25 + cosine 打分</text>
  </g>

  <!-- center arrow -->
  <line x1="280" y1="170" x2="340" y2="170" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="310" y="162" text-anchor="middle" font-size="11" fill="#666">分类</text>

  <!-- Candidates panel -->
  <rect x="340" y="90" width="520" height="420" rx="12" fill="#fafafa" stroke="#ccc"/>
  <text x="600" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Batch 中的候选样本（按属性重新分类）</text>

  <!-- Hard negative (amplified) -->
  <g>
    <rect x="360" y="135" width="480" height="105" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
    <text x="378" y="160" font-size="13" font-weight="700" fill="#c0392b">① 硬负样本　权重 ↑</text>
    <text x="378" y="182" font-size="12" fill="#333">深红 · V领 · 真丝 · 连衣裙 · 直筒版型</text>
    <text x="378" y="202" font-size="11" fill="#666">属性 BM25 高 → 词面像但不是同款</text>
    <text x="378" y="222" font-size="11" fill="#c0392b">→ 乘大权重，逼模型盯住"A字 vs 直筒"</text>
    <circle cx="800" cy="188" r="26" fill="#c0392b"/>
    <text x="800" y="193" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">×w</text>
  </g>

  <!-- False negative (masked) -->
  <g>
    <rect x="360" y="260" width="480" height="105" rx="10" fill="#eef6ff" stroke="#3a77c2" stroke-width="2"/>
    <text x="378" y="285" font-size="13" font-weight="700" fill="#3a77c2">② 假负样本　剔除</text>
    <text x="378" y="307" font-size="12" fill="#333">同款不同角度图 · cos(neg,q) &gt; cos(pos,q)+m</text>
    <text x="378" y="347" font-size="11" fill="#3a77c2">→ 从分母中 mask，避免被冤枉推远</text>
    <g transform="translate(800,312)">
      <circle r="22" fill="none" stroke="#3a77c2" stroke-width="3"/>
      <line x1="-15" y1="-15" x2="15" y2="15" stroke="#3a77c2" stroke-width="3"/>
    </g>
  </g>

  <!-- Easy negative -->
  <g>
    <rect x="360" y="385" width="480" height="95" rx="10" fill="#eef9ee" stroke="#2e8b57" stroke-width="2"/>
    <text x="378" y="412" font-size="13" font-weight="700" fill="#2e8b57">③ 普通负样本　正常对比</text>
    <text x="378" y="436" font-size="12" fill="#333">一双运动鞋 / 一件外套</text>
    <text x="378" y="458" font-size="11" fill="#666">属性差距大，按常规 InfoNCE 处理</text>
  </g>

  <!-- Loss -->
  <rect x="40" y="420" width="260" height="100" rx="10" fill="#1a1a1a"/>
  <text x="170" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Attribute-Guided InfoNCE</text>
  <text x="170" y="475" text-anchor="middle" font-size="11" fill="#ffd36b">分母：只累加有效负样本</text>
  <text x="170" y="498" text-anchor="middle" font-size="11" fill="#ff9a8a">每项乘 BM25 权重 w</text>

  <line x1="360" y1="200" x2="300" y2="440" stroke="#c0392b" stroke-width="1.8" marker-end="url(#ahR)" opacity="0.75"/>
  <line x1="360" y1="432" x2="300" y2="478" stroke="#2e8b57" stroke-width="1.8" marker-end="url(#ahG)" opacity="0.75"/>
</svg>