<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c05621"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1a202c">循环迭代训练 CIT：两个模型轮流变强</text>
  <text x="450" y="66" text-anchor="middle" font-size="14" fill="#4a5568">属性生成器 G  ⇄  表征模型 R</text>

  <!-- Left: Generator G -->
  <rect x="80" y="140" width="230" height="140" rx="14" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="2.5"/>
  <text x="195" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#2b6cb0">属性生成器 G</text>
  <text x="195" y="205" text-anchor="middle" font-size="13" fill="#2c5282">写商品关键属性</text>
  <text x="195" y="230" text-anchor="middle" font-size="12" fill="#4a5568">V领 / A字 / 真丝 / 深红</text>
  <text x="195" y="258" text-anchor="middle" font-size="12" fill="#718096">G₁ → G₂ → ...</text>

  <!-- Right: Representation R -->
  <rect x="590" y="140" width="230" height="140" rx="14" fill="#fff5f0" stroke="#c05621" stroke-width="2.5"/>
  <text x="705" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#c05621">表征模型 R</text>
  <text x="705" y="205" text-anchor="middle" font-size="13" fill="#7b341e">学会区分硬负样本</text>
  <text x="705" y="230" text-anchor="middle" font-size="12" fill="#4a5568">红裙 vs 真丝深红V领裙</text>
  <text x="705" y="258" text-anchor="middle" font-size="12" fill="#718096">R₁ → R₂ → ...</text>

  <!-- Arrow G -> R (top) -->
  <path d="M 310 185 C 420 135, 520 135, 588 185" fill="none" stroke="#2b6cb0" stroke-width="3" marker-end="url(#a)"/>
  <rect x="380" y="108" width="180" height="26" rx="13" fill="#ffffff" stroke="#2b6cb0"/>
  <text x="470" y="126" text-anchor="middle" font-size="13" fill="#2b6cb0" font-weight="600">属性 → AGCL 对比学习</text>

  <!-- Arrow R -> G (bottom) -->
  <path d="M 588 240 C 520 295, 420 295, 312 240" fill="none" stroke="#c05621" stroke-width="3" marker-end="url(#a2)"/>
  <rect x="375" y="288" width="190" height="26" rx="13" fill="#ffffff" stroke="#c05621"/>
  <text x="470" y="306" text-anchor="middle" font-size="13" fill="#c05621" font-weight="600">R 当奖励 → RL 调 G</text>

  <!-- Loop label -->
  <circle cx="450" cy="212" r="20" fill="#2d3748"/>
  <text x="450" y="219" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">↻</text>

  <!-- Bottom: results -->
  <rect x="110" y="360" width="680" height="200" rx="14" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="450" y="392" text-anchor="middle" font-size="15" font-weight="700" fill="#1a202c">仅用 30% 数据，一轮 CIT 后全面提升</text>

  <!-- Bars: Accuracy -->
  <g transform="translate(180,420)">
    <text x="85" y="0" text-anchor="middle" font-size="13" fill="#4a5568" font-weight="600">分类准确率</text>
    <rect x="25" y="30" width="60" height="70" fill="#a0aec0"/>
    <text x="55" y="120" text-anchor="middle" font-size="12" fill="#4a5568">R₁ 88.00</text>
    <rect x="115" y="22" width="60" height="78" fill="#c05621"/>
    <text x="145" y="120" text-anchor="middle" font-size="12" fill="#c05621" font-weight="700">R₂ 89.13</text>
  </g>

  <!-- Metrics -->
  <g transform="translate(470,435)">
    <text x="0" y="0" font-size="13" fill="#2d3748">✓ NMI 提升</text>
    <text x="0" y="26" font-size="13" fill="#2d3748">✓ ARI 提升</text>
    <text x="0" y="52" font-size="13" fill="#2d3748">✓ Purity 提升</text>
    <text x="0" y="90" font-size="12" fill="#718096">G 越写越准 → R 越学越强</text>
  </g>
</svg>