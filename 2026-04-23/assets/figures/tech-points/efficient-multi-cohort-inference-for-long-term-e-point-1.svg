<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">同一份实验数据，两种视角</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">差别只在：要不要把流失用户算进分母</text>

  <!-- Central data block -->
  <rect x="360" y="90" width="180" height="70" rx="10" fill="#fff3d6" stroke="#d9a441" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">多队列实验数据</text>
  <text x="450" y="140" text-anchor="middle" font-size="12" fill="#666">按进入时间分组 · 14天轨迹</text>

  <!-- Left: LTE -->
  <rect x="60" y="210" width="340" height="320" rx="12" fill="#eaf4ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e40af">LTE：只看留下的人</text>
  <text x="230" y="262" text-anchor="middle" font-size="12" fill="#1e40af">流失 = 随机缺失，忽略</text>

  <!-- LTE chart -->
  <line x1="110" y1="450" x2="370" y2="450" stroke="#666" stroke-width="1.5"/>
  <line x1="110" y1="300" x2="110" y2="450" stroke="#666" stroke-width="1.5"/>
  <text x="105" y="295" text-anchor="end" font-size="10" fill="#666">人均点击</text>
  <!-- control line -->
  <line x1="115" y1="400" x2="365" y2="400" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="335" y="394" font-size="11" fill="#555">对照 1.0</text>
  <!-- treatment bump -->
  <path d="M115,400 Q170,330 225,345 T365,400" stroke="#2563eb" stroke-width="2.5" fill="none"/>
  <text x="225" y="325" text-anchor="middle" font-size="11" fill="#2563eb">处理组：1.2→1.3→1.0</text>

  <rect x="95" y="475" width="270" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="230" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">LTE ≈ 0  「没影响」</text>

  <!-- Right: ΔERLV -->
  <rect x="500" y="210" width="340" height="320" rx="12" fill="#ffe9e9" stroke="#dc2626" stroke-width="2"/>
  <text x="670" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">ΔERLV：人数也算进去</text>
  <text x="670" y="262" text-anchor="middle" font-size="12" fill="#991b1b">流失 = 有信息，用 S(t) 加权</text>

  <!-- Retention chart -->
  <line x1="550" y1="450" x2="810" y2="450" stroke="#666" stroke-width="1.5"/>
  <line x1="550" y1="300" x2="550" y2="450" stroke="#666" stroke-width="1.5"/>
  <text x="545" y="295" text-anchor="end" font-size="10" fill="#666">留存</text>
  <!-- control retention -->
  <path d="M560,315 L800,355" stroke="#888" stroke-width="2" stroke-dasharray="4,3" fill="none"/>
  <text x="760" y="348" font-size="11" fill="#555">对照</text>
  <!-- treatment retention drops -->
  <path d="M560,315 Q680,410 800,425" stroke="#dc2626" stroke-width="2.5" fill="none"/>
  <text x="690" y="435" text-anchor="middle" font-size="11" fill="#dc2626">处理组活跃 −20%</text>

  <rect x="535" y="475" width="270" height="36" rx="6" fill="#fecaca" stroke="#dc2626"/>
  <text x="670" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#991b1b">ΔERLV = −0.7  「别上线」</text>

  <!-- Arrows from center -->
  <line x1="395" y1="160" x2="270" y2="210" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="505" y1="160" x2="630" y2="210" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- Bottom insight -->
  <text x="450" y="565" text-anchor="middle" font-size="13" fill="#333" font-style="italic">同一框架，互补视角：人均没变 ≠ 总价值没变</text>
</svg>