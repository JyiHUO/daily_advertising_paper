<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <linearGradient id="trapBad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe5e0"/>
      <stop offset="1" stop-color="#ffd1cc"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b5bd7"/>
      <stop offset="1" stop-color="#5f3dc4"/>
    </linearGradient>
    <linearGradient id="lteBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d7e3ff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="erlvBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe1c9"/>
      <stop offset="1" stop-color="#fff3e6"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">短实验里同时看见 稳态效应 与 累计价值流失</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#475569">Multi-Cohort A/B Testing · LTE 与 ΔERLV 的统一估计框架</text>

  <!-- TOP: the trap -->
  <g>
    <rect x="60" y="100" width="1080" height="92" rx="12" fill="url(#trapBad)" stroke="#f0a8a0" stroke-width="1"/>
    <text x="88" y="130" font-size="14" font-weight="700" fill="#8b2b1f">A/B 陷阱</text>
    <text x="88" y="155" font-size="13" fill="#6b2318">短期 CTR ↑ ，长期人均回归（LTE ≈ 0），看似中性 — 但用户在悄悄流失，累计价值实际为负</text>
    <text x="88" y="176" font-size="12" fill="#8b4a43">CCD / DiD 只估 LTE，忽略留存；且仅用部分队列对，方差大</text>

    <!-- mini curve -->
    <g transform="translate(820,112)">
      <rect x="0" y="0" width="300" height="70" rx="8" fill="#ffffff" opacity="0.75"/>
      <text x="10" y="16" font-size="11" fill="#64748b">人均指标</text>
      <path d="M10,55 Q60,20 110,35 T280,48" fill="none" stroke="#2b5bd7" stroke-width="2"/>
      <path d="M10,48 L280,48" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="270" y="64" text-anchor="end" font-size="10" fill="#2b5bd7">LTE ≈ 0 但留存 ↓</text>
    </g>
  </g>

  <!-- Left input: cohorts -->
  <g>
    <rect x="70" y="280" width="260" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="200" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">错峰进入的多个队列</text>

    <g font-size="11" fill="#475569">
      <rect x="90" y="322" width="14" height="14" fill="#2b5bd7"/><text x="112" y="334">Cohort 0</text>
      <rect x="90" y="346" width="14" height="14" fill="#4c7ce0"/><text x="112" y="358">Cohort 1</text>
      <rect x="90" y="370" width="14" height="14" fill="#7096ea"/><text x="112" y="382">Cohort 2</text>
      <rect x="90" y="394" width="14" height="14" fill="#a3b8f0"/><text x="112" y="406">Cohort k</text>
      <text x="90" y="432" fill="#94a3b8">每对差 k 天 → 得到一个 δ_k</text>
    </g>
    <text x="200" y="456" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">信息利用率 ↑</text>
  </g>

  <!-- arrow left -> core -->
  <line x1="330" y1="375" x2="376" y2="375" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Center mechanism -->
  <g>
    <rect x="380" y="300" width="440" height="150" rx="16" fill="url(#coreGrad)"/>
    <text x="600" y="334" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">逆方差加权 · 多队列估计器</text>
    <text x="600" y="358" text-anchor="middle" font-size="12" fill="#dbe4ff">对每个时滞 k 得到 δ_k(t) 的无偏估计</text>
    <text x="600" y="382" text-anchor="middle" font-size="13" fill="#ffffff" font-family="'Courier New',monospace">δ_MC(t) = Σ w_k · δ_k(t),  w_k ∝ 1/Var(δ_k)</text>
    <text x="600" y="406" text-anchor="middle" font-size="12" fill="#dbe4ff">拟合参数化衰减  f(t) = γ + α · exp(−β t)</text>
    <text x="600" y="430" text-anchor="middle" font-size="12" fill="#fcd34d">方差 vs CCD −50% · vs DiD −66%</text>
  </g>

  <!-- arrows core -> outputs -->
  <path d="M820,340 Q848,320 866,310" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M820,410 Q848,432 866,445" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LTE branch -->
  <g>
    <rect x="870" y="260" width="260" height="100" rx="12" fill="url(#lteBand)" stroke="#93b4ff"/>
    <text x="886" y="286" font-size="13" font-weight="700" fill="#1e3a8a">LTE · 稳态人均效应</text>
    <text x="886" y="308" font-size="11" fill="#1e3a8a">只看留下来的用户（流失视为随机缺失）</text>
    <text x="886" y="330" font-size="12" fill="#1e293b" font-family="'Courier New',monospace">LTE = γ = lim f(t)</text>
    <text x="886" y="350" font-size="11" fill="#475569">回答：人均表现是否稳态变化</text>
  </g>

  <!-- ERLV branch -->
  <g>
    <rect x="870" y="390" width="260" height="120" rx="12" fill="url(#erlvBand)" stroke="#f5b880"/>
    <text x="886" y="416" font-size="13" font-weight="700" fill="#9a3412">ΔERLV · 累计剩余生命周期价值</text>
    <text x="886" y="436" font-size="11" fill="#9a3412">把留存 S(t) 乘进去（流失是有信息事件）</text>
    <text x="886" y="460" font-size="11" fill="#1e293b" font-family="'Courier New',monospace">Σ [f_T·S_T − f_C·S_C]</text>
    <text x="886" y="482" font-size="11" fill="#475569">回答：总蛋糕变大还是变小</text>
    <text x="886" y="500" font-size="11" fill="#b91c1c" font-weight="600">例：LTE≈0，ΔERLV = −0.7 → 不上线</text>
  </g>

  <!-- Bottom: decision flip -->
  <g>
    <rect x="60" y="560" width="1080" height="160" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="588" font-size="13" font-weight="700" fill="#0f172a">同一份 7–14 天实验 · 两个互补视角 · 一次给出决策</text>

    <!-- experiment window shading -->
    <rect x="100" y="600" width="280" height="70" fill="#2b5bd7" opacity="0.08"/>
    <line x1="380" y1="600" x2="380" y2="670" stroke="#94a3b8" stroke-dasharray="2,3"/>
    <text x="240" y="618" text-anchor="middle" font-size="10" fill="#475569">观测窗口</text>
    <text x="740" y="618" text-anchor="middle" font-size="10" fill="#475569">指数衰减外推 — 同时得到 LTE 与 ΔERLV</text>

    <!-- timeline axis -->
    <line x1="100" y1="670" x2="1100" y2="670" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="100" y="690" font-size="10" fill="#64748b">t=0</text>
    <text x="600" y="690" text-anchor="middle" font-size="10" fill="#64748b">短实验窗口 → 外推</text>
    <text x="1100" y="690" text-anchor="end" font-size="10" fill="#64748b">t → ∞</text>

    <!-- treatment metric curve -->
    <path d="M100,648 Q250,605 420,625 T780,640 Q900,642 1100,642" fill="none" stroke="#2b5bd7" stroke-width="2.5"/>
    <text x="430" y="612" font-size="11" fill="#2b5bd7">f_T(t) 指标轨迹</text>

    <!-- retention treatment -->
    <path d="M100,615 Q300,630 500,648 T900,658 L1100,660" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="760" y="652" font-size="11" fill="#ea580c">S_T(t) 留存 ↓</text>

    <!-- retention control -->
    <path d="M100,615 Q300,622 500,628 T900,632 L1100,633" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="3,3"/>
    <text x="1020" y="624" font-size="10" fill="#64748b">S_C(t)</text>
  </g>

</svg>