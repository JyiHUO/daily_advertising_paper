<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="activeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="passiveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bauGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">"断药实验"：主动期 vs 被动期纵向对照设计</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">880万用户 · 11个月 · 90/10随机分流</text>

  <!-- Timeline bar background -->
  <rect x="80" y="82" width="740" height="36" rx="18" fill="#e2e8f0"/>

  <!-- Active period on timeline -->
  <rect x="80" y="82" width="268" height="36" rx="18" fill="url(#activeGrad)"/>
  <text x="214" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">主动管理期（月0-4）</text>

  <!-- Passive period on timeline -->
  <rect x="348" y="82" width="472" height="36" rx="18" fill="url(#passiveGrad)"/>
  <text x="584" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">被动自主期（月4-11）</text>

  <!-- Cut line -->
  <line x1="348" y1="74" x2="348" y2="126" stroke="#dc2626" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="348" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">✂ 人工停止介入</text>

  <!-- ======= MAIN AREA: Two panels ======= -->

  <!-- LEFT PANEL: Active Period -->
  <rect x="40" y="160" width="380" height="280" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="186" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">🧑‍💻 主动管理期</text>

  <!-- Human + Agent loop -->
  <rect x="70" y="205" width="140" height="70" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">营销人员</text>
  <text x="140" y="252" text-anchor="middle" font-size="11" fill="#475569">新文案 · 标注 · 调参</text>

  <rect x="250" y="205" width="140" height="70" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">AI 智能体</text>
  <text x="320" y="252" text-anchor="middle" font-size="11" fill="#475569">学习 · 优化 · 投放</text>

  <!-- Arrows between human and agent -->
  <line x1="210" y1="230" x2="248" y2="230" stroke="#334155" stroke-width="2" marker-end="url(#arrowBlack)"/>
  <line x1="250" y1="250" x2="212" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Component library growing -->
  <rect x="100" y="300" width="240" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="220" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">📦 组件库持续增长</text>
  <text x="220" y="338" text-anchor="middle" font-size="10" fill="#475569">文案变体 · 视觉素材 · 受众规则</text>

  <!-- Arrow down to library -->
  <line x1="220" y1="275" x2="220" y2="298" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Effect indicator -->
  <rect x="100" y="368" width="240" height="40" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="220" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">📈 效果持续攀升</text>

  <line x1="220" y1="350" x2="220" y2="366" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- RIGHT PANEL: Passive Period -->
  <rect x="460" y="160" width="400" height="280" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="186" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">🤖 被动自主期</text>

  <!-- Agent alone -->
  <rect x="560" y="205" width="160" height="70" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">AI 智能体</text>
  <text x="640" y="252" text-anchor="middle" font-size="11" fill="#475569">独立学习 · 自主投放</text>

  <!-- No human - crossed out -->
  <rect x="490" y="215" width="50" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="515" y="236" text-anchor="middle" font-size="16">🧑‍💻</text>
  <line x1="492" y1="217" x2="538" y2="263" stroke="#ef4444" stroke-width="3"/>
  <line x1="538" y1="217" x2="492" y2="263" stroke="#ef4444" stroke-width="3"/>

  <!-- Frozen library -->
  <rect x="520" y="300" width="240" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="640" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">🔒 组件库已冻结</text>
  <text x="640" y="338" text-anchor="middle" font-size="10" fill="#78716c">无新内容 · 仅调整匹配策略</text>

  <line x1="640" y1="275" x2="640" y2="298" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Effect indicator - still positive but declining -->
  <rect x="520" y="368" width="240" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="640" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#a16207">📉 效果衰减但仍显著为正</text>

  <line x1="640" y1="350" x2="640" y2="366" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- ======= BAU baseline bar at bottom ======= -->
  <rect x="80" y="460" width="740" height="42" rx="12" fill="url(#bauGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="450" y="486" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">📊 对照组（BAU 10%）：全程不变的常规策略 → 排除季节性干扰</text>

  <!-- Key insight callout -->
  <rect x="170" y="442" width="560" height="2" fill="#dc2626" opacity="0.3"/>

  <!-- Connecting arrow from panels to BAU -->
  <text x="450" y="454" text-anchor="middle" font-size="11" fill="#64748b">↕ 效果差对比</text>

</svg>