<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#c9184a"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4d6d" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff4d6d" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff758f"/>
      <stop offset="70%" stop-color="#ff4d6d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="thinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#4a00b0"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#028a5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d6d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#06d6a0" stroke-width="1.2"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ff758f" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="900" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="600" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#ffffff" font-weight="bold" letter-spacing="0.5">Heartbeat-Driven Autonomous Thinking</text>
  <text x="450" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff758f" letter-spacing="2" opacity="0.8">SIMULATING HUMAN COGNITION FOR LLM-BASED AI SYSTEMS</text>

  <!-- Center glow behind heartbeat -->
  <ellipse cx="450" cy="300" rx="200" ry="180" fill="url(#centerGlow)"/>

  <!-- ===== HEARTBEAT CENTER ===== -->
  <!-- Heart shape in center -->
  <g transform="translate(450, 270)" filter="url(#softGlow)">
    <path d="M0,-18 C-5,-30 -22,-30 -25,-15 C-28,0 0,20 0,25 C0,20 28,0 25,-15 C22,-30 5,-30 0,-18 Z" fill="url(#heartGrad)" opacity="0.9"/>
    <!-- Inner pulse ring -->
    <circle cx="0" cy="3" r="38" fill="none" stroke="#ff4d6d" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="38;48;38" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="3" r="55" fill="none" stroke="#ff4d6d" stroke-width="0.5" opacity="0.15">
      <animate attributeName="r" values="55;68;55" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="450" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">HEARTBEAT</text>
  <text x="450" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff758f" opacity="0.8">Periodic Clock Signal</text>

  <!-- Heartbeat ECG line across middle -->
  <g filter="url(#glow)">
    <polyline points="140,275 200,275 230,275 250,275 270,260 280,290 295,240 310,310 325,255 340,275 370,275 530,275 560,275 570,260 580,290 595,240 610,310 625,255 640,275 670,275 700,275 760,275" fill="none" stroke="url(#pulseGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== LEFT: Problem / Traditional LLM ===== -->
  <g transform="translate(110, 190)">
    <rect x="-75" y="-30" width="150" height="60" rx="10" fill="#1e1e3a" stroke="#555" stroke-width="1" opacity="0.85" filter="url(#shadow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Traditional LLM</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff758f">⚡ Passive / Reactive</text>
    <text x="0" y="-42" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#777">THE PROBLEM</text>
  </g>

  <!-- Arrow from problem to center -->
  <path d="M195,190 Q300,230 400,265" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowWhite)" opacity="0.4"/>

  <!-- ===== TOP: Thinking Activity Scheduler ===== -->
  <g transform="translate(450, 130)">
    <rect x="-110" y="-32" width="220" height="64" rx="14" fill="url(#thinkGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">Activity Scheduler</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4b8ff">Prioritize · Allocate · Dispatch</text>
    <!-- Tag -->
    <rect x="75" y="-38" width="52" height="18" rx="9" fill="#ff4d6d" opacity="0.8"/>
    <text x="101" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">CORE</text>
  </g>

  <!-- Arrow: Heartbeat → Scheduler (upward) -->
  <path d="M450,248 L450,162" fill="none" stroke="#ff758f" stroke-width="1.8" marker-end="url(#arrowPink)"/>
  <text x="465" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ff758f" opacity="0.7">tick</text>

  <!-- ===== LEFT-MIDDLE: Thinking Activities ===== -->
  <g transform="translate(190, 370)">
    <rect x="-85" y="-55" width="170" height="110" rx="12" fill="#1a1040" stroke="#7b2ff7" stroke-width="1.2" opacity="0.8" filter="url(#shadow)"/>
    <text x="0" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d4b8ff" font-weight="bold">Thinking Activities</text>
    <line x1="-60" y1="-24" x2="60" y2="-24" stroke="#7b2ff7" stroke-width="0.5" opacity="0.4"/>
    <!-- Activity list -->
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b0a0d0">🧠 Reflection</text>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b0a0d0">🔍 Self-evaluation</text>
    <text x="0" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b0a0d0">💡 Goal reassessment</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b0a0d0">📋 Memory consolidation</text>
  </g>

  <!-- Arrow: Scheduler → Thinking Activities -->
  <path d="M360,150 Q270,220 210,315" fill="none" stroke="#9b6dff" stroke-width="1.5" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>

  <!-- ===== RIGHT: LLM Backbone ===== -->
  <g transform="translate(710, 200)">
    <rect x="-80" y="-40" width="160" height="80" rx="14" fill="url(#llmGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">LLM Engine</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8e6f0">Reasoning · Generation</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8e6f0">Context Management</text>
  </g>

  <!-- Arrow: Scheduler → LLM -->
  <path d="M560,130 Q630,150 635,164" fill="none" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="595" y="138" font-family="Arial, sans-serif" font-size="8" fill="#00b4d8" opacity="0.8">dispatch</text>

  <!-- Arrow: LLM → Heartbeat feedback -->
  <path d="M680,245 Q620,285 510,280" fill="none" stroke="#ff758f" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowPink)" opacity="0.5"/>

  <!-- ===== BOTTOM-RIGHT: Autonomous Output ===== -->
  <g transform="translate(680, 420)">
    <rect x="-95" y="-40" width="190" height="80" rx="14" fill="url(#outputGrad)" opacity="0.8" filter="url(#shadow)"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">Autonomous Behavior</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8f5dc">Proactive thinking</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8f5dc">Self-initiated actions</text>
  </g>

  <!-- Arrow: LLM → Output -->
  <path d="M710,245 Q705,330 690,380" fill="none" stroke="#06d6a0" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- Arrow: Thinking → Output -->
  <path d="M275,400 Q450,460 585,420" fill="none" stroke="#06d6a0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)" opacity="0.6"/>

  <!-- ===== BOTTOM-CENTER: Feedback Loop ===== -->
  <!-- Curved arrow from output back to scheduler -->
  <path d="M620,465 Q450,530 340,480 Q250,440 250,360 Q250,280 370,155" fill="none" stroke="#ff758f" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrowPink)" opacity="0.35"/>
  <text x="310" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff758f" opacity="0.5">feedback loop</text>

  <!-- ===== KEY INSIGHT CALLOUT ===== -->
  <g transform="translate(130, 490)">
    <rect x="-90" y="-22" width="180" height="44" rx="22" fill="#0a0e27" stroke="#ff4d6d" stroke-width="1" opacity="0.9"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff758f" font-weight="bold">KEY INSIGHT</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ddd">Heartbeat → Autonomous thought</text>
  </g>

  <!-- ===== ANALOGY LABELS ===== -->
  <!-- Human brain analogy on the left -->
  <g transform="translate(70, 310)" opacity="0.6">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="30">🧠</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#aaa">Human</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#aaa">Cognition</text>
  </g>

  <!-- Robot/AI analogy on the right -->
  <g transform="translate(830, 310)" opacity="0.6">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="30">🤖</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#aaa">AI</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#aaa">System</text>
  </g>

  <!-- Bidirectional mapping arrow -->
  <path d="M95,300 L815,300" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-dasharray="2,6" opacity="0.15"/>

  <!-- ===== SMALL ANNOTATION: vs reactive ===== -->
  <g transform="translate(450, 560)">
    <text x="-160" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Reactive (wait for input)</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">→</text>
    <text x="160" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#06d6a0" font-weight="bold">Proactive (heartbeat-driven)</text>
  </g>

  <!-- Decorative corner accents -->
  <line x1="20" y1="20" x2="20" y2="50" stroke="#ff4d6d" stroke-width="1.5" opacity="0.3"/>
  <line x1="20" y1="20" x2="50" y2="20" stroke="#ff4d6d" stroke-width="1.5" opacity="0.3"/>
  <line x1="880" y1="580" x2="880" y2="550" stroke="#06d6a0" stroke-width="1.5" opacity="0.3"/>
  <line x1="880" y1="580" x2="850" y2="580" stroke="#06d6a0" stroke-width="1.5" opacity="0.3"/>
</svg>