<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <linearGradient id="humanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="fallacyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="900" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="600" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e2e8f0" font-weight="bold" letter-spacing="0.5">The LLM Fallacy</text>
  <text x="450" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="2">MISATTRIBUTION IN AI-ASSISTED COGNITIVE WORKFLOWS</text>
  <line x1="300" y1="75" x2="600" y2="75" stroke="#334155" stroke-width="1"/>

  <!-- ===== LEFT SIDE: Human Cognition ===== -->
  <!-- Human icon circle -->
  <circle cx="160" cy="230" r="52" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <circle cx="160" cy="230" r="48" fill="#1e293b" filter="shadow"/>
  <!-- Simple human head icon -->
  <circle cx="160" cy="215" r="14" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <path d="M142,248 Q142,232 160,232 Q178,232 178,248" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Brain waves -->
  <path d="M148,205 Q153,198 158,205" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.6"/>
  <path d="M162,203 Q167,196 172,203" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.6"/>
  
  <text x="160" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#93c5fd" font-weight="bold">Human</text>
  <text x="160" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Cognition</text>

  <!-- Human attributes -->
  <g transform="translate(55, 340)">
    <rect x="0" y="0" rx="12" ry="12" width="90" height="26" fill="#1e3a5f" opacity="0.7"/>
    <text x="45" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">Reasoning</text>
  </g>
  <g transform="translate(155, 340)">
    <rect x="0" y="0" rx="12" ry="12" width="90" height="26" fill="#1e3a5f" opacity="0.7"/>
    <text x="45" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">Judgment</text>
  </g>
  <g transform="translate(105, 375)">
    <rect x="0" y="0" rx="12" ry="12" width="100" height="26" fill="#1e3a5f" opacity="0.7"/>
    <text x="50" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">Intent &amp; Goals</text>
  </g>

  <!-- ===== RIGHT SIDE: LLM ===== -->
  <circle cx="740" cy="230" r="52" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  <circle cx="740" cy="230" r="48" fill="#1e293b" filter="shadow"/>
  <!-- Neural net icon -->
  <circle cx="725" cy="218" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="740" cy="210" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="755" cy="218" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="730" cy="235" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="750" cy="235" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="740" cy="250" r="4" fill="#a78bfa" opacity="0.8"/>
  <line x1="725" y1="218" x2="730" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="725" y1="218" x2="750" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="740" y1="210" x2="730" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="740" y1="210" x2="750" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="755" y1="218" x2="730" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="755" y1="218" x2="750" y2="235" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="730" y1="235" x2="740" y2="250" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="750" y1="235" x2="740" y2="250" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <text x="740" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#c4b5fd" font-weight="bold">LLM</text>
  <text x="740" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Generation</text>

  <!-- LLM attributes -->
  <g transform="translate(645, 340)">
    <rect x="0" y="0" rx="12" ry="12" width="85" height="26" fill="#2e1f5e" opacity="0.7"/>
    <text x="42" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c4b5fd">Fluency</text>
  </g>
  <g transform="translate(740, 340)">
    <rect x="0" y="0" rx="12" ry="12" width="100" height="26" fill="#2e1f5e" opacity="0.7"/>
    <text x="50" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c4b5fd">Pattern Match</text>
  </g>
  <g transform="translate(680, 375)">
    <rect x="0" y="0" rx="12" ry="12" width="110" height="26" fill="#2e1f5e" opacity="0.7"/>
    <text x="55" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c4b5fd">Statistical Output</text>
  </g>

  <!-- ===== Interaction arrows (curved) ===== -->
  <!-- Human → center -->
  <path d="M215,220 Q310,180 370,215" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <text x="285" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa" opacity="0.8">prompt</text>

  <!-- LLM → center -->
  <path d="M685,220 Q590,180 530,215" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <text x="615" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" opacity="0.8">response</text>

  <!-- ===== CENTER: The Cognitive Output (blended zone) ===== -->
  <ellipse cx="450" cy="240" rx="75" ry="55" fill="#1a1a2e" stroke="#475569" stroke-width="1.5" opacity="0.9" filter="shadow"/>
  <!-- Blended color indicator -->
  <ellipse cx="430" cy="240" rx="20" ry="30" fill="#3b82f6" opacity="0.08"/>
  <ellipse cx="470" cy="240" rx="20" ry="30" fill="#8b5cf6" opacity="0.08"/>
  
  <text x="450" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">Cognitive</text>
  <text x="450" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold">Output</text>
  <text x="450" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">(blended artifact)</text>

  <!-- ===== THE FALLACY: Central tension zone ===== -->
  <!-- Big downward arrow from output to fallacy -->
  <path d="M450,298 L450,345" fill="none" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrowRed)" filter="glow"/>

  <!-- Question mark scatter -->
  <text x="420" y="330" font-family="Georgia, serif" font-size="14" fill="#f87171" opacity="0.4">?</text>
  <text x="475" y="325" font-family="Georgia, serif" font-size="11" fill="#f87171" opacity="0.3">?</text>

  <!-- Central Fallacy diamond/badge -->
  <g filter="strongGlow">
    <path d="M450,355 L530,400 L450,445 L370,400 Z" fill="#1a0a0a" stroke="url(#fallacyGrad)" stroke-width="2.5"/>
  </g>
  <text x="450" y="393" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#fbbf24" font-weight="bold">MISATTRIBUTION</text>
  <text x="450" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f87171">Who really produced this?</text>

  <!-- Fallacy branching: two misattribution paths -->
  <!-- Left: over-credit to LLM -->
  <path d="M385,415 Q310,450 280,480" fill="none" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.7"/>
  <g transform="translate(185, 475)">
    <rect x="0" y="0" rx="8" ry="8" width="185" height="52" fill="#1c1017" stroke="#ef4444" stroke-width="1.2" opacity="0.85"/>
    <text x="92" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5" font-weight="bold">Over-credit to LLM</text>
    <text x="92" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">"The AI figured it out"</text>
  </g>

  <!-- Right: over-credit to Human -->
  <path d="M515,415 Q590,450 620,480" fill="none" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.7"/>
  <g transform="translate(530, 475)">
    <rect x="0" y="0" rx="8" ry="8" width="185" height="52" fill="#1c1017" stroke="#ef4444" stroke-width="1.2" opacity="0.85"/>
    <text x="92" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5" font-weight="bold">Over-credit to Human</text>
    <text x="92" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">"I came up with this myself"</text>
  </g>

  <!-- Center bottom: consequence -->
  <path d="M450,445 L450,478" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.6"/>
  <g transform="translate(378, 483)">
    <rect x="0" y="0" rx="16" ry="16" width="144" height="34" fill="#0a2620" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
    <text x="72" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7">Need: Clear</text>
    <text x="72" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34d399" font-weight="bold">Attribution Framework</text>
  </g>

  <!-- ===== Top labels for the tension ===== -->
  <!-- Contribution spectrum bar -->
  <g transform="translate(250, 105)">
    <rect x="0" y="0" rx="4" ry="4" width="400" height="8" fill="#1e293b"/>
    <rect x="0" y="0" rx="4" ry="4" width="160" height="8" fill="#3b82f6" opacity="0.5"/>
    <rect x="160" y="0" rx="0" ry="0" width="80" height="8" fill="#6d28d9" opacity="0.3"/>
    <rect x="240" y="0" rx="4" ry="4" width="160" height="8" fill="#8b5cf6" opacity="0.5"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">Human Contribution</text>
    <text x="400" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">LLM Contribution</text>
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24">← Blurry Boundary →</text>
  </g>

  <!-- Decorative corner accent -->
  <path d="M0,0 L60,0 L0,60 Z" fill="#3b82f6" opacity="0.04"/>
  <path d="M900,600 L840,600 L900,540 Z" fill="#8b5cf6" opacity="0.04"/>

  <!-- Bottom attribution line -->
  <line x1="200" y1="568" x2="700" y2="568" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">The LLM Fallacy — When collaborative cognition breaks clean attribution</text>
</svg>