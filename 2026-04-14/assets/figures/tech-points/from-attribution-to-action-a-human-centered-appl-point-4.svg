<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">激活引导的风险：涟漪效应与实例级局限</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#7f8c8d">Activation Steering — Ripple Effect &amp; Instance-Level Limitation</text>

  <!-- ====== LEFT: Ripple Effect ====== -->
  <text x="230" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#c0392b">⚠ 涟漪效应</text>

  <!-- Central block: "Female" component -->
  <rect x="170" y="125" width="120" height="50" rx="10" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="230" y="150" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">关闭 "女性"</text>
  <text x="230" y="166" text-anchor="middle" font-size="11" fill="#fde8e8">组件</text>
  <!-- X mark -->
  <line x1="275" y1="135" x2="283" y2="143" stroke="#fff" stroke-width="2.5"/>
  <line x1="283" y1="135" x2="275" y2="143" stroke="#fff" stroke-width="2.5"/>

  <!-- Target: Nurse fixed (green) -->
  <rect x="60" y="210" width="110" height="70" rx="12" fill="#27ae60" filter="url(#shadow)"/>
  <text x="115" y="238" text-anchor="middle" font-size="28">👩‍⚕️</text>
  <text x="115" y="265" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">护士预测 ✓ 修复</text>
  <line x1="200" y1="175" x2="145" y2="210" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <!-- Collateral: Dress broken -->
  <rect x="200" y="300" width="110" height="70" rx="12" fill="#e67e22" filter="url(#shadow)" opacity="0.9"/>
  <text x="255" y="328" text-anchor="middle" font-size="28">👗</text>
  <text x="255" y="355" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">裙子分类 ✗ 偏差</text>
  <line x1="230" y1="175" x2="250" y2="300" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>

  <!-- Collateral: Cosmetics broken -->
  <rect x="340" y="210" width="110" height="70" rx="12" fill="#e67e22" filter="url(#shadow)" opacity="0.9"/>
  <text x="395" y="238" text-anchor="middle" font-size="28">💄</text>
  <text x="395" y="265" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">化妆品 ✗ 偏差</text>
  <line x1="270" y1="175" x2="370" y2="210" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>

  <!-- Label -->
  <text x="330" y="320" font-size="11" fill="#c0392b" font-style="italic">组件非正交 → 连带影响</text>

  <!-- ====== Divider ====== -->
  <line x1="490" y1="90" x2="490" y2="560" stroke="#dce1e6" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- ====== RIGHT: Instance vs Global ====== -->
  <text x="695" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#2980b9">⚠ 实例 ≠ 全局</text>

  <!-- Single image fix -->
  <rect x="545" y="130" width="130" height="120" rx="14" fill="#2ecc71" filter="url(#shadow)" opacity="0.85"/>
  <text x="610" y="165" text-anchor="middle" font-size="40">🖼️</text>
  <text x="610" y="200" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">单张图修复</text>
  <text x="610" y="218" text-anchor="middle" font-size="22" fill="#fff">✓</text>
  <text x="610" y="242" text-anchor="middle" font-size="11" fill="#e8f8f0">实例级有效</text>

  <!-- Arrow with ≠ -->
  <line x1="685" y1="190" x2="730" y2="190" stroke="#7f8c8d" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="708" y="182" text-anchor="middle" font-size="20" fill="#e74c3c" font-weight="bold">≠</text>

  <!-- Test set -->
  <rect x="740" y="130" width="130" height="120" rx="14" fill="#e74c3c" filter="url(#shadow)" opacity="0.85"/>
  <text x="805" y="160" text-anchor="middle" font-size="15">🖼️🖼️🖼️</text>
  <text x="805" y="182" text-anchor="middle" font-size="15">🖼️🖼️🖼️</text>
  <text x="805" y="206" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">测试集泛化</text>
  <text x="805" y="224" text-anchor="middle" font-size="22" fill="#fff">✗</text>
  <text x="805" y="242" text-anchor="middle" font-size="11" fill="#fde8e8">不保证有效</text>

  <!-- ====== BOTTOM: Balance / Verdict ====== -->
  <!-- Scale icon area -->
  <rect x="530" y="310" width="340" height="120" rx="16" fill="#fff" stroke="#bdc3c8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Balance visual -->
  <!-- Fulcrum -->
  <polygon points="700,415 688,395 712,395" fill="#7f8c8d"/>
  <line x1="640" y1="380" x2="760" y2="395" stroke="#34495e" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan (benefit) - higher -->
  <rect x="618" y="362" width="46" height="22" rx="6" fill="#27ae60"/>
  <text x="641" y="378" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">局部收益</text>
  <!-- Right pan (cost) - lower -->
  <rect x="738" y="380" width="46" height="22" rx="6" fill="#e74c3c"/>
  <text x="761" y="396" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">全局损失</text>

  <text x="700" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">专家建议：需要全局评分</text>
  <text x="700" y="358" text-anchor="middle" font-size="11" fill="#7f8c8d">"局部修复收益是否值得全局性能损失？"</text>

  <!-- ====== BOTTOM CONCLUSION ====== -->
  <rect x="100" y="470" width="700" height="80" rx="16" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="450" y="502" text-anchor="middle" font-size="16" fill="#ecf0f1" font-weight="bold">💡 结论：激活引导更适合作为诊断工具，而非直接修复方案</text>
  <text x="450" y="528" text-anchor="middle" font-size="12" fill="#95a5a6">引导方向必须跨数据集泛化验证（专家 P1 最强标准）</text>

  <!-- Stats badges -->
  <rect x="60" y="400" width="80" height="30" rx="8" fill="#8e44ad" opacity="0.85"/>
  <text x="100" y="420" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">3/8 涟漪</text>

  <rect x="155" y="400" width="105" height="30" rx="8" fill="#8e44ad" opacity="0.85"/>
  <text x="207" y="420" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">3/8 实例局限</text>

  <rect x="275" y="400" width="105" height="30" rx="8" fill="#8e44ad" opacity="0.85"/>
  <text x="327" y="420" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">2/8 过度引导</text>
</svg>