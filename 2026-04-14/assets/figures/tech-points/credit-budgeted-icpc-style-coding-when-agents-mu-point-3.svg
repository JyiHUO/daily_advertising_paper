<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2e7d32">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#c62828">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#212121">首步效应：同一Agent，不同命运</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#757575">First-Move Effect &amp; Path Dependence</text>

  <!-- Center: Same Agent -->
  <rect x="355" y="90" width="190" height="60" rx="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">同一 Gemini-2.5-pro</text>
  <text x="450" y="136" text-anchor="middle" font-size="11" fill="#1565c0">相同环境 · 相同预算</text>

  <!-- Fork arrows -->
  <line x1="390" y1="150" x2="220" y2="200" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="510" y1="150" x2="680" y2="200" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <text x="280" y="178" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">选到简单题 ✓</text>
  <text x="620" y="178" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">选到难题 ✗</text>

  <!-- SUCCESS PATH (Left) -->
  <rect x="50" y="200" width="340" height="320" rx="16" fill="url(#successGrad)" stroke="#43a047" stroke-width="2"/>
  <text x="220" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">🎯 成功循环</text>

  <!-- Step 1: Easy solve -->
  <rect x="80" y="245" width="130" height="50" rx="10" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="145" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Bronze 题</text>
  <text x="145" y="283" text-anchor="middle" font-size="11" fill="#555">3步解决 ✓</text>

  <!-- Arrow -->
  <line x1="210" y1="270" x2="240" y2="270" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: Confidence -->
  <rect x="248" y="245" width="120" height="50" rx="10" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="308" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">信心 ↑</text>
  <text x="308" y="283" text-anchor="middle" font-size="11" fill="#555">预算充足</text>

  <!-- Snowball -->
  <path d="M220 310 Q220 330 180 340 Q140 350 160 370 Q180 390 220 380 Q260 370 280 390 Q300 410 260 430 Q220 450 280 460 Q340 470 340 440" stroke="#2e7d32" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  
  <!-- Snowball stages -->
  <circle cx="145" cy="340" r="14" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="145" y="344" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">S1</text>
  
  <circle cx="200" cy="385" r="20" fill="#81c784" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="200" y="389" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">S2</text>

  <circle cx="280" cy="430" r="28" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="280" y="434" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Gold</text>

  <text x="120" y="370" font-size="10" fill="#2e7d32">Silver</text>
  <text x="140" y="420" font-size="10" fill="#2e7d32">Silver</text>

  <!-- Result -->
  <rect x="100" y="475" width="200" height="35" rx="8" fill="#2e7d32"/>
  <text x="200" y="498" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">🏆 得分：17</text>

  <!-- FAIL PATH (Right) -->
  <rect x="510" y="200" width="340" height="320" rx="16" fill="url(#failGrad)" stroke="#e53935" stroke-width="2"/>
  <text x="680" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">😰 恐慌循环</text>

  <!-- Step 1: Hard fail -->
  <rect x="540" y="245" width="130" height="50" rx="10" fill="#fff" stroke="#ef5350" stroke-width="1.5"/>
  <text x="605" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Silver 难题</text>
  <text x="605" y="283" text-anchor="middle" font-size="11" fill="#555">反复失败 ✗</text>

  <!-- Arrow -->
  <line x1="670" y1="270" x2="700" y2="270" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 2: Panic -->
  <rect x="708" y="245" width="120" height="50" rx="10" fill="#fff" stroke="#ef5350" stroke-width="1.5"/>
  <text x="768" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">预算急降 ↓</text>
  <text x="768" y="283" text-anchor="middle" font-size="11" fill="#555">信心崩塌</text>

  <!-- Drain visualization -->
  <!-- Budget bar draining -->
  <rect x="560" y="315" width="200" height="18" rx="9" fill="#eee" stroke="#bbb" stroke-width="1"/>
  <rect x="560" y="315" width="200" height="18" rx="9" fill="#ef9a9a"/>
  <text x="660" y="328" text-anchor="middle" font-size="9" fill="#b71c1c" font-weight="bold">信用 100%</text>

  <rect x="560" y="345" width="200" height="18" rx="9" fill="#eee" stroke="#bbb" stroke-width="1"/>
  <rect x="560" y="345" width="90" height="18" rx="9" fill="#ef5350"/>
  <text x="660" y="358" text-anchor="middle" font-size="9" fill="#b71c1c" font-weight="bold">信用 45% — 频繁切题</text>

  <rect x="560" y="375" width="200" height="18" rx="9" fill="#eee" stroke="#bbb" stroke-width="1"/>
  <rect x="560" y="375" width="30" height="18" rx="9" fill="#c62828"/>
  <text x="660" y="388" text-anchor="middle" font-size="9" fill="#b71c1c" font-weight="bold">信用 15% — 被迫保守</text>

  <!-- Zigzag path showing unfocused switching -->
  <polyline points="570,420 620,435 580,450 650,460 590,475" stroke="#c62828" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="660" y="440" font-size="10" fill="#c62828">Silver↔Gold 反复切换</text>
  <text x="660" y="458" font-size="10" fill="#c62828">无法专注</text>

  <!-- Result -->
  <rect x="560" y="475" width="200" height="35" rx="8" fill="#c62828"/>
  <text x="660" y="498" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">💀 得分：12</text>

  <!-- Bottom insight -->
  <rect x="150" y="545" width="600" height="42" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="450" y="565" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">💡 核心发现：当前Agent缺乏元认知 — 不知何时放弃、何时切换</text>
  <text x="450" y="580" text-anchor="middle" font-size="11" fill="#bf360c">第一步的随机选择决定整条路径，表现差距可达 40%+</text>

  <!-- VS symbol -->
  <circle cx="450" cy="370" r="22" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="450" y="377" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">VS</text>
</svg>