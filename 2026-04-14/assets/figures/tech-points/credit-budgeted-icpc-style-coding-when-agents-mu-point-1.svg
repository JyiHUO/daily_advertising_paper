<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="budgetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="timeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B894"/>
      <stop offset="100%" stop-color="#55efc4"/>
    </linearGradient>
    <linearGradient id="penaltyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E17055"/>
      <stop offset="100%" stop-color="#fab1a0"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF8C00"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#636e72"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#2d3436">统一信用经济模型</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#636e72">三类成本 → 一个信用池，预算花完即终止</text>

  <!-- ========== Three Cost Sources (Top Row) ========== -->

  <!-- 1. Token/Action Cost -->
  <rect x="60" y="100" width="220" height="150" rx="16" fill="url(#tokenGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="170" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">🤖 动作成本</text>
  <text x="170" y="168" text-anchor="middle" font-size="13" fill="#ffffffcc">LLM 推理 token 费用</text>
  <text x="170" y="190" text-anchor="middle" font-size="13" fill="#ffffffcc">+ 提示 / 本地测试费用</text>
  <rect x="110" y="208" width="120" height="28" rx="8" fill="#ffffffaa"/>
  <text x="170" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C5CE7">每次调用扣信用</text>

  <!-- 2. Time Cost -->
  <rect x="340" y="100" width="220" height="150" rx="16" fill="url(#timeGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="450" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">⏱ 时间成本</text>
  <text x="450" y="168" text-anchor="middle" font-size="13" fill="#ffffffcc">墙钟时间 T × 系数 α</text>
  <text x="450" y="190" text-anchor="middle" font-size="13" fill="#ffffffcc">转换为等价信用</text>
  <rect x="390" y="208" width="120" height="28" rx="8" fill="#ffffffaa"/>
  <text x="450" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#00B894">每秒都在烧钱</text>

  <!-- 3. Penalty Cost -->
  <rect x="620" y="100" width="220" height="150" rx="16" fill="url(#penaltyGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="730" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">❌ 惩罚成本</text>
  <text x="730" y="168" text-anchor="middle" font-size="13" fill="#ffffffcc">错误提交</text>
  <text x="730" y="190" text-anchor="middle" font-size="13" fill="#ffffffcc">额外扣除信用</text>
  <rect x="670" y="208" width="120" height="28" rx="8" fill="#ffffffaa"/>
  <text x="730" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#E17055">提交错误罚款</text>

  <!-- Arrows from three sources to Credit Pool -->
  <line x1="170" y1="250" x2="370" y2="330" stroke="#6C5CE7" stroke-width="3" marker-end="url(#arrowOrange)" stroke-dasharray="8,4"/>
  <line x1="450" y1="250" x2="450" y2="330" stroke="#00B894" stroke-width="3" marker-end="url(#arrowOrange)" stroke-dasharray="8,4"/>
  <line x1="730" y1="250" x2="530" y2="330" stroke="#E17055" stroke-width="3" marker-end="url(#arrowOrange)" stroke-dasharray="8,4"/>

  <!-- ========== Central Credit Pool (Wallet) ========== -->
  <rect x="270" y="330" width="360" height="100" rx="20" fill="url(#budgetGrad)" filter="url(#shadow)"/>
  <text x="450" y="370" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff">💰 统一信用池</text>
  <text x="450" y="398" text-anchor="middle" font-size="15" fill="#ffffffdd">总预算上限 (如 20M 信用)</text>
  <text x="450" y="418" text-anchor="middle" font-size="12" fill="#ffffffaa">动作 + 时间 ≥ 预算 → 终止</text>

  <!-- ========== Bottom: Comparison (Two Agents) ========== -->

  <!-- Agent A -->
  <rect x="55" y="480" width="370" height="120" rx="14" fill="#fff" stroke="#00B894" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="95" cy="520" r="22" fill="#00B894" opacity="0.15"/>
  <text x="95" y="526" text-anchor="middle" font-size="20">🏆</text>
  <text x="240" y="510" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3436">Agent A — 省钱策略</text>
  <text x="240" y="534" text-anchor="middle" font-size="12" fill="#636e72">Token 5M + 时间 5M + 罚分 1M = <tspan font-weight="bold" fill="#00B894">11M</tspan></text>
  <text x="240" y="556" text-anchor="middle" font-size="12" fill="#636e72">2 题 · 10 分</text>
  <rect x="140" y="568" width="200" height="24" rx="8" fill="#00B894" opacity="0.12"/>
  <text x="240" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#00B894">✅ 同分时花得少 → 排名更高</text>

  <!-- Agent B -->
  <rect x="475" y="480" width="370" height="120" rx="14" fill="#fff" stroke="#E17055" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="515" cy="520" r="22" fill="#E17055" opacity="0.15"/>
  <text x="515" y="526" text-anchor="middle" font-size="20">😓</text>
  <text x="660" y="510" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3436">Agent B — 暴力策略</text>
  <text x="660" y="534" text-anchor="middle" font-size="12" fill="#636e72">Token 15M + 时间 2.5M + 罚分 0 = <tspan font-weight="bold" fill="#E17055">17.5M</tspan></text>
  <text x="660" y="556" text-anchor="middle" font-size="12" fill="#636e72">2 题 · 10 分</text>
  <rect x="560" y="568" width="200" height="24" rx="8" fill="#E17055" opacity="0.12"/>
  <text x="660" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#E17055">⚠ 同分但消耗多 → 排名更低</text>

  <!-- VS divider -->
  <circle cx="450" cy="540" r="20" fill="#2d3436"/>
  <text x="450" y="546" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFD700">VS</text>

  <!-- Arrow from pool to comparison -->
  <line x1="450" y1="430" x2="450" y2="470" stroke="#FF8C00" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="530" y="458" font-size="11" fill="#636e72">平局用总消耗排名</text>

</svg>