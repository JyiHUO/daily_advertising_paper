<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="budgetFull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
    <linearGradient id="budgetLow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="40%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <linearGradient id="budgetMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">多Agent协调的"成本税"</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#666">盲目加人 ≠ 更好结果 —— 协调沟通本身吞噬预算</text>

  <!-- ========== Strategy 1: Speed-First ========== -->
  <g transform="translate(30, 95)" filter="url(#shadow)">
    <rect width="260" height="430" rx="14" fill="white" stroke="#f44336" stroke-width="2.5"/>
    <!-- Header -->
    <rect width="260" height="50" rx="14" fill="#f44336"/>
    <rect y="36" width="260" height="14" fill="#f44336"/>
    <text x="130" y="33" text-anchor="middle" font-size="16" font-weight="bold" fill="white">🏎️ 速度优先型</text>

    <!-- Workers illustration -->
    <text x="130" y="78" text-anchor="middle" font-size="12" fill="#888">大量并行 Worker</text>
    <g transform="translate(30, 90)">
      <rect x="0" y="0" width="38" height="32" rx="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5"/>
      <text x="19" y="21" text-anchor="middle" font-size="11" fill="#c62828">W1</text>
      <rect x="46" y="0" width="38" height="32" rx="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5"/>
      <text x="65" y="21" text-anchor="middle" font-size="11" fill="#c62828">W2</text>
      <rect x="92" y="0" width="38" height="32" rx="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5"/>
      <text x="111" y="21" text-anchor="middle" font-size="11" fill="#c62828">W3</text>
      <rect x="138" y="0" width="38" height="32" rx="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5"/>
      <text x="157" y="21" text-anchor="middle" font-size="11" fill="#c62828">W4</text>
      <!-- More workers dots -->
      <text x="192" y="21" font-size="16" fill="#c62828">…</text>
    </g>

    <!-- Communication overhead arrows -->
    <g transform="translate(30, 135)">
      <line x1="19" y1="0" x2="65" y2="0" stroke="#FF6F00" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="65" y1="0" x2="111" y2="0" stroke="#FF6F00" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="111" y1="0" x2="157" y2="0" stroke="#FF6F00" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="19" y1="0" x2="111" y2="12" stroke="#FF6F00" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="65" y1="0" x2="157" y2="12" stroke="#FF6F00" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="19" y1="0" x2="157" y2="12" stroke="#FF6F00" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="100" y="28" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF6F00">⚡ 通信开销爆炸</text>
    </g>

    <!-- Token bar -->
    <text x="20" y="192" font-size="11" fill="#555">Token消耗</text>
    <rect x="20" y="198" width="220" height="22" rx="6" fill="#eee"/>
    <rect x="20" y="198" width="220" height="22" rx="6" fill="url(#budgetLow)"/>
    <text x="130" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="white">35M tokens (超限!)</text>

    <!-- Token breakdown -->
    <g transform="translate(20, 232)">
      <rect width="70" height="80" rx="4" fill="#FFCCBC"/>
      <text x="35" y="38" text-anchor="middle" font-size="10" fill="#BF360C">解题</text>
      <text x="35" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#BF360C">30%</text>
      <rect x="78" width="142" height="80" rx="4" fill="#FF8A65" opacity="0.85"/>
      <text x="149" y="30" text-anchor="middle" font-size="10" fill="white">协调沟通</text>
      <text x="149" y="52" text-anchor="middle" font-size="18" font-weight="bold" fill="white">70%</text>
      <text x="149" y="68" text-anchor="middle" font-size="10" fill="white">← 协调税!</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 330)">
      <text x="0" y="0" font-size="12" fill="#555">⏱ 50分钟</text>
      <text x="0" y="22" font-size="12" fill="#555">💰 预算耗尽</text>
      <rect x="120" y="-22" width="100" height="50" rx="10" fill="#FFCDD2" stroke="#f44336" stroke-width="2"/>
      <text x="170" y="2" text-anchor="middle" font-size="28" font-weight="bold" fill="#c62828">3分</text>
      <text x="170" y="20" text-anchor="middle" font-size="10" fill="#c62828">预算超限</text>
    </g>
  </g>

  <!-- ========== Strategy 2: Cost-Aware (HERO) ========== -->
  <g transform="translate(320, 95)" filter="url(#shadow)">
    <rect width="260" height="430" rx="14" fill="white" stroke="#2196F3" stroke-width="3"/>
    <!-- Highlight border -->
    <rect x="-4" y="-4" width="268" height="438" rx="16" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="0" opacity="0.3"/>
    <!-- Header -->
    <rect width="260" height="50" rx="14" fill="#1976D2"/>
    <rect y="36" width="260" height="14" fill="#1976D2"/>
    <text x="130" y="33" text-anchor="middle" font-size="16" font-weight="bold" fill="white">🧠 成本感知型 ★</text>

    <!-- Phase 1 -->
    <text x="130" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">阶段1: 并行筛选易题</text>
    <g transform="translate(50, 88)">
      <rect x="0" y="0" width="38" height="28" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
      <text x="19" y="19" text-anchor="middle" font-size="10" fill="#0D47A1">W1</text>
      <rect x="46" y="0" width="38" height="28" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
      <text x="65" y="19" text-anchor="middle" font-size="10" fill="#0D47A1">W2</text>
      <rect x="92" y="0" width="38" height="28" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
      <text x="111" y="19" text-anchor="middle" font-size="10" fill="#0D47A1">W3</text>
    </g>

    <!-- Arrow down with feedback -->
    <line x1="130" y1="125" x2="130" y2="155" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="190" y="143" font-size="10" fill="#FF6F00" font-weight="bold">📊 预算紧张!</text>

    <!-- Phase 2 -->
    <text x="130" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">阶段2: 切换串行深攻</text>
    <g transform="translate(85, 182)">
      <rect x="0" y="0" width="90" height="28" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
      <text x="45" y="19" text-anchor="middle" font-size="10" fill="#0D47A1">W1 (顺序)</text>
    </g>

    <!-- Token bar -->
    <text x="20" y="232" font-size="11" fill="#555">Token消耗</text>
    <rect x="20" y="238" width="220" height="22" rx="6" fill="#eee"/>
    <rect x="20" y="238" width="130" height="22" rx="6" fill="url(#budgetMid)"/>
    <text x="85" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="white">适中</text>
    <text x="195" y="254" text-anchor="middle" font-size="10" fill="#999">余量</text>

    <!-- Token breakdown -->
    <g transform="translate(20, 272)">
      <rect width="110" height="80" rx="4" fill="#BBDEFB"/>
      <text x="55" y="38" text-anchor="middle" font-size="10" fill="#0D47A1">解题</text>
      <text x="55" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">70%</text>
      <rect x="118" width="50" height="80" rx="4" fill="#90CAF9" opacity="0.7"/>
      <text x="143" y="38" text-anchor="middle" font-size="10" fill="#0D47A1">协调</text>
      <text x="143" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">30%</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 370)">
      <text x="0" y="0" font-size="12" fill="#555">⏱ 合理时间</text>
      <text x="0" y="22" font-size="12" fill="#555">💰 预算安全</text>
      <rect x="120" y="-22" width="100" height="50" rx="10" fill="#BBDEFB" stroke="#1976D2" stroke-width="2"/>
      <text x="170" y="2" text-anchor="middle" font-size="28" font-weight="bold" fill="#0D47A1">8分</text>
      <text x="170" y="20" text-anchor="middle" font-size="10" fill="#1565C0">最优!</text>
    </g>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1976D2"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- ========== Strategy 3: Frugal ========== -->
  <g transform="translate(610, 95)" filter="url(#shadow)">
    <rect width="260" height="430" rx="14" fill="white" stroke="#9E9E9E" stroke-width="2"/>
    <!-- Header -->
    <rect width="260" height="50" rx="14" fill="#757575"/>
    <rect y="36" width="260" height="14" fill="#757575"/>
    <text x="130" y="33" text-anchor="middle" font-size="16" font-weight="bold" fill="white">🐢 节俭型</text>

    <!-- Single worker -->
    <text x="130" y="78" text-anchor="middle" font-size="12" fill="#888">单Worker顺序执行</text>
    <g transform="translate(95, 88)">
      <rect x="0" y="0" width="70" height="32" rx="6" fill="#E0E0E0" stroke="#757575" stroke-width="1.5"/>
      <text x="35" y="21" text-anchor="middle" font-size="11" fill="#424242">W1</text>
    </g>

    <!-- Slow progress dots -->
    <g transform="translate(50, 135)">
      <circle cx="20" cy="10" r="5" fill="#BDBDBD"/>
      <circle cx="50" cy="10" r="5" fill="#BDBDBD"/>
      <circle cx="80" cy="10" r="5" fill="#BDBDBD"/>
      <circle cx="110" cy="10" r="5" fill="#E0E0E0"/>
      <circle cx="140" cy="10" r="5" fill="#E0E0E0"/>
      <text x="80" y="35" text-anchor="middle" font-size="11" fill="#999">逐题慢慢做…</text>
    </g>

    <!-- Token bar -->
    <text x="20" y="192" font-size="11" fill="#555">Token消耗</text>
    <rect x="20" y="198" width="220" height="22" rx="6" fill="#eee"/>
    <rect x="20" y="198" width="60" height="22" rx="6" fill="url(#budgetFull)"/>
    <text x="50" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="white">低</text>
    <text x="170" y="214" text-anchor="middle" font-size="10" fill="#aaa">大量剩余</text>

    <!-- Token breakdown -->
    <g transform="translate(20, 232)">
      <rect width="80" height="80" rx="4" fill="#C8E6C9"/>
      <text x="40" y="38" text-anchor="middle" font-size="10" fill="#2E7D32">解题</text>
      <text x="40" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">90%</text>
      <rect x="88" width="14" height="80" rx="4" fill="#A5D6A7" opacity="0.6"/>
      <text x="125" y="45" font-size="10" fill="#999">几乎无协调</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 330)">
      <text x="0" y="0" font-size="12" fill="#555">⏱ 300分钟!</text>
      <text x="0" y="22" font-size="12" fill="#e65100" font-weight="bold">❌ 不切实际</text>
      <rect x="120" y="-22" width="100" height="50" rx="10" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <text x="170" y="2" text-anchor="middle" font-size="28" font-weight="bold" fill="#616161">8分</text>
      <text x="170" y="20" text-anchor="middle" font-size="10" fill="#999">但太慢</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(0, 548)">
    <rect x="80" y="0" width="740" height="55" rx="12" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
    <text x="450" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">
      💡 核心洞察：协调沟通 = 隐形"税收"，盲目加Agent反而浪费预算
    </text>
    <text x="450" y="44" text-anchor="middle" font-size="12" fill="#BF360C">
      最优策略：根据剩余预算动态切换并行↔串行，像精明的项目经理一样分配资源
    </text>
  </g>

  <!-- VS labels -->
  <text x="305" y="330" text-anchor="middle" font-size="18" font-weight="bold" fill="#ccc">VS</text>
  <text x="595" y="330" text-anchor="middle" font-size="18" font-weight="bold" fill="#ccc">VS</text>
</svg>