<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="barLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="barMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#54d9a8"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="barHigh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5bc0de"/>
      <stop offset="100%" stop-color="#2c82a8"/>
    </linearGradient>
    <linearGradient id="barWeak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#95a5a6"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">能力饱和而非预算受限</text>
  <text x="450" y="68" text-anchor="middle" fill="#8899aa" font-size="13">Capability Saturation — More budget ≠ better performance</text>

  <!-- ===== LEFT: Bar Chart ===== -->
  <text x="250" y="105" text-anchor="middle" fill="#ddeeff" font-size="16" font-weight="bold">Gemini-2.5-pro 得分 vs 预算</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="420" y2="380" stroke="#556677" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="100" y2="380" stroke="#556677" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="90" y="380" text-anchor="end" fill="#8899aa" font-size="12">0</text>
  <text x="90" y="300" text-anchor="end" fill="#8899aa" font-size="12">5</text>
  <text x="90" y="220" text-anchor="end" fill="#8899aa" font-size="12">10</text>
  <text x="90" y="140" text-anchor="end" fill="#8899aa" font-size="12">15</text>

  <!-- Grid lines -->
  <line x1="100" y1="300" x2="420" y2="300" stroke="#334455" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="220" x2="420" y2="220" stroke="#334455" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="140" x2="420" y2="140" stroke="#334455" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Bar 1: 10M → 8.3 -->
  <rect x="135" y="247" width="60" height="133" rx="5" fill="url(#barLow)" opacity="0.9"/>
  <text x="165" y="240" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="bold">8.3</text>
  <text x="165" y="400" text-anchor="middle" fill="#aabbcc" font-size="13">10M</text>

  <!-- Bar 2: 20M → 13.2 -->
  <rect x="225" y="168" width="60" height="212" rx="5" fill="url(#barMid)" opacity="0.9"/>
  <text x="255" y="160" text-anchor="middle" fill="#54d9a8" font-size="18" font-weight="bold">13.2</text>
  <text x="255" y="400" text-anchor="middle" fill="#aabbcc" font-size="13">20M</text>

  <!-- Bar 3: 40M → 13.0 -->
  <rect x="315" y="171" width="60" height="209" rx="5" fill="url(#barHigh)" opacity="0.9"/>
  <text x="345" y="163" text-anchor="middle" fill="#5bc0de" font-size="18" font-weight="bold">~13.0</text>
  <text x="345" y="400" text-anchor="middle" fill="#aabbcc" font-size="13">40M</text>

  <!-- X axis label -->
  <text x="250" y="425" text-anchor="middle" fill="#8899aa" font-size="12">信用预算 (Credits)</text>

  <!-- Ceiling line -->
  <line x1="210" y1="168" x2="395" y2="168" stroke="#ffcc00" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="405" y="172" fill="#ffcc00" font-size="12" font-weight="bold">← 推理天花板</text>

  <!-- Arrow: improvement from 10M to 20M -->
  <path d="M 175 250 C 190 225, 230 215, 245 175" fill="none" stroke="#54d9a8" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#54d9a8"/>
    </marker>
  </defs>
  <text x="195" y="210" fill="#54d9a8" font-size="11" font-weight="bold">+59%↑</text>

  <!-- Arrow: no improvement from 20M to 40M -->
  <path d="M 275 172 L 310 172" fill="none" stroke="#ffcc00" stroke-width="2" marker-end="url(#arrowY)"/>
  <defs>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc00"/>
    </marker>
  </defs>
  <text x="288" y="158" fill="#ffcc00" font-size="11" font-weight="bold">≈0%</text>

  <!-- ===== RIGHT: Analogy & Insight ===== -->
  <!-- Ceiling metaphor -->
  <rect x="500" y="115" width="370" height="175" rx="12" fill="#1e3348" stroke="#2a4a66" stroke-width="1.5"/>

  <!-- Person hitting ceiling -->
  <!-- Stick figure -->
  <circle cx="555" cy="170" r="16" fill="none" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="555" y1="186" x2="555" y2="230" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="555" y1="200" x2="535" y2="215" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="555" y1="200" x2="575" y2="215" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="555" y1="230" x2="540" y2="260" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="555" y1="230" x2="570" y2="260" stroke="#ffcc00" stroke-width="2.5"/>
  <!-- Raised hands -->
  <line x1="535" y1="215" x2="530" y2="190" stroke="#ffcc00" stroke-width="2.5"/>
  <line x1="575" y1="215" x2="580" y2="190" stroke="#ffcc00" stroke-width="2.5"/>

  <!-- Ceiling block -->
  <rect x="510" y="130" width="90" height="16" rx="3" fill="#c0392b" opacity="0.7"/>
  <text x="555" y="143" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">CEILING</text>

  <!-- Stack of papers (more budget) -->
  <rect x="535" y="262" width="40" height="6" rx="2" fill="#5bc0de" opacity="0.5"/>
  <rect x="535" y="270" width="40" height="6" rx="2" fill="#5bc0de" opacity="0.4"/>
  <rect x="535" y="278" width="40" height="6" rx="2" fill="#5bc0de" opacity="0.3"/>

  <!-- Explanation text -->
  <text x="620" y="160" fill="#ffffff" font-size="14" font-weight="bold">核心洞察</text>
  <text x="620" y="183" fill="#ccddee" font-size="12">• 预算不足 → 明显掉分</text>
  <text x="620" y="205" fill="#ccddee" font-size="12">• 预算翻倍 → 毫无提升</text>
  <text x="620" y="227" fill="#ccddee" font-size="12">• 改写 prompt → 仅边际改善</text>
  <text x="620" y="255" fill="#ffcc00" font-size="13" font-weight="bold">瓶颈在推理能力，不在资源</text>

  <!-- ===== BOTTOM: Weak model comparison ===== -->
  <rect x="500" y="310" width="370" height="85" rx="12" fill="#1e3348" stroke="#2a4a66" stroke-width="1.5"/>

  <!-- Weak model mini bars -->
  <rect x="530" y="340" width="15" height="40" rx="3" fill="url(#barWeak)"/>
  <rect x="555" y="338" width="15" height="42" rx="3" fill="url(#barWeak)"/>
  <rect x="580" y="339" width="15" height="41" rx="3" fill="url(#barWeak)"/>
  <text x="560" y="335" text-anchor="middle" fill="#95a5a6" font-size="10">~1分</text>
  <text x="530" y="390" fill="#8899aa" font-size="9">10M 20M 40M</text>

  <text x="620" y="345" fill="#95a5a6" font-size="13" font-weight="bold">弱模型</text>
  <text x="620" y="368" fill="#8899aa" font-size="12">无论预算多少，得分 ≈ 1</text>
  <text x="620" y="388" fill="#8899aa" font-size="11">→ 草稿纸再多也做不出难题</text>

  <!-- ===== BOTTOM: Key takeaway ===== -->
  <rect x="80" y="445" width="740" height="55" rx="10" fill="#ffcc00" opacity="0.12" stroke="#ffcc00" stroke-width="1"/>
  <text x="450" y="478" text-anchor="middle" fill="#ffcc00" font-size="16" font-weight="bold">💡 存在"最优预算区间"——低于阈值会浪费潜力，高于天花板则浪费预算</text>
</svg>