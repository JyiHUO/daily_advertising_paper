<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="attribGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ee5a24" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="steerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="saeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#78909c"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecdc4"/>
    </marker>
    <marker id="arrowHeadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="900" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="620" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="620" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="620" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="620" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="620" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e0e6ed" font-size="17" font-weight="700" letter-spacing="0.5">From Attribution to Action</text>
  <text x="450" y="58" text-anchor="middle" fill="#78909c" font-size="11" letter-spacing="0.3">Human-Centered Activation Steering for CLIP Model Debugging</text>
  
  <!-- Central tension: big horizontal arrow from Attribution to Action -->
  <path d="M 130 78 Q 450 72 770 78" stroke="url(#arrowGrad)" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  <text x="200" y="76" fill="#ff6b6b" font-size="9" font-weight="600" opacity="0.7">CORRELATION</text>
  <text x="660" y="76" fill="#4ecdc4" font-size="9" font-weight="600" opacity="0.7">CAUSATION</text>

  <!-- ====== LEFT SIDE: Input + SAE Decomposition ====== -->
  
  <!-- Input image representation -->
  <g transform="translate(70, 105)" filter="url(#softShadow)">
    <rect width="110" height="90" rx="8" fill="#1e3050" stroke="#34495e" stroke-width="1.2"/>
    <!-- Simplified nurse image icon -->
    <circle cx="55" cy="35" r="14" fill="#5dade2" opacity="0.3"/>
    <circle cx="55" cy="28" r="7" fill="#aed6f1"/>
    <rect x="42" y="38" width="26" height="20" rx="4" fill="#aed6f1" opacity="0.7"/>
    <text x="55" y="75" text-anchor="middle" fill="#b0bec5" font-size="9">Input Image</text>
    <text x="55" y="85" text-anchor="middle" fill="#5dade2" font-size="7.5" font-style="italic">"nurse photo"</text>
  </g>

  <!-- Arrow from input to CLIP -->
  <path d="M 185 150 L 220 150" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrowHead)" fill="none"/>

  <!-- CLIP Model block -->
  <g transform="translate(225, 115)" filter="url(#softShadow)">
    <rect width="100" height="70" rx="10" fill="url(#saeGrad)" opacity="0.85"/>
    <text x="50" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">CLIP</text>
    <text x="50" y="43" text-anchor="middle" fill="#ddd" font-size="8">Vision Encoder</text>
    <text x="50" y="56" text-anchor="middle" fill="#c8d6e5" font-size="7">latent embedding</text>
  </g>

  <!-- Arrow from CLIP to SAE -->
  <path d="M 330 150 L 365 150" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrowHead)" fill="none"/>

  <!-- ====== CENTER: SAE Decomposition (the star) ====== -->
  <g transform="translate(370, 95)">
    <!-- SAE container -->
    <rect width="175" height="120" rx="12" fill="#162040" stroke="#6c5ce7" stroke-width="1.5" opacity="0.9"/>
    <text x="87" y="18" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="600">SAE Decomposition</text>
    
    <!-- Component bars representing decomposed features -->
    <g transform="translate(12, 28)">
      <!-- Component bars with varying heights = attribution scores -->
      <rect x="0" y="32" width="18" height="52" rx="3" fill="#ff6b6b" opacity="0.9"/>
      <text x="9" y="28" text-anchor="middle" fill="#ff6b6b" font-size="6.5" font-weight="600">20.6</text>
      <text x="9" y="78" text-anchor="middle" fill="#fff" font-size="5" transform="rotate(-90, 9, 60)">🩺 stethoscope</text>
      
      <rect x="24" y="55" width="18" height="29" rx="3" fill="#ff9f43" opacity="0.85"/>
      <text x="33" y="51" text-anchor="middle" fill="#ff9f43" font-size="6.5" font-weight="600">7.1</text>
      <text x="33" y="78" text-anchor="middle" fill="#fff" font-size="5" transform="rotate(-90, 33, 68)">♀ female</text>
      
      <rect x="48" y="62" width="18" height="22" rx="3" fill="#feca57" opacity="0.7"/>
      <text x="57" y="58" text-anchor="middle" fill="#feca57" font-size="6.5">4.3</text>
      
      <rect x="72" y="68" width="18" height="16" rx="3" fill="#78909c" opacity="0.5"/>
      <rect x="96" y="72" width="18" height="12" rx="3" fill="#78909c" opacity="0.4"/>
      <rect x="120" y="75" width="18" height="9" rx="3" fill="#78909c" opacity="0.3"/>
      <rect x="144" y="77" width="13" height="7" rx="2" fill="#78909c" opacity="0.2"/>
      
      <!-- Label -->
      <text x="75" y="95" text-anchor="middle" fill="#78909c" font-size="7">← attribution score (R_j = a_j × ∂out/∂a_j)</text>
    </g>
  </g>

  <!-- ====== The KEY TENSION: Dashed line separating observation from intervention ====== -->
  <line x1="50" y1="235" x2="850" y2="235" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="8,5" opacity="0.4"/>
  <rect x="350" y="224" width="200" height="22" rx="11" fill="#1a2744" stroke="#ff6b6b" stroke-width="1" opacity="0.7"/>
  <text x="450" y="239" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="700">⚡ THE GAP: Correlation ≠ Causation</text>

  <!-- ====== BOTTOM: The 4-Step Workflow as a flowing path ====== -->
  
  <!-- Step 1: Predict -->
  <g transform="translate(55, 270)" filter="url(#softShadow)">
    <rect width="130" height="65" rx="10" fill="#1e3050" stroke="#5dade2" stroke-width="1.5"/>
    <circle cx="20" cy="17" r="11" fill="#5dade2" opacity="0.3"/>
    <text x="20" y="21" text-anchor="middle" fill="#5dade2" font-size="11" font-weight="700">1</text>
    <text x="75" y="20" text-anchor="middle" fill="#5dade2" font-size="11" font-weight="600">Predict</text>
    <text x="65" y="38" text-anchor="middle" fill="#90a4ae" font-size="7.5">Run CLIP inference</text>
    <text x="65" y="50" text-anchor="middle" fill="#b0bec5" font-size="8" font-style="italic">"nurse 53%"</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 190 302 C 210 302, 215 302, 235 302" stroke="#5dade2" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" opacity="0.7"/>

  <!-- Step 2: Review Attribution -->
  <g transform="translate(240, 270)" filter="url(#softShadow)">
    <rect width="145" height="65" rx="10" fill="#1e3050" stroke="url(#attribGrad)" stroke-width="1.5"/>
    <circle cx="20" cy="17" r="11" fill="#ff6b6b" opacity="0.3"/>
    <text x="20" y="21" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">2</text>
    <text x="82" y="20" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="600">Review</text>
    <text x="72" y="38" text-anchor="middle" fill="#90a4ae" font-size="7.5">Browse SAE components</text>
    <text x="72" y="50" text-anchor="middle" fill="#b0bec5" font-size="8" font-style="italic">"♀ female → high R_j"</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 390 302 C 410 302, 420 302, 440 302" stroke="#ff9f43" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" opacity="0.7"/>

  <!-- Step 3: Hypothesize -->
  <g transform="translate(445, 270)" filter="url(#softShadow)">
    <rect width="145" height="65" rx="10" fill="#1e3050" stroke="#feca57" stroke-width="1.5"/>
    <circle cx="20" cy="17" r="11" fill="#feca57" opacity="0.3"/>
    <text x="20" y="21" text-anchor="middle" fill="#feca57" font-size="11" font-weight="700">3</text>
    <text x="82" y="20" text-anchor="middle" fill="#feca57" font-size="11" font-weight="600">Hypothesize</text>
    <text x="72" y="38" text-anchor="middle" fill="#90a4ae" font-size="7.5">Form causal guess</text>
    <text x="72" y="50" text-anchor="middle" fill="#b0bec5" font-size="8" font-style="italic">"gender bias → nurse?"</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M 595 302 C 615 302, 625 302, 645 302" stroke="#4ecdc4" stroke-width="1.5" fill="none" marker-end="url(#arrowHeadGreen)" opacity="0.7"/>

  <!-- Step 4: Test (Activation Steering) - HIGHLIGHTED -->
  <g transform="translate(650, 260)" filter="url(#bigGlow)">
    <rect width="195" height="85" rx="12" fill="#0d2137" stroke="url(#steerGrad)" stroke-width="2.5"/>
    <circle cx="22" cy="19" r="12" fill="#4ecdc4" opacity="0.35"/>
    <text x="22" y="23" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="700">4</text>
    <text x="108" y="22" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="700">Test: Steer!</text>
    <text x="97" y="42" text-anchor="middle" fill="#90a4ae" font-size="7.5">Activation steering intervention</text>
    
    <!-- Slider visualization -->
    <line x1="25" y1="60" x2="170" y2="60" stroke="#34495e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="25" cy="60" r="5" fill="#ff6b6b" filter="url(#glow)"/>
    <text x="25" y="73" text-anchor="middle" fill="#ff6b6b" font-size="6">m=-1</text>
    <text x="97" y="73" text-anchor="middle" fill="#78909c" font-size="6">m=0</text>
    <text x="170" y="73" text-anchor="middle" fill="#4ecdc4" font-size="6">m=+1</text>
    <text x="97" y="55" text-anchor="middle" fill="#ccc" font-size="6.5">ã_j = a_j × (1+m_j)</text>
  </g>

  <!-- ====== BOTTOM: Results split ====== -->
  
  <!-- Before steering -->
  <g transform="translate(150, 380)" filter="url(#softShadow)">
    <rect width="250" height="100" rx="10" fill="#1e3050" stroke="#ff6b6b" stroke-width="1.2" opacity="0.8"/>
    <text x="125" y="20" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">❌ Before Steering</text>
    <text x="125" y="38" text-anchor="middle" fill="#b0bec5" font-size="8">Attribution only → "looks plausible"</text>
    
    <!-- Bar chart: nurse high -->
    <rect x="30" y="50" width="120" height="14" rx="3" fill="#ff6b6b" opacity="0.7"/>
    <text x="155" y="61" fill="#ff6b6b" font-size="9" font-weight="600">nurse 53%</text>
    <rect x="30" y="70" width="55" height="14" rx="3" fill="#78909c" opacity="0.4"/>
    <text x="90" y="81" fill="#78909c" font-size="9">doctor 22%</text>
    
    <text x="125" y="97" text-anchor="middle" fill="#78909c" font-size="7" font-style="italic">Trust based on "reasonable explanation"</text>
  </g>

  <!-- Big central arrow -->
  <g>
    <path d="M 415 430 C 445 420, 465 420, 500 430" stroke="#4ecdc4" stroke-width="2.5" fill="none" marker-end="url(#arrowHeadGreen)"/>
    <text x="458" y="415" text-anchor="middle" fill="#4ecdc4" font-size="8" font-weight="600">suppress ♀</text>
    <text x="458" y="426" text-anchor="middle" fill="#4ecdc4" font-size="7">m = -1</text>
  </g>

  <!-- After steering -->
  <g transform="translate(510, 380)" filter="url(#softShadow)">
    <rect width="250" height="100" rx="10" fill="#0d2a20" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="125" y="20" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">✓ After Steering</text>
    <text x="125" y="38" text-anchor="middle" fill="#b0bec5" font-size="8">Causal verification → evidence-based</text>
    
    <!-- Bar chart: doctor high -->
    <rect x="30" y="50" width="40" height="14" rx="3" fill="#78909c" opacity="0.4"/>
    <text x="75" y="61" fill="#78909c" font-size="9">nurse 12%</text>
    <rect x="30" y="70" width="160" height="14" rx="3" fill="#4ecdc4" opacity="0.7"/>
    <text x="195" y="81" fill="#4ecdc4" font-size="9" font-weight="600">doctor 85%</text>
    
    <text x="125" y="97" text-anchor="middle" fill="#4ecdc4" font-size="7" font-style="italic">Trust based on "I tested it myself"</text>
  </g>

  <!-- ====== Expert findings summary at bottom ====== -->
  <g transform="translate(55, 508)">
    <rect width="790" height="80" rx="10" fill="#12203a" stroke="#34495e" stroke-width="0.8"/>
    <text x="395" y="18" text-anchor="middle" fill="#dfe6e9" font-size="10" font-weight="600">Expert Study Findings (n=8 ML Practitioners)</text>
    
    <!-- Key stats -->
    <g transform="translate(30, 32)">
      <circle cx="0" cy="10" r="15" fill="#4ecdc4" opacity="0.15"/>
      <text x="0" y="14" text-anchor="middle" fill="#4ecdc4" font-size="13" font-weight="700">8/8</text>
      <text x="0" y="30" text-anchor="middle" fill="#90a4ae" font-size="7">fixed both tasks</text>
    </g>
    
    <g transform="translate(180, 32)">
      <circle cx="0" cy="10" r="15" fill="#feca57" opacity="0.15"/>
      <text x="0" y="14" text-anchor="middle" fill="#feca57" font-size="13" font-weight="700">6/8</text>
      <text x="0" y="30" text-anchor="middle" fill="#90a4ae" font-size="7">shifted to evidence</text>
      <text x="0" y="40" text-anchor="middle" fill="#90a4ae" font-size="7">-based trust</text>
    </g>
    
    <g transform="translate(350, 32)">
      <circle cx="0" cy="10" r="15" fill="#ff9f43" opacity="0.15"/>
      <text x="0" y="14" text-anchor="middle" fill="#ff9f43" font-size="13" font-weight="700">7/8</text>
      <text x="0" y="30" text-anchor="middle" fill="#90a4ae" font-size="7">preferred suppress</text>
      <text x="0" y="40" text-anchor="middle" fill="#90a4ae" font-size="7">over amplify</text>
    </g>
    
    <g transform="translate(530, 32)">
      <circle cx="0" cy="10" r="15" fill="#ff6b6b" opacity="0.15"/>
      <text x="0" y="14" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">⚠️</text>
      <text x="0" y="30" text-anchor="middle" fill="#90a4ae" font-size="7">ripple effects:</text>
      <text x="0" y="40" text-anchor="middle" fill="#90a4ae" font-size="7">suppress ≠ isolate</text>
    </g>
    
    <g transform="translate(700, 32)">
      <circle cx="0" cy="10" r="15" fill="#a29bfe" opacity="0.15"/>
      <text x="0" y="14" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="700">⚠️</text>
      <text x="0" y="30" text-anchor="middle" fill="#90a4ae" font-size="7">instance fix ≠</text>
      <text x="0" y="40" text-anchor="middle" fill="#90a4ae" font-size="7">global repair</text>
    </g>
  </g>

  <!-- Decorative corner accent -->
  <circle cx="870" cy="30" r="40" fill="#6c5ce7" opacity="0.04"/>
  <circle cx="30" cy="590" r="30" fill="#4ecdc4" opacity="0.04"/>
  
  <!-- Footer -->
  <text x="450" y="610" text-anchor="middle" fill="#455a64" font-size="7.5">SAE = Sparse Autoencoder · CLIP = Contrastive Language-Image Pre-training · XAI = Explainable AI</text>
</svg>