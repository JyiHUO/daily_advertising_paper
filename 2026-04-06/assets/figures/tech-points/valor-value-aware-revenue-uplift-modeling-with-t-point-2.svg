<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="focalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="zilnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aab"/>
    </marker>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="18"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Focal-ZILN 混合损失</text>
  <text x="450" y="66" text-anchor="middle" fill="#8899bb" font-size="13">解决 80%+ 零收入样本淹没梯度的核心机制</text>

  <!-- ========== LEFT PANEL: Problem ========== -->
  <rect x="30" y="90" width="260" height="200" rx="14" fill="#1e2d4a" stroke="#334466" stroke-width="1.5"/>
  <text x="160" y="116" text-anchor="middle" fill="#ff6b6b" font-size="15" font-weight="bold">❌ 普通损失</text>

  <!-- Bar chart: imbalance -->
  <!-- Zero samples bar -->
  <rect x="60" y="138" width="50" height="120" rx="4" fill="#ff6b6b" opacity="0.7"/>
  <text x="85" y="275" text-anchor="middle" fill="#ccc" font-size="11">零收入</text>
  <text x="85" y="155" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">950</text>

  <!-- Positive samples bar -->
  <rect x="130" y="245" width="50" height="13" rx="4" fill="#4ecdc4" opacity="0.7"/>
  <text x="155" y="275" text-anchor="middle" fill="#ccc" font-size="11">有收入</text>
  <text x="155" y="243" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>

  <!-- Gradient arrow overwhelm -->
  <text x="215" y="170" fill="#ff6b6b" font-size="28" font-weight="bold">⟹</text>
  <text x="215" y="195" fill="#ff8888" font-size="10" text-anchor="middle">梯度被</text>
  <text x="215" y="208" fill="#ff8888" font-size="10" text-anchor="middle">零样本淹没</text>
  <text x="215" y="230" fill="#ffaa88" font-size="11" text-anchor="middle">预测坍缩为0</text>

  <!-- ========== CENTER: ZILN Architecture ========== -->
  <!-- Input block -->
  <rect x="320" y="95" width="260" height="50" rx="10" fill="#2a3a5c" stroke="#5566aa" stroke-width="1.5"/>
  <text x="450" y="125" text-anchor="middle" fill="#dde" font-size="14" font-weight="bold">网络输入: 客户特征 X</text>

  <!-- Arrow down -->
  <line x1="450" y1="145" x2="450" y2="170" stroke="#aab" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three heads -->
  <rect x="320" y="175" width="75" height="60" rx="10" fill="url(#headGrad)" opacity="0.9"/>
  <text x="357" y="200" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">π</text>
  <text x="357" y="220" text-anchor="middle" fill="#ddd" font-size="10">转化概率</text>

  <rect x="413" y="175" width="75" height="60" rx="10" fill="url(#zilnGrad)" opacity="0.85"/>
  <text x="450" y="200" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">μ</text>
  <text x="450" y="220" text-anchor="middle" fill="#ddd" font-size="10">条件均值</text>

  <rect x="505" y="175" width="75" height="60" rx="10" fill="url(#zilnGrad)" opacity="0.85"/>
  <text x="542" y="200" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">σ</text>
  <text x="542" y="220" text-anchor="middle" fill="#ddd" font-size="10">条件标准差</text>

  <!-- Expected revenue formula -->
  <rect x="325" y="255" width="250" height="36" rx="8" fill="#1a2540" stroke="#5577aa" stroke-width="1"/>
  <text x="450" y="278" text-anchor="middle" fill="#ffe66d" font-size="13" font-weight="bold">E[Y] = π · exp(μ + σ²/2)</text>

  <!-- ========== LOSS SPLIT ========== -->
  <!-- Arrows from heads to loss -->
  <line x1="357" y1="235" x2="357" y2="318" stroke="#a29bfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="450" y1="291" x2="450" y2="318" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="542" y1="235" x2="542" y2="318" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Focal Loss box -->
  <rect x="310" y="320" width="130" height="80" rx="12" fill="url(#focalGrad)" opacity="0.9" filter="url(#glow)"/>
  <text x="375" y="348" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Focal Loss</text>
  <text x="375" y="368" text-anchor="middle" fill="#ffe" font-size="11">(1−p)^γ · CE</text>
  <text x="375" y="388" text-anchor="middle" fill="#ffd" font-size="10">聚焦难样本</text>

  <!-- LogNormal NLL box -->
  <rect x="460" y="320" width="130" height="80" rx="12" fill="url(#zilnGrad)" opacity="0.9" filter="url(#glow)"/>
  <text x="525" y="348" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">LogNorm NLL</text>
  <text x="525" y="368" text-anchor="middle" fill="#ffe" font-size="11">−log p(y|μ,σ)</text>
  <text x="525" y="388" text-anchor="middle" fill="#ffd" font-size="10">正收入拟合</text>

  <!-- Plus sign -->
  <circle cx="450" cy="360" r="14" fill="#1a2744" stroke="#fff" stroke-width="2"/>
  <text x="450" y="366" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">+</text>

  <!-- Arrow to combined loss -->
  <line x1="450" y1="400" x2="450" y2="430" stroke="#fff" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- Combined loss -->
  <rect x="350" y="432" width="200" height="42" rx="10" fill="#ffe66d" opacity="0.15" stroke="#ffe66d" stroke-width="2"/>
  <text x="450" y="459" text-anchor="middle" fill="#ffe66d" font-size="15" font-weight="bold">Focal-ZILN Loss</text>

  <!-- ========== RIGHT PANEL: Focal Effect ========== -->
  <rect x="610" y="90" width="260" height="200" rx="14" fill="#1e2d4a" stroke="#334466" stroke-width="1.5"/>
  <text x="740" y="116" text-anchor="middle" fill="#4ecdc4" font-size="15" font-weight="bold">✓ Focal 加权后</text>

  <!-- Sample 1: easy zero -->
  <rect x="630" y="132" width="220" height="48" rx="8" fill="#253350"/>
  <circle cx="655" cy="156" r="12" fill="#ff6b6b" opacity="0.4"/>
  <text x="655" y="161" text-anchor="middle" fill="#fff" font-size="10">0</text>
  <text x="720" y="148" fill="#ccc" font-size="11">p=0.05 → 权重</text>
  <text x="720" y="167" fill="#ff6b6b" font-size="14" font-weight="bold">(0.05)² = 0.0025</text>
  <text x="838" y="160" fill="#ff6b6b" font-size="10">≈忽略</text>

  <!-- Sample 2: uncertain positive -->
  <rect x="630" y="192" width="220" height="48" rx="8" fill="#253350"/>
  <circle cx="655" cy="216" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="655" y="221" text-anchor="middle" fill="#fff" font-size="10">$</text>
  <text x="720" y="208" fill="#ccc" font-size="11">p=0.3 → 权重</text>
  <text x="720" y="227" fill="#4ecdc4" font-size="14" font-weight="bold">(0.7)² = 0.49</text>
  <text x="838" y="220" fill="#4ecdc4" font-size="10">✓保留</text>

  <!-- Effect summary -->
  <text x="740" y="263" text-anchor="middle" fill="#ffe66d" font-size="12" font-weight="bold">梯度聚焦高价值样本 ↑</text>

  <!-- ========== BOTTOM: Distribution Visual ========== -->
  <rect x="30" y="500" width="840" height="105" rx="14" fill="#162038" stroke="#2a3a5c" stroke-width="1"/>
  <text x="60" y="528" fill="#8899bb" font-size="13" font-weight="bold">零膨胀对数正态分布 (ZILN):</text>

  <!-- Spike at zero -->
  <rect x="120" y="540" width="14" height="50" rx="2" fill="#ff6b6b" opacity="0.8"/>
  <text x="127" y="600" text-anchor="middle" fill="#ff9999" font-size="10">Y=0</text>
  <text x="127" y="537" text-anchor="middle" fill="#ff6b6b" font-size="10">1−ρ</text>

  <!-- Lognormal curve (simplified) -->
  <path d="M160,590 Q180,590 200,585 Q230,570 260,540 Q280,555 320,570 Q380,585 460,588 Q540,590 600,590" fill="none" stroke="#4ecdc4" stroke-width="3" opacity="0.8"/>
  <text x="260" y="533" fill="#4ecdc4" font-size="10">LogNormal</text>
  <text x="260" y="548" fill="#4ecdc4" font-size="10">(概率 ρ)</text>

  <!-- Arrow pointing to the overall -->
  <text x="640" y="545" fill="#ffe66d" font-size="12" font-weight="bold">关键洞察</text>
  <text x="640" y="565" fill="#ccd" font-size="11">80%+样本堆积在零点</text>
  <text x="640" y="583" fill="#ccd" font-size="11">Focal 降权易分零样本</text>
  <text x="640" y="601" fill="#ffe66d" font-size="11">→ 模型学会识别稀有高价值客户</text>
</svg>