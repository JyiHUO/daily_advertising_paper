<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#EA580C">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">业务感知语义ID (BID)：给语义码"盖业务章"</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">核心思想：编码时融入业务信号 + 门控筛选 → 解码时还原验证</text>

  <!-- ============ ENCODER SECTION (Left) ============ -->
  <rect x="30" y="90" width="400" height="400" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="118" text-anchor="middle" font-size="17" font-weight="bold" fill="#1D4ED8">编码器 Encoder</text>

  <!-- Token Embeddings -->
  <rect x="60" y="140" width="90" height="40" rx="8" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="105" y="165" text-anchor="middle" font-size="12" fill="#1E40AF">Token Emb</text>
  <text x="105" y="195" text-anchor="middle" font-size="11" fill="#64748B">a-2, b-4, c-6</text>

  <!-- Business Embedding -->
  <rect x="175" y="140" width="90" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="220" y="165" text-anchor="middle" font-size="12" fill="#92400E">业务 Emb</text>
  <text x="220" y="195" text-anchor="middle" font-size="11" fill="#92400E">🍔 外卖</text>

  <!-- Concat -->
  <rect x="120" y="216" width="80" height="30" rx="6" fill="#C7D2FE" stroke="#818CF8" stroke-width="1"/>
  <text x="160" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338CA">拼接</text>
  <line x1="105" y1="180" x2="140" y2="216" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="220" y1="180" x2="180" y2="216" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- FFN -->
  <rect x="120" y="266" width="80" height="32" rx="8" fill="#A5B4FC" stroke="#6366F1" stroke-width="1.5"/>
  <text x="160" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">FFN</text>
  <line x1="160" y1="246" x2="160" y2="266" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mid representation -->
  <text x="160" y="315" text-anchor="middle" font-size="11" fill="#475569">中间表示 h</text>

  <!-- Gate Network -->
  <rect x="260" y="266" width="120" height="32" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="320" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">门控 σ(·)</text>
  <line x1="200" y1="282" x2="260" y2="282" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="230" y="275" text-anchor="middle" font-size="10" fill="#94A3B8">h</text>

  <!-- Gate output visual -->
  <g transform="translate(280,310)">
    <rect x="0" y="0" width="16" height="14" rx="2" fill="#16A34A" opacity="0.8"/><text x="8" y="11" text-anchor="middle" font-size="8" fill="#fff">高</text>
    <rect x="20" y="0" width="16" height="14" rx="2" fill="#16A34A" opacity="0.5"/><text x="28" y="11" text-anchor="middle" font-size="8" fill="#fff">中</text>
    <rect x="40" y="0" width="16" height="14" rx="2" fill="#DC2626" opacity="0.3"/><text x="48" y="11" text-anchor="middle" font-size="8" fill="#fff">低</text>
    <rect x="60" y="0" width="16" height="14" rx="2" fill="#DC2626" opacity="0.2"/><text x="68" y="11" text-anchor="middle" font-size="8" fill="#fff">低</text>
    <text x="40" y="32" text-anchor="middle" font-size="9" fill="#78716C">价格↑ 娱乐↓</text>
  </g>

  <!-- Element-wise multiply -->
  <circle cx="230" cy="380" r="18" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text x="230" y="385" text-anchor="middle" font-size="18" font-weight="bold" fill="#A16207">⊙</text>
  <text x="230" y="408" text-anchor="middle" font-size="10" fill="#78716C">逐元素乘</text>

  <line x1="160" y1="320" x2="215" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="298" x2="248" y2="368" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Output: Business-aware repr -->
  <rect x="160" y="430" width="150" height="38" rx="10" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="235" y="454" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">业务感知表示</text>
  <line x1="230" y1="408" x2="235" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ DECODER SECTION (Right) ============ -->
  <rect x="470" y="90" width="400" height="290" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="118" text-anchor="middle" font-size="17" font-weight="bold" fill="#C2410C">解码器 Decoder</text>

  <!-- Input -->
  <rect x="530" y="140" width="110" height="36" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="585" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">业务感知表示</text>

  <rect x="660" y="140" width="90" height="36" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="705" y="163" text-anchor="middle" font-size="12" fill="#92400E">业务 Emb</text>

  <!-- Concat -->
  <rect x="610" y="196" width="70" height="28" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="645" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#9A3412">拼接</text>
  <line x1="585" y1="176" x2="625" y2="196" stroke="#2563EB" stroke-width="1.3" marker-end="url(#arrowBlue)"/>
  <line x1="705" y1="176" x2="665" y2="196" stroke="#F59E0B" stroke-width="1.3" marker-end="url(#arrowOrange)"/>

  <!-- FFN + ReLU gate -->
  <rect x="590" y="242" width="110" height="32" rx="8" fill="#FB923C" stroke="#EA580C" stroke-width="1.5"/>
  <text x="645" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">FFN + ReLU门控</text>
  <line x1="645" y1="224" x2="645" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reconstructed tokens -->
  <rect x="580" y="296" width="130" height="36" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="645" y="319" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">重建 Token Emb</text>
  <line x1="645" y1="274" x2="645" y2="296" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="645" y="350" text-anchor="middle" font-size="11" fill="#64748B">â-2, b̂-4, ĉ-6</text>

  <!-- Loss arrow connecting original and reconstructed -->
  <rect x="470" y="400" width="400" height="70" rx="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">重建损失 L₂ = ‖Token Emb − 重建 Token Emb‖²</text>
  <text x="670" y="450" text-anchor="middle" font-size="12" fill="#991B1B">保证"盖章→拆章"不丢语义信息</text>

  <!-- Arrow from encoder bottom to decoder -->
  <line x1="310" y1="449" x2="530" y2="158" stroke="#2563EB" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>

  <!-- ============ BOTTOM: PCA Comparison ============ -->
  <rect x="30" y="505" width="400" height="100" rx="12" fill="#FEE2E2" stroke="#F87171" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="230" y="530" text-anchor="middle" font-size="13" font-weight="bold" fill="#B91C1C">❌ 无BID：共享码本 → 混在一起</text>
  <!-- Mixed dots -->
  <g transform="translate(100,545)">
    <circle cx="0" cy="0" r="5" fill="#EF4444" opacity="0.6"/><circle cx="12" cy="8" r="5" fill="#3B82F6" opacity="0.6"/>
    <circle cx="25" cy="-3" r="5" fill="#EF4444" opacity="0.6"/><circle cx="38" cy="5" r="5" fill="#3B82F6" opacity="0.6"/>
    <circle cx="50" cy="10" r="5" fill="#EF4444" opacity="0.5"/><circle cx="18" cy="-8" r="5" fill="#3B82F6" opacity="0.5"/>
    <circle cx="8" cy="14" r="5" fill="#22C55E" opacity="0.5"/><circle cx="42" cy="-6" r="5" fill="#22C55E" opacity="0.5"/>
    <circle cx="55" cy="-2" r="5" fill="#22C55E" opacity="0.5"/><circle cx="30" cy="12" r="5" fill="#EF4444" opacity="0.6"/>
  </g>
  <text x="300" y="565" text-anchor="middle" font-size="11" fill="#9CA3AF">PCA 可视化</text>

  <rect x="470" y="505" width="400" height="100" rx="12" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="670" y="530" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803D">✅ 有BID：业务感知 → 清晰分离</text>
  <!-- Separated clusters -->
  <g transform="translate(540,548)">
    <circle cx="0" cy="0" r="5" fill="#EF4444"/><circle cx="12" cy="5" r="5" fill="#EF4444"/><circle cx="6" cy="-6" r="5" fill="#EF4444"/>
    <circle cx="15" cy="-3" r="5" fill="#EF4444"/>
    <text x="8" y="20" text-anchor="middle" font-size="9" fill="#B91C1C">外卖🍔</text>
  </g>
  <g transform="translate(620,540)">
    <circle cx="0" cy="0" r="5" fill="#3B82F6"/><circle cx="13" cy="4" r="5" fill="#3B82F6"/><circle cx="5" cy="-7" r="5" fill="#3B82F6"/>
    <circle cx="16" cy="-2" r="5" fill="#3B82F6"/>
    <text x="8" y="22" text-anchor="middle" font-size="9" fill="#1D4ED8">娱乐🎬</text>
  </g>
  <g transform="translate(700,550)">
    <circle cx="0" cy="0" r="5" fill="#22C55E"/><circle cx="12" cy="6" r="5" fill="#22C55E"/><circle cx="6" cy="-5" r="5" fill="#22C55E"/>
    <circle cx="14" cy="-2" r="5" fill="#22C55E"/>
    <text x="8" y="20" text-anchor="middle" font-size="9" fill="#15803D">医疗🏥</text>
  </g>
  <text x="750" y="578" text-anchor="middle" font-size="11" fill="#9CA3AF">PCA 可视化</text>

</svg>