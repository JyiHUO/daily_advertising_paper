<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">多业务预测头 (MBP)</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#7F8C8D">共享专家 + 业务门控路由 → 业务专属表示</text>

  <!-- ===== BOTTOM: Sequence Encoder ===== -->
  <rect x="250" y="500" width="300" height="52" rx="10" fill="#3498DB" opacity="0.15" stroke="#3498DB" stroke-width="2"/>
  <text x="400" y="531" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">序列编码器 (HSTU)</text>
  <text x="400" y="548" text-anchor="middle" font-size="11" fill="#7F8C8D">用户行为 → 通用表示 h</text>

  <!-- Arrow up from encoder -->
  <line x1="400" y1="498" x2="400" y2="458" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Concat box ===== -->
  <rect x="280" y="410" width="240" height="46" rx="8" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="400" y="430" text-anchor="middle" font-size="13" fill="#2C3E50">h ⊕ 业务Embedding</text>
  <text x="400" y="447" text-anchor="middle" font-size="12" fill="#888">→ 融合向量 z</text>

  <!-- Business embedding labels -->
  <rect x="548" y="414" width="90" height="18" rx="4" fill="#E67E22" opacity="0.2"/>
  <text x="593" y="427" text-anchor="middle" font-size="10" fill="#E67E22" font-weight="bold">外卖 Emb</text>
  <rect x="548" y="434" width="90" height="18" rx="4" fill="#2980B9" opacity="0.2"/>
  <text x="593" y="447" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">娱乐 Emb</text>
  <line x1="546" y1="423" x2="522" y2="428" stroke="#E67E22" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="546" y1="443" x2="522" y2="438" stroke="#2980B9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow up from concat to gate+experts -->
  <line x1="400" y1="408" x2="400" y2="378" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== MIDDLE: Shared Experts + Gate (main innovation area) ===== -->
  <rect x="100" y="215" width="600" height="162" rx="14" fill="#FFF9E6" stroke="#F0C040" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="120" y="238" font-size="12" fill="#B7950B" font-weight="bold">共享参数区 (所有业务共享)</text>

  <!-- Gate Network -->
  <rect x="130" y="260" width="160" height="100" rx="10" fill="#fff" stroke="#9B59B6" stroke-width="2"/>
  <text x="210" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#8E44AD">门控网络</text>
  <text x="210" y="305" text-anchor="middle" font-size="11" fill="#777">SiLU 激活</text>
  <text x="210" y="325" text-anchor="middle" font-size="11" fill="#777">z → K维权重</text>
  <text x="210" y="348" text-anchor="middle" font-size="10" fill="#9B59B6">[w₁, w₂, ... w₈]</text>

  <!-- Expert Networks -->
  <g>
    <rect x="370" y="255" width="62" height="56" rx="6" fill="#2ECC71" opacity="0.18" stroke="#27AE60" stroke-width="1.5"/>
    <text x="401" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">专家1</text>
    <text x="401" y="296" text-anchor="middle" font-size="9" fill="#666">FFN</text>
  </g>
  <g>
    <rect x="442" y="255" width="62" height="56" rx="6" fill="#2ECC71" opacity="0.18" stroke="#27AE60" stroke-width="1.5"/>
    <text x="473" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">专家2</text>
    <text x="473" y="296" text-anchor="middle" font-size="9" fill="#666">FFN</text>
  </g>
  <text x="519" y="283" font-size="18" fill="#888">…</text>
  <g>
    <rect x="540" y="255" width="62" height="56" rx="6" fill="#2ECC71" opacity="0.18" stroke="#27AE60" stroke-width="1.5"/>
    <text x="571" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">专家8</text>
    <text x="571" y="296" text-anchor="middle" font-size="9" fill="#666">FFN</text>
  </g>

  <!-- Weighted sum symbol -->
  <circle cx="485" cy="345" r="18" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="485" y="351" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">Σw</text>

  <!-- Arrows: gate to sum -->
  <path d="M290 340 Q350 360 465 345" stroke="#9B59B6" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Arrows: experts to sum -->
  <line x1="401" y1="313" x2="472" y2="332" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="473" y1="313" x2="480" y2="328" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="571" y1="313" x2="500" y2="335" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow from z to gate and experts -->
  <line x1="350" y1="378" x2="210" y2="362" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="378" x2="485" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- z label near arrow split -->
  <text x="395" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">z</text>

  <!-- ===== TOP: Two business outputs ===== -->
  <!-- Business A: 外卖 -->
  <rect x="140" y="90" width="210" height="90" rx="12" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/>
  <text x="245" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#E67E22">🍜 外卖业务</text>
  <text x="245" y="137" text-anchor="middle" font-size="11" fill="#888">门控权重: [<tspan fill="#E67E22" font-weight="bold">0.30</tspan>, 0.05, <tspan fill="#E67E22" font-weight="bold">0.25</tspan>, ...]</text>
  <text x="245" y="155" text-anchor="middle" font-size="11" fill="#888">→ 外卖专属表示</text>
  <text x="245" y="172" text-anchor="middle" font-size="11" fill="#E67E22">→ BID解码 → 餐饮SID序列</text>

  <!-- Business B: 娱乐 -->
  <rect x="440" y="90" width="210" height="90" rx="12" fill="#D6EAF8" stroke="#2980B9" stroke-width="2"/>
  <text x="545" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#2980B9">🎬 娱乐业务</text>
  <text x="545" y="137" text-anchor="middle" font-size="11" fill="#888">门控权重: [0.02, ..., <tspan fill="#2980B9" font-weight="bold">0.35</tspan>, ..., <tspan fill="#2980B9" font-weight="bold">0.28</tspan>]</text>
  <text x="545" y="155" text-anchor="middle" font-size="11" fill="#888">→ 娱乐专属表示</text>
  <text x="545" y="172" text-anchor="middle" font-size="11" fill="#2980B9">→ BID解码 → 娱乐SID序列</text>

  <!-- Arrows from sum to outputs -->
  <path d="M470 328 Q380 240 280 182" stroke="#E67E22" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M500 328 Q560 240 545 182" stroke="#2980B9" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Key insight callout -->
  <rect x="10" y="510" width="220" height="70" rx="10" fill="#fff" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="120" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#E74C3C">💡 核心思想</text>
  <text x="120" y="551" text-anchor="middle" font-size="10.5" fill="#555">同一组专家，不同业务</text>
  <text x="120" y="567" text-anchor="middle" font-size="10.5" fill="#555">通过Embedding路由不同组合</text>

  <!-- Small note -->
  <text x="700" y="585" text-anchor="middle" font-size="10" fill="#AAA">K=8 专家最优</text>
</svg>