<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2979FF">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2E7D32">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#E8EDF2"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A237E">MBGR 增量集成：嫁接而非替换</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#666">在美团RTB广告系统中渐进式部署生成式推荐</text>

  <!-- ===== Left: MBGR Offline ===== -->
  <rect x="40" y="100" width="220" height="200" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565C0">MBGR 离线训练</text>

  <!-- User emb -->
  <rect x="60" y="148" width="180" height="48" rx="8" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="150" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">👤 用户 Embedding</text>
  <text x="150" y="186" text-anchor="middle" font-size="11" fill="#1565C0">预计算 → 分布式缓存</text>

  <!-- Item emb -->
  <rect x="60" y="210" width="180" height="48" rx="8" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="150" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">📦 物品 Embedding</text>
  <text x="150" y="248" text-anchor="middle" font-size="11" fill="#1565C0">Token查表 + BID编码</text>

  <!-- Offline label -->
  <rect x="55" y="270" width="80" height="22" rx="6" fill="#1565C0"/>
  <text x="95" y="285" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">离线/轻量</text>

  <!-- ===== Center: Online System ===== -->
  <rect x="330" y="100" width="240" height="310" rx="14" fill="#FFF8E1" stroke="#F57F17" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">🔄 现有 RTB 广告系统</text>

  <!-- Recall channel -->
  <rect x="350" y="150" width="200" height="58" rx="10" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="450" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#BF360C">召回层</text>
  <text x="450" y="194" text-anchor="middle" font-size="12" fill="#E65100">ANN 向量召回（新通道）</text>

  <!-- Ranking model -->
  <rect x="350" y="228" width="200" height="58" rx="10" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="450" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#BF360C">排序层</text>
  <text x="450" y="272" text-anchor="middle" font-size="12" fill="#E65100">MBGR emb 作为增强特征</text>

  <!-- CTCVR output -->
  <rect x="380" y="310" width="140" height="40" rx="10" fill="#EF6C00" stroke="#BF360C" stroke-width="1.5"/>
  <text x="450" y="336" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">预测 CTCVR</text>

  <!-- Arrow: Recall → Ranking -->
  <line x1="450" y1="208" x2="450" y2="228" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow: Ranking → CTCVR -->
  <line x1="450" y1="286" x2="450" y2="310" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Integration label -->
  <rect x="375" y="365" width="150" height="24" rx="6" fill="#F57F17"/>
  <text x="450" y="382" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">渐进式嫁接，低风险</text>

  <!-- ===== Arrows: MBGR → System ===== -->
  <!-- User emb → Recall -->
  <path d="M 240 170 C 290 170, 310 170, 350 175" fill="none" stroke="#2979FF" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="290" y="158" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">缓存查询</text>

  <!-- Item emb → Ranking -->
  <path d="M 240 234 C 290 240, 310 250, 350 257" fill="none" stroke="#2979FF" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="290" y="256" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">在线编码</text>

  <!-- ===== Right: Results ===== -->
  <rect x="640" y="100" width="230" height="310" rx="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <text x="755" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B5E20">📊 线上 A/B 效果</text>
  <text x="755" y="148" text-anchor="middle" font-size="11" fill="#558B2F">30% 流量，1 周</text>

  <!-- Bar chart area -->
  <!-- Bars -->
  <!-- A: +3.0% -->
  <rect x="665" y="200" width="40" height="60" rx="4" fill="#81C784"/>
  <text x="685" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">+3.0%</text>
  <text x="685" y="274" text-anchor="middle" font-size="11" fill="#333">A</text>

  <!-- C: +4.5% -->
  <rect x="715" y="185" width="40" height="75" rx="4" fill="#66BB6A"/>
  <text x="735" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">+4.5%</text>
  <text x="735" y="274" text-anchor="middle" font-size="11" fill="#333">C</text>

  <!-- D: +5.2% -->
  <rect x="765" y="175" width="40" height="85" rx="4" fill="#43A047"/>
  <text x="785" y="171" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">+5.2%</text>
  <text x="785" y="274" text-anchor="middle" font-size="11" fill="#333">D</text>

  <!-- B: +7.5% -->
  <rect x="815" y="152" width="40" height="108" rx="4" fill="#2E7D32"/>
  <text x="835" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">+7.5%</text>
  <text x="835" y="274" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">B(小)</text>

  <!-- Baseline -->
  <line x1="658" y1="260" x2="862" y2="260" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Overall highlight -->
  <rect x="670" y="310" width="170" height="44" rx="10" fill="#1B5E20" opacity="0.9"/>
  <text x="755" y="330" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">整体 CTCVR +3.98%</text>
  <text x="755" y="346" text-anchor="middle" font-size="11" fill="#A5D6A7">小业务提升尤为显著</text>

  <!-- Arrow System → Results -->
  <path d="M 570 255 L 630 255" fill="none" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== Bottom: Key Insight ===== -->
  <rect x="100" y="440" width="700" height="70" rx="12" fill="#fff" stroke="#1A237E" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="466" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A237E">💡 核心策略：不替换管线，而是"嫁接"Embedding</text>
  <text x="450" y="490" text-anchor="middle" font-size="13" fill="#555">用户emb预计算存缓存 + 物品emb在线轻量编码 → 同时增强召回与排序，低风险高收益</text>

  <!-- ===== VS badge ===== -->
  <circle cx="150" cy="360" r="22" fill="#E53935" opacity="0.9"/>
  <text x="150" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">VS</text>
  <text x="150" y="395" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold">端到端替换</text>
  <text x="150" y="410" text-anchor="middle" font-size="10" fill="#999">风险高 ✗</text>

  <text x="310" y="395" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">增量嫁接</text>
  <text x="310" y="410" text-anchor="middle" font-size="10" fill="#2E7D32">低风险 ✓</text>
  <circle cx="310" cy="360" r="22" fill="#2E7D32" opacity="0.9"/>
  <text x="310" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">MBGR</text>

  <!-- Arrow between VS -->
  <line x1="175" y1="360" x2="285" y2="360" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>