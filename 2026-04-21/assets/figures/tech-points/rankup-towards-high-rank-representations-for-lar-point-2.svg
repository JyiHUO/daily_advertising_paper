<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.05"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2d9c8a">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">多 Embedding 表：扩展表征自由度</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">RankUp — 从"一张照片"到"多角度拍摄"</text>

  <!-- ==================== LEFT: Single Embedding ==================== -->
  <rect x="30" y="90" width="390" height="420" rx="16" fill="url(#g1)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="225" y="120" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">❌ 传统：单 Embedding 表</text>

  <!-- Feature -->
  <rect x="160" y="145" width="130" height="40" rx="8" fill="#f8d7da" stroke="#c0392b" stroke-width="1.5"/>
  <text x="225" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">广告类目 ID</text>

  <!-- Arrow down -->
  <line x1="225" y1="185" x2="225" y2="215" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Single table -->
  <rect x="130" y="220" width="190" height="55" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="225" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Embedding 表</text>
  <text x="225" y="263" text-anchor="middle" font-size="12" fill="#888">仅 1 个查找</text>

  <!-- Arrow down -->
  <line x1="225" y1="275" x2="225" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Single vector -->
  <g>
    <rect x="105" y="315" width="240" height="38" rx="6" fill="#ffcccc" stroke="#e74c3c" stroke-width="1.5"/>
    <!-- Color blocks to show vector -->
    <rect x="115" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.7"/>
    <rect x="137" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.6"/>
    <rect x="159" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.5"/>
    <rect x="181" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.4"/>
    <rect x="203" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.35"/>
    <rect x="225" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
    <rect x="247" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.25"/>
    <rect x="269" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.2"/>
    <rect x="291" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.15"/>
    <rect x="313" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.1"/>
    <text x="225" y="370" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">1 × 64 维向量</text>
  </g>

  <!-- Rank box -->
  <rect x="120" y="400" width="210" height="50" rx="10" fill="#fff0f0" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="225" y="422" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">秩上界 = d</text>
  <text x="225" y="441" text-anchor="middle" font-size="13" fill="#e74c3c">有效秩 ≈ 40</text>

  <!-- Metaphor -->
  <text x="225" y="480" text-anchor="middle" font-size="30">📷</text>
  <text x="225" y="500" text-anchor="middle" font-size="12" fill="#999" font-style="italic">仅一个角度拍照</text>

  <!-- ==================== RIGHT: Multi Embedding ==================== -->
  <rect x="480" y="90" width="390" height="420" rx="16" fill="url(#g2)" stroke="#4ecdc4" stroke-width="2"/>
  <text x="675" y="120" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a8a7d">✅ RankUp：K 个 Embedding 表</text>

  <!-- Feature -->
  <rect x="610" y="145" width="130" height="40" rx="8" fill="#d1f2eb" stroke="#1a8a7d" stroke-width="1.5"/>
  <text x="675" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a8a7d">广告类目 ID</text>

  <!-- Three arrows fan out -->
  <line x1="640" y1="185" x2="560" y2="220" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="675" y1="185" x2="675" y2="220" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="710" y1="185" x2="790" y2="220" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Three tables -->
  <rect x="500" y="222" width="120" height="46" rx="8" fill="#fff" stroke="#1abc9c" stroke-width="2"/>
  <text x="560" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a8a7d">表 1</text>

  <rect x="635" y="222" width="80" height="46" rx="8" fill="#fff" stroke="#1abc9c" stroke-width="2"/>
  <text x="675" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a8a7d">表 2</text>

  <rect x="730" y="222" width="120" height="46" rx="8" fill="#fff" stroke="#1abc9c" stroke-width="2"/>
  <text x="790" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a8a7d">表 3</text>

  <!-- K=3 label -->
  <text x="675" y="288" text-anchor="middle" font-size="12" fill="#888">K = 3 个独立子空间</text>

  <!-- Three arrows converge -->
  <line x1="560" y1="268" x2="595" y2="310" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="675" y1="268" x2="675" y2="310" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="790" y1="268" x2="755" y2="310" stroke="#2d9c8a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Combined vector - colorful -->
  <g>
    <rect x="545" y="315" width="260" height="38" rx="6" fill="#c8f7e8" stroke="#1abc9c" stroke-width="1.5"/>
    <!-- Color blocks - 3 groups -->
    <rect x="555" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.8"/>
    <rect x="577" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.5"/>
    <rect x="599" y="322" width="18" height="24" rx="3" fill="#e74c3c" opacity="0.3"/>
    <rect x="625" y="322" width="18" height="24" rx="3" fill="#3498db" opacity="0.8"/>
    <rect x="647" y="322" width="18" height="24" rx="3" fill="#3498db" opacity="0.5"/>
    <rect x="669" y="322" width="18" height="24" rx="3" fill="#3498db" opacity="0.3"/>
    <rect x="695" y="322" width="18" height="24" rx="3" fill="#f39c12" opacity="0.8"/>
    <rect x="717" y="322" width="18" height="24" rx="3" fill="#f39c12" opacity="0.5"/>
    <rect x="739" y="322" width="18" height="24" rx="3" fill="#f39c12" opacity="0.3"/>
    <rect x="765" y="322" width="18" height="24" rx="3" fill="#9b59b6" opacity="0.4"/>
    <text x="675" y="370" text-anchor="middle" font-size="13" fill="#1a8a7d" font-weight="bold">K × 64 维组合表征</text>
  </g>

  <!-- Rank box -->
  <rect x="570" y="400" width="210" height="50" rx="10" fill="#e8faf6" stroke="#1abc9c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="675" y="422" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a8a7d">秩上界 = K × d</text>
  <text x="675" y="441" text-anchor="middle" font-size="13" fill="#1abc9c">有效秩 ≈ 46 ↑</text>

  <!-- Metaphor -->
  <text x="645" y="480" text-anchor="middle" font-size="30">📷</text>
  <text x="675" y="480" text-anchor="middle" font-size="30">📷</text>
  <text x="705" y="480" text-anchor="middle" font-size="30">📷</text>
  <text x="675" y="500" text-anchor="middle" font-size="12" fill="#999" font-style="italic">多角度拍照，信息更丰富</text>

  <!-- ==================== Center VS ==================== -->
  <circle cx="450" cy="300" r="26" fill="#fff" stroke="#aaa" stroke-width="2"/>
  <text x="450" y="306" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">VS</text>

  <!-- ==================== Bottom key insight ==================== -->
  <rect x="180" y="520" width="540" height="36" rx="12" fill="#2c3e50" opacity="0.9"/>
  <text x="450" y="544" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🎨 更多"颜料" → Block-0 有效秩提升 15% → 缓解表征坍缩</text>
</svg>