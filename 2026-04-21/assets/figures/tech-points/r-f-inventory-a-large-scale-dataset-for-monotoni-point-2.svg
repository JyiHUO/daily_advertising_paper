<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#94a3b8">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#10b981">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#ef4444">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">PV 理论上界：频控规则决定的"天花板"</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">R&amp;F Inventory — Theoretical Maximum Exposure Bound</text>

  <!-- ========== LEFT: Formula Derivation ========== -->
  <!-- Box: Input Parameters -->
  <rect x="40" y="100" width="260" height="120" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="128" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">📋 合约参数</text>
  <text x="60" y="158" fill="#cbd5e1" font-size="14">排期 T = <tspan fill="#f59e0b" font-weight="bold">10</tspan> 天</text>
  <text x="60" y="182" fill="#cbd5e1" font-size="14">频控窗口 W = <tspan fill="#f59e0b" font-weight="bold">7</tspan> 天</text>
  <text x="60" y="206" fill="#cbd5e1" font-size="14">窗口上限 K = <tspan fill="#f59e0b" font-weight="bold">3</tspan> 次</text>

  <!-- Arrow down -->
  <line x1="170" y1="224" x2="170" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box: Formula -->
  <rect x="40" y="262" width="260" height="100" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="292" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="bold">🔢 单用户上界公式</text>
  <text x="170" y="322" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Max = K × ⌈T / W⌉</text>
  <text x="170" y="350" text-anchor="middle" fill="#fbbf24" font-size="15">= 3 × ⌈10/7⌉ = 3 × 2 = <tspan font-size="18" font-weight="bold">6</tspan></text>

  <!-- Arrow down -->
  <line x1="170" y1="366" x2="170" y2="400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box: Total PV Bound -->
  <rect x="40" y="404" width="260" height="80" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="434" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">📊 合约 PV 上界</text>
  <text x="170" y="462" text-anchor="middle" fill="#e2e8f0" font-size="15">UV=5000 → PV ≤ <tspan fill="#10b981" font-size="20" font-weight="bold">30,000</tspan></text>

  <!-- ========== CENTER: Visual Timeline ========== -->
  <!-- Timeline visualization -->
  <text x="555" y="112" text-anchor="middle" fill="#94a3b8" font-size="13">单用户在 10 天排期中的频控窗口</text>

  <!-- Window 1 -->
  <rect x="390" y="130" width="210" height="68" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <text x="495" y="152" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">窗口 1：第 1-7 天</text>
  <!-- 3 ad icons -->
  <circle cx="440" cy="180" r="10" fill="url(#gBlue)"/>
  <text x="440" y="184" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <circle cx="480" cy="180" r="10" fill="url(#gBlue)"/>
  <text x="480" y="184" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <circle cx="520" cy="180" r="10" fill="url(#gBlue)"/>
  <text x="520" y="184" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <text x="560" y="184" fill="#93c5fd" font-size="12">× 3</text>

  <!-- Window 2 -->
  <rect x="390" y="210" width="210" height="68" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <text x="495" y="232" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">窗口 2：第 8-10 天</text>
  <circle cx="440" cy="260" r="10" fill="url(#gBlue)"/>
  <text x="440" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <circle cx="480" cy="260" r="10" fill="url(#gBlue)"/>
  <text x="480" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <circle cx="520" cy="260" r="10" fill="url(#gBlue)"/>
  <text x="520" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">▶</text>
  <text x="560" y="264" fill="#93c5fd" font-size="12">× 3</text>

  <!-- Sum -->
  <text x="495" y="305" text-anchor="middle" fill="#fcd34d" font-size="16" font-weight="bold">单用户最多 6 次曝光</text>

  <!-- ========== RIGHT: Validation Use Cases ========== -->
  <!-- Use case 1: Data Quality -->
  <rect x="640" y="130" width="230" height="90" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="755" y="158" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">✅ 用途 1：数据质检</text>
  <text x="755" y="182" text-anchor="middle" fill="#cbd5e1" font-size="12">检查所有样本 PV</text>
  <text x="755" y="202" text-anchor="middle" fill="#cbd5e1" font-size="12">不超过理论上界</text>

  <!-- Use case 2: Model Constraint -->
  <rect x="640" y="240" width="230" height="90" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="755" y="268" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">🔒 用途 2：模型约束</text>
  <text x="755" y="292" text-anchor="middle" fill="#cbd5e1" font-size="12">预测值不得超过</text>
  <text x="755" y="312" text-anchor="middle" fill="#cbd5e1" font-size="12">物理可行范围</text>

  <!-- ========== BOTTOM: Comparison / Violation Example ========== -->
  <rect x="390" y="360" width="480" height="140" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="392" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">对比：模型预测 vs 上界</text>

  <!-- Bar: Upper bound -->
  <rect x="430" y="412" width="300" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <rect x="430" y="412" width="300" height="28" rx="6" fill="url(#gBlue)" opacity="0.3"/>
  <text x="580" y="431" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">上界 PV = 30,000</text>
  <line x1="730" y1="408" x2="730" y2="444" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bar: Valid prediction -->
  <rect x="430" y="448" width="230" height="18" rx="4" fill="url(#gGreen)" opacity="0.7"/>
  <text x="548" y="461" text-anchor="middle" fill="white" font-size="11" font-weight="bold">✓ 预测 25,000</text>

  <!-- Bar: Invalid prediction (exceeds) -->
  <rect x="430" y="472" width="350" height="18" rx="4" fill="url(#gRed)" opacity="0.7"/>
  <text x="605" y="485" text-anchor="middle" fill="white" font-size="11" font-weight="bold">✗ 预测 35,000 → 违反约束！</text>

  <!-- Exceeded part highlight -->
  <rect x="730" y="472" width="50" height="18" rx="0" fill="#ef4444" opacity="0.4"/>
  <line x1="730" y1="468" x2="730" y2="494" stroke="#ef4444" stroke-width="2"/>

  <!-- Arrows from formula to use cases -->
  <path d="M300 310 Q340 310 380 230" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <path d="M300 350 Q350 400 385 420" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" fill="#64748b" font-size="11">R&amp;F-Inventory (SIGIR 2026) — 频控规则推导 PV 天花板，用于数据质检 &amp; 模型可行域约束</text>
</svg>