<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="gUser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2C5F9E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gAd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8913A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C06A1A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gCross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5A3FD6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gMeta" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A9B52;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B61FF"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#F7F8FC"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">RankUp: 预训练Embedding交叉注入</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#777">将检索阶段的用户-广告匹配先验，以Cross Token形式注入排序模型</text>

  <!-- ===== LEFT: User Emb ===== -->
  <rect x="60" y="110" width="160" height="80" rx="14" fill="url(#gUser)" filter="url(#shadow)"/>
  <text x="140" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">User Emb</text>
  <text x="140" y="168" text-anchor="middle" font-size="12" fill="#D0E4FF">双塔检索模型 · 128维</text>

  <!-- ===== RIGHT: Ad Emb ===== -->
  <rect x="580" y="110" width="160" height="80" rx="14" fill="url(#gAd)" filter="url(#shadow)"/>
  <text x="660" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Ad Emb</text>
  <text x="660" y="168" text-anchor="middle" font-size="12" fill="#FFEACC">双塔检索模型 · 128维</text>

  <!-- Arrows down to multiply -->
  <line x1="140" y1="190" x2="340" y2="260" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <line x1="660" y1="190" x2="460" y2="260" stroke="#E8913A" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <!-- ===== CENTER: Element-wise Multiply ===== -->
  <circle cx="400" cy="270" r="38" fill="#fff" stroke="#7B61FF" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="264" text-anchor="middle" font-size="32" font-weight="bold" fill="#7B61FF">⊙</text>
  <text x="400" y="286" text-anchor="middle" font-size="10" fill="#7B61FF">逐元素乘</text>

  <!-- Label: soft cross -->
  <rect x="490" y="246" width="130" height="28" rx="8" fill="#F3EEFF" stroke="#7B61FF" stroke-width="1"/>
  <text x="555" y="265" text-anchor="middle" font-size="11" fill="#5A3FD6">偏好 × 属性 = 交叉</text>
  <line x1="490" y1="264" x2="440" y2="270" stroke="#7B61FF" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Arrow down to projection -->
  <line x1="400" y1="308" x2="400" y2="340" stroke="#7B61FF" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== Projection Box ===== -->
  <rect x="320" y="342" width="160" height="46" rx="10" fill="url(#gCross)" filter="url(#shadow)"/>
  <text x="400" y="363" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Linear → D维</text>
  <text x="400" y="380" text-anchor="middle" font-size="11" fill="#E0D4FF">生成 Cross Token</text>

  <!-- Arrow down to MetaFormer -->
  <line x1="400" y1="388" x2="400" y2="418" stroke="#7B61FF" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== MetaFormer ===== -->
  <rect x="140" y="420" width="520" height="72" rx="16" fill="url(#gMeta)" filter="url(#shadow)"/>
  <text x="400" y="450" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">MetaFormer（Token Mixing）</text>
  <text x="400" y="473" text-anchor="middle" font-size="12" fill="#D0FFDF">Cross Token + Global Token + Sparse Tokens → 逐层交互</text>

  <!-- Small tokens inside MetaFormer bar -->
  <rect x="170" y="432" width="50" height="22" rx="6" fill="#5A3FD6" opacity="0.9"/>
  <text x="195" y="447" text-anchor="middle" font-size="9" fill="#fff">Cross</text>

  <rect x="230" y="432" width="50" height="22" rx="6" fill="#333" opacity="0.6"/>
  <text x="255" y="447" text-anchor="middle" font-size="9" fill="#fff">Global</text>

  <rect x="290" y="432" width="50" height="22" rx="6" fill="#333" opacity="0.4"/>
  <text x="315" y="447" text-anchor="middle" font-size="9" fill="#fff">Sparse</text>

  <text x="352" y="447" text-anchor="middle" font-size="11" fill="#fff">…</text>

  <!-- Bottom insight callout -->
  <rect x="200" y="498" width="400" height="18" rx="6" fill="none"/>
  <text x="400" y="512" text-anchor="middle" font-size="12" font-style="italic" fill="#888">消融实验：去掉Cross Token → Block-0有效秩显著下降 ↓</text>
</svg>