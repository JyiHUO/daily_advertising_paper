<svg height="960" width="1440" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="url(#gold)" font-size="26" font-weight="bold" filter="url(#glow)">RankUp 微信广告全量上线效果</text>
  <text x="450" y="68" text-anchor="middle" fill="#8899bb" font-size="14">10M → 100M 参数 · 2层MetaFormer · 三大广告场景</text>

  <!-- Left: Before (RankMixer) -->
  <rect x="40" y="100" width="160" height="340" rx="14" fill="#1e2248" stroke="#444" stroke-width="1.5"/>
  <text x="120" y="130" text-anchor="middle" fill="#99aacc" font-size="16" font-weight="bold">RankMixer</text>
  <text x="120" y="152" text-anchor="middle" fill="#667" font-size="12">（基线）</text>

  <!-- Dim representation icon -->
  <circle cx="120" cy="210" r="36" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="120" cy="210" r="12" fill="#445"/>
  <text x="120" y="215" text-anchor="middle" fill="#889" font-size="10">低秩</text>
  <text x="120" y="275" text-anchor="middle" fill="#778899" font-size="11">表征坍缩</text>
  <text x="120" y="295" text-anchor="middle" fill="#556677" font-size="11">深层信息丢失</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00E676"/>
    </marker>
  </defs>
  <line x1="210" y1="270" x2="260" y2="270" stroke="#00E676" stroke-width="3" marker-end="url(#arrowG)"/>
  <text x="235" y="258" text-anchor="middle" fill="#00E676" font-size="13" font-weight="bold">RankUp</text>

  <!-- Right: RankUp block -->
  <rect x="270" y="100" width="160" height="340" rx="14" fill="#1a2848" stroke="#00E676" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" fill="#00E676" font-size="16" font-weight="bold">RankUp</text>
  <text x="350" y="152" text-anchor="middle" fill="#5a8" font-size="12">五项互补机制</text>

  <!-- Rich representation icon -->
  <circle cx="350" cy="210" r="36" fill="none" stroke="#00E676" stroke-width="2.5"/>
  <circle cx="350" cy="210" r="24" fill="none" stroke="#00C853" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="350" cy="210" r="12" fill="#00E676" opacity="0.5"/>
  <circle cx="338" cy="198" r="4" fill="#FFD700"/>
  <circle cx="362" cy="198" r="4" fill="#FFA500"/>
  <circle cx="350" cy="225" r="4" fill="#00BCD4"/>
  <circle cx="335" cy="215" r="3" fill="#E040FB"/>
  <circle cx="365" cy="215" r="3" fill="#FF5252"/>
  <text x="350" y="275" text-anchor="middle" fill="#aaccbb" font-size="11">高秩表征</text>
  <text x="350" y="295" text-anchor="middle" fill="#7a9" font-size="11">多样隐空间</text>

  <!-- Big arrow to results -->
  <polygon points="445,240 475,215 475,230 530,230 530,250 475,250 475,265" fill="url(#gold)" opacity="0.9"/>

  <!-- Results area -->
  <rect x="540" y="90" width="340" height="370" rx="16" fill="#111832" stroke="#FFD700" stroke-width="1.5" opacity="0.95"/>
  <text x="710" y="122" text-anchor="middle" fill="url(#gold)" font-size="18" font-weight="bold">A/B 测试结果 (14天)</text>

  <!-- Video号 bar -->
  <rect x="570" y="148" width="24" height="24" rx="4" fill="#07C160"/>
  <text x="600" y="165" fill="#ccc" font-size="13" font-weight="bold">视频号</text>
  <rect x="685" y="150" width="120" height="20" rx="4" fill="#1a3a2a" stroke="#2a5a3a" stroke-width="1"/>
  <rect x="685" y="150" width="102" height="20" rx="4" fill="url(#green)" opacity="0.85"/>
  <text x="820" y="165" fill="#00E676" font-size="14" font-weight="bold">GMV +3.41%</text>
  <text x="710" y="190" fill="#6a8a7a" font-size="11">AUC +0.367%</text>

  <!-- 公众号 bar -->
  <rect x="570" y="212" width="24" height="24" rx="4" fill="#576B95"/>
  <text x="600" y="229" fill="#ccc" font-size="13" font-weight="bold">公众号</text>
  <rect x="685" y="214" width="120" height="20" rx="4" fill="#1a2a3a" stroke="#2a4a5a" stroke-width="1"/>
  <rect x="685" y="214" width="120" height="20" rx="4" fill="#4FC3F7" opacity="0.7"/>
  <text x="820" y="229" fill="#4FC3F7" font-size="14" font-weight="bold">GMV +4.81%</text>
  <text x="710" y="254" fill="#6a8aaa" font-size="11">AUC +0.331%</text>

  <!-- 朋友圈 bar -->
  <rect x="570" y="276" width="24" height="24" rx="4" fill="#FA5151"/>
  <text x="600" y="293" fill="#ccc" font-size="13" font-weight="bold">朋友圈</text>
  <rect x="685" y="278" width="120" height="20" rx="4" fill="#3a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <rect x="685" y="278" width="72" height="20" rx="4" fill="#FF7043" opacity="0.75"/>
  <text x="820" y="293" fill="#FF7043" font-size="14" font-weight="bold">GMV +2.12%</text>
  <text x="710" y="318" fill="#aa7a6a" font-size="11">AUC +0.269%</text>

  <!-- Cold start highlight -->
  <rect x="560" y="340" width="305" height="65" rx="12" fill="#2a1a00" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="712" y="362" text-anchor="middle" fill="#FFD700" font-size="15" font-weight="bold">🔥 新广告冷启动</text>
  <text x="712" y="385" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold">首日 GMV +9.67%</text>
  <text x="712" y="400" text-anchor="middle" fill="#aa8a3a" font-size="10">数据稀疏时，高秩表征价值最大</text>

  <!-- Revenue label -->
  <rect x="560" y="418" width="305" height="30" rx="8" fill="#1a1a3a"/>
  <text x="712" y="439" text-anchor="middle" fill="#bb99dd" font-size="13">年化增收估计：数亿美元量级 💰</text>

  <!-- Bottom insight -->
  <rect x="40" y="475" width="820" height="55" rx="12" fill="#0d1225" stroke="#334" stroke-width="1"/>
  <text x="450" y="500" text-anchor="middle" fill="#aabbcc" font-size="15">核心洞察：<tspan fill="#00E676" font-weight="bold">解决表征坍缩</tspan> → 深层参数真正被利用 → <tspan fill="#FFD700" font-weight="bold">广告GMV显著增长</tspan></text>
  <text x="450" y="520" text-anchor="middle" fill="#667788" font-size="12">工业推荐系统中 AUC +0.3% 已属显著改进</text>
</svg>