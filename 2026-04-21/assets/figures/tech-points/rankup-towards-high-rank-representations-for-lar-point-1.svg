  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">RankUp: 随机置换分割 vs 语义分组</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#666">降低 Token 间相关性 → 提升有效秩</text>

  <!-- ===== LEFT SIDE: Semantic Grouping ===== -->
  <rect x="30" y="80" width="400" height="420" rx="14" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="80" width="400" height="36" rx="14" fill="#e53935" opacity="0.12"/>
  <text x="230" y="104" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">❌ 语义分组（传统）</text>

  <!-- Feature pool -->
  <rect x="60" y="130" width="340" height="50" rx="8" fill="#ffcdd2" stroke="#e53935" stroke-width="1.2"/>
  <text x="230" y="152" text-anchor="middle" font-size="12" fill="#b71c1c" font-weight="bold">1200 个稀疏特征</text>
  <text x="230" y="168" text-anchor="middle" font-size="11" fill="#c62828">按语义分组：用户人口 | 用户行为 | 广告属性 | …</text>

  <!-- Arrow down -->
  <line x1="230" y1="182" x2="230" y2="205" stroke="#e53935" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Grouped tokens -->
  <g>
    <rect x="60" y="210" width="78" height="44" rx="6" fill="#ef9a9a" stroke="#e53935" stroke-width="1"/>
    <text x="99" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Token 1</text>
    <text x="99" y="242" text-anchor="middle" font-size="9" fill="#c62828">年龄,性别,城市</text>

    <rect x="145" y="210" width="78" height="44" rx="6" fill="#ef9a9a" stroke="#e53935" stroke-width="1"/>
    <text x="184" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Token 2</text>
    <text x="184" y="242" text-anchor="middle" font-size="9" fill="#c62828">点击,浏览,购买</text>

    <rect x="230" y="210" width="78" height="44" rx="6" fill="#ef9a9a" stroke="#e53935" stroke-width="1"/>
    <text x="269" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Token 3</text>
    <text x="269" y="242" text-anchor="middle" font-size="9" fill="#c62828">广告类目,出价</text>

    <rect x="315" y="210" width="78" height="44" rx="6" fill="#ef9a9a" stroke="#e53935" stroke-width="1"/>
    <text x="354" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">… ×32</text>
    <text x="354" y="242" text-anchor="middle" font-size="9" fill="#c62828">长尾特征堆积</text>
  </g>

  <!-- Problem label -->
  <text x="230" y="278" text-anchor="middle" font-size="12" fill="#b71c1c" font-weight="bold">⚠ 同组特征高度相关</text>

