    <text x="624" y="242" text-anchor="middle" font-size="9" fill="#2e7d32">性别,点击,素材</text>

    <rect x="670" y="210" width="78" height="44" rx="6" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1"/>
    <text x="709" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">Token 3</text>
    <text x="709" y="242" text-anchor="middle" font-size="9" fill="#2e7d32">城市,浏览,标签</text>

    <rect x="755" y="210" width="78" height="44" rx="6" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1"/>
    <text x="794" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">… ×32</text>
    <text x="794" y="242" text-anchor="middle" font-size="9" fill="#2e7d32">特征分散混合</text>
  </g>

