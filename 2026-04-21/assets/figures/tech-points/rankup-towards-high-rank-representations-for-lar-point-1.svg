  <rect x="532" y="336" width="16" height="16" rx="2" fill="#a5d6a7" opacity="0.2"/>
  <rect x="550" y="336" width="16" height="16" rx="2" fill="#81c784" opacity="0.3"/>
  <rect x="568" y="336" width="16" height="16" rx="2" fill="#a5d6a7" opacity="0.25"/>
  <rect x="586" y="336" width="16" height="16" rx="2" fill="#81c784" opacity="0.2"/>
  <rect x="604" y="336" width="16" height="16" rx="2" fill="#a5d6a7" opacity="0.15"/>
  <rect x="532" y="354" width="16" height="16" rx="2" fill="#81c784" opacity="0.25"/>
  <rect x="550" y="354" width="16" height="16" rx="2" fill="#a5d6a7" opacity="0.2"/>
  <rect x="568" y="354" width="16" height="16" rx="2" fill="#81c784" opacity="0.3"/>
  <rect x="586" y="354" width="16" height="16" rx="2" fill="#a5d6a7" opacity="0.2"/>
  <rect x="604" y="354" width="16" height="16" rx="2" fill="#81c784" opacity="0.25"/>
  <text x="580" y="385" text-anchor="middle" font-size="10" fill="#2e7d32">低互信息 🟢</text>

  <!-- Effective rank bars (high & uniform) -->
  <g transform="translate(700, 292)">
    <text x="60" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">有效秩分布</text>
    <rect x="10" y="24" width="10" height="52" rx="2" fill="#66bb6a"/>
    <rect x="24" y="22" width="10" height="54" rx="2" fill="#66bb6a"/>
    <rect x="38" y="26" width="10" height="50" rx="2" fill="#66bb6a"/>
    <rect x="52" y="24" width="10" height="52" rx="2" fill="#66bb6a"/>
    <rect x="66" y="22" width="10" height="54" rx="2" fill="#66bb6a"/>
