    <line x1="5" y1="76" x2="123" y2="76" stroke="#1b5e20" stroke-width="0.8"/>
    <text x="60" y="90" text-anchor="middle" font-size="9" fill="#2e7d32">所有 Token 秩 ≈ 35+ ↑</text>
