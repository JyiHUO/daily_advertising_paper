  <text x="450" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">核心思想：打乱特征顺序 → 每个 Token 信息更多样 → 有效秩 ↑</text>
  <text x="450" y="494" text-anchor="middle" font-size="11" fill="#555">微信广告全量上线，GMV +2~5%</text>
